tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por horas a compensar", "q": "Las horas realizadas en días inhábiles o de descanso se computan multiplicando por:", "opciones": ["1,5", "1,25", "2", "1,75"], "correcta": 2, "expl": "El Art. 49 lit. c fija el coeficiente 2 para días inhábiles o de descanso.", "id": "5-27", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por exámenes génito-mamarios y urológicos", "q": "Las funcionarias tienen derecho a licencia para exámenes génito-mamarios de:", "opciones": ["2 dias al año", "1 dia al año", "Medio dia", "3 dias al año"], "correcta": 1, "expl": "El Art. 51 otorga 1 dia al año para Papanicolaou y/o radiografía mamaria.", "id": "5-28", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia gremial", "q": "El tope de la licencia gremial es de:", "opciones": ["1.000 horas mensuales", "2.000 horas mensuales", "2.000 horas anuales", "500 horas mensuales"], "correcta": 1, "expl": "El Art. 54 fija un tope de 2.000 horas mensuales.", "id": "5-29", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia gremial", "q": "Cada solicitud de licencia gremial no puede exceder un período de:", "opciones": ["7 dias corridos", "15 dias corridos", "30 dias corridos", "10 dias hábiles"], "correcta": 1, "expl": "El Art. 55 fija un máximo de 15 dias corridos desde la fecha de inicio.", "id": "5-30", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por reproducción asistida", "q": "Para hombres, la licencia por reproducción asistida es:", "opciones": ["No mayor a 24 horas", "De 1 a 5 dias", "48 horas", "72 horas"], "correcta": 0, "expl": "El Art. 56 concede a los hombres una licencia no mayor a 24 horas.", "id": "5-31", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia para perfeccionamiento", "q": "La licencia para perfeccionamiento es de hasta:", "opciones": ["5 dias al año", "10 dias al año", "20 dias al año", "15 dias al año"], "correcta": 1, "expl": "El Art. 57 otorga hasta 10 dias al año (ampliable por Directorio).", "id": "5-32", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia en apoyo a deportistas", "q": "La licencia en apoyo a deportistas abarca:", "opciones": ["Solo el dia del certamen", "Desde 2 dias antes hasta 2 dias después de la participación de la delegación", "Una semana antes y después", "Solo los dias de competencia"], "correcta": 1, "expl": "El Art. 58 la concede desde 2 dias antes del certamen hasta 2 dias después de finalizada la participación.", "id": "5-33", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia sin goce de sueldo", "q": "El plazo máximo de la licencia especial sin goce de sueldo es:", "opciones": ["6 meses", "1 año", "2 años", "5 años"], "correcta": 1, "expl": "El Art. 59 fija un plazo máximo de hasta 1 año (con excepciones para casos en el exterior, organismos internacionales, etc.).", "id": "5-34", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por familiar enfermo", "q": "La licencia especial por familiar enfermo es de hasta:", "opciones": ["5 dias, o 10 con internación", "10 dias hábiles, y hasta 15 dias hábiles con internación", "15 dias siempre", "20 dias al año"], "correcta": 1, "expl": "El Art. 60 otorga hasta 10 dias hábiles y hasta 15 dias hábiles por año en caso de internación.", "id": "5-35", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Disposiciones generales", "q": "El pago en dinero de licencias no gozadas al cese no puede exceder de:", "opciones": ["30 dias corridos", "45 dias corridos", "60 dias corridos", "90 dias corridos"], "correcta": 2, "expl": "El Art. 67 limita el pago a un máximo de 60 dias corridos.", "id": "5-36", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Disposiciones generales", "q": "Respecto del derecho a la licencia anual reglamentaria, es correcto que:", "opciones": ["Caduca al año", "No caduca y es irrenunciable", "Es renunciable por escrito", "Caduca a los 2 años"], "correcta": 1, "expl": "El derecho no caduca (Art. 68) y es irrenunciable (Art. 69).", "id": "5-37", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Modificativas 2024", "q": "Las R.D. de 2024 modificaron principalmente los artículos referidos a:", "opciones": ["Licencia por estudio y gremial", "Maternidad, paternidad y reducción horaria (arts. 12, 14, 16, 17 y 22)", "Enfermedad y duelo", "Donación y deportistas"], "correcta": 1, "expl": "R.D. 10-2/2024 modificó arts. 12, 14, 16, 17 y 22; R.D. 14-5/2024 modificó nuevamente el art. 22 (reducción horaria por adopción).", "id": "5-38", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Disposiciones generales", "q": "El plazo general para solicitar las licencias del reglamento es:", "opciones": ["Con 48 horas de anticipación", "Hasta el día de inicio (salvo enfermedad)", "Con 1 semana de anticipación", "Hasta 3 días después del inicio"], "correcta": 1, "expl": "El Art. 62 establece que deben solicitarse hasta el día de inicio; no aplica a la licencia por enfermedad.", "id": "5-39", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}], "autoeval": [{"q": "Enumerá la licencia ordinaria base y cómo se incrementa por antigüedad.", "a": "Base de 20 dias hábiles anuales como minimo (Art. 2), mas 1 dia complementario por cada 4 años de antigüedad para quienes tengan mas de 5 años de servicios estatales (Art. 3)."}, {"q": "Describí la duración de la licencia por maternidad y sus ampliaciones.", "a": "14 semanas (1 antes y 13 después del parto), adelantable hasta 6 semanas antes (Art. 12). Se amplía a 18 semanas por nacimientos múltiples, pretérminos o peso menor o igual a 1,5 kg (Art. 14 lit. f), y puede extenderse hasta los 6 meses del bebé si nace con afección grave o discapacidad (Art. 14 lit. d y e). Todo según R.D. 10-2/2024."}, {"q": "Cuál es la regla de la licencia por paternidad y su excepción?", "a": "10 dias hábiles desde el nacimiento (Art. 17); 30 dias corridos en los casos de los literales d, e y f del Art. 14 (modif. R.D. 10-2/2024)."}, {"q": "Explicá la escala de días de la licencia por duelo.", "a": "10 dias hábiles por padres, cónyuge, hijos, hijos adoptivos, padres adoptantes y concubinos; 4 dias hábiles por hermanos; 2 dias hábiles por abuelos, nietos, parientes políticos, padrastros/hijastros, tíos y sobrinos (Art. 41)."}, {"q": "Cómo funciona la licencia por estudio y sus requisitos?", "a": "Hasta 20 dias hábiles anuales para rendir exámenes (Art. 43). Requisitos: terciaria/universitaria aprobar 2 materias en el año civil anterior; secundaria aprobar 75% de materias; se reduce a 10 dias si solo aprobó 2 materias en los 2 años previos; no se exige a quienes la usan por primera vez (Art. 44)."}, {"q": "Detallá la licencia por reproducción asistida según el género.", "a": "Mujeres: 1 a 5 dias previos a la punción; 48 horas entre punción e implantación; máximo 72 horas desde la implantación. Hombres: no mayor a 24 horas (Art. 56)."}, {"q": "Qué dispone el reglamento sobre licencia sin goce de sueldo?", "a": "El Directorio puede concederla en casos fundados, sin goce de sueldo, por hasta 1 año, no reiterable hasta transcurridos 4 años; con excepciones (cónyuge funcionario en el exterior, organismos internacionales hasta 5 años, estudios/investigaciones en el extranjero, cargos docentes, consultorías) (Art. 59)."}, {"q": "Qué reglas de cierre fija el reglamento sobre el derecho a licencia (caducidad, renuncia, pago al cese)?", "a": "La licencia anual no caduca (Art. 68) y es irrenunciable (Art. 69); al cese se paga en dinero la licencia no gozada sin exceder 60 dias corridos (Art. 67); por cada 15 inasistencias imputables se descuenta 1 dia de licencia (Art. 66)."}, {"q": "Qué cambiaron las modificativas de 2024?", "a": "La R.D. N° 10-2/2024 (17.04.2024) modificó los arts. 12, 14, 16, 17 y 22 (maternidad, paternidad y reducción horaria) y la R.D. N° 14-5/2024 (22.05.2024) ajustó nuevamente el art. 22 (la reducción horaria por adopción se extiende hasta el año de la entrega efectiva del menor)."}], "huecos": ["El reglamento no fija un número exacto de días para varias licencias por leyes especiales (Censo, Juntas Departamentales/Locales/Electorales, feriado departamental, Comisión Receptora de Votos): remite a la Ley Electoral y a las normas que en cada caso lo establezcan (Arts. 45-48), por lo que esos días concretos no surgen del PDF.", "El reglamento no establece un tope máximo de días para la licencia por enfermedad (Cap. VII); fija controles y umbrales de ausentismo (Art. 35) pero no un límite de días en sí.", "El asueto del 28 de mayo mencionado en la consigna no aparece en este Reglamento de Licencias; el reglamento trata asuetos/feriados de forma genérica (Arts. 10, 65) sin fijar fecha. El asueto del 28 de mayo (aniversario del BPS) se regula por otra norma no incluida en este PDF.", "El texto del PDF se obtuvo completo por web_fetch (R.D. 34-2/2022 + modificativas R.D. 10-2/2024 y R.D. 14-5/2024); no hubo truncamiento de contenido normativo relevante."]}, {"id": 6, "tema": "Reglamento de Procedimiento Administrativo del BPS", "fuente_pagina": "https://www.bps.gub.uy/24267/", "fuente_pdf": "https://www.bps.gub.uy/bps/file/24267/1/reglamento-de-procedimiento-administrativo.pdf", "fuente_nombre": "Reglamento de Procedimiento Administrativo del Banco de Previsión Social (R.D. 40-29/1997 y resoluciones modificativas)", "ficha": "Es el reglamento interno del BPS que regula el procedimiento administrativo comun, es decir, cómo se tramitan los asuntos ante el organismo. El Libro I cubre los principios generales, la iniciación y el trámite del expediente, las notificaciones, los términos y plazos, las peticiones, el acto administrativo y los recursos administrativos. El Libro II regula el procedimiento disciplinario (sumarios e investigaciones). Recoge y adapta para el BPS las reglas nacionales (Constitución, Ley 15.869, Decreto 500/991 y normas conexas).", "eli5": "Imaginá que el BPS es una oficina enorme con miles de trámites. Este reglamento es el manual de reglas del juego: dice cómo presentar un pedido, cómo se arma la carpeta (expediente), cuánto tiempo tiene cada uno para responder, cómo te avisan las decisiones (notificaciones) y, lo más importante, qué podés hacer si una resolución no te gusta: presentar recursos. Es como las reglas de un partido: si no las seguís en tiempo y forma, perdés la jugada (por ejemplo, si dejás pasar el plazo para recurrir).", "esquema": ["LIBRO I – Del Procedimiento Administrativo en General (Arts. 1-134)", "Sección I – Principios Generales (Arts. 1-13)", "  - Ámbito de aplicación (Art. 1)", "  - Lista de principios generales (Art. 2)", "  - Excusación y recusación (Art. 3)", "  - Verdad material, debido proceso, buena fe (Arts. 4-6)", "  - Vicios de forma y conservación del acto (Art. 7)", "  - Celeridad e informalismo (Arts. 8-9)", "Sección II – Del Trámite Administrativo (Arts. 14-100)", "  - Iniciación: a petición o de oficio (Arts. 14-17)", "  - Forma, presentación y recepción de escritos (Arts. 18-25)", "  - Formas de documentación; oficio, circular, comunicado, memorando (Arts. 26-32)", "  - De los expedientes (Arts. 33-37)", "  - De los formularios (Arts. 38-42)", "  - Aspectos materiales, foliatura, piezas y desgloses (Arts. 43-53)", "  - Sustanciación: impulsión de oficio, prueba, vista (Arts. 54-73)", "  - Terminación: resolución, desistimiento, renuncia, paralización (Arts. 74-79)", "  - De las notificaciones (Arts. 80-89)", "  - De los términos y plazos (Arts. 90-100)", "Sección III – De las Peticiones y de los Actos y Recursos Administrativos (Arts. 101-134)", "  - Derecho de petición (Arts. 101-103)", "  - Actos administrativos: definición, motivación, estructura (Arts. 104-111)", "  - De los Recursos Administrativos (Arts. 112-134)", "    - Recursos de revocación y jerárquico; plazos (Arts. 112-120)", "    - Trámite de los recursos (Arts. 121-134)", "LIBRO II – Del Procedimiento Disciplinario (Arts. 135 en adelante)", "  - Principios; falta; secreto; non bis in idem (Arts. 135-140)", "  - Denuncias e informaciones de urgencia (Arts. 141-147)", "  - Sumarios e investigaciones administrativas (Arts. 148-182...)"], "datos_duros": ["PLAZO RECURSO DE REVOCACIÓN: 10 días corridos y siguientes al de la notificación personal o publicación en el Diario Oficial; se interpone ante el mismo órgano que dictó el acto (Art. 112).", "RECURSO JERÁRQUICO: se interpone en forma CONJUNTA y SUBSIDIARIA con el de revocación, ante el jerarca máximo del órgano, cuando el acto fue dictado por un órgano sometido a jerarquía (Art. 112).", "Si el acto NO fue notificado personalmente ni publicado, el interesado puede recurrirlo en cualquier momento (Art. 112).", "PLAZO PARA RESOLVER LOS RECURSOS: el Directorio del BPS tiene 120 días para resolver; se cuentan por días corridos sin interrupción, se suspenden en Semana de Turismo y se extienden al día hábil siguiente si vencen en feriado (Art. 115).", "El plazo de los recursos se SUSPENDE durante las Ferias Judiciales y la Semana de Turismo, y se extiende al día hábil siguiente si vence en feriado (Art. 114).", "INSTRUCCIÓN DEL RECURSO DE REVOCACIÓN: 30 días desde el día siguiente a su interposición (Art. 116 lit. a).", "INSTRUCCIÓN DEL RECURSO JERÁRQUICO: 30 días, a partir de los 150 días siguientes a la interposición, o desde el día siguiente a la notificación de la resolución expresa del recurso de revocación (Art. 116 lit. b).", "Los plazos de instrucción de los recursos (Art. 116) se cuentan por días corridos, sin interrupción, NO se suspenden por Semana de Turismo, y se extienden al día hábil siguiente si vencen en feriado (Art. 116).", "AGOTAMIENTO DE LA VÍA ADMINISTRATIVA: a los 150 días de interpuesto el recurso de revocación si es el único; a los 200 días de la interposición conjunta de revocación y jerárquico (Art. 117; Art. 41 Ley 17.292).", "DENEGATORIA FICTA / CONFIRMACIÓN FICTA: vencidos los 200 días sin resolución, se reputa fictamente confirmado el acto impugnado (Art. 118).", "Si no se resuelven los recursos dentro de los 30 días siguientes a la denegatoria ficta, la omisión se tendrá como presunción simple a favor del administrado ante el TCA en acción de nulidad (Art. 118; Art. 41 Ley 17.292).", "Los escritos de interposición de recursos y los presentados durante su tramitación llevan FIRMA DE LETRADO (abogado); si falta, se otorgan 10 días hábiles para salvarla, bajo apercibimiento de tener el recurso por no presentado (Art. 125; Decreto-ley 15.524 art. 37).", "PLAZO GENERAL DE LA ADMINISTRACIÓN PARA DECIDIR PETICIONES: 120 días desde el cumplimiento del último acto que ordene la norma; vencido, se entiende DESECHADA la petición (Art. 90; Constitución art. 318).", "Petición ante cualquier órgano: se tiene por desechada si a los 150 días de su presentación no hay resolución expresa (Art. 92).", "TRÁMITES DE INSTRUCCIÓN DE PETICIONES: deben cumplirse en 30 días desde el día siguiente a la petición (Art. 91).", "CÓMPUTO DE LOS PLAZOS PARA DECIDIR (Arts. 90-93): se cuentan por días CORRIDOS, sin interrupción; si vencen en feriado se extienden al día hábil siguiente; se suspenden solo durante la Semana de Turismo (Art. 93; Ley 15.869 art. 10).", "REGLA GENERAL DE PLAZOS REGLAMENTARIOS: cuando se señalan por días, se entienden HÁBILES; son hábiles los días en que funcionan las oficinas de la Administración Pública (Art. 97).", "Los plazos se cuentan SIEMPRE a partir del día siguiente a la notificación o publicación del acto (Art. 96).", "Plazos en meses: de fecha a fecha; si no hay día equivalente, expira el último día del mes. Plazos en años: naturales (Art. 97).", "Los plazos vencen en el último momento hábil del horario de la oficina del día respectivo; si vencen en feriado, se extienden al día hábil siguiente (Art. 98).", "PRÓRROGA de plazos exclusivamente reglamentarios: a pedido de parte, por una sola vez, sin exceder la mitad del plazo original; si la Administración no se expide en 3 días, se reputa concedida (Art. 95).", "VISTA PREVIA: cuando pueda recaer decisión contraria, sanción o perjuicio, o haya oposición, se da vista al interesado por 10 días para descargos y defensa (Art. 69).", "PERÍODO DE PRUEBA a pedido de parte: plazo prudencial no superior a 30 días (Art. 66).", "DICTÁMENES de técnicos y asesores: 5 días desde recibido el expediente, prorrogable hasta 10 días con constancia fundada (Art. 56).", "PROVIDENCIAS DE TRÁMITE: 3 días desde el siguiente a la recepción; diligencias ordenadas: 5 días, ampliables 5 días más (Art. 99).", "NOTIFICACIONES: se practican en plazo máximo de 5 días hábiles desde el día siguiente a la recepción del expediente en la oficina notificadora (Art. 80).", "Notificación por domicilio desconocido: publicación en el Diario Oficial durante TRES días seguidos (Art. 83).", "Notificaciones defectuosas: surten efecto desde que el interesado hace manifestación expresa o interpone el recurso pertinente (Art. 88).", "El conocimiento informal del acto NO suple la notificación personal ni la publicación, por lo que no hace correr el plazo para recurrir (Art. 113).", "Personería no acreditada: 10 días hábiles para salvar la omisión, bajo apercibimiento de archivo (Art. 23).", "Retiro de expedientes por las partes/letrados: máximo 5 días, previa autorización (Art. 70).", "Paralización por causa del interesado: la Administración intima comparecencia en plazo prudencial no mayor de 30 días (Art. 78).", "La falta de impulsión por los interesados NO produce perención; el procedimiento continúa hasta la decisión final (Art. 54).", "Expediente: se forma una segunda pieza al alcanzar 100 hojas (Art. 51); toda pieza de más de una hoja se folia (Art. 48).", "Interposición por telegrama colacionado/fax: 10 días hábiles para comparecer a ratificar, cumplir firma letrada y demás requisitos, bajo apercibimiento de tener el recurso por no presentado (Art. 126).", "Pasividades civiles (delegación del Poder Ejecutivo): corresponde interponer conjunta y subsidiariamente revocación y jerárquico (Art. 130; Decreto 264/996 art. 1)."], "teoria_resumida": "\u003cp\u003eEl \u003cstrong\u003eReglamento de Procedimiento Administrativo del BPS\u003c/strong\u003e regula cómo se tramitan los asuntos ante el organismo. Su \u003cstrong\u003eLibro I\u003c/strong\u003e es lo más evaluable: principios, trámite del expediente, notificaciones, plazos, peticiones, actos y recursos.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePrincipios (Art. 2):\u003c/strong\u003e imparcialidad, legalidad objetiva, impulsión de oficio, verdad material, economía/celeridad/eficacia, informalismo en favor del administrado, debido procedimiento, contradicción, buena fe, motivación y gratuidad. Sirven además como criterio interpretativo. La \u003cstrong\u003eimpulsión es de oficio\u003c/strong\u003e (Art. 54): la falta de actividad del interesado no produce perención. Rige la \u003cstrong\u003everdad material\u003c/strong\u003e (Art. 4) y el \u003cstrong\u003einformalismo\u003c/strong\u003e (Art. 9).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEl expediente (Arts. 33-53):\u003c/strong\u003e se forma cuando hay que reunir actuaciones para resolver; se ordena por fechas, se folia, y al llegar a 100 hojas se abre nueva pieza (Arts. 34, 48, 51). Tiene número correlativo anual único (Art. 36).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVista de las actuaciones (Art. 69):\u003c/strong\u003e antes de una decisión contraria, sancionatoria o perjudicial, o si hubo oposición, se da \u003cstrong\u003evista al interesado por 10 días\u003c/strong\u003e para descargos y defensa. Las partes pueden examinar el expediente (Art. 70).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNotificaciones (Arts. 80-89):\u003c/strong\u003e se notifican las resoluciones que dan vista, las que culminan el procedimiento y las que causan gravamen irreparable. Plazo de la oficina: \u003cstrong\u003e5 días hábiles\u003c/strong\u003e (Art. 80). Si se desconoce el domicilio: \u003cstrong\u003e3 días seguidos en el Diario Oficial\u003c/strong\u003e (Art. 83). El conocimiento informal NO hace correr plazos (Art. 113).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePlazos (Arts. 90-100):\u003c/strong\u003e regla clave del Art. 97: \u003cstrong\u003ecuando se señalan por días, son hábiles\u003c/strong\u003e. Se cuentan desde el día siguiente a la notificación/publicación (Art. 96). En cambio, los plazos para que la Administración DECIDA peticiones y recursos se cuentan por \u003cstrong\u003edías corridos\u003c/strong\u003e, suspendiéndose solo en Semana de Turismo (Arts. 93, 115). La Administración tiene \u003cstrong\u003e120 días\u003c/strong\u003e para decidir; vencidos, la petición se entiende desechada (Art. 90).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eActo administrativo (Arts. 104-111):\u003c/strong\u003e es toda manifestación de voluntad de la Administración que produce efectos jurídicos (Art. 104). Debe ser \u003cstrong\u003emotivado\u003c/strong\u003e (Art. 106) y constar de parte expositiva (Visto, Resultandos, Considerandos, Atento) y dispositiva (Art. 107).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRECURSOS ADMINISTRATIVOS (Arts. 112-134) – lo más evaluable:\u003c/strong\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eRevocación:\u003c/strong\u003e 10 días corridos desde la notificación personal o publicación, ante el mismo órgano que dictó el acto (Art. 112).\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eJerárquico:\u003c/strong\u003e conjunta y subsidiariamente con el de revocación, ante el jerarca máximo, si el órgano está sometido a jerarquía (Art. 112).\u003c/li\u003e\u003cli\u003eEl plazo para recurrir se \u003cstrong\u003esuspende en Ferias Judiciales y Semana de Turismo\u003c/strong\u003e (Art. 114).\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eAgotamiento de la vía:\u003c/strong\u003e 150 días si solo hay revocación; 200 días si hay revocación + jerárquico (Art. 117). Vencidos los 200 días sin resolver, el acto se reputa \u003cstrong\u003efictamente confirmado\u003c/strong\u003e (Art. 118).\u003c/li\u003e\u003cli\u003eLos escritos de recursos llevan \u003cstrong\u003efirma de letrado\u003c/strong\u003e (Art. 125).\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eEl BPS aplica además las normas nacionales: \u003cstrong\u003eConstitución (arts. 30, 66, 318), Ley 15.869, Ley 17.292 y normas del Decreto 500/991\u003c/strong\u003e, que el reglamento recoge y cita.\u003c/p\u003e", "teoria_exhaustiva": [{"ref": "Art. 1", "titulo": "Ámbito de aplicación", "cita": "Las disposiciones de este reglamento alcanzan al procedimiento administrativo común, desenvuelto en la actividad del BPS dentro de sus diversos cometidos.", "explicacion": "Define que el reglamento rige el procedimiento administrativo común del BPS, no procedimientos especiales que tengan su propia norma.", "ejemplo": "El trámite de una solicitud de certificado o de una pasividad sigue estas reglas salvo norma especial."}, {"ref": "Art. 2", "titulo": "Principios generales", "cita": "Imparcialidad; legalidad objetiva; impulsión de oficio; verdad material; economía, celeridad y eficacia; informalismo en favor del administrado; flexibilidad; delegación material; debido procedimiento; contradicción; buena fe; motivación; gratuidad.", "explicacion": "Enumera los principios que rigen toda la actuación del BPS y que sirven también como criterio interpretativo para resolver dudas en la aplicación de las reglas.", "ejemplo": "Si una regla admite dos lecturas, se elige la que favorece al administrado (informalismo)."}, {"ref": "Art. 3", "titulo": "Excusación y recusación", "cita": "Los funcionarios deberán excusarse y ser recusados cuando medie cualquier circunstancia comprobable que pueda afectar su imparcialidad.", "explicacion": "Garantiza la imparcialidad. La excusación o recusación no suspende el procedimiento; se forma expediente separado que se eleva en 5 días al jerarca superior, quien decide.", "ejemplo": "Un funcionario enemistado con la parte debe apartarse del trámite."}, {"ref": "Art. 4", "titulo": "Verdad material", "cita": "El BPS está obligado a ajustarse a la verdad material de los hechos, sin que lo obliguen los acuerdos entre los interesados.", "explicacion": "La Administración debe investigar y conocer los hechos reales, aunque no hayan sido alegados o probados por las partes.", "ejemplo": "Aunque las partes admitan un hecho, el BPS debe verificarlo si influye en la decisión."}, {"ref": "Art. 5", "titulo": "Debido proceso", "cita": "Los interesados gozarán de todos los derechos y garantías inherentes al debido proceso... un procedimiento de duración razonable.", "explicacion": "Reconoce las garantías constitucionales, legales y de derecho internacional, incluyendo la duración razonable.", "ejemplo": "El interesado tiene derecho a ser oído y a ofrecer prueba."}, {"ref": "Art. 7", "titulo": "Vicios de forma y conservación", "cita": "Los vicios de forma de los actos de procedimiento no causan nulidad si cumplen con el fin que los determina y no se hubieren disminuido las garantías.", "explicacion": "Consagra el principio de conservación: un defecto formal no anula si el acto cumplió su fin y no provocó indefensión. La nulidad de un acto no contagia a los independientes.", "ejemplo": "Un escrito con un error formal menor que igualmente fue entendido no se anula."}, {"ref": "Arts. 8-9", "titulo": "Celeridad e informalismo", "cita": "Deberá asegurarse la celeridad, simplicidad y economía... se aplicará el principio del informalismo en favor del administrado.", "explicacion": "Se evitan trámites y formalismos innecesarios. El informalismo opera ante exigencias formales no esenciales que pueden cumplirse después.", "ejemplo": "Una omisión formal subsanable no causa el rechazo del trámite."}, {"ref": "Arts. 14-15", "titulo": "Iniciación del procedimiento", "cita": "El procedimiento podrá iniciarse a petición de persona interesada o de oficio.", "explicacion": "Dos vías de inicio. Iniciado, la autoridad puede adoptar medidas provisionales para asegurar la eficacia de la resolución, salvo que causen perjuicios graves o irreparables.", "ejemplo": "El BPS inicia de oficio una investigación por denuncia."}, {"ref": "Arts. 18-25", "titulo": "Forma, presentación y recepción de escritos", "cita": "Toda petición o exposición se efectuará por escrito... todo escrito deberá acompañarse de copia firmada, devuelta con constancia de fecha y hora.", "explicacion": "Regula la forma de los escritos, la firma, la presentación de documentos en fotocopia con certificación, y la constancia de recepción. Si no se acredita personería, hay 10 días hábiles para salvarlo (Art. 23).", "ejemplo": "Se presenta el escrito con una copia que la oficina sella con fecha y hora."}, {"ref": "Art. 26-27", "titulo": "Formas de documentación del acto", "cita": "Los actos administrativos se documentarán por escrito cuando la norma lo disponga... contendrán lugar y fecha, órgano, funcionario y firma.", "explicacion": "La forma es el modo de documentar la voluntad administrativa. Puede prescindirse de la forma escrita por urgencia o imposibilidad, documentándose después.", "ejemplo": "Una orden urgente verbal se documenta por escrito en la primera oportunidad."}, {"ref": "Art. 30", "titulo": "Oficio, circular, comunicado y memorando", "cita": "El oficio... para dar conocimiento de resoluciones a otro órgano; la circular... órdenes a funcionarios; el comunicado... noticias generales; el memorando... comunicaciones directas jerarca-subordinado.", "explicacion": "Define los cuatro instrumentos de comunicación escrita y para qué se usa cada uno.", "ejemplo": "Un memorando comunica una instrucción del gerente a su equipo."}, {"ref": "Arts. 33-37", "titulo": "De los expedientes", "cita": "Se formará expediente con aquellos asuntos que se documentan por escrito siempre que sea necesario mantener reunidas todas las actuaciones para resolver.", "explicacion": "El expediente reúne las actuaciones; se ordena por fechas (Art. 34), tiene número correlativo anual único (Art. 36) y hoja de tramitación inicial (Art. 37). No se forma expediente con circulares, comunicados, memorandos ni trámites por formulario (Art. 35).", "ejemplo": "Una solicitud de pasividad genera un expediente con todas sus actuaciones."}, {"ref": "Arts. 48-53", "titulo": "Foliatura, piezas y desgloses", "cita": "Toda pieza documental de más de una hoja deberá ser foliada... Cuando un expediente alcance a cien hojas se formará una segunda pieza.", "explicacion": "Reglas materiales: foliar las hojas, enmendar la foliatura con constancia, formar nueva pieza cada 100 hojas, y dejar constancia de los desgloses.", "ejemplo": "Al llegar a la hoja 100 se abre la pieza 2 con su propia carátula."}, {"ref": "Art. 54", "titulo": "Impulsión de oficio / no perención", "cita": "La impulsión del procedimiento se realizará de oficio... La falta de impulsión por los interesados no produce la perención de las actuaciones.", "explicacion": "La Administración impulsa el trámite por sí misma. Que el interesado no actúe no caduca el expediente: debe seguir hasta la decisión final.", "ejemplo": "Aunque el peticionario no haga nada, el BPS debe resolver."}, {"ref": "Art. 56", "titulo": "Plazo de dictámenes técnicos", "cita": "Los funcionarios técnicos y asesores deberán expedir sus dictámenes dentro de los cinco días de recibido el expediente... extenderse hasta diez días.", "explicacion": "Plazo de 5 días para dictaminar, prorrogable a 10 con constancia fundada, y nueva prórroga a juicio del superior si la complejidad lo justifica.", "ejemplo": "Un asesor jurídico dictamina dentro de los 5 días."}, {"ref": "Art. 66", "titulo": "Prueba y período probatorio", "cita": "Si mediare pedido de parte, deberá disponer la apertura de un período de prueba por un plazo prudencial no superior a los treinta días.", "explicacion": "El BPS puede disponer prueba de oficio; a pedido de parte abre período de prueba (máx. 30 días). Las partes pueden controlar la producción de la prueba.", "ejemplo": "Se abre un período de hasta 30 días para diligenciar testigos."}, {"ref": "Art. 69", "titulo": "Vista previa de las actuaciones", "cita": "...no se dictará resolución sin previa vista al interesado por el término de diez días para que pueda presentar sus descargos... y articular su defensa.", "explicacion": "Garantía clave del debido proceso: ante decisión contraria, sanción, perjuicio u oposición, se otorga vista por 10 días. Con varias partes el término es común y corre desde la última notificación.", "ejemplo": "Antes de denegar una prestación, se da vista por 10 días."}, {"ref": "Art. 70", "titulo": "Examen y retiro del expediente", "cita": "Los expedientes podrán ser examinados en la oficina por las partes... podrán ser retirados por el término máximo de cinco días, previa autorización.", "explicacion": "Acceso a las actuaciones: examen en oficina y retiro en confianza por hasta 5 días. Se cuida la información de terceros contribuyentes.", "ejemplo": "El abogado retira el expediente 5 días para estudiarlo."}, {"ref": "Art. 71", "titulo": "Documentos secretos o reservados", "cita": "Los documentos o piezas podrán ser calificados como secretos, confidenciales o reservados... El mero hecho de que los informes sean favorables o adversos no habilita a darles carácter de reservados.", "explicacion": "Excepción al acceso: solo según normas legales/reglamentarias. No basta que un dictamen sea adverso para reservarlo.", "ejemplo": "Datos de otro contribuyente pueden reservarse."}, {"ref": "Arts. 74-78", "titulo": "Terminación del trámite", "cita": "Una vez concluida la sustanciación... la autoridad competente deberá dictar resolución. En ningún caso el vencimiento de los plazos exime de su obligación de pronunciarse.", "explicacion": "Formas de terminación: resolución (Art. 74), desistimiento o renuncia (Arts. 75-77) y manejo de la paralización por causa del interesado, con intimación de comparecencia en plazo no mayor de 30 días (Art. 78). El deber de resolver subsiste aun vencidos los plazos.", "ejemplo": "El interesado desiste por escrito y se declara concluido el procedimiento."}, {"ref": "Art. 80", "titulo": "Notificaciones: qué y plazo", "cita": "Las resoluciones que den vista, las que culminen el procedimiento y las que causen gravamen irreparable... serán notificadas... en el plazo máximo de 5 días hábiles.", "explicacion": "Define qué actos se notifican, el concepto de domicilio y los medios (telegrama, carta certificada, medios informáticos, etc.). La oficina notifica en máx. 5 días hábiles desde el día siguiente a la recepción del expediente.", "ejemplo": "La resolución que da vista se notifica al domicilio constituido en 5 días hábiles."}, {"ref": "Art. 83", "titulo": "Domicilio desconocido", "cita": "Cuando se desconozca el domicilio... se le tendrá por notificado mediante su publicación en el Diario Oficial durante tres días seguidos.", "explicacion": "Si no se conoce el domicilio, la notificación ficta se logra publicando 3 días seguidos en el Diario Oficial.", "ejemplo": "Se publica el aviso 3 días en el Diario Oficial."}, {"ref": "Art. 88", "titulo": "Notificaciones defectuosas", "cita": "Las notificaciones defectuosas surtirán efecto a partir de la fecha en que se haga manifestación expresa en tal sentido por el interesado o se interponga el recurso pertinente.", "explicacion": "Una notificación con defectos se 'sanea' si el interesado se da por enterado o recurre. Desde ahí corren los plazos.", "ejemplo": "Si el interesado recurre, queda notificado pese al defecto."}, {"ref": "Art. 90", "titulo": "Plazo general para decidir (120 días)", "cita": "...decidir sobre cualquier petición... dentro del término de ciento veinte días... Se entenderá desechada la petición si la autoridad no resolviera dentro del término indicado.", "explicacion": "La Administración tiene 120 días para resolver. Vencidos sin respuesta, opera la denegatoria ficta (Constitución art. 318). El deber de pronunciarse no se extingue (Ley 15.869 art. 8).", "ejemplo": "Si a los 120 días no hay respuesta, la petición se entiende desechada."}, {"ref": "Arts. 91-92", "titulo": "Instrucción y petición ante cualquier órgano", "cita": "Los trámites para la debida instrucción... dentro del término de treinta días... se tendrán por desechadas si al cabo de ciento cincuenta días no se dictó resolución.", "explicacion": "Instrucción de peticiones: 30 días. Petición ante cualquier órgano: desechada si a los 150 días no hay resolución expresa.", "ejemplo": "Sin respuesta a los 150 días, la petición se considera rechazada."}, {"ref": "Art. 93", "titulo": "Cómputo de plazos para decidir", "cita": "Los plazos señalados precedentemente se cuentan por días corridos y se computan sin interrupción... se suspenderá solamente durante la Semana de Turismo.", "explicacion": "Para los plazos en que la Administración debe decidir peticiones, el cómputo es por días CORRIDOS, con suspensión solo en Semana de Turismo y extensión al hábil siguiente si vence en feriado.", "ejemplo": "Los 120 días del Art. 90 son corridos, salvo la pausa de Semana de Turismo."}, {"ref": "Arts. 96-98", "titulo": "Reglas de cómputo: días hábiles", "cita": "Los plazos se contarán siempre a partir del día siguiente... Cuando los plazos reglamentarios se señalen por días, se entiende que éstos son hábiles.", "explicacion": "Regla central: los plazos reglamentarios por días son HÁBILES (Art. 97). Se cuentan desde el día siguiente a la notificación/publicación (Art. 96). En meses: de fecha a fecha; en años: naturales. Vencen en el último momento hábil; si caen en feriado, al hábil siguiente (Art. 98).", "ejemplo": "Un plazo reglamentario de '5 días' significa 5 días hábiles."}, {"ref": "Art. 95", "titulo": "Prórroga de plazos reglamentarios", "cita": "...podrá conceder a petición de los interesados una prórroga... Podrá solicitarse por una sola vez y en ningún caso excederá de la mitad del plazo original.", "explicacion": "Solo para plazos exclusivamente reglamentarios. Por una sola vez, máximo la mitad del plazo. Si la Administración no se expide en 3 días, se reputa concedida.", "ejemplo": "Un plazo reglamentario de 10 días puede prorrogarse 5 días una vez."}, {"ref": "Art. 99", "titulo": "Plazos de trámite interno", "cita": "Las providencias de trámite deberán dictarse en el término máximo de tres días... Las diligencias o actuaciones... dentro del plazo máximo de cinco días, ampliable cinco días más.", "explicacion": "Fija plazos breves de gestión interna: 3 días para providencias de trámite y 5 días (ampliables a 10) para diligencias.", "ejemplo": "Un pase de trámite debe dictarse en 3 días."}, {"ref": "Arts. 101-103", "titulo": "Derecho de petición", "cita": "Todo habitante tiene derecho de petición para ante todas y cualesquiera autoridades de la República (Constitución, Art. 30).", "explicacion": "Reconoce el derecho de petición (Const. art. 30) y la obligación de decidir (art. 318). El Art. 103 detalla los requisitos de la petición: nombre y domicilio, hechos y fundamentos, y solicitud concreta; omisiones de los numerales 1 y 3 se subsanan en 10 días.", "ejemplo": "Una petición sin solicitud clara: 10 días para aclararla."}, {"ref": "Art. 104", "titulo": "Definición de acto administrativo", "cita": "Acto administrativo es toda manifestación de voluntad de la Administración que produce efectos jurídicos.", "explicacion": "Definición clave. Distingue Ordenanza (normas generales conforme a la Constitución), Reglamento (normas generales y abstractas) y Resolución (normas particulares y concretas).", "ejemplo": "La resolución que concede una pasividad es un acto administrativo."}, {"ref": "Art. 106", "titulo": "Motivación del acto", "cita": "Todo acto administrativo deberá ser motivado, explicándose las razones de hecho y de derecho que lo fundamentan. No son admisibles fórmulas generales.", "explicacion": "Exige motivación concreta y específica del caso; prohíbe fórmulas genéricas. Es garantía de control y defensa.", "ejemplo": "No basta 'visto lo actuado'; hay que explicar por qué se decide así."}, {"ref": "Art. 107", "titulo": "Estructura del acto", "cita": "Toda resolución administrativa debe constar de una parte expositiva y una dispositiva. La expositiva: Visto, Resultandos, Considerandos y Atento.", "explicacion": "Define la estructura formal. El 'Visto' sitúa la cuestión; 'Resultandos' los hechos; 'Considerandos' los fundamentos; 'Atento' las normas. A veces el Atento sustituye los Considerandos.", "ejemplo": "Una resolución típica: Visto / Resultando / Considerando / Atento / parte dispositiva."}, {"ref": "Arts. 110-111", "titulo": "Prescripciones de orden interno", "cita": "Las prescripciones administrativas de orden interno (directivas, órdenes, instrucciones de servicio) no obligan a los administrados, pero éstos pueden invocarlas en su favor.", "explicacion": "Las instrucciones internas no obligan al administrado, pero éste puede invocar las que lo beneficien. Su contravención vicia el acto si eran en beneficio del interesado.", "ejemplo": "El administrado invoca una instrucción interna que le da un derecho."}, {"ref": "Art. 112", "titulo": "Recursos de revocación y jerárquico", "cita": "...podrán ser impugnados con el recurso de revocación, ante el mismo órgano... dentro de los diez días corridos y siguientes al de su notificación personal... o publicación.", "explicacion": "Plazo NUCLEAR: 10 días corridos para revocación, ante el mismo órgano. Si el órgano está sometido a jerarquía, se interpone además, conjunta y subsidiariamente, el jerárquico ante el jerarca máximo. Sin notificación ni publicación, puede recurrirse en cualquier momento.", "ejemplo": "Notificado un acto del gerente, recurro en 10 días con revocación + jerárquico subsidiario al Directorio."}, {"ref": "Art. 113", "titulo": "Conocimiento informal", "cita": "En ningún caso el conocimiento informal del acto lesivo suple a la notificación personal o a la publicación... no hace correr el cómputo del plazo para recurrir.", "explicacion": "Enterarse 'por afuera' no inicia el plazo para recurrir. El interesado, si quiere, puede darse por notificado y ejercer sus defensas.", "ejemplo": "Si me entero de palabra, el plazo no empieza hasta la notificación formal."}, {"ref": "Art. 114", "titulo": "Suspensión del plazo para recurrir", "cita": "Para interponer los recursos administrativos, el plazo se suspenderá durante las Ferias Judiciales, la Semana de Turismo, y si vencen en día feriado se extenderá hasta el día hábil siguiente.", "explicacion": "Diferencia importante: el plazo para INTERPONER recursos se suspende en Ferias Judiciales y Semana de Turismo (Ley 15.869 art. 10).", "ejemplo": "Si caen Ferias Judiciales dentro de los 10 días, el plazo se detiene esos días."}, {"ref": "Art. 115", "titulo": "Plazo del Directorio para resolver (120 días)", "cita": "El Directorio del BPS está obligado a resolver los recursos... dentro del término de ciento veinte días... Si no lo hiciere, se entenderá rechazado el recurso.", "explicacion": "El Directorio tiene 120 días para resolver recursos (días corridos, sin interrupción, suspendidos en Semana de Turismo, extendidos al hábil si vence en feriado). Sin resolución, el recurso se entiende rechazado, pero subsiste el deber de pronunciarse.", "ejemplo": "A los 120 días sin respuesta, el recurso se considera rechazado."}, {"ref": "Art. 116", "titulo": "Plazos de instrucción de los recursos", "cita": "Para el recurso de revocación, 30 días desde el día siguiente a su interposición; para el jerárquico, 30 días a partir de los 150 días siguientes... o desde la notificación de la resolución del recurso de revocación.", "explicacion": "Plazos de instrucción de 30 días con puntos de partida distintos. Se cuentan por días corridos, sin interrupción, NO se suspenden por Semana de Turismo, y se extienden al hábil si vencen en feriado.", "ejemplo": "La instrucción del recurso de revocación corre 30 días desde el día siguiente a interponerlo."}, {"ref": "Art. 117", "titulo": "Agotamiento de la vía administrativa", "cita": "Se tendrá por agotada la vía administrativa: a los 150 días siguientes al de la interposición del recurso de revocación... a los 200 días siguientes a la interposición conjunta de revocación y jerárquico.", "explicacion": "Plazos NUCLEARES para agotar la vía: 150 días si solo revocación; 200 días si revocación + jerárquico (Art. 41 Ley 17.292). Agotar la vía habilita la acción de nulidad ante el TCA.", "ejemplo": "Con ambos recursos, a los 200 días sin resolver queda agotada la vía."}, {"ref": "Art. 118", "titulo": "Confirmación ficta y presunción simple", "cita": "...vencido el plazo de doscientos días sin haberse adoptado resolución, se reputará fictamente confirmado el acto impugnado.", "explicacion": "A los 200 días sin resolución se configura la confirmación ficta. Si tampoco se resuelve dentro de los 30 días siguientes a la denegatoria ficta, opera una presunción simple a favor del administrado ante el TCA.", "ejemplo": "Vencidos los 200 días, el acto queda fictamente confirmado y puedo ir al TCA."}, {"ref": "Art. 119", "titulo": "Agotamiento por resolución anticipada", "cita": "Si la resolución definitiva fuere notificada personalmente o publicada antes del vencimiento del plazo total, la vía administrativa quedará agotada en la fecha de la notificación o publicación.", "explicacion": "Si la Administración resuelve y notifica antes del vencimiento, la vía se agota en esa fecha (no hay que esperar los plazos máximos).", "ejemplo": "Si me notifican la resolución a los 100 días, la vía queda agotada ahí."}, {"ref": "Art. 120", "titulo": "Suspensión del acto impugnado", "cita": "...se podrá disponer la suspensión transitoria, total o parcial, de la ejecución del acto impugnado, siempre que la misma fuere susceptible de irrogar daños graves...", "explicacion": "Medida cautelar: puede suspenderse la ejecución del acto recurrido si causa daños graves y la suspensión no perjudica gravemente el interés general ni a terceros.", "ejemplo": "Se suspende la ejecución de un acto que causaría un perjuicio grave irreparable."}, {"ref": "Arts. 121-123", "titulo": "Legitimación y forma de los recursos", "cita": "Podrán interponer recursos las personas físicas o jurídicas que se consideren directamente lesionadas... siempre deberá constar el nombre y domicilio del recurrente y su voluntad de recurrir.", "explicacion": "Legitimado: el directamente lesionado. La forma puede ser escrito, formulario, telegrama, fax, etc., pero debe constar nombre, domicilio, voluntad de recurrir, cuáles recursos y qué acto se impugna.", "ejemplo": "Un recurso por fax válido si identifica recurrente, recursos y acto."}, {"ref": "Art. 124", "titulo": "Fundamentación posterior", "cita": "La fundamentación del recurso constituye un derecho del recurrente, que podrá cumplir posteriormente... mientras el asunto esté pendiente de resolución.", "explicacion": "No es obligatorio fundar al interponer: se puede fundamentar después, mientras esté pendiente. La omisión no exime a la Administración de resolver.", "ejemplo": "Interpongo el recurso en plazo y agrego los fundamentos más adelante."}, {"ref": "Art. 125", "titulo": "Firma de letrado", "cita": "Llevarán firma de letrado los escritos en que se interpongan recursos administrativos y los que se presenten durante su tramitación.", "explicacion": "Requisito de firma de abogado (Decreto-ley 15.524 art. 37). Si falta, 10 días hábiles para salvarla, bajo apercibimiento de tener el recurso por no presentado.", "ejemplo": "El recurso sin firma letrada: 10 días hábiles para regularizar."}, {"ref": "Arts. 126-128", "titulo": "Recursos por medios a distancia", "cita": "...el recurrente dispondrá de un plazo de diez días hábiles... para comparecer en la oficina a efectos de ratificar por escrito su voluntad de recurrir...", "explicacion": "Si se recurre por telegrama/fax, hay 10 días hábiles para ratificar, cumplir la firma letrada y demás requisitos. La fecha/hora de interposición es la de la oficina telegráfica o del reporte del equipo (Art. 127).", "ejemplo": "Recurro por fax y en 10 días hábiles voy a ratificar con firma de abogado."}, {"ref": "Arts. 129-130", "titulo": "Recursos en actos delegados y pasividades", "cita": "Si el acto fue dictado en ejercicio de atribuciones delegadas, los recursos podrán presentarse ante el órgano delegante o el delegado... En pasividades civiles corresponde interponer conjunta y subsidiariamente revocación y jerárquico.", "explicacion": "En actos delegados el recurso se presenta indistintamente ante delegante o delegado. En pasividades civiles (delegación del Poder Ejecutivo) van revocación + jerárquico (Decreto 264/996).", "ejemplo": "Contra una resolución de pasividad civil: revocación y jerárquico conjuntos."}, {"ref": "Arts. 133-134", "titulo": "Resolución del recurso", "cita": "La resolución del recurso jerárquico confirmará, modificará o revocará total o parcialmente el acto impugnado. Cuando estime que existe vicio de forma, podrá convalidar el acto.", "explicacion": "El jerarca puede confirmar, modificar o revocar, e incluso convalidar subsanando vicios de forma. Si se anula una resolución general por legitimidad, los efectos son retroactivos con resguardo de actos firmes y derechos adquiridos (Art. 134).", "ejemplo": "El Directorio modifica parcialmente el acto recurrido."}, {"ref": "Arts. 135-140 (Libro II)", "titulo": "Procedimiento disciplinario: principios", "cita": "El procedimiento disciplinario es el conjunto de trámites... La falta es todo acto u omisión del funcionario que viole los deberes funcionales... serán de carácter secreto.", "explicacion": "Libro II: regula sumarios e investigaciones. Rige la presunción de inocencia (Art. 137), el non bis in idem (Art. 139) y el carácter secreto del procedimiento, cuya violación es falta grave (Art. 140).", "ejemplo": "Un sumario por incumplimiento de deberes es secreto."}, {"ref": "Arts. 148-153 (Libro II)", "titulo": "Sumario e investigación; suspensión preventiva", "cita": "El sumario administrativo... tiende a determinar la responsabilidad de los funcionarios imputados... La suspensión preventiva es preceptiva cuando los hechos constituyan falta grave.", "explicacion": "Distingue investigación (comprobar hechos) de sumario (determinar responsabilidad). La suspensión preventiva con retención de medio sueldo es preceptiva en falta grave y no puede exceder 6 meses (Art. 153).", "ejemplo": "Ante falta grave, se decreta sumario con suspensión preventiva."}, {"ref": "Arts. 178, 181-182 (Libro II)", "titulo": "Plazos del sumario", "cita": "Toda instrucción de sumario e investigación deberá terminarse en el plazo de sesenta días corridos... prorrogable hasta 30 días.", "explicacion": "La instrucción del sumario dura 60 días corridos (prorrogables 30). Concluida, el instructor tiene 10 días para el informe (Art. 181) y se da vista a los interesados por 10 días, prorrogable por otros 10 (Art. 182).", "ejemplo": "El instructor cierra la instrucción en 60 días y hace su informe en 10 días."}], "flashcards": [{"front": "¿Qué procedimiento alcanza este reglamento?", "back": "El procedimiento administrativo común del BPS dentro de sus diversos cometidos (Art. 1).", "id": "6-0"}, {"front": "Nombrá cinco principios generales del procedimiento administrativo del BPS.", "back": "Imparcialidad, legalidad objetiva, impulsión de oficio, verdad material, economía/celeridad/eficacia, informalismo, debido procedimiento, contradicción, buena fe, motivación, gratuidad (Art. 2).", "id": "6-1"}, {"front": "¿Qué obliga al BPS a investigar los hechos aunque no los aleguen las partes?", "back": "El principio de verdad material (Art. 4).", "id": "6-2"}, {"front": "¿Suspende el procedimiento la excusación o recusación de un funcionario?", "back": "No; no produce suspensión ni separación automática. Se forma expediente separado que se eleva en 5 días al jerarca superior (Art. 3).", "id": "6-3"}, {"front": "¿Un vicio de forma siempre anula el acto?", "back": "No: no causa nulidad si el acto cumplió su fin y no se disminuyeron las garantías ni hubo indefensión (Art. 7).", "id": "6-4"}, {"front": "¿Cómo puede iniciarse el procedimiento administrativo?", "back": "A petición de persona interesada o de oficio (Art. 14).", "id": "6-5"}, {"front": "¿Cuándo se forma expediente?", "back": "Con los asuntos documentados por escrito cuando es necesario reunir todas las actuaciones para resolver (Art. 33).", "id": "6-6"}, {"front": "¿Cada cuántas hojas se forma una nueva pieza del expediente?", "back": "Al alcanzar las cien hojas (Art. 51).", "id": "6-7"}, {"front": "¿La inactividad del interesado produce perención del expediente?", "back": "No: la impulsión es de oficio y la falta de impulsión por el interesado no produce perención (Art. 54).", "id": "6-8"}, {"front": "¿En qué plazo deben expedir su dictamen los técnicos y asesores?", "back": "5 días desde recibido el expediente, prorrogable hasta 10 con constancia fundada (Art. 56).", "id": "6-9"}, {"front": "¿Por cuánto tiempo se otorga la vista previa al interesado antes de una decisión contraria o sancionatoria?", "back": "10 días para descargos, probanzas y defensa (Art. 69).", "id": "6-10"}, {"front": "¿Por cuánto tiempo puede retirar el expediente un letrado?", "back": "Máximo 5 días, previa autorización (Art. 70).", "id": "6-11"}, {"front": "¿Qué resoluciones deben notificarse?", "back": "Las que dan vista, las que culminan el procedimiento y las que causan gravamen irreparable (o cuando la autoridad lo disponga) (Art. 80).", "id": "6-12"}, {"front": "¿En qué plazo debe practicar la oficina las notificaciones?", "back": "Máximo 5 días hábiles desde el día siguiente a la recepción del expediente (Art. 80).", "id": "6-13"}, {"front": "Si se desconoce el domicilio, ¿cómo se notifica?", "back": "Por publicación en el Diario Oficial durante tres días seguidos (Art. 83).", "id": "6-14"}, {"front": "¿Desde cuándo surte efecto una notificación defectuosa?", "back": "Desde que el interesado hace manifestación expresa o interpone el recurso pertinente (Art. 88).", "id": "6-15"}, {"front": "¿El conocimiento informal del acto hace correr el plazo para recurrir?", "back": "No; no suple la notificación personal ni la publicación (Art. 113).", "id": "6-16"}, {"front": "¿Cuál es la regla general de cómputo de los plazos reglamentarios señalados por días?", "back": "Se entienden días hábiles (Art. 97).", "id": "6-17"}, {"front": "¿Desde qué día se cuentan los plazos?", "back": "Siempre a partir del día siguiente a la notificación o publicación del acto (Art. 96).", "id": "6-18"}, {"front": "¿Cómo se computan los plazos en meses y en años?", "back": "Meses: de fecha a fecha (si no hay día equivalente, el último día del mes). Años: naturales (Art. 97).", "id": "6-19"}, {"front": "¿Qué pasa si un plazo administrativo vence en día feriado?", "back": "Se extiende hasta el día hábil inmediato siguiente (Art. 98).", "id": "6-20"}, {"front": "¿En qué plazo debe decidir la Administración una petición y qué pasa si no lo hace?", "back": "120 días; vencidos, la petición se entiende desechada, pero subsiste el deber de pronunciarse (Art. 90; Const. art. 318).", "id": "6-21"}, {"front": "¿Cómo se computan los plazos para que la Administración decida peticiones?", "back": "Por días corridos, sin interrupción; se suspenden solo en Semana de Turismo y se extienden al hábil si vencen en feriado (Art. 93).", "id": "6-22"}, {"front": "¿Se puede prorrogar un plazo reglamentario?", "back": "Sí, por una sola vez, sin exceder la mitad del plazo original; si la Administración no se expide en 3 días, se reputa concedida (Art. 95).", "id": "6-23"}, {"front": "¿Qué es un acto administrativo?", "back": "Toda manifestación de voluntad de la Administración que produce efectos jurídicos (Art. 104).", "id": "6-24"}, {"front": "¿Debe motivarse todo acto administrativo?", "back": "Sí; deben explicarse las razones de hecho y de derecho, sin fórmulas generales (Art. 106).", "id": "6-25"}, {"front": "¿Cuáles son las partes de la parte expositiva de una resolución?", "back": "Visto, Resultandos, Considerandos y Atento (Art. 107).", "id": "6-26"}, {"front": "¿En qué plazo y ante quién se interpone el recurso de revocación?", "back": "10 días corridos siguientes a la notificación personal o publicación, ante el mismo órgano que dictó el acto (Art. 112).", "id": "6-27"}, {"front": "¿Cuándo se interpone el recurso jerárquico y ante quién?", "back": "Conjunta y subsidiariamente con el de revocación, ante el jerarca máximo, cuando el órgano está sometido a jerarquía (Art. 112).", "id": "6-28"}, {"front": "¿Qué pasa con el plazo para recurrir durante las Ferias Judiciales y la Semana de Turismo?", "back": "Se suspende (Art. 114).", "id": "6-29"}, {"front": "¿En qué plazo debe el Directorio resolver los recursos y qué pasa si no lo hace?", "back": "120 días; si no resuelve, se entiende rechazado el recurso, sin que cese el deber de pronunciarse (Art. 115).", "id": "6-30"}, {"front": "¿En cuántos días se agota la vía administrativa si solo se interpuso revocación?", "back": "A los 150 días de su interposición sin resolución (Art. 117 lit. a).", "id": "6-31"}, {"front": "¿En cuántos días se agota la vía si se interpusieron conjuntamente revocación y jerárquico?", "back": "A los 200 días de la interposición conjunta sin resolución (Art. 117 lit. b; Art. 41 Ley 17.292).", "id": "6-32"}, {"front": "¿Qué ocurre a los 200 días sin resolución del recurso?", "back": "Se reputa fictamente confirmado el acto impugnado (Art. 118).", "id": "6-33"}, {"front": "¿Cómo se computan los plazos de instrucción de los recursos (Art. 116)?", "back": "Por días corridos, sin interrupción; NO se suspenden por Semana de Turismo; se extienden al hábil si vencen en feriado (Art. 116).", "id": "6-34"}, {"front": "¿Llevan firma de letrado los escritos de recursos?", "back": "Sí; si falta, hay 10 días hábiles para salvarla, bajo apercibimiento de tener el recurso por no presentado (Art. 125).", "id": "6-35"}, {"front": "¿Es obligatorio fundamentar el recurso al momento de interponerlo?", "back": "No; la fundamentación puede cumplirse después mientras el asunto esté pendiente (Art. 124).", "id": "6-36"}, {"front": "Si recurro por fax o telegrama, ¿qué plazo tengo para ratificar?", "back": "10 días hábiles para comparecer, ratificar y cumplir la firma letrada y demás requisitos (Art. 126).", "id": "6-37"}, {"front": "¿Puede suspenderse la ejecución del acto impugnado?", "back": "Sí, si la ejecución es susceptible de causar daños graves y no perturba gravemente el interés general ni a terceros (Art. 120).", "id": "6-38"}, {"front": "En actos dictados por delegación, ¿ante quién se presentan los recursos?", "back": "Indistintamente ante el órgano delegante o el delegado (Art. 129).", "id": "6-39"}, {"front": "¿Qué recursos corresponden contra resoluciones de pasividades civiles?", "back": "Revocación y jerárquico, conjunta y subsidiariamente (Art. 130; Decreto 264/996).", "id": "6-40"}, {"front": "¿Qué puede hacer el jerarca al resolver el recurso jerárquico?", "back": "Confirmar, modificar o revocar total o parcialmente el acto; y convalidarlo si hay vicio de forma (Art. 133).", "id": "6-41"}, {"front": "¿Qué es la falta disciplinaria?", "back": "Todo acto u omisión del funcionario, intencional o culposo, que viole los deberes funcionales (Art. 136).", "id": "6-42"}, {"front": "¿Cuánto dura la instrucción de un sumario?", "back": "60 días corridos desde la notificación al instructor, prorrogables hasta 30 días (Art. 178).", "id": "6-43"}, {"front": "¿Cuándo es preceptiva la suspensión preventiva del funcionario sumariado?", "back": "Cuando los hechos constituyan falta grave; con retención de medio sueldo y máximo 6 meses (Art. 153).", "id": "6-44"}], "practica": [{"subtema": "Ámbito y principios generales", "q": "¿A qué alcanza el Reglamento de Procedimiento Administrativo del BPS según el Art. 1?", "opciones": ["Solo a los procedimientos disciplinarios", "Al procedimiento administrativo común desenvuelto en la actividad del BPS", "Únicamente a los trámites de pasividades", "A los juicios ante el Tribunal de lo Contencioso Administrativo"], "correcta": 1, "expl": "El Art. 1 establece que alcanza al procedimiento administrativo común del BPS dentro de sus diversos cometidos.", "id": "6-0", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Ámbito y principios generales", "q": "¿Cuál de estos NO es un principio enumerado en el Art. 2?", "opciones": ["Verdad material", "Informalismo en favor del administrado", "Onerosidad del trámite", "Impulsión de oficio"], "correcta": 2, "expl": "El Art. 2 consagra la gratuidad, no la onerosidad. Los demás sí son principios listados.", "id": "6-1", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Ámbito y principios generales", "q": "El principio que obliga al BPS a conocer los hechos reales aunque las partes no los hayan alegado es el de:", "opciones": ["Legalidad objetiva", "Verdad material", "Contradicción", "Gratuidad"], "correcta": 1, "expl": "La verdad material (Art. 4) obliga a investigar los hechos sin atarse a los acuerdos de las partes.", "id": "6-2", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Ámbito y principios generales", "q": "Según el Art. 2, los principios generales también sirven como:", "opciones": ["Sanciones", "Criterio interpretativo para resolver cuestiones de aplicación de las reglas", "Causales de nulidad", "Requisitos de los recursos"], "correcta": 1, "expl": "El último inciso del Art. 2 dispone que los principios sirven de criterio interpretativo.", "id": "6-3", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Excusación, recusación y vicios", "q": "Cuando un funcionario se excusa o es recusado, el escrito se eleva al jerarca superior dentro de:", "opciones": ["Tres días", "Cinco días", "Diez días", "Quince días"], "correcta": 1, "expl": "El Art. 3 dispone que el expediente separado se eleva dentro de los cinco días al jerarca inmediatamente superior.", "id": "6-4", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Excusación, recusación y vicios", "q": "Respecto de los vicios de forma de los actos de procedimiento, el Art. 7 establece que:", "opciones": ["Siempre causan nulidad absoluta", "No causan nulidad si cumplen su fin y no se disminuyeron las garantías", "Solo son subsanables por el TCA", "Anulan también los actos anteriores y posteriores"], "correcta": 1, "expl": "El Art. 7 consagra el principio de conservación: el vicio formal no anula si el acto cumplió su fin sin afectar garantías.", "id": "6-5", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Iniciación y escritos", "q": "El procedimiento administrativo puede iniciarse (Art. 14):", "opciones": ["Solo de oficio", "Solo a petición de parte", "A petición de persona interesada o de oficio", "Solo por denuncia policial"], "correcta": 2, "expl": "El Art. 14 admite ambas vías: a petición de persona interesada o de oficio.", "id": "6-6", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Iniciación y escritos", "q": "Si no se acredita la personería al presentar el escrito, ¿qué plazo se otorga para salvar la omisión?", "opciones": ["Cinco días corridos", "Diez días hábiles", "Tres días hábiles", "Veinte días corridos"], "correcta": 1, "expl": "El Art. 23 otorga diez días hábiles para salvar la omisión, bajo apercibimiento de archivo.", "id": "6-7", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Documentación y comunicaciones", "q": "El documento usado para dar conocimiento de resoluciones a otro órgano o pedirle diligencias es el:", "opciones": ["Memorando", "Comunicado", "Oficio", "Circular"], "correcta": 2, "expl": "El Art. 30 define que el oficio se usa para dar conocimiento de resoluciones a otro órgano o formularle peticiones.", "id": "6-8", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Documentación y comunicaciones", "q": "La circular, según el Art. 30, se utiliza para:", "opciones": ["Difundir noticias generales", "Poner en conocimiento de los funcionarios órdenes o instrucciones de servicio", "Comunicaciones directas jerarca-subordinado", "Dar conocimiento de resoluciones a otro órgano"], "correcta": 1, "expl": "El Art. 30 reserva la circular para órdenes o instrucciones de servicio a los funcionarios.", "id": "6-9", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "El expediente", "q": "Según el Art. 51, se forma una segunda pieza del expediente cuando éste alcanza:", "opciones": ["Cincuenta hojas", "Cien hojas", "Doscientas hojas", "Setenta y cinco hojas"], "correcta": 1, "expl": "El Art. 51 indica que al alcanzar cien hojas se forma una segunda pieza.", "id": "6-10", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "El expediente", "q": "¿Con cuál de estos NO se forma expediente (Art. 35)?", "opciones": ["Una petición que requiere reunir actuaciones para resolver", "Las circulares, comunicados y memorandos", "Una solicitud de pasividad", "Un sumario administrativo"], "correcta": 1, "expl": "El Art. 35 prohíbe formar expediente con circulares, comunicados y memorandos, y con trámites por formulario.", "id": "6-11", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "El expediente", "q": "El número de identificación del expediente es (Art. 36):", "opciones": ["Asignado por cada dependencia de forma independiente", "Correlativo anual único para todo el organismo", "Asignado por el Diario Oficial", "Aleatorio y sin orden"], "correcta": 1, "expl": "El Art. 36 establece un número correlativo anual único para todo el organismo.", "id": "6-12", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Sustanciación e impulsión", "q": "La falta de impulsión del procedimiento por los interesados (Art. 54):", "opciones": ["Produce la perención de las actuaciones", "No produce perención; el procedimiento continúa hasta la decisión final", "Obliga a archivar el expediente", "Suspende el trámite por seis meses"], "correcta": 1, "expl": "El Art. 54 dispone que no hay perención: la impulsión es de oficio y el trámite continúa.", "id": "6-13", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Sustanciación e impulsión", "q": "Los técnicos y asesores deben expedir su dictamen dentro de (Art. 56):", "opciones": ["Tres días, prorrogables a cinco", "Cinco días, prorrogables hasta diez con constancia fundada", "Diez días improrrogables", "Quince días"], "correcta": 1, "expl": "El Art. 56 fija 5 días, extensibles hasta 10 con constancia fundada en el expediente.", "id": "6-14", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Prueba y vista", "q": "El período de prueba a pedido de parte no puede superar (Art. 66):", "opciones": ["Diez días", "Veinte días", "Treinta días", "Sesenta días"], "correcta": 2, "expl": "El Art. 66 fija un plazo prudencial no superior a treinta días.", "id": "6-15", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Prueba y vista", "q": "Antes de dictar una resolución contraria, sancionatoria o perjudicial, se da vista al interesado por (Art. 69):", "opciones": ["Cinco días", "Diez días", "Quince días", "Veinte días"], "correcta": 1, "expl": "El Art. 69 otorga vista por diez días para descargos, probanzas y defensa.", "id": "6-16", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Prueba y vista", "q": "Cuando hay varias partes que deben evacuar la vista (Art. 69):", "opciones": ["Cada una tiene un plazo independiente", "El término es común y corre del día siguiente a la última notificación", "Solo la primera notificada puede contestar", "El plazo se reduce a la mitad"], "correcta": 1, "expl": "El Art. 69 dispone término común que corre desde la última notificación.", "id": "6-17", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Acceso al expediente", "q": "Las partes o sus letrados pueden retirar el expediente por un máximo de (Art. 70):", "opciones": ["Tres días", "Cinco días", "Diez días", "Quince días"], "correcta": 1, "expl": "El Art. 70 permite el retiro por hasta cinco días, previa autorización y bajo responsabilidad del letrado.", "id": "6-18", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Terminación del trámite", "q": "Si un trámite se paraliza por causa del interesado, la Administración intima su comparecencia en un plazo (Art. 78):", "opciones": ["No mayor de 10 días", "No mayor de 30 días", "No mayor de 60 días", "De 120 días"], "correcta": 1, "expl": "El Art. 78 fija un plazo prudencial no mayor de 30 días para intimar la comparecencia.", "id": "6-19", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Notificaciones", "q": "¿Cuáles resoluciones deben notificarse según el Art. 80?", "opciones": ["Solo las que imponen multas", "Las que dan vista, las que culminan el procedimiento y las que causan gravamen irreparable", "Todas las providencias de trámite", "Únicamente las dictadas por el Directorio"], "correcta": 1, "expl": "El Art. 80 enumera esas resoluciones (y las que la autoridad disponga expresamente).", "id": "6-20", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Notificaciones", "q": "El plazo máximo para que la oficina practique las notificaciones es (Art. 80):", "opciones": ["3 días hábiles", "5 días hábiles", "10 días corridos", "15 días hábiles"], "correcta": 1, "expl": "El Art. 80 fija máximo 5 días hábiles desde el día siguiente a la recepción del expediente.", "id": "6-21", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Notificaciones", "q": "Cuando se desconoce el domicilio del interesado, la notificación se hace (Art. 83):", "opciones": ["Por carta certificada", "Por publicación en el Diario Oficial durante tres días seguidos", "Por edicto en un periódico privado", "No se notifica"], "correcta": 1, "expl": "El Art. 83 dispone la publicación en el Diario Oficial durante tres días seguidos.", "id": "6-22", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Notificaciones", "q": "Una notificación defectuosa surte efecto (Art. 88):", "opciones": ["Nunca", "Desde que el interesado se manifiesta expresamente o interpone el recurso pertinente", "A los 30 días de practicada", "Desde la fecha original aunque sea defectuosa"], "correcta": 1, "expl": "El Art. 88 sanea el defecto desde la manifestación expresa o la interposición del recurso.", "id": "6-23", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Términos y plazos", "q": "Cuando los plazos reglamentarios se señalan por días, se entiende que son (Art. 97):", "opciones": ["Corridos", "Hábiles", "Naturales", "Calendario"], "correcta": 1, "expl": "El Art. 97 establece que los plazos por días son hábiles.", "id": "6-24", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Términos y plazos", "q": "Los plazos se cuentan a partir de (Art. 96):", "opciones": ["El mismo día de la notificación", "El día siguiente a la notificación o publicación del acto", "El primer día hábil del mes siguiente", "La fecha de dictado del acto"], "correcta": 1, "expl": "El Art. 96 dispone que se cuentan siempre a partir del día siguiente a la notificación o publicación.", "id": "6-25", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Términos y plazos", "q": "La Administración tiene para decidir una petición un plazo de (Art. 90):", "opciones": ["60 días", "90 días", "120 días", "150 días"], "correcta": 2, "expl": "El Art. 90 fija 120 días; vencidos, la petición se entiende desechada.", "id": "6-26", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Términos y plazos", "q": "Los plazos para que la Administración decida peticiones se computan (Art. 93):", "opciones": ["Por días hábiles", "Por días corridos, suspendiéndose solo en Semana de Turismo", "Por días corridos sin ninguna suspensión", "Por meses de fecha a fecha"], "correcta": 1, "expl": "El Art. 93 establece días corridos, sin interrupción, con suspensión solo en Semana de Turismo.", "id": "6-27", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Términos y plazos", "q": "La prórroga de un plazo exclusivamente reglamentario (Art. 95):", "opciones": ["Es ilimitada", "Procede por una sola vez y no excede la mitad del plazo original", "Solo la concede el Directorio", "Duplica el plazo original"], "correcta": 1, "expl": "El Art. 95 permite prórroga por una sola vez, sin exceder la mitad del plazo; si no hay respuesta en 3 días, se reputa concedida.", "id": "6-28", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Términos y plazos", "q": "Las providencias de trámite deben dictarse en un plazo máximo de (Art. 99):", "opciones": ["Un día", "Tres días", "Cinco días", "Diez días"], "correcta": 1, "expl": "El Art. 99 fija 3 días para las providencias de trámite; las diligencias en 5 días, ampliables 5 más.", "id": "6-29", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Derecho de petición", "q": "El derecho de petición ante cualquier autoridad de la República está consagrado en (Art. 101):", "opciones": ["El art. 318 de la Constitución", "El art. 30 de la Constitución", "La Ley 15.869", "El Decreto 500/991"], "correcta": 1, "expl": "El Art. 101 invoca el art. 30 de la Constitución para el derecho de petición.", "id": "6-30", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Derecho de petición", "q": "Si la petición carece de la solicitud concreta (numeral 3 del Art. 103), se requiere salvar la omisión en:", "opciones": ["Cinco días", "Diez días", "Quince días", "Treinta días"], "correcta": 1, "expl": "El Art. 103 otorga diez días para salvar la omisión, bajo apercibimiento de archivo.", "id": "6-31", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Acto administrativo", "q": "Acto administrativo es (Art. 104):", "opciones": ["Toda comunicación interna del organismo", "Toda manifestación de voluntad de la Administración que produce efectos jurídicos", "Solo las resoluciones del Directorio", "Cualquier escrito presentado por el administrado"], "correcta": 1, "expl": "El Art. 104 define el acto administrativo como manifestación de voluntad que produce efectos jurídicos.", "id": "6-32", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Acto administrativo", "q": "Según el Art. 104, la norma particular y concreta creada por acto administrativo se llama:", "opciones": ["Ordenanza", "Reglamento", "Resolución", "Circular"], "correcta": 2, "expl": "El Art. 104 llama Resolución a las normas particulares y concretas.", "id": "6-33", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Acto administrativo", "q": "Respecto de la motivación del acto, el Art. 106 dispone que:", "opciones": ["Basta una fórmula general de fundamentación", "Debe motivarse con relación directa y concreta de los hechos del caso", "Solo se motivan los actos sancionatorios", "La motivación es facultativa"], "correcta": 1, "expl": "El Art. 106 exige motivación concreta y prohíbe las fórmulas generales.", "id": "6-34", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Acto administrativo", "q": "La parte expositiva de una resolución se compone de (Art. 107):", "opciones": ["Visto, Resultandos, Considerandos y Atento", "Solo el Visto y la parte dispositiva", "Encabezado y firma", "Considerandos y sanción"], "correcta": 0, "expl": "El Art. 107 detalla Visto, Resultandos, Considerandos y Atento como parte expositiva.", "id": "6-35", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Recursos: revocación y jerárquico", "q": "El recurso de revocación se interpone (Art. 112):", "opciones": ["Ante el jerarca máximo, en 30 días", "Ante el mismo órgano que dictó el acto, en 10 días corridos desde la notificación o publicación", "Ante el TCA, en 60 días", "Ante el Poder Ejecutivo, en 20 días"], "correcta": 1, "expl": "El Art. 112 fija 10 días corridos, ante el mismo órgano que dictó el acto.", "id": "6-36", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Recursos: revocación y jerárquico", "q": "El recurso jerárquico, cuando corresponde, se interpone (Art. 112):", "opciones": ["De forma autónoma y posterior a la revocación", "En forma conjunta y subsidiaria con el de revocación, ante el jerarca máximo", "Solo ante el TCA", "Únicamente si el de revocación fue rechazado expresamente"], "correcta": 1, "expl": "El Art. 112 exige interponerlo conjunta y subsidiariamente ante el jerarca máximo cuando el órgano está sometido a jerarquía.", "id": "6-37", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Recursos: revocación y jerárquico", "q": "Si el acto no fue notificado personalmente ni publicado en el Diario Oficial (Art. 112):", "opciones": ["No puede recurrirse nunca", "El interesado puede recurrirlo en cualquier momento", "El plazo es de 60 días", "Se considera firme"], "correcta": 1, "expl": "El Art. 112 permite recurrir en cualquier momento si no hubo notificación ni publicación.", "id": "6-38", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Recursos: plazos y cómputo", "q": "El plazo para interponer los recursos administrativos se suspende durante (Art. 114):", "opciones": ["Solo la Semana de Turismo", "Las Ferias Judiciales y la Semana de Turismo", "Todo el mes de enero", "Ningún período"], "correcta": 1, "expl": "El Art. 114 dispone suspensión durante Ferias Judiciales y Semana de Turismo, con extensión al hábil si vence en feriado.", "id": "6-39", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Recursos: plazos y cómputo", "q": "El Directorio del BPS debe resolver los recursos dentro de (Art. 115):", "opciones": ["60 días", "90 días", "120 días", "200 días"], "correcta": 2, "expl": "El Art. 115 fija 120 días; si no resuelve, se entiende rechazado el recurso.", "id": "6-40", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Recursos: plazos y cómputo", "q": "Los plazos de instrucción de los recursos del Art. 116 se computan:", "opciones": ["Por días hábiles, suspendiéndose en Semana de Turismo", "Por días corridos, sin interrupción y SIN suspenderse por Semana de Turismo", "Por meses de fecha a fecha", "Por días corridos suspendiéndose en Ferias Judiciales"], "correcta": 1, "expl": "El Art. 116 establece días corridos, sin interrupción, sin suspensión por Semana de Turismo, con extensión al hábil si vence en feriado.", "id": "6-41", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Recursos: agotamiento de la vía", "q": "Si solo se interpuso el recurso de revocación, la vía administrativa se agota a los (Art. 117):", "opciones": ["120 días", "150 días", "200 días", "30 días"], "correcta": 1, "expl": "El Art. 117 lit. a fija 150 días para el caso de revocación como único recurso.", "id": "6-42", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Recursos: agotamiento de la vía", "q": "Si se interpusieron conjuntamente revocación y jerárquico, la vía se agota a los (Art. 117):", "opciones": ["150 días", "180 días", "200 días", "240 días"], "correcta": 2, "expl": "El Art. 117 lit. b fija 200 días (Art. 41 Ley 17.292) para la interposición conjunta.", "id": "6-43", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Recursos: agotamiento de la vía", "q": "Vencido el plazo de 200 días sin resolución, el acto impugnado (Art. 118):", "opciones": ["Queda anulado", "Se reputa fictamente confirmado", "Pasa al TCA automáticamente", "Se considera revocado"], "correcta": 1, "expl": "El Art. 118 establece la confirmación ficta del acto a los 200 días sin resolución.", "id": "6-44", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Recursos: trámite", "q": "Los escritos en que se interponen recursos administrativos (Art. 125):", "opciones": ["No requieren firma de abogado", "Llevan firma de letrado;
