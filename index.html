ades del funcionario?", "a": "Se basan en la norma UNIT-ISO/IEC 27002. Todos los funcionarios, usuarios y empresas contratadas relacionadas con el manejo de la información son responsables de cumplir la política; quienes la violen serán sancionados según la normativa vigente (pág. 18-19)."}, {"q": "Mencioná la legislación vigente en materia de datos personales y ciberseguridad citada por el material.", "a": "Ley 18.331 (Protección de Datos Personales), Ley 19.670 (arts. 37-40 con estándares del RGPD), Ley 20.327 (Ciberdelincuencia, 2024) y Decreto 66/025 (ciberseguridad para el Estado e infraestructuras críticas) (pág. 19-20)."}], "huecos": ["El documento lista cuatro tipos de información secreta vinculados a BPS (tributario, del funcionariado, estadístico y profesional), pero el texto extraído por web_fetch solo desarrolla el secreto tributario y el del funcionariado. NO se obtuvo el desarrollo del 'secreto estadístico' ni del 'secreto profesional'.", "El material clasifica la información no pública como secreta, reservada y confidencial, pero el texto extraído NO desarrolla subsecciones propias con la definición detallada de 'información reservada' ni de 'información confidencial' (solo se mencionan).", "Las imágenes del PDF (triángulos CID, flujo amenaza-vulnerabilidad-activo-impacto y ciclo PHVA) se incorporaron mediante sus descripciones textuales (texto alternativo) incluidas en el propio PDF; no se analizó el contenido gráfico más allá de esas descripciones.", "El material menciona la norma UNIT-ISO/IEC 27002 y la Ley 18.331 como marco, pero NO transcribe artículos específicos de la Ley 18.331; el detalle articulado de esa ley quedaría fuera del alcance del documento de estudio."]}, {"id": 10, "tema": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)", "fuente_pagina": "https://www.bps.gub.uy/24270/", "fuente_pdf": "https://www.bps.gub.uy/bps/file/24270/1/tributacion-y-recaudacion-de-contribuciones-especiales-de-seguridad-social.pdf", "fuente_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (BPS, Centro de Estudios en Seguridad Social, Salud y Administración, edición 2026)", "ficha": "Material que describe cómo el BPS, a través de la Asesoría Tributaria y Recaudación (ATYR), registra, recauda, fiscaliza y gestiona el cobro de las Contribuciones Especiales de Seguridad Social (CESS): tributos que financian las prestaciones del sistema de seguridad social (jubilaciones, seguro de salud, servicios bonificados y fondo de garantía de créditos laborales). Aborda materia gravada, regímenes de aportación por tipo de actividad, obligaciones de los contribuyentes, historia laboral y sanciones.", "eli5": "Imaginá que la seguridad social es un club gigante que paga jubilaciones y médico a todos. Para sostenerlo, cada empresa y cada trabajador pone una cuota obligatoria todos los meses. Esas cuotas se llaman CESS y las cobra una oficina del BPS llamada ATYR, igual que un tesorero que anota quién paga, calcula cuánto le toca a cada uno y le pone multa al que paga tarde. No son un impuesto cualquiera ni una tasa por un trámite: son una contribución especial, porque a cambio quien aporta recibe un beneficio concreto (jubilación, salud).", "esquema": ["1. Concepto de tributo y las CESS", "  - Tributo: especies (impuesto, tasa, contribucion especial)", "  - Las CESS son contribuciones especiales (financian prestaciones)", "  - Componentes de las CESS: aportes jubilatorios, seguro de salud, servicios bonificados, fondo de garantia de creditos laborales", "2. ATYR como recaudador y agente de otros impuestos/fondos", "  - Oficinas: Registro, Recaudacion, Distribucion, Fiscalizacion, Gestion de Cobro, Certificados", "  - Recauda ademas IRPF (con DGI), FRL, fondos sectoriales, Mevir", "3. Derechos, obligaciones y principios", "  - Obligaciones: inscribir, declarar, nominas, pagar, conservar registros", "  - Principios: congruencia, primacia de remuneracion real, actividad, verdad material, lo devengado", "4. Trabajador dependiente y no dependiente", "5. Materia gravada de CESS (Ley 16.713 art. 153)", "  - Dependientes: partidas gravadas y no gravadas, fictos (BFC/BPC)", "  - No dependientes: categorias de fictos, directores SA, SAS", "6. Regimenes/tipos de aportacion", "  - Industria y Comercio, Civil, Rural, Construccion, Notarial, Bancaria, Servicios Personales, Servicio Domestico, Monotributo", "7. Aporte jubilatorio y Fonasa (tasas)", "8. Historia laboral", "9. Disposiciones generales: pagos, DJNP, exoneraciones, bonificaciones", "10. Sanciones por incumplimiento (multas, mora, recargos)"], "datos_duros": ["Materia gravada de CESS: todo ingreso regular y permanente, en dinero o especie, susceptible de apreciacion pecuniaria, percibido en concepto de retribucion por actividad personal dentro del ambito BPS (Ley 16.713, art. 153).", "Fondo de garantia de creditos laborales: contribucion especial PATRONAL de 0,025 % sobre remuneraciones de dependientes de actividad privada, desde 1/1/2019 (Ley 19.690; Dec. 77/19).", "Aporte jubilatorio Industria y Comercio: personal 15 % / patronal 7,5 %.", "Aporte jubilatorio Civil: personal 15 % en todos los casos; patronal: Entes autonomos y servicios descentralizados 7,5 %, Administracion Central 19,5 %, Intendencias municipales 16,5 %.", "Tope de cotizacion jubilatoria para regimen mixto/SPC: $ 288.836 (valor 2/2026).", "Servicios bonificados (ejemplo): trabajo a 20 grados bajo cero o inferior aporta 13,8 % de contribucion patronal por servicios bonificados (bonificacion 5x4).", "Fondo de Reconversion Laboral (FRL): personal 0,10 % / patronal 0,10 % desde 1/1/2019. Se exceptua el sector publico.", "Fonasa aporte patronal: basico 5 % mas complemento de cuota mutual (CCM). El aguinaldo esta exonerado del aporte patronal (5 %).", "CCM = (cantidad de beneficiarios x valor cuota mutual) - (aporte basico personal + aporte patronal).", "Fonasa aportes personales hasta 2,5 BPC: sin conyuge/sin hijos 3 %; sin conyuge/con hijos 3 %; con conyuge/sin hijos 5 %; con conyuge/con hijos 5 %.", "Fonasa aportes personales mayor a 2,5 BPC: sin conyuge/sin hijos 4,5 %; sin conyuge/con hijos 6 %; con conyuge/sin hijos 6,5 %; con conyuge/con hijos 8 %.", "Requisito cobertura medica SNS: minimo 13 jornales o 104 horas mensuales o retribucion mayor o igual a 1,25 BPC.", "Viaticos sin rendicion de cuentas gravados: 50 % dentro del pais, 25 % fuera del pais.", "Ficto de propina: 3 BFC. Ficto de vivienda: 10 BFC.", "Art. 167 Ley 16.713: alimentacion, prestaciones medicas, seguros y transporte hasta 20 % de la retribucion nominal en efectivo estan exentos de aportes personales, no del aporte patronal jubilatorio. Tope alimentacion: 100 UI diarias (Ley 19.732).", "No dependientes sin personal: minimo unipersonales/sociedades de hecho 11 BFC (1.a categoria); socios de sociedades con contrato 15 BFC (2.a categoria).", "Categorias de fictos no dependientes: 1=11 BFC, 2=15, 3=20, 4=25, 5=30, 6=36, 7=42, 8=48, 9=54, 10=60 BFC.", "Directores de SA: materia gravada = remuneracion real con minimo de 30 BFC por mes del ejercicio en que ejercio el cargo.", "BFC = una unidad reajustable (UR). BPC = base de prestaciones y contribuciones.", "Rural: tasa UBC 0,1004 %; sin explotacion agropecuaria la tasa se incrementa 50 %. Minimo de aporte = 15 % de 22 BFC con reduccion del 33 %. Pago cuatrimestral.", "Mevir: lo abonan quienes explotan padrones rurales con mas de 500 hectareas coneat; es trimestral.", "Trabajo domestico: aporte jubilatorio personal 15 % / patronal 7,5 %; FRL 0,10 %/0,10 %; fondo de garantia patronal 0,025 %; fondo social 0,03 %/0,03 % (opcional). BSE 1,87 % sobre base imponible. Prima por antiguedad 0,5 % por año (maximo 5 %).", "Construccion (Ley 14.411): AUC patronal 71,8 % (jubilatorio personal 17,9 %, jubilatorio patronal 9 %, seguro de salud 9 %, cargas salariales 29,9 %, BSE 6 %). Se adiciona 4 % Caja Profesionales Universitarios. Descuentos personales: FRL 0,10 % y tasas adicionales de salud.", "Monotributo (Ley 18.083): jubilatorio 22,5 % sobre 5 BFC; FRL 0,10 % sobre 5 BFC; sueldo ficto patronal 5 BFC; aporte gradual primeros 24 meses.", "Monotributo social Mides (Ley 18.874): aporte progresivo 25 %, 50 %, 75 % y recien tras 36 meses el 100 %.", "Pago regimen general: mensual, al mes siguiente de la actividad, antes del vencimiento del calendario BPS. Rurales: cuatrimestral.", "Multas registrales fuera de plazo: Inscripcion 1 UR; Modificacion 1 UR; Clausura 1,5 UR.", "Multa GAFI: alta 1 UR por trabajador (plazo 10 dias antes del inicio y hasta fecha de ingreso); baja 1 UR por trabajador (plazo 5 dias habiles desde el egreso); altas/bajas de oficio 2 UR por persona.", "Multa por no presentacion de nomina: dentro del mes de vencimiento en plazo 0,10 UR (tope 5 UR); fuera de plazo 0,10 UR; fuera del mes de vencimiento 0,25 UR. Reiteracion en el año: doble (0,20 UR / 0,50 UR). En inspeccion 1 UR.", "Mora en pago (presento nomina): hasta 5.o dia habil 2,5 %, despues del 5.o y hasta 90 dias corridos 5 %, despues de 90 dias 10 %. Si NO presento nomina: 5 %, 10 %, 20 %.", "Multa por defraudacion (Codigo Tributario art. 96): de 1 a 15 veces el monto del tributo.", "Multa art. 10 Ley 16.244: omision de recibo de sueldo de 1,25 a 5 veces el salario mensual; constancia/recibo dolosa hasta 20 veces el salario mensual correcto.", "Tipos de aportacion: 1 Industria y Comercio, 2 Civil, 3 Rural, 4 Construccion, 5 Notarial, 6 Bancaria, 11 Servicios Personales, 48 Servicio Domestico."], "teoria_resumida": "\u003cp\u003eLas \u003cstrong\u003eContribuciones Especiales de Seguridad Social (CESS)\u003c/strong\u003e son \u003cstrong\u003etributos\u003c/strong\u003e destinados a financiar las prestaciones del sistema de seguridad social. El material parte del concepto de tributo, cuyas especies son el \u003cstrong\u003eimpuesto\u003c/strong\u003e (no tiene contrapartida directa), la \u003cstrong\u003etasa\u003c/strong\u003e (se paga por un servicio estatal concreto) y la \u003cstrong\u003econtribucion especial\u003c/strong\u003e (genera un beneficio derivado de una actividad estatal). Las CESS son contribuciones especiales porque el aporte da derecho a una prestacion concreta: jubilacion, seguro de salud, contribucion por servicios bonificados y fondo de garantia de creditos laborales (Introduccion).\u003c/p\u003e\u003cp\u003eEl organismo que gestiona el ciclo completo (registro, recaudacion, fiscalizacion y cobro) es la \u003cstrong\u003eAsesoria Tributaria y Recaudacion (ATYR)\u003c/strong\u003e. Ademas, el BPS oficia de \u003cstrong\u003eagente recaudador\u003c/strong\u003e de otros tributos y fondos: IRPF (junto con DGI, Ley 18.083), Fondo de Reconversion Laboral (FRL), Mevir y fondos sectoriales (Otros fondos e impuestos que se recaudan).\u003c/p\u003e\u003cp\u003eLa \u003cstrong\u003emateria gravada\u003c/strong\u003e es todo ingreso regular y permanente, en dinero o especie, percibido como retribucion por actividad personal dentro del ambito BPS (\u003cstrong\u003eLey 16.713, art. 153\u003c/strong\u003e). Rige el \u003cstrong\u003eprincipio de primacia de la remuneracion real\u003c/strong\u003e y el \u003cstrong\u003eprincipio de lo devengado\u003c/strong\u003e (la obligacion nace cuando se genera el salario, no cuando se paga). Algunas partidas se gravan por \u003cstrong\u003emontos fictos\u003c/strong\u003e (propina = 3 BFC, vivienda = 10 BFC), medidos en BFC (= 1 UR) o BPC.\u003c/p\u003e\u003cp\u003eLos aportes se dividen en \u003cstrong\u003epersonales\u003c/strong\u003e (del trabajador) y \u003cstrong\u003epatronales\u003c/strong\u003e (de la empresa). El aporte jubilatorio personal es \u003cstrong\u003e15 %\u003c/strong\u003e en Industria y Comercio y Civil; el patronal varia segun el tipo de aportacion. Existen regimenes especiales: \u003cstrong\u003eRural\u003c/strong\u003e (aporte por hectareas coneat, pago cuatrimestral), \u003cstrong\u003eServicio Domestico\u003c/strong\u003e, \u003cstrong\u003eConstruccion\u003c/strong\u003e (AUC del 71,8 %, Ley 14.411), \u003cstrong\u003eServicios Personales\u003c/strong\u003e y \u003cstrong\u003eMonotributo\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003eEntre las \u003cstrong\u003eobligaciones\u003c/strong\u003e estan: inscribir la empresa, declarar altas/bajas, presentar \u003cstrong\u003enominas\u003c/strong\u003e mensuales, pagar antes del vencimiento y conservar registros. De las nominas se conforma la \u003cstrong\u003ehistoria laboral\u003c/strong\u003e de cada persona. El incumplimiento genera \u003cstrong\u003esanciones\u003c/strong\u003e: multas registrales y GAFI (en UR), multa por mora (porcentaje sobre lo no pagado segun la demora) y recargos resarcitorios capitalizables (Sanciones por incumplimiento).\u003c/p\u003e", "teoria_exhaustiva": [{"ref": "Introduccion", "titulo": "Concepto de CESS y rol de ATYR", "cita": "ATYR gestiona el proceso de recaudacion de las CESS, tributos destinados a financiar las prestaciones que otorga el sistema de seguridad social.", "explicacion": "Define las CESS como tributos cuyo destino es financiar jubilaciones, seguro de salud, servicios bonificados y fondo de garantia de creditos laborales, y fija a ATYR como la reparticion encargada del registro, recaudacion, fiscalizacion y cobro.", "ejemplo": "Una empresa comercial paga mensualmente sus aportes a ATYR, que con esos fondos financia la jubilacion futura de sus trabajadores."}, {"ref": "Introduccion - Aportes jubilatorios", "titulo": "Sistema previsional mixto", "cita": "Desde el 1 de abril de 1996 el sistema es mixto (Ley 16.713): BPS (solidaridad intergeneracional) y AFAP (ahorro individual). La Ley 20.130 (2023) crea el SPC.", "explicacion": "La recaudacion de los aportes jubilatorios la hace integramente el BPS, que luego distribuye a las AFAP la cuota parte de quienes integran el regimen mixto o el sistema previsional comun (SPC).", "ejemplo": "Del 15 % de aporte personal de un trabajador del regimen mixto, una parte va a su AFAP."}, {"ref": "Fondo de garantia de creditos laborales", "titulo": "Contribucion patronal de 0,025 %", "cita": "La Ley 19.690 crea una contribucion especial patronal de 0,025 %, desde 1/1/2019, sobre remuneraciones de dependientes de la actividad privada.", "explicacion": "Cubre las contingencias por insolvencia del empleador. Es exclusivamente patronal y se aplica cualquiera sea el ambito de afiliacion de quien emplea.", "ejemplo": "Una pyme privada paga 0,025 % sobre el sueldo de cada dependiente para este fondo."}, {"ref": "Principios generales", "titulo": "Principios de la administracion tributaria", "cita": "Congruencia, primacia de la remuneracion real, actividad, verdad material; principio de lo devengado: la obligacion nace cuando se genera el salario.", "explicacion": "Todo lo que es asignacion computable es materia gravada (congruencia); las CESS se aplican sobre lo realmente percibido; el hecho generador es la actividad personal remunerada; la obligacion nace al devengarse el salario.", "ejemplo": "Aunque la empresa pague el sueldo de marzo en abril, la obligacion corresponde al mes de cargo marzo (lo devengado)."}, {"ref": "Concepto de trabajador dependiente y no dependiente", "titulo": "Dependiente vs no dependiente", "cita": "Dependiente: presta servicio, no asume riesgos, depende economicamente y esta sujeto a ordenes. No dependiente: actua en forma independiente y asume el riesgo de su actividad.", "explicacion": "El dependiente es subordinado, oneroso, personal e intransferible. El no dependiente puede ser unipersonal o socio de sociedades (arts. 172 y 173 Ley 16.713).", "ejemplo": "Un mozo en relacion de dependencia es dependiente; el dueño de un kiosco unipersonal es no dependiente."}, {"ref": "Principales oficinas de ATYR", "titulo": "Ciclo operativo de ATYR", "cita": "Registro de Contribuyentes y Empresas, Recaudacion, Distribucion, Fiscalizacion, Gestion de Cobro, Certificados.", "explicacion": "El registro inscribe/modifica/clausura empresas; recaudacion calcula y factura; distribucion vierte a las AFAP; fiscalizacion controla; gestion de cobro recupera adeudos; certificados expide constancias.", "ejemplo": "Para vender un inmueble una empresa necesita el certificado especial que acredita no tener adeudos."}, {"ref": "Materia gravada de CESS (Ley 16.713 art. 153)", "titulo": "Definicion de materia gravada", "cita": "Constituye materia gravada todo ingreso regular y permanente, en dinero o especie, susceptible de apreciacion pecuniaria, percibido en concepto de retribucion por actividad personal.", "explicacion": "Es la base sobre la que se calculan los aportes. No define la gravabilidad el nombre de la partida sino los hechos que le dan origen. Algunas partidas se gravan por montos fictos.", "ejemplo": "Un sueldo y las horas extras siempre son materia gravada; una prima por casamiento, no."}, {"ref": "Materia gravada - fictos (BFC y BPC)", "titulo": "Bases de medida: BFC y BPC", "cita": "BFC equivale a una unidad reajustable (UR). BPC es la base de prestaciones y contribuciones usada como base de aportacion y limite de prestaciones.", "explicacion": "El Poder Ejecutivo fija montos fictos para ingresos en especie o no cuantificables (propinas, vivienda). Se expresan en BFC; los topes y minimos de salud, en BPC.", "ejemplo": "La propina se grava por un ficto de 3 BFC, sin importar cuanto recibio realmente el mozo."}, {"ref": "Materia gravada - Dependientes - Viaticos", "titulo": "Viaticos sin rendicion de cuentas", "cita": "Se grava 50 % de la partida cuando se usa dentro del pais y 25 % cuando se usa fuera del pais.", "explicacion": "Solo se gravan los viaticos sin rendicion de cuentas. Si hay rendicion y escrituracion contable, o se prueba su caracter indemnizatorio, no estan gravados.", "ejemplo": "Un viatico nacional de 1000 sin rendicion grava 500."}, {"ref": "Materia gravada - Dependientes - Propinas y vivienda", "titulo": "Fictos de propina y vivienda", "cita": "Las propinas estan gravadas con un ficto de 3 BFC; la vivienda otorgada al personal se grava en forma ficta sobre 10 BFC.", "explicacion": "La reglamentacion lista las actividades con ficto de propina (gastronomia, hoteleria, estaciones de servicio, etc.). La vivienda en dinero o especie se grava por 10 BFC.", "ejemplo": "Un mozo de restaurante tributa por 3 BFC de propina ademas de su sueldo."}, {"ref": "Materia gravada - partidas no gravadas", "titulo": "Partidas no gravadas", "cita": "No son materia gravada: indemnizacion por despido, salario vacacional (exento de todo gravamen, Ley 16.101), licencia no gozada por egreso, provision de ropa y herramientas.", "explicacion": "Tambien quedan fuera las gratificaciones discrecionales no vinculadas a la prestacion (primas por casamiento/nacimiento) y los complementos de subsidios que no excedan la remuneracion habitual.", "ejemplo": "El salario vacacional no paga aportes; el sueldo de licencia efectivamente gozada, si."}, {"ref": "Art. 167 Ley 16.713", "titulo": "Prestaciones del art. 167", "cita": "Alimentacion, prestaciones medicas, seguros y transporte, hasta 20 % de la retribucion nominal en efectivo, estan exentas de aportes personales, no del aporte patronal jubilatorio.", "explicacion": "Estas partidas no pagan aporte personal pero si patronal jubilatorio. La alimentacion debe pagarse por dinero electronico (desde 1/3/2016) con tope de 100 UI diarias (Ley 19.732).", "ejemplo": "Un vale de alimentacion electronico dentro del tope no descuenta aporte personal al trabajador."}, {"ref": "No dependientes - categorias de fictos", "titulo": "Sueldos fictos del no dependiente", "cita": "Minimo unipersonales/sociedades de hecho 11 BFC (1.a categoria); socios de sociedades con contrato 15 BFC (2.a categoria). Hay 10 categorias hasta 60 BFC.", "explicacion": "Sin personal aporta por la categoria de ficto elegida; con personal, por el mayor entre la categoria y el maximo salario de su mejor dependiente, con minimos. Pluriactividad: aporta por la empresa de mayor monto gravado.", "ejemplo": "Un titular unipersonal sin empleados aporta como minimo por 11 BFC."}, {"ref": "No dependientes - Directores de SA y SAS", "titulo": "Directores de SA y SAS", "cita": "Directores de SA: materia gravada la remuneracion real con minimo de 30 BFC por mes del ejercicio. SAS: aporte jubilatorio por el mayor entre remuneracion y 30 BFC.", "explicacion": "Directores sin remuneracion o radicados en el extranjero estan exentos (con prueba). En SAS, si ningun integrante percibe remuneracion, debe aportar al menos uno por el mayor entre el maximo salario y 15 BFC. Las SAS quedan en el SNIS.", "ejemplo": "Un director de SA con remuneracion de 20 BFC igual aporta por el minimo de 30 BFC."}, {"ref": "Regimen de aportacion - Aporte jubilatorio", "titulo": "Tasas jubilatorias I y C y Civil", "cita": "Industria y Comercio: personal 15 % / patronal 7,5 %. Civil: personal 15 %; patronal 7,5 % (entes), 19,5 % (Administracion Central), 16,5 % (intendencias).", "explicacion": "La tasa personal jubilatoria es la misma para todos; la patronal cambia segun el tipo de aportacion. Existe tope de cotizacion para el regimen mixto/SPC ($288.836, valor 2/2026).", "ejemplo": "Por un sueldo de 30.000 en I y C, el trabajador aporta 4.500 (15 %) y la empresa 2.250 (7,5 %) de jubilatorio."}, {"ref": "Contribucion patronal por servicios bonificados", "titulo": "Servicios bonificados", "cita": "Quienes ocupen dependientes a 20 grados bajo cero o inferiores aportan 13,8 % por servicios bonificados (bonificacion 5x4).", "explicacion": "Es una contribucion patronal adicional por actividades riesgosas catalogadas como bonificadas para el computo jubilatorio (edad y servicios). Aplica el tope de cotizacion del regimen mixto/SPC.", "ejemplo": "Un frigorifico con camaras de frio extremo paga este 13,8 % adicional."}, {"ref": "Aporte Seguro Nacional de Salud - Fonasa", "titulo": "Aportes al Fonasa", "cita": "Personal: 3 % a 8 % segun remuneracion (corte en 2,5 BPC) y situacion familiar. Patronal: basico 5 % mas complemento de cuota mutual (CCM). Aguinaldo exonerado del 5 %.", "explicacion": "El SNIS (desde 1/1/2008) extiende cobertura a hijos a cargo y conyuge/concubino sin cobertura propia. Requisito: 13 jornales o 104 horas o 1,25 BPC. No se aplica tope de cotizacion al Fonasa. Desde 2011 hay devolucion de excedentes.", "ejemplo": "Un trabajador que gana mas de 2,5 BPC con conyuge e hijos a cargo aporta 8 % personal de Fonasa."}, {"ref": "Fondo de reconversion laboral (FRL)", "titulo": "FRL", "cita": "Desde 1/1/2019: aporte personal 0,10 % y patronal 0,10 %. Se exceptua el sector publico.", "explicacion": "Financia la recapacitacion profesional (Inefop), sobre todo de desempleados. Se exonera de su pago a las actividades del sector publico.", "ejemplo": "Sobre un sueldo de 30.000, FRL son 30 de aporte personal y 30 patronal."}, {"ref": "Actividades rurales", "titulo": "Regimen rural", "cita": "Tasa UBC 0,1004 %; sin explotacion agropecuaria se incrementa 50 %. Minimo = 15 % de 22 BFC con reduccion del 33 %. Pago cuatrimestral. Mevir si supera 500 ha coneat.", "explicacion": "El aporte patronal rural se calcula por hectareas coneat (hectareas reales x indice coneat) y comprende todos los aportes por no dependientes y el patronal por dependientes. Pluripersonales pagan acrecimiento del 10 %.", "ejemplo": "Una estancia con explotacion liquida la contribucion patronal = hectareas coneat x (1 BPC x 0,1004 %)."}, {"ref": "Trabajo domestico", "titulo": "Regimen de trabajo domestico", "cita": "Tasas iguales a Industria y Comercio (jubilatorio 15 %/7,5 %); fondo social opcional 0,03 %/0,03 %; BSE 1,87 % sobre base imponible. Ley 18.065.", "explicacion": "BPS liquida automaticamente aguinaldo, prima por antiguedad (0,5 % por año, max 5 %), prima por presentismo y aumentos por laudo. La nomina se genera automaticamente tras la declaracion del empleador.", "ejemplo": "El empleador de una trabajadora domestica paga jubilatorio patronal 7,5 % y el 1,87 % de BSE."}, {"ref": "Industria de la construccion (Ley 14.411)", "titulo": "Aporte Unificado de la Construccion (AUC)", "cita": "AUC patronal 71,8 % (jubilatorio personal 17,9 %, jubilatorio patronal 9 %, salud 9 %, cargas salariales 29,9 %, BSE 6 %). Se adiciona 4 % Caja Profesionales.", "explicacion": "El aporte es de cargo del propietario de la obra. Como el AUC incluye el aporte personal, no se descuenta al trabajador jubilatorio ni salud basico: solo FRL 0,10 % y tasas adicionales de salud. Hay distintas modalidades de obra.", "ejemplo": "En una obra por administracion, el propietario paga el AUC del 71,8 % sobre las remuneraciones gravadas."}, {"ref": "Servicios personales fuera de la relacion de dependencia", "titulo": "Servicios personales", "cita": "Desde julio 2011 ingresan al SNIS. El aporte al Fonasa se efectiviza por anticipos mensuales a cuenta del tributo anual; tasas personales segun base y situacion familiar.", "explicacion": "Comprende profesionales (Caja Profesional), escribanos (Caja Notarial) y servicios personales no profesionales que aportan a BPS. La base surge de los importes facturados.", "ejemplo": "Un profesional independiente paga anticipos mensuales de Fonasa segun su facturacion."}, {"ref": "Monotributo (Ley 18.083)", "titulo": "Monotributo", "cita": "Jubilatorio 22,5 % sobre 5 BFC; FRL 0,10 % sobre 5 BFC; sueldo ficto patronal 5 BFC; aporte gradual los primeros 24 meses.", "explicacion": "Prestacion tributaria unificada para empresas de reducida dimension (unipersonales con hasta un dependiente, sociedades de hecho). Sustituye los impuestos nacionales (excepto importacion). BPS suspende de oficio tras dos meses sin pago.", "ejemplo": "Un feriante monotributista paga 22,5 % de jubilatorio sobre 5 BFC."}, {"ref": "Monotributo social Mides (Ley 18.874)", "titulo": "Monotributo social Mides", "cita": "Aporte progresivo: 25 %, 50 %, 75 % y, tras 36 meses, el 100 %. Requiere autorizacion previa del Mides.", "explicacion": "Para hogares por debajo de la linea de pobreza o en vulnerabilidad social. Si optan por cobertura del SNS, el aporte al Fonasa se hace sin gradualidad.", "ejemplo": "Un emprendedor en vulnerabilidad inscripto por Mides paga solo el 25 % del aporte el primer tramo."}, {"ref": "Disposiciones generales - Pagos y DJNP", "titulo": "Pagos y declaracion jurada de no pago", "cita": "El pago del regimen general es mensual, al mes siguiente de la actividad, antes del vencimiento. Si no se puede pagar, se presenta la nomina con DJNP.", "explicacion": "El pago minimo incluye aportes personales (jubilatorios, Fonasa, FRL), patronales por actividades bonificadas y multas/recargos. Retener y no verter aportes personales puede configurar apropiacion indebida (delito).", "ejemplo": "Una empresa sin liquidez presenta la nomina de mayo acompañada de la DJNP antes del vencimiento."}, {"ref": "Historia laboral", "titulo": "Historia laboral", "cita": "Detalle ordenado de todas las actividades comprendidas en BPS de cada persona; se conforma con la informacion de las nominas.", "explicacion": "Incluye empresas, tipo de relacion, calidad de servicios y remuneraciones computables. La integracion de aportes a la cuenta individual esta condicionada al pago efectivo.", "ejemplo": "Si la empresa declara pero no paga, esos aportes no se integran a la cuenta individual del trabajador."}, {"ref": "Exoneraciones (Codigo Tributario art. 41)", "titulo": "Exoneraciones", "cita": "La exoneracion es la liberacion total o parcial de la obligacion tributaria establecida por ley (Codigo Tributario, art. 41).", "explicacion": "Total: enseñanza privada y cultural, cooperativas sociales, partidos politicos. Parcial: cooperativas de trabajo, sociedades de fomento rural, taxis. Solo FRL: sindicatos, comisiones de fomento. Transporte colectivo exonera el patronal jubilatorio hasta 7,5 %.", "ejemplo": "Un colegio privado esta exonerado del aporte patronal jubilatorio (Constitucion, art. 69)."}, {"ref": "Bonificaciones", "titulo": "Beneficios al buen pagador", "cita": "Beneficio buen pagador: exoneracion de multas y recargos si regulariza dentro del mes de vencimiento estando regular los 12 meses previos (Codigo Tributario, art. 94).", "explicacion": "Tambien existe la bonificacion para buenos pagadores (Ley 17.963): en 2025, descuento del 10 % sobre el aporte jubilatorio patronal del mes de cargo diciembre para micro y pequeñas empresas.", "ejemplo": "Una empresa al dia que paga el mes de cargo diciembre obtiene un descuento sobre el aporte patronal."}, {"ref": "Sanciones - transacciones registrales y GAFI", "titulo": "Multas registrales y GAFI", "cita": "Inscripcion 1 UR, modificacion 1 UR, clausura 1,5 UR. Alta/baja de dependientes 1 UR por persona; de oficio 2 UR.", "explicacion": "Sancionan las transacciones registrales y las altas/bajas de dependientes fuera de plazo. Las altas tienen plazo de 10 dias antes del inicio y hasta el ingreso; las bajas, 5 dias habiles desde el egreso.", "ejemplo": "Inscribir un trabajador despues de su fecha de ingreso genera multa de 1 UR por esa persona."}, {"ref": "Sanciones - mora y recargos", "titulo": "Mora por pago tardio", "cita": "Con nomina presentada: 2,5 % hasta el 5.o dia habil, 5 % hasta 90 dias, 10 % despues. Sin nomina: 5 %, 10 %, 20 %. Mas recargo resarcitorio mensual capitalizable.", "explicacion": "La multa por mora es gradual segun la demora y si se presento o no la nomina. Al configurarse la mora se adiciona un recargo resarcitorio fijado por el Poder Ejecutivo, calculado dia por dia.", "ejemplo": "Pagar 10 dias tarde habiendo presentado la nomina genera 5 % de multa sobre lo adeudado mas recargos."}, {"ref": "Sanciones - infracciones (Codigo Tributario)", "titulo": "Contravencion y defraudacion", "cita": "Contravencion (art. 95): montos fijados por el Poder Ejecutivo. Defraudacion (art. 96): multa de 1 a 15 veces el monto del tributo.", "explicacion": "La contravencion sanciona la violacion de deberes formales u obstaculizacion; la defraudacion, el acto fraudulento para obtener enriquecimiento indebido a costa del Estado. La Ley 16.244 (art. 10) sanciona la omision de recibos de sueldo.", "ejemplo": "Falsear nominas para pagar menos aportes puede configurar defraudacion con multa de hasta 15 veces el tributo."}], "flashcards": [{"front": "Que son las CESS?", "back": "Tributos destinados a financiar las prestaciones del sistema de seguridad social: aportes jubilatorios, seguro de salud, contribucion por servicios bonificados y fondo de garantia de creditos laborales (Introduccion).", "id": "10-0"}, {"front": "Cuales son las tres especies de tributo y por que las CESS son contribucion especial?", "back": "Impuesto, tasa y contribucion especial. Las CESS son contribuciones especiales porque el aporte genera derecho a una prestacion concreta de la seguridad social (Introduccion).", "id": "10-1"}, {"front": "Que oficina del BPS gestiona la recaudacion de las CESS?", "back": "La Asesoria Tributaria y Recaudacion (ATYR), encargada del registro, recaudacion, fiscalizacion y gestion de cobro (Principales oficinas de ATYR).", "id": "10-2"}, {"front": "De que otros tributos/fondos es agente recaudador el BPS?", "back": "IRPF (con DGI, Ley 18.083), FRL, Mevir y fondos sectoriales (grafica, metalurgica, domestico, construccion) (Otros fondos e impuestos).", "id": "10-3"}, {"front": "Como se define la materia gravada de CESS?", "back": "Todo ingreso regular y permanente, en dinero o especie, susceptible de apreciacion pecuniaria, percibido como retribucion por actividad personal dentro del ambito BPS (Ley 16.713, art. 153).", "id": "10-4"}, {"front": "Que es el principio de lo devengado?", "back": "La obligacion tributaria nace cuando se genera el salario, independientemente de la fecha del pago (Principios generales).", "id": "10-5"}, {"front": "Cuanto es el aporte jubilatorio personal y patronal en Industria y Comercio?", "back": "Personal 15 %, patronal 7,5 % (Tasas de aporte jubilatorio para Industria y Comercio).", "id": "10-6"}, {"front": "Cuales son las tasas patronales jubilatorias en la aportacion Civil?", "back": "Entes autonomos/servicios descentralizados 7,5 %, Administracion Central 19,5 %, Intendencias municipales 16,5 % (personal 15 % en todos) (Tasas aporte jubilatorio para Civil).", "id": "10-7"}, {"front": "Que es el fondo de garantia de creditos laborales y cual es su tasa?", "back": "Contribucion especial patronal de 0,025 % sobre remuneraciones de dependientes de la actividad privada, desde 1/1/2019 (Ley 19.690).", "id": "10-8"}, {"front": "Cual es el tope de cotizacion jubilatoria para el regimen mixto/SPC?", "back": "$ 288.836 (valor 2/2026) (Aporte jubilatorio).", "id": "10-9"}, {"front": "Como se grava la propina y la vivienda?", "back": "Propina: ficto de 3 BFC; vivienda: ficto de 10 BFC (Materia gravada - Dependientes).", "id": "10-10"}, {"front": "Como se gravan los viaticos sin rendicion de cuentas?", "back": "50 % dentro del pais y 25 % fuera del pais (Viaticos).", "id": "10-11"}, {"front": "Que establece el art. 167 de la Ley 16.713?", "back": "Alimentacion, prestaciones medicas, seguros y transporte hasta el 20 % de la retribucion nominal en efectivo estan exentos de aportes personales, no del patronal jubilatorio.", "id": "10-12"}, {"front": "Que partidas NO constituyen materia gravada?", "back": "Indemnizacion por despido, salario vacacional (exento, Ley 16.101), licencia no gozada por egreso, provision de ropa y herramientas, gratificaciones discrecionales (Materia gravada).", "id": "10-13"}, {"front": "Que son BFC y BPC?", "back": "BFC = una unidad reajustable (UR), base ficta de contribucion. BPC = base de prestaciones y contribuciones (Materia gravada de CESS).", "id": "10-14"}, {"front": "Cual es el ficto minimo para no dependientes unipersonales y para socios con contrato?", "back": "Unipersonales/sociedades de hecho: 11 BFC (1.a categoria). Socios de sociedades con contrato: 15 BFC (2.a categoria) (No dependientes).", "id": "10-15"}, {"front": "Cual es la materia gravada minima de un director de SA?", "back": "La remuneracion real con un minimo de 30 BFC por cada mes del ejercicio en que ejercio el cargo (Directores de sociedades anonimas).", "id": "10-16"}, {"front": "Cuales son las tasas del FRL?", "back": "0,10 % personal y 0,10 % patronal desde 1/1/2019; se exceptua el sector publico (Fondo de reconversion laboral).", "id": "10-17"}, {"front": "Como se compone el aporte patronal al Fonasa?", "back": "Aporte basico del 5 % mas el complemento de cuota mutual (CCM); el aguinaldo esta exonerado del 5 % (Aportes patronales Fonasa).", "id": "10-18"}, {"front": "Cual es el aporte personal de Fonasa para quien gana mas de 2,5 BPC con conyuge e hijos a cargo?", "back": "8 % (Tasas de aportes Fonasa, aportes personales).", "id": "10-19"}, {"front": "Que requisitos dan derecho a la cobertura del SNS?", "back": "Minimo 13 jornales o 104 horas mensuales o retribucion mayor o igual a 1,25 BPC (Requisitos Fonasa).", "id": "10-20"}, {"front": "Que caracteristica tiene el pago de aportes de las empresas rurales?", "back": "La exigibilidad del pago es cuatrimestral; los aportes patronales se vinculan con hectareas o montepios (Actividades rurales).", "id": "10-21"}, {"front": "Cual es la tasa para la UBC rural y el minimo de aporte?", "back": "Tasa 0,1004 % (se incrementa 50 % sin explotacion agropecuaria); minimo = 15 % de 22 BFC con reduccion del 33 % (Contribucion patronal rural).", "id": "10-22"}, {"front": "Quienes pagan el impuesto Mevir y con que periodicidad?", "back": "Quienes explotan padrones rurales con mas de 500 hectareas coneat; es trimestral (Mevir).", "id": "10-23"}, {"front": "Cual es el AUC en la construccion y que incluye?", "back": "71,8 % patronal: jubilatorio personal 17,9 %, jubilatorio patronal 9 %, salud 9 %, cargas salariales 29,9 %, BSE 6 %; mas 4 % de Caja Profesionales (Ley 14.411).", "id": "10-24"}, {"front": "Que descuentos personales tiene el trabajador de la construccion?", "back": "Solo FRL 0,10 % y las tasas adicionales del seguro de salud; no se le descuenta jubilatorio ni salud basico (Aportes personales construccion).", "id": "10-25"}, {"front": "Cuanto aporta el monotributo (Ley 18.083) por jubilatorio?", "back": "22,5 % sobre 5 BFC; FRL 0,10 % sobre 5 BFC; aporte gradual los primeros 24 meses (Monotributo).", "id": "10-26"}, {"front": "Como es la gradualidad del monotributo social Mides?", "back": "Progresivo: 25 %, 50 %, 75 % y recien tras 36 meses se paga el 100 % (Monotributo social Mides, Ley 18.874).", "id": "10-27"}, {"front": "Cuales son los tipos de aportacion segun la actividad?", "back": "1 Industria y Comercio, 2 Civil, 3 Rural, 4 Construccion, 5 Notarial, 6 Bancaria, 11 Servicios Personales, 48 Servicio Domestico (Regimen de aportacion).", "id": "10-28"}, {"front": "Que es la historia laboral y como se conforma?", "back": "Detalle ordenado de todas las actividades de cada persona comprendidas en BPS; se conforma con la informacion de las nominas (Historia laboral).", "id": "10-29"}, {"front": "Cuando se integran los aportes a la cuenta individual?", "back": "La integracion esta condicionada al pago efectivo (Distribucion / Historia laboral).", "id": "10-30"}, {"front": "Cuales son las obligaciones del contribuyente?", "back": "Inscribir la empresa, declarar ingresos/egresos, comunicar modificaciones, presentar nominas, pagar aportes y conservar libros y registros (Obligaciones).", "id": "10-31"}, {"front": "Que es la DJNP y cuando se presenta?", "back": "Declaracion jurada de no pago: se presenta junto con la nomina cuando la empresa no puede pagar antes del vencimiento (Pagos y DJNP).", "id": "10-32"}, {"front": "Que sancion tiene la inscripcion, modificacion y clausura fuera de plazo?", "back": "Inscripcion 1 UR, modificacion 1 UR, clausura 1,5 UR (Transacciones registrales fuera de plazo).", "id": "10-33"}, {"front": "Cual es la multa GAFI por alta o baja fuera de plazo?", "back": "1 UR por trabajador (alta o baja); de oficio 2 UR por persona (Alta o baja a dependientes fuera de plazo).", "id": "10-34"}, {"front": "Cuanto es la multa por mora segun la demora (con nomina presentada)?", "back": "2,5 % hasta el 5.o dia habil; 5 % hasta 90 dias corridos; 10 % despues de 90 dias. Sin nomina: 5 %, 10 % y 20 % (Mora).", "id": "10-35"}, {"front": "Cuanto es la multa por defraudacion?", "back": "De 1 a 15 veces el monto del tributo (Codigo Tributario, art. 96).", "id": "10-36"}, {"front": "Que es el beneficio buen pagador?", "back": "Exoneracion de multas y recargos si regulariza dentro del mes de vencimiento estando regular los 12 meses previos (Codigo Tributario, art. 94).", "id": "10-37"}, {"front": "Cual es la tasa de BSE en trabajo domestico?", "back": "1,87 % sobre la base imponible de seguridad social; se factura con los aportes mensuales (Cobertura del BSE).", "id": "10-38"}, {"front": "Que diferencia a un trabajador dependiente de uno no dependiente?", "back": "El dependiente presta servicio subordinado, no asume riesgos y depende economicamente; el no dependiente actua en forma independiente y asume el riesgo de su actividad (Concepto de trabajador dependiente y no dependiente).", "id": "10-39"}], "practica": [{"subtema": "Concepto de tributo y CESS", "q": "Las CESS son tributos cuya naturaleza es la de:", "opciones": ["Impuesto", "Tasa", "Contribucion especial", "Precio publico"], "correcta": 2, "expl": "Son contribuciones especiales porque el aporte genera derecho a una prestacion concreta del sistema de seguridad social (Introduccion).", "id": "10-0", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Concepto de tributo y CESS", "q": "Cual de estos NO es financiado por las CESS?", "opciones": ["Aportes jubilatorios", "Seguro de salud", "Fondo de garantia de creditos laborales", "Alumbrado publico municipal"], "correcta": 3, "expl": "Las CESS financian jubilaciones, seguro de salud, servicios bonificados y fondo de garantia de creditos laborales (Introduccion).", "id": "10-1", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Concepto de tributo y CESS", "q": "Que ley creo el sistema previsional mixto vigente desde el 1/4/1996?", "opciones": ["Ley 16.713", "Ley 18.083", "Ley 18.211", "Ley 20.130"], "correcta": 0, "expl": "La Ley 16.713 (de 3/9/1995) instauro el sistema mixto BPS-AFAP (Aportes jubilatorios).", "id": "10-2", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Concepto de tributo y CESS", "q": "Que ley de 2023 crea el nuevo sistema previsional comun (SPC)?", "opciones": ["Ley 19.690", "Ley 20.130", "Ley 18.211", "Ley 19.820"], "correcta": 1, "expl": "La Ley 20.130 (2023) crea el SPC manteniendo el caracter mixto (Aportes jubilatorios).", "id": "10-3", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "ATYR como recaudador", "q": "Que unidad de ATYR expide constancias de situacion contributiva?", "opciones": ["Recaudacion", "Fiscalizacion", "Certificados", "Distribucion"], "correcta": 2, "expl": "La unidad de Certificados gestiona y expide los certificados comun y especial (Certificados).", "id": "10-4", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "ATYR como recaudador", "q": "El certificado especial es requisito para:", "opciones": ["Cobrar ante organismos estatales", "Enajenar, clausurar, hipotecar o prendar bienes", "Ceder cuotas sociales", "Inscribir una obra"], "correcta": 1, "expl": "El certificado especial acredita que no hay adeudos y se exige para enajenar, clausurar, hipotecar o prendar bienes (Certificados).", "id": "10-5", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "ATYR como recaudador", "q": "Ademas de las CESS, BPS recauda el IRPF en colaboracion con:", "opciones": ["MTSS", "DGI", "Caja Profesional", "BSE"], "correcta": 1, "expl": "Desde el 1/7/2007 BPS colabora con la DGI en la recaudacion del IRPF del trabajo (Ley 18.083) (Otros fondos e impuestos).", "id": "10-6", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "ATYR como recaudador", "q": "La distribucion de aportes a las AFAP esta condicionada a:", "opciones": ["La presentacion de la nomina", "El pago efectivo", "La inscripcion de la obra", "La firma de un convenio"], "correcta": 1, "expl": "La integracion de aportes a las cuentas individuales esta condicionada al pago efectivo (Distribucion).", "id": "10-7", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Materia gravada", "q": "Segun el art. 153 de la Ley 16.713, la materia gravada es todo ingreso:", "opciones": ["Eventual y extraordinario", "Regular y permanente, en dinero o especie, por actividad personal", "Solo en dinero", "Solo el sueldo nominal"], "correcta": 1, "expl": "Es todo ingreso regular y permanente, en dinero o especie, percibido como retribucion por actividad personal (Ley 16.713, art. 153).", "id": "10-8", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Materia gravada", "q": "El ficto de propina equivale a:", "opciones": ["3 BFC", "10 BFC", "1 BPC", "5 BFC"], "correcta": 0, "expl": "Las propinas se gravan con un ficto de 3 BFC (Propinas).", "id": "10-9", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Materia gravada", "q": "El ficto de vivienda otorgada al personal equivale a:", "opciones": ["3 BFC", "6,5 BPC", "10 BFC", "22 BFC"], "correcta": 2, "expl": "La prestacion de vivienda se grava en forma ficta sobre 10 BFC (Vivienda).", "id": "10-10", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Materia gravada", "q": "Un viatico sin rendicion de cuentas usado dentro del pais se grava en:", "opciones": ["25 %", "50 %", "100 %", "0 %"], "correcta": 1, "expl": "Se grava el 50 % dentro del pais y el 25 % fuera del pais (Viaticos).", "id": "10-11", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Materia gravada", "q": "Cual de estas partidas NO constituye materia gravada?", "opciones": ["Horas extras", "Aguinaldo", "Salario vacacional", "Comisiones"], "correcta": 2, "expl": "El salario vacacional esta exento de todo gravamen fiscal o social (Ley 16.101) (Salario vacacional).", "id": "10-12", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Materia gravada", "q": "Las prestaciones del art. 167 (alimentacion, salud, seguros, transporte) hasta el 20 % del nominal en efectivo estan exentas de:", "opciones": ["Todo aporte", "Aportes personales, no del patronal jubilatorio", "Solo aporte patronal", "Fonasa unicamente"], "correcta": 1, "expl": "Estan exentas de aportes personales pero no del aporte patronal jubilatorio (Art. 167 Ley 16.713).", "id": "10-13", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Materia gravada", "q": "Cuando una gratificacion adquiere naturaleza salarial y constituye materia gravada?", "opciones": ["Siempre", "Cuando es regular y permanente (al menos 3 veces a intervalos similares)", "Nunca", "Solo si supera 1 BPC"], "correcta": 1, "expl": "Es regular y permanente cuando se percibe en no menos de tres oportunidades a intervalos de similar duracion (Gratificaciones).", "id": "10-14", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "El aporte jubilatorio personal en Industria y Comercio es:", "opciones": ["7,5 %", "15 %", "22,5 %", "19,5 %"], "correcta": 1, "expl": "Personal 15 %, patronal 7,5 % en Industria y Comercio (Tasas de aporte jubilatorio I y C).", "id": "10-15", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "La tasa patronal jubilatoria de la Administracion Central (aportacion Civil) es:", "opciones": ["7,5 %", "16,5 %", "19,5 %", "15 %"], "correcta": 2, "expl": "Administracion Central 19,5 %; entes 7,5 %; intendencias 16,5 % (Tasas aporte jubilatorio Civil).", "id": "10-16", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "La contribucion patronal por servicios bonificados a 20 grados bajo cero es:", "opciones": ["7,5 %", "9 %", "13,8 %", "5 %"], "correcta": 2, "expl": "El ejemplo del documento indica 13,8 % por bonificacion 5x4 (Contribucion patronal por servicios bonificados).", "id": "10-17", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "La tasa del fondo de garantia de creditos laborales es:", "opciones": ["0,10 %", "0,025 %", "0,03 %", "1,87 %"], "correcta": 1, "expl": "Es una contribucion patronal de 0,025 % desde 1/1/2019 (Ley 19.690).", "id": "10-18", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "Las tasas del Fondo de Reconversion Laboral (FRL) son:", "opciones": ["0,10 % personal y 0,10 % patronal", "0,025 % patronal", "5 % patronal", "3 % personal"], "correcta": 0, "expl": "FRL: 0,10 % personal y 0,10 % patronal desde 1/1/2019, exceptuado el sector publico (FRL).", "id": "10-19", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "El aporte patronal basico al Fonasa es:", "opciones": ["3 %", "5 %", "7,5 %", "8 %"], "correcta": 1, "expl": "Basico 5 % mas complemento de cuota mutual (CCM); el aguinaldo esta exonerado del 5 % (Aportes patronales Fonasa).", "id": "10-20", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "El aporte personal de Fonasa para quien gana mas de 2,5 BPC, con conyuge e hijos a cargo, es:", "opciones": ["3 %", "5 %", "6,5 %", "8 %"], "correcta": 3, "expl": "Llega al 8 % (3 % basico + 5 % adicional) (Tasas de aportes Fonasa personales).", "id": "10-21", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "El requisito de jornales/horas para tener derecho al SNS es:", "opciones": ["10 jornales o 80 horas", "13 jornales o 104 horas o 1,25 BPC", "20 jornales o 160 horas", "25 jornales o 200 horas"], "correcta": 1, "expl": "Minimo 13 jornales o 104 horas mensuales o retribucion mayor o igual a 1,25 BPC (Requisitos Fonasa).", "id": "10-22", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "El monto imponible minimo (ficto) de un titular unipersonal no dependiente es:", "opciones": ["11 BFC", "15 BFC", "5 BFC", "30 BFC"], "correcta": 0, "expl": "Unipersonales/sociedades de hecho: 11 BFC (1.a categoria); socios con contrato: 15 BFC (No dependientes).", "id": "10-23", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "La materia gravada minima de un director de SA es:", "opciones": ["11 BFC", "15 BFC", "30 BFC por mes", "60 BFC"], "correcta": 2, "expl": "Remuneracion real con minimo de 30 BFC por cada mes del ejercicio ejercido (Directores de SA).", "id": "10-24", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "El pago de aportes de las empresas rurales es:", "opciones": ["Mensual", "Bimestral", "Cuatrimestral", "Anual"], "correcta": 2, "expl": "La exigibilidad del pago en aportacion rural es cuatrimestral (Actividades rurales).", "id": "10-25", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "La tasa para determinar la UBC rural es:", "opciones": ["0,025 %", "0,1004 %", "1,87 %", "71,8 %"], "correcta": 1, "expl": "0,1004 %; se incrementa 50 % sin explotacion agropecuaria (Contribucion patronal rural).", "id": "10-26", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "El AUC patronal de la construccion (Ley 14.411) es:", "opciones": ["29,9 %", "71,8 %", "9 %", "17,9 %"], "correcta": 1, "expl": "AUC patronal del 71,8 % de las remuneraciones gravadas, mas 4 % de Caja Profesionales (Industria de la construccion).", "id": "10-27", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "En la construccion, que descuento personal SI se le hace al trabajador?", "opciones": ["Jubilatorio personal 17,9 %", "Salud basico 3 %", "FRL 0,10 % y tasas adicionales de salud", "BSE 6 %"], "correcta": 2, "expl": "Como el AUC es de cargo del titular, al trabajador solo se le descuenta FRL 0,10 % y las tasas adicionales de salud (Aportes personales construccion).", "id": "10-28", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "El monotributo (Ley 18.083) aporta por jubilatorio:", "opciones": ["15 % sobre la remuneracion real", "22,5 % sobre 5 BFC", "7,5 % sobre 11 BFC", "9 % sobre 5 BPC"], "correcta": 1, "expl": "Jubilatorio 22,5 % sobre 5 BFC; FRL 0,10 % sobre 5 BFC (Monotributo).", "id": "10-29", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Aportes y regimenes", "q": "La gradualidad del monotributo social Mides llega al 100 % despues de:", "opciones": ["12 meses", "24 meses", "36 meses", "48 meses"], "correcta": 2, "expl": "Aporte progresivo 25 %, 50 %, 75 % y, tras 36 meses, el 100 % (Monotributo social Mides).", "id": "10-30", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Obligaciones e historia laboral", "q": "Cual NO es una obligacion del contribuyente?", "opciones": ["Inscribir la empresa", "Presentar nominas", "Fijar la tasa de aporte", "Conservar libros y registros"], "correcta": 2, "expl": "Las tasas las fija la ley; el contribuyente inscribe, declara, presenta nominas, paga y conserva registros (Obligaciones).", "id": "10-31", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Obligaciones e historia laboral", "q": "La historia laboral se conforma con la informacion de:", "opciones": ["Los certificados", "Las nominas presentadas por las empresas", "Las inspecciones", "Las facilidades de pago"], "correcta": 1, "expl": "Se conforma con la informacion que surge de las nominas (Historia laboral).", "id": "10-32", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Obligaciones e historia laboral", "q": "Las empresas con dependientes deben presentar la nomina con periodicidad:", "opciones": ["Mensual", "Cuatrimestral", "Anual", "Semestral"], "correcta": 0, "expl": "Las empresas con dependientes envian la nomina en forma mensual; las rurales, cuatrimestral (Nominas).", "id": "10-33", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Obligaciones e historia laboral", "q": "Que se presenta cuando la empresa no puede pagar antes del vencimiento?", "opciones": ["Una rectificativa", "La nomina con declaracion jurada de no pago (DJNP)", "Un certificado especial", "Un convenio de facilidades"], "correcta": 1, "expl": "Se presenta la nomina acompañada de la DJNP (Pagos y DJNP).", "id": "10-34", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Obligaciones e historia laboral", "q": "Retener y no verter aportes personales por parte del empleador puede configurar:", "opciones": ["Una contravencion menor", "Apropiacion indebida (delito)", "Una simple mora", "Una exoneracion"], "correcta": 1, "expl": "La retencion y no version de aportes personales es considerada apropiacion indebida y puede configurar un delito (Pagos y DJNP).", "id": "10-35", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Sanciones", "q": "La multa por clausura de empresa fuera de plazo es:", "opciones": ["1 UR", "1,5 UR", "2 UR", "5 UR"], "correcta": 1, "expl": "Inscripcion 1 UR, modificacion 1 UR, clausura 1,5 UR (Transacciones registrales fuera de plazo).", "id": "10-36", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Sanciones", "q": "La multa GAFI por alta o baja de un dependiente fuera de plazo es:", "opciones": ["0,10 UR", "1 UR por trabajador", "1,5 UR", "5 UR"], "correcta": 1, "expl": "1 UR por trabajador; las altas/bajas de oficio 2 UR por persona (Alta o baja a dependientes fuera de plazo).", "id": "10-37", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Sanciones", "q": "Habiendo presentado la nomina, la multa por mora hasta el 5.o dia habil es:", "opciones": ["2,5 %", "5 %", "10 %", "20 %"], "correcta": 0, "expl": "Con nomina presentada: 2,5 % hasta el 5.o dia habil, 5 % hasta 90 dias, 10 % despues (Mora).", "id": "10-38", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Sanciones", "q": "Sin presentar la nomina, la multa por mora despues de 90 dias corridos es:", "opciones": ["5 %", "10 %", "20 %", "2,5 %"], "correcta": 2, "expl": "Sin nomina: 5 %, 10 % y 20 % (despues de 90 dias) (Mora).", "id": "10-39", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Sanciones", "q": "La multa por defraudacion (Codigo Tributario, art. 96) es:", "opciones": ["De 1 a 5 veces el tributo", "De 1 a 15 veces el monto del tributo", "1 UR", "Fijada por el Poder Ejecutivo"], "correcta": 1, "expl": "La defraudacion se sanciona con multa de 1 a 15 veces el monto del tributo (art. 96).", "id": "10-40", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Sanciones", "q": "El beneficio buen pagador (art. 94 Codigo Tributario) consiste en:", "opciones": ["Reducir la tasa de aporte", "Exonerar multas y recargos si regulariza dentro del mes estando regular 12 meses antes", "Eliminar el IRPF", "Devolver el aguinaldo"], "correcta": 1, "expl": "Exonera multas y recargos a quien regulariza dentro del mes de vencimiento con 12 meses regulares previos (Bonificaciones).", "id": "10-41", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}, {"subtema": "Sanciones", "q": "Que se adiciona a la multa al configurarse la mora, ademas del porcentaje?", "opciones": ["Una multa fija de 1 UR", "Un recargo resarcitorio mensual capitalizable cuatrimestralmente", "El doble del tributo", "Ninguna"], "correcta": 1, "expl": "Se adiciona un recargo resarcitorio mensual capitalizable cuatrimestralmente, calculado dia por dia (Mora).", "id": "10-42", "tema_id": 10, "tema_nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social (CESS)"}], "autoeval": [{"q": "Explique por que las CESS se clasifican como contribuciones especiales y no como impuestos o tasas.", "a": "Porque el aporte da derecho a una prestacion concreta derivada de la actividad estatal de seguridad social (jubilacion, salud), a diferencia del impuesto (sin contrapartida directa) y de la tasa (servicio estatal puntual) (Introduccion)."}, {"q": "Cual es el rol de ATYR y cuales son sus principales oficinas?", "a": "ATYR gestiona el ciclo integral de las CESS: Registro de Contribuyentes y Empresas, Recaudacion, Distribucion, Fiscalizacion, Gestion de Cobro y Certificados (Principales oficinas de ATYR)."}, {"q": "Defina materia gravada de CESS segun la Ley 16.713.", "a": "Todo ingreso regular y permanente, en dinero o especie, susceptible de apreciacion pecuniaria, percibido como retribucion con motivo de la actividad personal dentro del ambito BPS (art. 153)."}, {"q": "Diferencie aporte personal de aporte patronal y de un ejemplo en Industria y Comercio.", "a": "El personal lo aporta el trabajador (jubilatorio 15 %) y el patronal lo aporta la empresa (jubilatorio 7,5 %). Se aplican sobre la materia gravada (Tasas I y C)."}, {"q": "Mencione tres partidas no gravadas y tres gravadas.", "a": "No gravadas: salario vacacional, indemnizacion por despido, provision de ropa/herramientas. Gravadas: sueldo, horas extras, aguinaldo, propina (ficto 3 BFC) (Materia gravada)."}, {"q": "Describa el regimen rural en cuanto a base de calculo y periodicidad.", "a": "El aporte patronal se calcula por hectareas coneat con tasa UBC 0,1004 % (50 % mas sin explotacion); minimo 15 % de 22 BFC con reduccion 33 %; pago cuatrimestral (Actividades rurales)."}, {"q": "Que es el AUC en la construccion y como afecta los descuentos al trabajador?", "a": "Es el aporte unificado patronal del 71,8 % a cargo del titular de la obra; incluye el aporte personal, por lo que al trabajador solo se le descuenta FRL 0,10 % y tasas adicionales de salud (Ley 14.411)."}, {"q": "Explique la historia laboral y su relacion con el pago efectivo.", "a": "Es el detalle de todas las actividades en BPS de cada persona, conformado por las nominas; los aportes se integran a la cuenta individual solo con el pago efectivo (Historia laboral / Distribucion)."}, {"q": "Enumere las obligaciones principales del contribuyente.", "a": "Inscribir la empresa, declarar ingresos/egresos del personal, comunicar modificaciones, presentar nominas, pagar aportes y conservar libros y registros (Obligaciones)."}, {"q": "Describa el regimen de sanciones por mora en el pago.", "a": "Con nomina: 2,5 % hasta el 5.o dia habil, 5 % hasta 90 dias, 10 % despues; sin nomina: 5 %, 10 % y 20 %; mas recargo resarcitorio mensual capitalizable (Sanciones)."}, {"q": "Que son BFC y BPC y para que se usan?", "a": "BFC = una UR, usada para fictos (propina 3 BFC, vivienda 10 BFC, categorias de no dependientes); BPC = base de prestaciones y contribuciones, usada en topes y franjas de Fonasa (Materia gravada)."}, {"q": "Explique las tasas personales de Fonasa segun situacion familiar.", "a": "Van de 3 % a 8 %: el adicional sube con conyuge/hijos a cargo y con remuneracion mayor a 2,5 BPC; el aguinaldo se excluye del computo de las franjas (Tasas de aportes Fonasa)."}], "huecos": ["El PDF menciona el costo promedio equivalente (CPE) para servicios personales (75 % del CPE) pero no da su valor numerico; debe considerarse a partir de enero de 2026.", "No se detallan los valores monetarios actualizados de UR, BFC, BPC ni cuota mutual (el documento los referencia como unidades sin importe vigente, salvo el tope de cotizacion de 288.836 a 2/2026).", "Los limites de ingresos para el monotributo (unipersonales vs sociedades de hecho) y para radioemisoras se mencionan de forma cualitativa, sin todas las cifras exactas vigentes.", "Los montos minimos y maximos de la multa por contravencion (art. 95 Codigo Tributario) los fija el Poder Ejecutivo y no figuran en el PDF."]}], "plan": [{"dia": 1, "titulo": "Bases: Protección Social y el BPS", "temas": [4], "foco": "Entender qué es la seguridad social, la naturaleza jurídica del BPS (Ente Autónomo, art. 195 Const.) y su organización. Es el marco de todo lo demás.", "tareas": ["Leer Teoría del Tema 4 completa", "Repasar el esquema de organización (Directorio, Gerencia General, ATYR y Prestaciones)", "Hacer las flashcards del Tema 4", "Práctica del Tema 4 (apuntar a 80%+)"]}, {"dia": 2, "titulo": "Estatuto del Funcionario (parte 1)", "temas": [1], "foco": "Ingreso, escalafones (sos escalafón C), obligaciones, prohibiciones e incompatibilidades.", "tareas": ["Leer Teoría del Tema 1 (Caps. I a VII)", "Memorizar los 7 escalafones y los requisitos de ingreso", "Flashcards del Tema 1", "Práctica del Tema 1 (subtemas de ingreso, escalafones y obligaciones)"]}, {"dia": 3, "titulo": "Estatuto (parte 2) + Licencias", "temas": [1, 5], "foco": "Derechos y garantías, disciplina y extinción del vínculo en el Estatuto; y el Reglamento de Licencias con los días exactos.", "tareas": ["Terminar Teoría del Tema 1 (Caps. VIII a XIII)", "Leer Teoría del Tema 5", "Memorizar los DÍAS de cada licencia (tabla de Datos clave)", "Práctica de los Temas 1 y 5"]}, {"dia": 4, "titulo": "Procedimiento Administrativo", "temas": [6], "foco": "El expediente, plazos, notificaciones y sobre todo los RECURSOS (revocación, jerárquico) y sus plazos.", "tareas": ["Leer Teoría del Tema 6", "Memorizar plazos de recursos y ago
