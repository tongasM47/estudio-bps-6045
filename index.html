as": ["Hacer 2-3 Simulacros y apuntar a 'nivel primer puesto'", "Rehacer las flashcards marcadas 'repasar'", "Repasar los subtemas donde fallaste en Práctica", "Lectura final de Datos clave la noche previa"]}], "fuentes": [{"n": 1, "nombre": "Estatuto del funcionario", "pagina": "https://www.bps.gub.uy/24262/", "pdf": "https://www.bps.gub.uy/bps/file/24262/1/estatuto-del-funcionario.pdf"}, {"n": 2, "nombre": "Plan Estratégico 2025-2030", "pagina": "https://www.bps.gub.uy/24263/", "pdf": "https://www.bps.gub.uy/bps/file/24263/1/plan-estrategico-2025-2030.pdf"}, {"n": 3, "nombre": "Prestaciones", "pagina": "https://www.bps.gub.uy/24264/", "pdf": "https://www.bps.gub.uy/bps/file/24264/1/prestaciones.pdf"}, {"n": 4, "nombre": "Protección Social, misión, visión y organización del BPS", "pagina": "https://www.bps.gub.uy/24265/", "pdf": "https://www.bps.gub.uy/bps/file/24265/1/proteccion-social-mision-vision-y-organizacion-del-bps.pdf"}, {"n": 5, "nombre": "Reglamento de Licencias y Modificativas", "pagina": "https://www.bps.gub.uy/24266/", "pdf": "https://www.bps.gub.uy/bps/file/24266/1/reglamento-de-licencias-y-modificativas.pdf"}, {"n": 6, "nombre": "Reglamento de Procedimiento Administrativo", "pagina": "https://www.bps.gub.uy/24267/", "pdf": "https://www.bps.gub.uy/bps/file/24267/1/reglamento-de-procedimiento-administrativo.pdf"}, {"n": 7, "nombre": "Reglamento de Responsabilidad Administrativa", "pagina": "https://www.bps.gub.uy/24268/", "pdf": "https://www.bps.gub.uy/bps/file/24268/1/reglamento-de-responsabilidad-administrativa.pdf"}, {"n": 8, "nombre": "Salud en el trabajo: factores y riesgos psicosociales", "pagina": "https://www.bps.gub.uy/24271/", "pdf": "https://www.bps.gub.uy/bps/file/24271/1/salud-en-el-trabajo-factores-y-riesgos-psicosociales.pdf"}, {"n": 9, "nombre": "Seguridad de la Información", "pagina": "https://www.bps.gub.uy/24269/", "pdf": "https://www.bps.gub.uy/bps/file/24269/1/seguridad-de-la-informacion.pdf"}, {"n": 10, "nombre": "Tributación y recaudación de Contribuciones Especiales de Seguridad Social", "pagina": "https://www.bps.gub.uy/24270/", "pdf": "https://www.bps.gub.uy/bps/file/24270/1/tributacion-y-recaudacion-de-contribuciones-especiales-de-seguridad-social.pdf"}]}</script>
<script>
"use strict";
const DATA = JSON.parse(document.getElementById('appdata').textContent);
const TEMAS = DATA.temas;
const LS = {
  get(k,d){try{const v=localStorage.getItem('bps6045_'+k);return v===null?d:JSON.parse(v);}catch(e){return d;}},
  set(k,v){try{localStorage.setItem('bps6045_'+k,JSON.stringify(v));}catch(e){}},
  clear(){Object.keys(localStorage).filter(x=>x.indexOf('bps6045_')===0).forEach(x=>localStorage.removeItem(x));}
};
let state = {
  plan: LS.get('plan', []),
  correct: LS.get('correct', {}),
  answered: LS.get('answered', {}),
  bestSim: LS.get('bestSim', 0),
  flash: LS.get('flash', {}),
  deck: 1,
  practTema: 1
};
function save(){LS.set('plan',state.plan);LS.set('correct',state.correct);LS.set('answered',state.answered);LS.set('bestSim',state.bestSim);LS.set('flash',state.flash);}
const esc = s => (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function updateProgress(){
  const totalQ = DATA.totales.preguntas;
  const correctN = Object.keys(state.correct).length;
  const planDone = state.plan.filter(Boolean).length;
  const pPlan = planDone/10;
  const pPract = totalQ? correctN/totalQ : 0;
  const pSim = state.bestSim/40;
  const overall = Math.round((pPlan*0.4 + pPract*0.4 + pSim*0.2)*100);
  document.getElementById('progFill').style.width = overall+'%';
  document.getElementById('progPct').textContent = overall+'%';
}

const TABS = [
  ['inicio','Inicio'],['plan','Plan 10 días'],['teoria','Teoría'],
  ['tarjetas','Tarjetas'],['practica','Práctica por tema'],
  ['simulacro','Simulacro'],['datos','Datos clave']
];
let current='inicio';
function buildTabs(){
  const c=document.getElementById('tabs');
  c.innerHTML = TABS.map(t=>`<button class="tab" data-v="${t[0]}">${t[1]}</button>`).join('');
  c.querySelectorAll('.tab').forEach(b=>b.onclick=()=>show(b.dataset.v));
}
function show(v){
  current=v;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id==='view-'+v));
  window.scrollTo(0,0);
  if(v==='plan')renderPlan();
  if(v==='inicio')renderInicio();
}

function renderInicio(){
  const correctN=Object.keys(state.correct).length, answeredN=Object.keys(state.answered).length;
  const planDone=state.plan.filter(Boolean).length;
  const acc = answeredN? Math.round(correctN/answeredN*100):0;
  const fuentes = DATA.fuentes.map(f=>`<li><b>${f.n}.</b> ${esc(f.nombre)} — <a href="${f.pagina}" target="_blank" rel="noopener">página BPS</a> · <a href="${f.pdf}" target="_blank" rel="noopener" class="fuente-link">PDF oficial</a></li>`).join('');
  const extras = [];
  TEMAS.forEach(t=>(t.fuentes_extra||[]).forEach(f=>extras.push(`<li>Tema ${t.id}: <a href="${f.url}" target="_blank" rel="noopener" class="fuente-link">${esc(f.nombre)}</a></li>`)));
  const huecos = TEMAS.filter(t=>(t.huecos||[]).length).map(t=>`<li><b>Tema ${t.id} (${esc(t.tema)}):</b><ul>${t.huecos.map(h=>`<li>${esc(h)}</li>`).join('')}</ul></li>`).join('');
  document.getElementById('view-inicio').innerHTML = `
  <h2 class="view-title">Bienvenido/a, a estudiar para el primer puesto</h2>
  <div class="card">
    <p>Esta app reúne los <b>10 temas</b> del material oficial del Llamado 6045/2026 (Auxiliar Administrativo del BPS), con teoría desarrollada, tarjetas, práctica por subtema y simulacros. Todo el contenido teórico proviene de las <b>fuentes oficiales del BPS</b> citadas más abajo.</p>
    <div class="stats">
      <div class="stat"><div class="num">${DATA.totales.temas}</div><div class="lbl">Temas</div></div>
      <div class="stat"><div class="num">${DATA.totales.flashcards}</div><div class="lbl">Tarjetas</div></div>
      <div class="stat"><div class="num">${DATA.totales.preguntas}</div><div class="lbl">Preguntas</div></div>
      <div class="stat"><div class="num">${planDone}/10</div><div class="lbl">Días del plan</div></div>
      <div class="stat"><div class="num">${acc}%</div><div class="lbl">Aciertos práctica</div></div>
      <div class="stat"><div class="num">${state.bestSim}/40</div><div class="lbl">Mejor simulacro</div></div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="show('plan')">Ver plan de 10 días</button>
      <button class="btn sec" onclick="show('teoria')">Ir a la teoría</button>
      <button class="btn sec" onclick="show('simulacro')">Hacer un simulacro</button>
    </div>
  </div>
  <div class="card">
    <h3 style="color:var(--azul);margin-top:0">Cómo aprovecharla</h3>
    <ul>
      <li><b>Plan 10 días:</b> seguí el orden sugerido y marcá cada día al terminarlo.</li>
      <li><b>Teoría:</b> abrí cada tema; tenés ficha, ELI5, esquema, datos duros, teoría artículo por artículo y autoevaluación.</li>
      <li><b>Tarjetas:</b> tocá para darlas vuelta; marcá "La sabía" o "Repasar".</li>
      <li><b>Práctica:</b> corrige al instante y explica con la cita.</li>
      <li><b>Simulacro:</b> 40 preguntas al azar, distintas cada vez. 60% aprueba; 90% es nivel primer puesto.</li>
    </ul>
    <p class="muted">Tu progreso se guarda en este navegador (localStorage).</p>
    <button class="btn danger sm" onclick="resetAll()">Reiniciar todo el progreso</button>
  </div>
  <div class="card">
    <h3 style="color:var(--azul);margin-top:0">Bibliografía y fuentes oficiales</h3>
    <ul>${fuentes}</ul>
    ${extras.length?`<h4 style="color:var(--azul)">Fuentes complementarias oficiales del BPS</h4><p class="muted">Usadas para completar secciones del Tema 3 que el PDF base no traía (se truncaba en la descarga).</p><ul>${extras.join('')}</ul>`:''}
  </div>
  ${huecos?`<div class="box hueco"><h4>Huecos señalados (lo que no se pudo verificar/extraer)</h4><ul>${huecos}</ul></div>`:''}
  `;
}
function resetAll(){
  if(confirm('¿Seguro que querés borrar TODO tu progreso (días, aciertos y mejor simulacro)?')){
    LS.clear();
    state={plan:[],correct:{},answered:{},bestSim:0,flash:{},deck:state.deck,practTema:state.practTema};
    renderInicio();renderPlan();updateProgress();
    if(current==='practica')renderPractica();
    if(current==='tarjetas')renderFlash();
  }
}

function renderPlan(){
  const v=document.getElementById('view-plan');
  const items = DATA.plan.map((d,i)=>{
    const done = !!state.plan[i];
    const temas = d.temas.map(id=>`<span class="pill">Tema ${id}</span>`).join('');
    return `<div class="acc-item ${done?'dia-done':''}" id="dia-${i}">
      <div class="acc-head">
        <label class="dia-check" onclick="event.stopPropagation()">
          <input type="checkbox" ${done?'checked':''} onchange="togglePlan(${i})">
        </label>
        <span class="acc-num">${d.dia}</span>
        <span class="acc-title">${esc(d.titulo)}</span>
        <span class="acc-arrow" onclick="toggleAcc('dia-${i}')">▶</span>
      </div>
      <div class="acc-body">
        <p>${temas}</p>
        <p><b>Foco:</b> ${esc(d.foco)}</p>
        <ul class="plan-tasks">${d.tareas.map(t=>`<li>${esc(t)}</li>`).join('')}</ul>
      </div>
    </div>`;
  }).join('');
  v.innerHTML = `<h2 class="view-title">Plan de estudio en 10 días</h2>
    <div class="aviso">Tenés 10 días. Hacé un tema por día siguiendo este orden (de lo general a lo particular) y dejá los últimos días para simulacros. Marcá cada día cuando lo termines.</div>
    ${items}`;
}
function togglePlan(i){state.plan[i]=!state.plan[i];save();updateProgress();
  document.getElementById('dia-'+i).classList.toggle('dia-done',state.plan[i]);}
function toggleAcc(id){document.getElementById(id).classList.toggle('open');}

function renderTeoria(){
  const v=document.getElementById('view-teoria');
  const items = TEMAS.map(t=>{
    const esquema = (t.esquema||[]).join('\n');
    const datos = (t.datos_duros||[]).map(d=>`<li>${esc(d)}</li>`).join('');
    const exh = (t.teoria_exhaustiva||[]).map(a=>`<div class="art">
        <div><span class="ref">${esc(a.ref||'')}</span><span class="tit">${esc(a.titulo||'')}</span></div>
        ${a.cita?`<div class="cita">“${esc(a.cita)}”</div>`:''}
        ${a.explicacion?`<div class="exp">${esc(a.explicacion)}</div>`:''}
        ${a.ejemplo?`<div class="ej"><b>Ejemplo:</b> ${esc(a.ejemplo)}</div>`:''}
      </div>`).join('');
    const autoeval = (t.autoeval||[]).map((q,i)=>`<div class="qa" id="qa-${t.id}-${i}">
        <div class="q" onclick="toggleAcc('qa-${t.id}-${i}')">❓ ${esc(q.q)}</div>
        <div class="a">${esc(q.a)}</div></div>`).join('');
    const huecos = (t.huecos||[]).length?`<div class="box hueco"><h4>Huecos / a verificar</h4><ul>${t.huecos.map(h=>`<li>${esc(h)}</li>`).join('')}</ul></div>`:'';
    return `<div class="acc-item" id="teo-${t.id}">
      <div class="acc-head" onclick="toggleAcc('teo-${t.id}')">
        <span class="acc-num">${t.id}</span>
        <span class="acc-title">${esc(t.tema)}</span>
        <span class="acc-arrow">▶</span>
      </div>
      <div class="acc-body">
        <h3>Ficha</h3>
        <p>${esc(t.ficha)}</p>
        <p class="muted">Fuente oficial: <a href="${t.fuente_pdf}" target="_blank" rel="noopener" class="fuente-link">${esc(t.fuente_nombre||t.tema)}</a></p>
        ${t.nota_fuentes?`<div class="aviso">${esc(t.nota_fuentes)}</div>`:''}
        ${(t.fuentes_extra&&t.fuentes_extra.length)?`<details style="margin:6px 0"><summary class="muted" style="cursor:pointer">Fuentes complementarias oficiales del BPS (${t.fuentes_extra.length})</summary><ul>${t.fuentes_extra.map(f=>`<li><a href="${f.url}" target="_blank" rel="noopener" class="fuente-link">${esc(f.nombre)}</a></li>`).join('')}</ul></details>`:''}
        <div class="box eli5"><h4>🧒 ELI5 — explicación súper simple</h4><div>${esc(t.eli5)}</div></div>
        <div class="box esquema"><h4>🗺️ Esquema</h4><pre>${esc(esquema)}</pre></div>
        <div class="box datos"><h4>📌 Datos duros para memorizar</h4><ul>${datos}</ul></div>
        <h3>Teoría desarrollada</h3>
        <div class="teoria-html">${t.teoria_resumida||''}</div>
        <h3>Punto por punto / artículo por artículo</h3>
        ${exh}
        <h3>Autoevaluación</h3>
        ${autoeval}
        ${huecos}
      </div>
    </div>`;
  }).join('');
  v.innerHTML = `<h2 class="view-title">Teoría completa</h2>
    <p class="muted" style="margin-top:-6px">Tocá un tema para desplegarlo. Cada tema trae ficha, ELI5, esquema, datos duros, teoría punto por punto con citas y autoevaluación.</p>
    ${items}`;
}

let flashOrder=[], flashIdx=0;
function renderFlash(){
  const v=document.getElementById('view-tarjetas');
  const decks = TEMAS.map(t=>`<button class="deck-btn ${t.id===state.deck?'active':''}" onclick="setDeck(${t.id})">${t.id}. ${esc(t.tema.length>22?t.tema.slice(0,22)+'…':t.tema)}</button>`).join('');
  v.innerHTML = `<h2 class="view-title">Tarjetas (flashcards)</h2>
    <div class="deck-sel">${decks}</div>
    <div class="btn-row" style="margin-bottom:12px">
      <button class="btn sec sm" onclick="shuffleDeck()">🔀 Mezclar</button>
      <button class="btn sec sm" onclick="resetDeckMarks()">Limpiar marcas de este mazo</button>
      <span class="muted" id="deckStats"></span>
    </div>
    <div class="flash-area">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="flash-inner">
          <div class="flash-face flash-front" id="flashFront"></div>
          <div class="flash-face flash-back" id="flashBack"></div>
        </div>
      </div>
      <div class="flash-tip">Tocá la tarjeta para darla vuelta</div>
      <div class="flash-meta">
        <button class="btn sec sm" onclick="prevCard()">← Anterior</button>
        <span id="flashPos"></span>
        <button class="btn sec sm" onclick="nextCard()">Siguiente →</button>
      </div>
      <div class="btn-row" style="justify-content:center;margin-top:10px">
        <button class="btn sm" style="background:var(--verde)" onclick="markCard('known')">✓ La sabía</button>
        <button class="btn sm danger" onclick="markCard('review')">↻ Repasar</button>
      </div>
    </div>`;
  initDeck();
}
function setDeck(id){state.deck=id;renderFlash();}
function curDeckCards(){return TEMAS.find(t=>t.id===state.deck).flashcards;}
function initDeck(){flashOrder=curDeckCards().map((_,i)=>i);flashIdx=0;showCard();}
function shuffleDeck(){for(let i=flashOrder.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[flashOrder[i],flashOrder[j]]=[flashOrder[j],flashOrder[i]];}flashIdx=0;showCard();}
function showCard(){
  const cards=curDeckCards();const card=cards[flashOrder[flashIdx]];
  const fc=document.getElementById('flashcard');fc.classList.remove('flipped');
  document.getElementById('flashFront').textContent=card.front;
  document.getElementById('flashBack').textContent=card.back;
  document.getElementById('flashPos').textContent=`${flashIdx+1} / ${cards.length}`;
  const known=Object.entries(state.flash).filter(([k,vv])=>k.startsWith(state.deck+'-')&&vv==='known').length;
  const rev=Object.entries(state.flash).filter(([k,vv])=>k.startsWith(state.deck+'-')&&vv==='review').length;
  document.getElementById('deckStats').textContent=`✓ ${known} sabidas · ↻ ${rev} a repasar · ${cards.length} en el mazo`;
}
function flipCard(){document.getElementById('flashcard').classList.toggle('flipped');}
function nextCard(){flashIdx=(flashIdx+1)%flashOrder.length;showCard();}
function prevCard(){flashIdx=(flashIdx-1+flashOrder.length)%flashOrder.length;showCard();}
function markCard(st){const card=curDeckCards()[flashOrder[flashIdx]];state.flash[card.id]=st;save();showCard();setTimeout(nextCard,180);}
function resetDeckMarks(){Object.keys(state.flash).forEach(k=>{if(k.startsWith(state.deck+'-'))delete state.flash[k];});save();showCard();}

function renderPractica(){
  const v=document.getElementById('view-practica');
  const sel = TEMAS.map(t=>`<option value="${t.id}" ${t.id===state.practTema?'selected':''}>${t.id}. ${esc(t.tema)}</option>`).join('');
  v.innerHTML = `<h2 class="view-title">Práctica por tema</h2>
    <div class="filtro"><label>Tema: <select onchange="state.practTema=+this.value;save();renderPractQs()">${sel}</select></label></div>
    <div id="practQs"></div>`;
  renderPractQs();
}
function renderPractQs(){
  const t=TEMAS.find(x=>x.id===state.practTema);
  const cont=document.getElementById('practQs');
  const groups=[];const map={};
  t.practica.forEach(p=>{if(!map[p.subtema]){map[p.subtema]=[];groups.push(p.subtema);}map[p.subtema].push(p);});
  let html=`<div class="muted" style="margin-bottom:10px">${t.practica.length} preguntas en ${groups.length} subtemas. Cada pregunta corrige al instante.</div>`;
  groups.forEach(g=>{
    html+=`<div class="subt-head">${esc(g)}</div>`;
    map[g].forEach(p=>{html+=qHtml(p);});
  });
  cont.innerHTML=html;
}
function qHtml(p){
  const opts=p.opciones.map((o,i)=>`<button class="opt" data-q="${p.id}" data-i="${i}" onclick="answer('${p.id}',${i},${p.correcta})">${String.fromCharCode(65+i)}. ${esc(o)}</button>`).join('');
  return `<div class="preg" id="preg-${p.id}">
    <div class="enun">${esc(p.q)}</div>
    <div class="opts">${opts}</div>
    <div class="expl" id="expl-${p.id}"></div>
  </div>`;
}
function answer(qid,i,correcta){
  const box=document.getElementById('preg-'+qid);
  if(box.dataset.done)return;
  box.dataset.done='1';
  const p=findQ(qid);
  box.querySelectorAll('.opt').forEach(b=>{b.classList.add('disabled');
    const bi=+b.dataset.i;
    if(bi===correcta)b.classList.add('correct');
    if(bi===i&&i!==correcta)b.classList.add('wrong');
  });
  const ok=i===correcta;
  const expl=document.getElementById('expl-'+qid);
  expl.innerHTML=(ok?'✓ <b>¡Correcto!</b> ':'✗ <b>Incorrecto.</b> ')+esc(p.expl);
  expl.classList.add('show');if(!ok)expl.classList.add('bad');
  state.answered[qid]=true;
  if(ok)state.correct[qid]=true; else delete state.correct[qid];
  save();updateProgress();
}
function findQ(qid){for(const t of TEMAS){const p=t.practica.find(x=>x.id===qid);if(p)return p;}return null;}

let simSet=[], simAns={};
function renderSim(){
  const v=document.getElementById('view-simulacro');
  v.innerHTML=`<h2 class="view-title">Simulacro</h2>
    <div class="card">
      <p>Se arman <b>40 preguntas al azar</b> de todo el banco (cambian en cada intento). Respondé todas y obtené tu puntaje.</p>
      <p class="muted">Aprobás con 24/40 (60%). Con 36/40 (90%) alcanzás <b>nivel primer puesto</b>.</p>
      <p>Mejor simulacro hasta ahora: <b>${state.bestSim}/40</b></p>
      <button class="btn" onclick="startSim()">Comenzar simulacro</button>
    </div>
    <div id="simBody"></div>`;
}
function pickRandom(n){
  const all=[];TEMAS.forEach(t=>t.practica.forEach(p=>all.push(p)));
  for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}
  return all.slice(0,Math.min(n,all.length));
}
function startSim(){
  simSet=pickRandom(40);simAns={};
  const body=document.getElementById('simBody');
  let html='';
  simSet.forEach((p,idx)=>{
    const opts=p.opciones.map((o,i)=>`<button class="opt" data-i="${i}" onclick="simAnswer(${idx},${i},this)">${String.fromCharCode(65+i)}. ${esc(o)}</button>`).join('');
    html+=`<div class="preg" id="sim-${idx}">
      <div class="sim-q">Pregunta ${idx+1} de ${simSet.length} · Tema ${p.tema_id}</div>
      <div class="enun">${esc(p.q)}</div>
      <div class="opts">${opts}</div>
      <div class="expl" id="simexpl-${idx}"></div>
    </div>`;
  });
  html+=`<div class="card" style="text-align:center"><button class="btn" onclick="finishSim()">Terminar y ver puntaje</button></div>`;
  body.innerHTML=html;window.scrollTo(0,0);
}
function simAnswer(idx,i,btn){
  const box=document.getElementById('sim-'+idx);
  if(box.dataset.done)return;box.dataset.done='1';
  const p=simSet[idx];simAns[idx]=i;
  box.querySelectorAll('.opt').forEach(b=>{b.classList.add('disabled');const bi=+b.dataset.i;
    if(bi===p.correcta)b.classList.add('correct');
    if(bi===i&&i!==p.correcta)b.classList.add('wrong');});
  const ok=i===p.correcta;
  const e=document.getElementById('simexpl-'+idx);
  e.innerHTML=(ok?'✓ <b>Correcto.</b> ':'✗ <b>Incorrecto.</b> ')+esc(p.expl);
  e.classList.add('show');if(!ok)e.classList.add('bad');
}
function finishSim(){
  let score=0;simSet.forEach((p,idx)=>{if(simAns[idx]===p.correcta)score++;});
  if(score>state.bestSim){state.bestSim=score;save();updateProgress();}
  const pct=Math.round(score/simSet.length*100);
  let cls='no',msg='Seguí practicando: todavía no alcanza para aprobar.';
  if(pct>=90){cls='top';msg='🏆 ¡Nivel primer puesto! Excelente.';}
  else if(pct>=60){cls='ok';msg='✓ ¡Aprobado! Vas muy bien.';}
  const body=document.getElementById('simBody');
  body.insertAdjacentHTML('afterbegin',`<div class="card result-big">
    <div class="score">${score}/${simSet.length}</div>
    <div class="result-msg ${cls}">${msg}</div>
    <div class="muted">${pct}% de aciertos · Mejor marca: ${state.bestSim}/40</div>
    <div class="btn-row" style="justify-content:center;margin-top:12px">
      <button class="btn" onclick="startSim()">Repetir con otras 40</button>
      <button class="btn sec" onclick="renderSim()">Volver</button>
    </div></div>`);
  window.scrollTo(0,0);
}

function renderDatos(){
  const v=document.getElementById('view-datos');
  const sel=`<option value="0">Todos los temas</option>`+TEMAS.map(t=>`<option value="${t.id}">${t.id}. ${esc(t.tema)}</option>`).join('');
  v.innerHTML=`<h2 class="view-title">Datos clave (tabla anti-blanco)</h2>
    <p class="muted" style="margin-top:-6px">Los números, plazos y listas exactas más preguntables. Repasalos la noche previa.</p>
    <div class="filtro"><label>Filtrar: <select id="datosFiltro" onchange="fillDatos(+this.value)">${sel}</select></label></div>
    <div class="tabla-wrap"><table class="datos"><thead><tr><th style="width:130px">Tema</th><th>Dato / número / plazo / lista exacta</th></tr></thead><tbody id="datosBody"></tbody></table></div>`;
  fillDatos(0);
}
function fillDatos(filtro){
  let rows='';
  TEMAS.forEach(t=>{if(filtro&&t.id!==filtro)return;
    (t.datos_duros||[]).forEach((d,i)=>{rows+=`<tr>${i===0?`<td class="tema-c" rowspan="${t.datos_duros.length}">${t.id}. ${esc(t.tema)}</td>`:''}<td>${esc(d)}</td></tr>`;});
  });
  document.getElementById('datosBody').innerHTML=rows;
}

function buildViews(){
  document.getElementById('main').innerHTML = TABS.map(t=>`<section class="view" id="view-${t[0]}"></section>`).join('');
  renderInicio();renderPlan();renderTeoria();renderFlash();renderPractica();renderSim();renderDatos();
}
buildTabs();buildViews();show('inicio');updateProgress();
</script>
</body>
</html>
