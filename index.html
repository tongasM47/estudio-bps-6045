rencia; Acceso universal y equitativo; Calidad de atención; Participación; Solidaridad; Mejora continua e innovación; Compromiso con la gestión humana) (Valores).", "Lineamientos / Objetivos estratégicos: son 8 ejes (Lineamientos Estratégicos / Objetivos Estratégicos).", "FODA: estructura de Fortalezas, Oportunidades, Debilidades y Amenazas (Diagnóstico Estratégico).", "Normativa citada en impactos de corto plazo: Art. 219 de la Ley 20.130 (reconocimiento de servicios) y cambios introducidos por la Ley 20.130 (Diagnóstico Estratégico).", "Diálogo Social: a cargo de la Comisión Sectorial de Protección y Seguridad Social; implementación en el período 2025-2026 (Diagnóstico Estratégico).", "Meta: trámites de Prestaciones Económicas (Jubilaciones y Pensiones) iniciables en forma digital: base 9%; 2026 ≥27%; 2027 ≥50%; 2028 ≥73%; 2029 ≥82%; 2030 ≥91% (Indicadores OE2.1).", "Meta: percentil 80 de días de demora pago Jubilación Común: base 90 días (dic/2024); 2030 ≤70 días (Indicadores OE2.1).", "Meta: llamadas atendidas antes de 3 minutos en cola 1997: base 97,48% (set/2025); 2030 ≥99% (Indicadores OE1.2).", "Meta: consultas del 1997 resueltas en forma automática (IVR): base 87,67%; 2030 ≥97% (Indicadores OE1.2).", "Meta: cumplimiento de estándares de ciberseguridad (niveles 0 a 4): base 2,7 (may/2025); 2030 ≥2,9 (Indicadores OE8.2).", "Meta: funcionarios con al menos 12 horas de capacitación al año: base 70%; 2030 ≥85% (Indicadores OE5.1).", "Marco normativo de ciberseguridad de referencia: Marco de Ciberseguridad de AGESIC (Decreto 66/2025) (Objetivo 8.2).", "Soluciones habitacionales: tiempo de otorgamiento base 45 meses; 2030 ≤43 meses (Indicadores OE2.2).", "Iniciativas educativas en escuelas y liceos: base 8; 2030 ≥24 (Indicadores OE7.1)."], "teoria_resumida": "\u003cp\u003eEl \u003cstrong\u003ePlan Estratégico 2025-2030\u003c/strong\u003e del BPS es elaborado por la \u003cstrong\u003eGerencia Planificación y Control Institucional\u003c/strong\u003e y funciona como hoja de ruta del Instituto de Seguridad Social para el quinquenio. NO es una norma articulada: se cita por sección, eje, objetivo, misión, visión o valores.\u003c/p\u003e\u003cp\u003eEn la \u003cstrong\u003eIntroducción\u003c/strong\u003e recuerda que el BPS es un \u003cstrong\u003eente autónomo creado en el art. 195 de la Constitución de 1967\u003c/strong\u003e, cuyo cometido es coordinar los servicios estatales de previsión social y organizar la Seguridad Social. Aporta datos de magnitud: \u003cstrong\u003e1.376.110 prestaciones\u003c/strong\u003e otorgadas y \u003cstrong\u003e1.579.795 puestos cotizantes\u003c/strong\u003e en enero 2025.\u003c/p\u003e\u003cp\u003eLa \u003cstrong\u003eMisión\u003c/strong\u003e es garantizar el acceso a los derechos y el cumplimiento de las obligaciones de Seguridad Social, administrando los recursos en forma eficiente y con atención oportuna y satisfactoria. La \u003cstrong\u003eVisión\u003c/strong\u003e es ser un Instituto cercano, transparente, que acompañe en todas las etapas de la vida, con un equipo comprometido y orientado a la mejora continua.\u003c/p\u003e\u003cp\u003eLos \u003cstrong\u003e9 Valores\u003c/strong\u003e son: \u003cul\u003e\u003cli\u003eResponsabilidad social\u003c/li\u003e\u003cli\u003eArticulación interinstitucional\u003c/li\u003e\u003cli\u003eTransparencia\u003c/li\u003e\u003cli\u003eAcceso universal y equitativo\u003c/li\u003e\u003cli\u003eCalidad de atención\u003c/li\u003e\u003cli\u003eParticipación\u003c/li\u003e\u003cli\u003eSolidaridad\u003c/li\u003e\u003cli\u003eMejora continua e innovación\u003c/li\u003e\u003cli\u003eCompromiso con la gestión humana\u003c/li\u003e\u003c/ul\u003e\u003c/p\u003e\u003cp\u003eEl \u003cstrong\u003eDiagnóstico Estratégico\u003c/strong\u003e identifica desafíos (envejecimiento demográfico y su efecto en el coeficiente de dependencia, tecnología en el trabajo, pobreza infantil, Diálogo Social 2025-2026) e impactos de corto plazo (Ley 20.130, abatir stock de expedientes de pasividad, nuevo sistema informático de Prestaciones Económicas). Incluye un \u003cstrong\u003eFODA\u003c/strong\u003e (Fortalezas, Oportunidades, Debilidades, Amenazas).\u003c/p\u003e\u003cp\u003eDefine \u003cstrong\u003e8 lineamientos estratégicos\u003c/strong\u003e que se reflejan como \u003cstrong\u003e8 objetivos estratégicos\u003c/strong\u003e (ejes): (1) facilitar la gestión del ciudadano, (2) optimizar el otorgamiento de beneficios, (3) fortalecer la gestión tributaria, (4) transformar la gestión interna, (5) desarrollar a las personas del Instituto, (6) fortalecer vínculos interinstitucionales, (7) promover el conocimiento sobre Seguridad Social, (8) potenciar la transformación digital y la gobernanza. Cada eje se desagrega en sub-objetivos (1.1 a 8.5) con líneas de acción.\u003c/p\u003e\u003cp\u003eFinalmente, los \u003cstrong\u003eIndicadores Estratégicos\u003c/strong\u003e fijan metas anuales 2026-2030 con valor base, por ejemplo: trámites de prestaciones iniciables en forma digital (de 9% a ≥91%), demora del pago de Jubilación Común (de 90 a ≤70 días), llamadas atendidas en menos de 3 minutos (≥99%) y cumplimiento de ciberseguridad (de 2,7 a ≥2,9).\u003c/p\u003e", "teoria_exhaustiva": [{"ref": "Introducción", "titulo": "Naturaleza y cometido del BPS", "cita": "El Banco de Previsión Social es un ente autónomo creado en el artículo 195 de la Constitución... Nuestro cometido central es coordinar los servicios estatales de previsión social y organizar la Seguridad Social.", "explicacion": "Encuadra al BPS como ente autónomo de rango constitucional y fija su cometido. Es la base que justifica el plan.", "ejemplo": "Coordinar prestaciones de jubilaciones, salud, desempleo y asignaciones familiares dentro de un mismo organismo."}, {"ref": "Introducción", "titulo": "Magnitud del Instituto (datos ene/2025)", "cita": "En enero 2025, el Instituto ha otorgado 1.376.110 prestaciones... el Instituto recaudó el aporte de 1.579.795 puestos cotizantes.", "explicacion": "Dimensiona el alcance social y económico del BPS, lo que fundamenta la sensibilidad e impacto de su gestión.", "ejemplo": "Jubilaciones (496.802) y AFAM (466.302) son las prestaciones más numerosas."}, {"ref": "Introducción", "titulo": "Rol como brazo ejecutor de políticas", "cita": "el Instituto tiene a su cargo la responsabilidad de implementar una serie de políticas públicas relevantes, como por ejemplo el Sistema Nacional Integrado de Salud...", "explicacion": "Muestra que el BPS, además de previsión, ejecuta políticas con otros organismos (MIDES, ANEP, DGI, MTSS, MVOT).", "ejemplo": "Ventanilla única con MIDES para Asignación Familiar o Tarjeta Uruguay Social; plan Ibirapitá; turismo social en Colonia de Raigón."}, {"ref": "Misión", "titulo": "Misión institucional", "cita": "Garantizar el acceso a los derechos de las personas y el cumplimiento de las obligaciones de Seguridad Social, administrando los recursos en forma eficiente y brindando una atención oportuna y satisfactoria para el usuario.", "explicacion": "Define la razón de ser: equilibrar derechos (acceso) y obligaciones (cumplimiento), con eficiencia y buena atención.", "ejemplo": "Pagar una jubilación en plazo (derecho) y a la vez cobrar aportes a un empleador (obligación)."}, {"ref": "Visión", "titulo": "Visión institucional", "cita": "Ser un Instituto cercano y de gestión transparente, que acompañe a las personas en todas las etapas de su vida, con un equipo humano comprometido, profesional y orientado a la mejora continua.", "explicacion": "Describe el estado futuro deseado: cercanía, transparencia, acompañamiento del curso de vida y mejora continua.", "ejemplo": "Un usuario que resuelve un trámite en línea con un referente identificable que le da seguimiento."}, {"ref": "Valores", "titulo": "Los 9 valores", "cita": "Responsabilidad social; Articulación interinstitucional; Transparencia; Acceso universal y equitativo; Calidad de atención; Participación; Solidaridad; Mejora continua e innovación; Compromiso con la gestión humana.", "explicacion": "Son los principios que guían la conducta institucional. Conviene memorizar la lista exacta (son 9).", "ejemplo": "Solidaridad: la Seguridad Social como redistribución y equidad entre generaciones."}, {"ref": "Diagnóstico Estratégico", "titulo": "Envejecimiento y coeficiente de dependencia", "cita": "incide negativamente en el coeficiente de dependencia del sistema, el cual mide la proporción que existe entre los trabajadores que efectúan aportes... y las personas que reciben una prestación.", "explicacion": "El envejecimiento (menos natalidad, menos mortalidad) sube la relación de dependencia y presiona la financiación.", "ejemplo": "Cada vez más jubilados por cada trabajador activo aportante."}, {"ref": "Diagnóstico Estratégico", "titulo": "Impactos de corto plazo", "cita": "Atender la demanda para el reconocimiento de servicios de acuerdo con el Art 219 de la Ley 20.130... Abatir el stock de expedientes de solicitud de pasividad con atraso... Contar con un nuevo sistema informático para las Prestaciones Económicas.", "explicacion": "Lista de presiones operativas inmediatas que el plan debe atender, varias ligadas a la Ley 20.130 y al Diálogo Social.", "ejemplo": "Reducir el atraso en expedientes de jubilación pendientes."}, {"ref": "Diagnóstico Estratégico - FODA", "titulo": "Fortalezas", "cita": "Reputación institucional y confianza; presencia del BPS en todo el país; Datacenter autogestionado; CRENADECER (enfermedades raras)...", "explicacion": "Factores internos positivos a potenciar. Incluyen capital humano, cobertura territorial y capacidades tecnológicas.", "ejemplo": "Estructura multicanal de atención ya existente."}, {"ref": "Diagnóstico Estratégico - FODA", "titulo": "Oportunidades", "cita": "Diálogo social; nativos digitales y canales no presenciales; Big Data, inteligencia artificial; interoperabilidad con otros organismos; administrar el Sistema Nacional de Certificación Laboral.", "explicacion": "Factores externos favorables a aprovechar, sobre todo tecnológicos y de coordinación interinstitucional.", "ejemplo": "Usar IA para análisis predictivo de fiscalización."}, {"ref": "Diagnóstico Estratégico - FODA", "titulo": "Debilidades", "cita": "Estructura organizacional rígida y vertical; sistema de prestaciones desactualizado con alto riesgo operativo; inexistencia de una evaluación de desempeño; inexistencia de un Plan de continuidad operativa de los sistemas.", "explicacion": "Factores internos a mitigar; muchos justifican objetivos de los ejes 4, 5 y 8.", "ejemplo": "Web no adaptada y falta de gobernanza de la atención al usuario."}, {"ref": "Diagnóstico Estratégico - FODA", "titulo": "Amenazas", "cita": "Ciberataques; eventos extraordinarios; incremento del riesgo de fraude; comunicación distorsiva externa sobre cambios normativos; falta de formación en Seguridad Social en las personas.", "explicacion": "Factores externos negativos a anticipar; varios sustentan los ejes de transformación digital (8) y conocimiento (7).", "ejemplo": "Un ciberataque que comprometa servicios en línea."}, {"ref": "Lineamientos Estratégicos", "titulo": "Las 8 líneas estratégicas", "cita": "Se definieron 8 líneas estratégicas que surgen del análisis FODA y del compromiso con una gestión centrada en las personas, eficiente, transparente e innovadora.", "explicacion": "Son la traducción del diagnóstico en orientaciones de acción; coinciden con los 8 objetivos estratégicos.", "ejemplo": "Línea 8: potenciar la transformación digital y la gobernanza de sus instrumentos."}, {"ref": "Objetivo 1", "titulo": "Facilitar la gestión del ciudadano", "cita": "Facilitar a los ciudadanos la gestión ante BPS promoviendo la simplicidad, accesibilidad y la calidad de la atención en todos los canales.", "explicacion": "Eje de atención: optimizar información (1.1), potenciar atención (1.2), accesibilidad multicanal (1.3) y seguimiento de la atención (1.4).", "ejemplo": "Atención personalizada con referentes identificables y reducción del tiempo de espera para una cita."}, {"ref": "Objetivo 2", "titulo": "Optimizar el otorgamiento de beneficios", "cita": "Optimizar la gestión en el otorgamiento de los beneficios para garantizar a las personas el acceso justo, oportuno y eficiente a los derechos de Seguridad Social.", "explicacion": "Abarca gestión moderna de prestaciones (2.1), servicios sociales (2.2) y servicios de salud (2.3).", "ejemplo": "Reducir la demora del percentil 80 del pago de Jubilación Común de 90 a ≤70 días."}, {"ref": "Objetivo 3", "titulo": "Fortalecer la gestión tributaria", "cita": "Fortalecer la gestión tributaria promoviendo la formalización y el cumplimiento colaborativo... mediante la integración de los modelos de facilitación y control.", "explicacion": "Combina facilitar el cumplimiento voluntario (3.1), fiscalización inteligente (3.2) y gestión de cobro (3.3).", "ejemplo": "Acompañamiento a incumplidores menores y sanciones rápidas a quienes persisten en la evasión."}, {"ref": "Objetivo 4", "titulo": "Transformar la gestión interna", "cita": "Transformar la gestión interna poniendo foco en el usuario, propiciando la mejora continua y la innovación.", "explicacion": "Incluye procesos eficientes (4.1), cultura de planificación y control (4.2), estructura organizativa (4.3) y controles internos (4.4).", "ejemplo": "Implementar un Panel de Gestión Estratégica y gestión por proyectos."}, {"ref": "Objetivo 5", "titulo": "Desarrollo de las personas del Instituto", "cita": "Impulsar el desarrollo de las personas que trabajan en el Instituto.", "explicacion": "Desarrolla competencias y trayectorias (5.1) y mejora del bienestar laboral, infraestructura y cultura (5.2).", "ejemplo": "Plan integral de formación continua; meta de ≥85% de funcionarios con 12 horas de capacitación al año en 2030."}, {"ref": "Objetivo 6", "titulo": "Vínculos interinstitucionales", "cita": "Fortalecer los vínculos interinstitucionales tanto a nivel nacional como internacional, con el fin de mejorar el diseño e implementación de las políticas de Seguridad Social.", "explicacion": "Comprende interacción nacional/internacional (6.1), investigaciones y proyecciones actuariales (6.2) e información para el Diálogo Social (6.3).", "ejemplo": "Proyecciones actuariales de Invalidez, Vejez y Sobrevivencia (IVS) según mejores prácticas."}, {"ref": "Objetivo 7", "titulo": "Promover el conocimiento sobre Seguridad Social", "cita": "Promover el conocimiento sobre Seguridad Social.", "explicacion": "Fortalece la cultura de Seguridad Social (7.1) y la participación de la sociedad civil/Diálogo Social (7.2).", "ejemplo": "Iniciativas educativas en escuelas y liceos: de 8 (base) a ≥24 en 2030."}, {"ref": "Objetivo 8", "titulo": "Transformación digital y gobernanza", "cita": "Potenciar la transformación digital del Instituto y la gobernanza de sus instrumentos.", "explicacion": "Cubre transformación digital (8.1), ciberresiliencia y seguridad (8.2), inteligencia artificial (8.3), gestión de datos (8.4) y obsolescencia tecnológica (8.5).", "ejemplo": "Cumplir el Marco de Ciberseguridad de AGESIC (Decreto 66/2025)."}, {"ref": "Indicadores Estratégicos", "titulo": "Sistema de medición con metas 2026-2030", "cita": "se presentan los indicadores y sus correspondientes valores esperados que permitirán medir su cumplimiento.", "explicacion": "Cada objetivo tiene indicadores con valor base y metas anuales; algunos figuran como 'A definir' o 'Sin indicadores definidos'.", "ejemplo": "Trámites de prestaciones iniciables digitalmente: de 9% a ≥91% en 2030."}], "flashcards": [{"front": "¿Qué período abarca el Plan Estratégico del BPS?", "back": "2025-2030 (Plan Estratégico, Introducción).", "id": "2-0"}, {"front": "¿Qué área del BPS elaboró el Plan Estratégico 2025-2030?", "back": "La Gerencia Planificación y Control Institucional (encabezado del documento).", "id": "2-1"}, {"front": "¿Cuál es la Misión del BPS según el plan?", "back": "Garantizar el acceso a los derechos y el cumplimiento de las obligaciones de Seguridad Social, administrando los recursos en forma eficiente y brindando atención oportuna y satisfactoria al usuario (Misión).", "id": "2-2"}, {"front": "¿Cuál es la Visión del BPS?", "back": "Ser un Instituto cercano y de gestión transparente, que acompañe a las personas en todas las etapas de su vida, con un equipo humano comprometido, profesional y orientado a la mejora continua (Visión).", "id": "2-3"}, {"front": "¿Cuántos valores tiene el plan y cuáles son?", "back": "9 valores: Responsabilidad social, Articulación interinstitucional, Transparencia, Acceso universal y equitativo, Calidad de atención, Participación, Solidaridad, Mejora continua e innovación, Compromiso con la gestión humana (Valores).", "id": "2-4"}, {"front": "¿Cuántos lineamientos/objetivos estratégicos define el plan?", "back": "8 ejes (Lineamientos Estratégicos / Objetivos Estratégicos).", "id": "2-5"}, {"front": "¿Qué herramienta de diagnóstico usa el plan?", "back": "Un análisis FODA: Fortalezas, Oportunidades, Debilidades y Amenazas (Diagnóstico Estratégico).", "id": "2-6"}, {"front": "¿Cuántas prestaciones otorgó el BPS en enero 2025?", "back": "1.376.110 prestaciones (Introducción).", "id": "2-7"}, {"front": "¿Cuántos puestos cotizantes recaudó el BPS en enero 2025?", "back": "1.579.795 puestos cotizantes (Introducción).", "id": "2-8"}, {"front": "¿En qué artículo de la Constitución se crea el BPS?", "back": "Artículo 195 de la Constitución de 1967 (Introducción).", "id": "2-9"}, {"front": "¿Qué es el coeficiente de dependencia del sistema?", "back": "La proporción entre los trabajadores que aportan y las personas que reciben una prestación; el envejecimiento lo afecta negativamente (Diagnóstico Estratégico).", "id": "2-10"}, {"front": "¿Qué ley se menciona en los impactos de corto plazo del diagnóstico?", "back": "La Ley 20.130 (reconocimiento de servicios por el Art. 219 y otros cambios) (Diagnóstico Estratégico).", "id": "2-11"}, {"front": "¿Quién tiene a cargo el Diálogo Social y en qué período se implementa?", "back": "La Comisión Sectorial de Protección y Seguridad Social; implementación 2025-2026 (Diagnóstico Estratégico).", "id": "2-12"}, {"front": "¿Cuál es el Objetivo Estratégico 1?", "back": "Facilitar a los ciudadanos la gestión ante BPS promoviendo simplicidad, accesibilidad y calidad de la atención en todos los canales (Objetivo 1).", "id": "2-13"}, {"front": "¿Cuál es el Objetivo Estratégico 3?", "back": "Fortalecer la gestión tributaria promoviendo la formalización y el cumplimiento colaborativo, integrando facilitación y control (Objetivo 3).", "id": "2-14"}, {"front": "¿Cuál es el Objetivo Estratégico 8?", "back": "Potenciar la transformación digital del Instituto y la gobernanza de sus instrumentos (Objetivo 8).", "id": "2-15"}, {"front": "¿Qué marco normativo de ciberseguridad debe cumplir el BPS?", "back": "El Marco de Ciberseguridad de AGESIC (Decreto 66/2025) (Objetivo 8.2).", "id": "2-16"}, {"front": "Meta 2030: ¿qué porcentaje de trámites de Prestaciones Económicas podrán iniciarse en forma digital?", "back": "≥91% (base 9%) (Indicadores OE2.1).", "id": "2-17"}, {"front": "Meta 2030: ¿cuál es el objetivo de demora (percentil 80) para el pago de Jubilación Común?", "back": "≤70 días (base 90 días, dic/2024) (Indicadores OE2.1).", "id": "2-18"}, {"front": "Meta 2030: ¿qué porcentaje de funcionarios debe completar al menos 12 horas de capacitación al año?", "back": "≥85% (base 70%) (Indicadores OE5.1).", "id": "2-19"}, {"front": "Meta 2030: ¿cuál es el objetivo de cumplimiento de estándares de ciberseguridad (escala 0-4)?", "back": "≥2,9 (base 2,7 de may/2025) (Indicadores OE8.2).", "id": "2-20"}, {"front": "¿Cuál es la prestación más numerosa según el desglose de enero 2025?", "back": "Jubilaciones, con 496.802 (Introducción).", "id": "2-21"}, {"front": "¿Qué tres dimensiones cubre el Objetivo 2?", "back": "Gestión moderna de prestaciones (2.1), servicios sociales (2.2) y servicios de salud (2.3) (Objetivo 2).", "id": "2-22"}, {"front": "¿Cuál es el Objetivo Estratégico 5?", "back": "Impulsar el desarrollo de las personas que trabajan en el Instituto (Objetivo 5).", "id": "2-23"}, {"front": "¿Qué busca el Objetivo 7?", "back": "Promover el conocimiento sobre Seguridad Social, fortaleciendo su cultura y la participación de la sociedad civil (Objetivo 7).", "id": "2-24"}, {"front": "Meta: ¿cuántas iniciativas educativas en escuelas y liceos se proyectan para 2030?", "back": "≥24 (base 8) (Indicadores OE7.1).", "id": "2-25"}], "practica": [{"subtema": "Identificación general del plan", "q": "¿Qué período abarca el Plan Estratégico del BPS analizado?", "opciones": ["2020-2025", "2025-2030", "2024-2029", "2025-2028"], "correcta": 1, "expl": "El documento es el Plan Estratégico 2025-2030 (Introducción y encabezado).", "id": "2-0", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Identificación general del plan", "q": "¿Qué gerencia elaboró el plan?", "opciones": ["Gerencia de Recursos Humanos", "Gerencia Planificación y Control Institucional", "Gerencia de Prestaciones", "Gerencia de Tecnología"], "correcta": 1, "expl": "Figura en el encabezado: Gerencia Planificación y Control Institucional.", "id": "2-1", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Identificación general del plan", "q": "El Plan Estratégico 2025-2030 es:", "opciones": ["Una ley articulada", "Un decreto del Poder Ejecutivo", "Un documento de planificación institucional", "Un convenio internacional"], "correcta": 2, "expl": "Es una herramienta de planificación institucional, no una norma articulada (Introducción).", "id": "2-2", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Introducción y naturaleza del BPS", "q": "¿En qué artículo de la Constitución se crea el BPS?", "opciones": ["Art. 67", "Art. 195", "Art. 219", "Art. 332"], "correcta": 1, "expl": "El BPS es un ente autónomo creado en el artículo 195 de la Constitución de 1967 (Introducción).", "id": "2-3", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Introducción y naturaleza del BPS", "q": "¿Cuántas prestaciones otorgó el BPS en enero 2025?", "opciones": ["1.579.795", "1.376.110", "1.276.110", "496.802"], "correcta": 1, "expl": "En enero 2025 otorgó 1.376.110 prestaciones (Introducción). 1.579.795 corresponde a puestos cotizantes.", "id": "2-4", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Introducción y naturaleza del BPS", "q": "¿Cuántos puestos cotizantes recaudó el BPS en enero 2025?", "opciones": ["1.376.110", "466.302", "1.579.795", "226.366"], "correcta": 2, "expl": "Recaudó el aporte de 1.579.795 puestos cotizantes (Introducción).", "id": "2-5", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Introducción y naturaleza del BPS", "q": "Según el desglose de enero 2025, ¿cuál es la prestación más numerosa?", "opciones": ["AFAM", "Pensiones de sobrevivencia", "Jubilaciones", "Pensiones asistenciales"], "correcta": 2, "expl": "Jubilaciones: 496.802, la cifra más alta del desglose (Introducción).", "id": "2-6", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Misión", "q": "¿Qué dos grandes ejes equilibra la Misión del BPS?", "opciones": ["Recaudación e inversión", "El acceso a los derechos y el cumplimiento de las obligaciones", "Salud y vivienda", "Atención presencial y virtual"], "correcta": 1, "expl": "La Misión habla de garantizar el acceso a los derechos y el cumplimiento de las obligaciones de Seguridad Social (Misión).", "id": "2-7", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Misión", "q": "Según la Misión, los recursos deben administrarse:", "opciones": ["De forma eficiente", "Con máxima rentabilidad financiera", "Tercerizando servicios", "Sin control externo"], "correcta": 0, "expl": "La Misión exige administrar los recursos en forma eficiente con atención oportuna y satisfactoria (Misión).", "id": "2-8", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Visión", "q": "¿Qué característica NO aparece en la Visión del BPS?", "opciones": ["Cercano", "De gestión transparente", "Líder regional en inversiones", "Orientado a la mejora continua"], "correcta": 2, "expl": "La Visión menciona cercano, transparente, acompañamiento del curso de vida y mejora continua; no habla de inversiones (Visión).", "id": "2-9", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Visión", "q": "La Visión plantea acompañar a las personas:", "opciones": ["Solo en la vejez", "En todas las etapas de su vida", "Únicamente cuando trabajan", "Solo ante enfermedades"], "correcta": 1, "expl": "La Visión busca acompañar a las personas en todas las etapas de su vida (Visión).", "id": "2-10", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Valores", "q": "¿Cuántos valores define el plan?", "opciones": ["5", "7", "9", "11"], "correcta": 2, "expl": "El plan enumera 9 valores (Valores).", "id": "2-11", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Valores", "q": "¿Cuál de los siguientes NO es uno de los valores del plan?", "opciones": ["Solidaridad", "Transparencia", "Competitividad de mercado", "Participación"], "correcta": 2, "expl": "Los valores incluyen Solidaridad, Transparencia y Participación; 'competitividad de mercado' no figura (Valores).", "id": "2-12", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Valores", "q": "El valor que define a la Seguridad Social como compromiso colectivo y redistribución de recursos es:", "opciones": ["Solidaridad", "Calidad de atención", "Articulación interinstitucional", "Responsabilidad social"], "correcta": 0, "expl": "La Solidaridad se describe como expresión del compromiso colectivo y mecanism objetivo de 'fortalecer la gestión tributaria promoviendo la formalización y el cumplimiento colaborativo' es el:", "opciones": ["Objetivo 1", "Objetivo 2", "Objetivo 3", "Objetivo 4"], "correcta": 2, "expl": "Corresponde al Objetivo Estratégico 3 (Objetivos Estratégicos).", "id": "2-23", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Lineamientos y Objetivos estratégicos", "q": "El eje que aborda inteligencia artificial, ciberresiliencia y obsolescencia tecnológica es el:", "opciones": ["Objetivo 5", "Objetivo 6", "Objetivo 7", "Objetivo 8"], "correcta": 3, "expl": "El Objetivo 8 trata la transformación digital y la gobernanza de sus instrumentos (Objetivo 8).", "id": "2-24", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Lineamientos y Objetivos estratégicos", "q": "'Impulsar el desarrollo de las personas que trabajan en el Instituto' es el:", "opciones": ["Objetivo 4", "Objetivo 5", "Objetivo 6", "Objetivo 7"], "correcta": 1, "expl": "Es el Objetivo Estratégico 5 (Objetivos Estratégicos).", "id": "2-25", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Indicadores y metas", "q": "La meta 2030 de trámites de Prestaciones Económicas iniciables en forma digital es:", "opciones": ["≥27%", "≥50%", "≥73%", "≥91%"], "correcta": 3, "expl": "La meta 2030 es ≥91%, partiendo de un valor base de 9% (Indicadores OE2.1).", "id": "2-26", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Indicadores y metas", "q": "El valor base del percentil 80 de demora para el pago de Jubilación Común (dic/2024) es:", "opciones": ["70 días", "90 días", "177 días", "208 días"], "correcta": 1, "expl": "El valor base es 90 días (dic/2024); la meta 2030 es ≤70 días (Indicadores OE2.1).", "id": "2-27", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Indicadores y metas", "q": "¿Qué marco de ciberseguridad debe cumplir el BPS según el Objetivo 8.2?", "opciones": ["ISO 9001", "Marco de Ciberseguridad de AGESIC (Decreto 66/2025)", "Reglamento GDPR", "Norma PCI-DSS"], "correcta": 1, "expl": "El Objetivo 8.2 establece cumplir con el Marco de Ciberseguridad de AGESIC (Decreto 66/2025).", "id": "2-28", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Indicadores y metas", "q": "La meta 2030 de funcionarios con al menos 12 horas de capacitación al año es:", "opciones": ["≥73%", "≥80%", "≥85%", "≥90%"], "correcta": 2, "expl": "La meta 2030 es ≥85% (base 70%) (Indicadores OE5.1).", "id": "2-29", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}, {"subtema": "Indicadores y metas", "q": "Algunos indicadores del plan aparecen como:", "opciones": ["Confidenciales", "'A definir' o 'Sin indicadores definidos'", "Eliminados", "Solo en dólares"], "correcta": 1, "expl": "Varios indicadores figuran como 'A definir' o 'Sin indicadores definidos' (Indicadores Estratégicos).", "id": "2-30", "tema_id": 2, "tema_nombre": "Plan Estratégico 2025-2030 del BPS"}], "autoeval": [{"q": "Enunciá la Misión y la Visión del BPS según el plan.", "a": "Misión: garantizar el acceso a los derechos y el cumplimiento de las obligaciones de Seguridad Social, administrando los recursos en forma eficiente y con atención oportuna y satisfactoria al usuario. Visión: ser un Instituto cercano y de gestión transparente, que acompañe a las personas en todas las etapas de su vida, con un equipo humano comprometido, profesional y orientado a la mejora continua (Misión y Visión)."}, {"q": "Mencioná los 9 valores del plan.", "a": "Responsabilidad social, Articulación interinstitucional, Transparencia, Acceso universal y equitativo, Calidad de atención, Participación, Solidaridad, Mejora continua e innovación y Compromiso con la gestión humana (Valores)."}, {"q": "Listá los 8 objetivos/lineamientos estratégicos.", "a": "1) Facilitar la gestión del ciudadano en todos los canales; 2) optimizar el otorgamiento de beneficios; 3) fortalecer la gestión tributaria; 4) transformar la gestión interna con foco en el usuario; 5) impulsar el desarrollo de las personas del Instituto; 6) fortalecer vínculos interinstitucionales; 7) promover el conocimiento sobre Seguridad Social; 8) potenciar la transformación digital y la gobernanza (Objetivos Estratégicos)."}, {"q": "¿Qué es el coeficiente de dependencia y por qué preocupa al BPS?", "a": "Es la proporción entre trabajadores que aportan y personas que reciben prestaciones. El envejecimiento demográfico (menor natalidad y mortalidad) lo deteriora, presionando la financiación del sistema (Diagnóstico Estratégico)."}, {"q": "Indicá tres metas concretas con su valor base.", "a": "Trámites de prestaciones iniciables en forma digital: de 9% a ≥91% en 2030; demora (P80) del pago de Jubilación Común: de 90 a ≤70 días; funcionarios con ≥12 horas de capacitación/año: de 70% a ≥85% (Indicadores Estratégicos OE2.1 y OE5.1)."}, {"q": "¿Qué normas/decretos concretos cita el plan?", "a": "La Ley 20.130 (Art. 219, reconocimiento de servicios, y otros cambios) en el diagnóstico, y el Marco de Ciberseguridad de AGESIC, Decreto 66/2025, en el Objetivo 8.2."}], "huecos": ["El PDF presenta varios indicadores con valor 'A definir' (p. ej. encuesta de satisfacción web del OE1.1; quejas gestionadas del OE1.4; ausentismo de funcionarios del OE5.2) y dos sub-objetivos 'Sin indicadores definidos' (OE4.3 y OE6.3): no son omisiones del resumen sino que el documento oficial los deja pendientes.", "El gráfico de desglose de prestaciones de enero 2025 fue transcripto desde sus etiquetas de texto; el formato visual del gráfico no se conserva.", "El texto se obtuvo por completo vía web_fetch del PDF oficial; no se detectó truncamiento."]}, {"id": 3, "tema": "Prestaciones", "fuente_pagina": "https://www.bps.gub.uy/24264/", "fuente_pdf": "https://www.bps.gub.uy/bps/file/24264/1/prestaciones.pdf", "fuente_nombre": "Prestaciones - Centro de Estudios en Seguridad Social, Salud y Administracion (CESSSA), BPS, edicion 2026", "ficha": "Material oficial del BPS (edicion 2026) que sistematiza las prestaciones de la seguridad social uruguaya. Cubre las prestaciones economicas de actividad (subsidios por desempleo, maternidad, paternidad, cuidados parentales, adopcion y enfermedad), las afiliaciones mutuales en el SNIS, las asignaciones familiares y las prestaciones economicas de pasividad (jubilaciones, subsidios por incapacidad, pensiones de sobrevivencia y pensiones no contributivas). Sirve como base de estudio para el llamado del BPS.", "eli5": "Imagina que la seguridad social es un paraguas que el Estado abre cuando a una persona le pasa algo que le baja la plata o le sube los gastos (queda sin trabajo, tiene un hijo, se enferma, se jubila). A esos hechos se les llama contingencias. Las prestaciones son las distintas formas de ese paraguas: a veces te dan plata para reemplazar el sueldo que perdiste (sustitutivas), a veces te ayudan con un gasto extra como anteojos o los hijos (complementarias). Algunas las cobras porque aportaste antes (contributivas) y otras te las dan por necesidad aunque no hayas aportado (no contributivas).", "esquema": ["Conceptos generales", "  - Contingencia: hecho que genera necesidad economica (baja de ingresos o suba de gastos)", "  - Prestacion: herramienta juridica para asegurar igualdad de oportunidades y calidad de vida", "  - Clasificaciones: contributivas/no contributivas; en dinero/especie/servicio; largo/corto plazo; sustitutivas/complementarias", "Prestaciones economicas de actividad", "  - Subsidio por desempleo", "  - Subsidio por maternidad (y Ley 17.215 cambio temporario de actividades)", "  - Subsidio por paternidad", "  - Subsidio para cuidados parentales y licencias por adopcion", "  - Subsidio por enfermedad", "  - Afiliaciones mutuales y SNIS / Fonasa", "Asignaciones familiares (3 regimenes detallados)", "  - Regimen general Decreto-Ley 15.084", "  - Plan de Equidad Ley 18.227", "  - Embarazos y nacimientos multiples Ley 17.474 y Ley 20.365", "Protesis y lentes", "Prestaciones economicas de pasividad", "  - Regimenes de pasividad y conceptos fundamentales", "  - Ley 16.713 (transicion y mixto)", "  - Jubilacion comun y por edad avanzada", "  - Ley 20.130 Sistema Previsional Comun", "  - Jubilacion por incapacidad total / Subsidio transitorio por incapacidad parcial", "  - SEIC (Ley 18.395 y Ley 20.130) / Envejecimiento activo", "  - Pensiones por sobrevivencia", "  - Subsidio por expensas funerarias", "  - Pensiones especiales (Ley 19.039, Ley 18.850)", "  - Pensiones no contributivas: vejez, vejez por cuidados, invalidez", "Secciones no extraidas (pag. 63-74): Asistencia a la vejez Ley 18.241; Prestaciones de salud (Crenadecer, etc.); Prestaciones Sociales"], "datos_duros": ["Subsidio por desempleo - requisito Industria y Comercio mensual: 180 dias en planilla en los ultimos 12 meses.", "Subsidio por desempleo - Industria y Comercio jornalero: 180 dias en planilla y 150 jornales efectivos en 12 meses; destajista: 180 dias + minimo 6 BPC en 12 meses.", "Subsidio por desempleo - Rural mensual: 270 dias en planilla en 30 meses; jornalero: 225 jornales en 30 meses; destajista: minimo 9 BPC en 30 meses.", "Subsidio por desempleo - Servicio domestico mensual: 180 dias en 12 meses o 360 dias en 24 meses.", "Causales de desempleo: despido, suspension total/parcial del trabajo, reduccion laboral (mayor al 25 %) y multiempleo.", "Desempleo por despido: 6 meses o 72 jornales; +6 meses si tiene 50 anos al despido. Monto decreciente mes a mes.", "Desempleo despido mensual/destajista (% sobre promedio): 1er mes 66 %, 2do 57 %, 3ro 50 %, 4to 45 %, 5to 42 %, 6to 40 %.", "Desempleo despido jornalero (jornales por mes): 16, 14, 12, 11, 10, 9.", "Desempleo por suspension: 4 meses o 48 jornales; mensual/destajista 50 % del promedio; jornalero 12 jornales por mes.", "Suplemento del 20 % del subsidio de desempleo por casado/concubino, menores o mayores con discapacidad a cargo, o descendientes menores de 21 anos.", "Plazo para solicitar el desempleo: 30 dias; pierde un mes por cada 30 dias de demora.", "Topes desempleo despido (BPC, enero de cada ano): 1ro 13,5715; 2do 11,7199; 3ro 9,8709; 4to 8,6374; 5to 8,0193; 6to 7,4012. Minimo 1,2335 BPC.", "Tope desempleo por suspension/multiempleo: 9,8709 BPC mensuales.", "Del desempleo se descuenta hasta el 70 % del liquido por deudas de actividad patronal.", "Prorroga especial de suspension: generalmente 36 jornales o 3 meses, extensible hasta 144 jornales o 12 meses; luego la autoriza el Poder Legislativo.", "Subsidio por maternidad: 98 dias (14 semanas) = 6 semanas antes + 8 despues del parto; cobertura total no menor a 14 semanas.", "Maternidad - extensiones: complejidad hasta 6 meses de edad; multiple o bajo peso (\u003c=1,5 kg) hasta 18 semanas; prematuro hasta 33 semanas de gestacion.", "Maternidad - monto: 98 jornales en un solo pago (promedio 6 meses gravados); minimo 2 BPC por mes, sin tope maximo.", "Cambio temporario de actividades (Ley 17.215): si la empresa no puede otorgarlo, BPS da licencia especial cobrando la mitad del salario.", "Subsidio por paternidad: 3 dias paga la empresa (Ley 18.345) + 17 dias BPS (Ley 19.161) = 20 dias corridos; extensible hasta 30 dias (Ley 20.000).", "Paternidad - monto: 10 jornales en un solo pago; minimo 2 BPC por mes, sin tope maximo.", "Subsidio para cuidados parentales: medio horario hasta los 6 meses de edad (9 meses si hubo extension por complejidad); monto 50 % del jornal promedio del subsidio maternal/paternal; pago mensual a mes vencido.", "Licencia por adopcion Decreto-Ley 15.084: 42 dias desde la tenencia judicial. Ley 17.292: 42 dias para una parte y 10 dias habiles para la otra; plazo para solicitar 30 dias.", "Subsidio por enfermedad - requisitos: dependiente mensual 3 meses de actividad efectiva en el ano anterior; jornalero/destajista 75 jornales en el ano anterior.", "Subsidio por enfermedad: se abona desde el 4to dia de certificacion (1er dia si hay internacion); plazo maximo 1 ano, extensible hasta 1 ano mas.", "Subsidio por enfermedad - monto: 70 % del jornal promedio (6 meses, sin aguinaldo) con tope mensual de 9,8709 BPC.", "Enfermedad - accidente laboral: BSE paga 66,67 % y BPS cubre la diferencia hasta el 70 % (3,33 %). Internaciones psiquiatricas cubiertas luego de 30 dias.", "SNIS: rige desde 2008; el Seguro Nacional de Salud (SNS) se financia con el Fonasa; BPS recauda y paga; la Junasa administra el seguro.", "Fonasa - beneficiarios dependientes privados: minimo 13 jornales (104 horas) en el mes o 1,25 BPC o mas.", "Afiliacion mutual: plazo de 180 dias para cambiar el prestador asignado de oficio; movilidad regulada con al menos 23 meses en el mismo prestador.", "Asignaciones familiares: 4 regimenes mencionados; el material desarrolla 3. Solo la del Decreto-Ley 15.084 es prestacion de actividad.", "AF Decreto-Ley 15.084 - montos: ingresos hasta 7,4012 BPC -\u003e 0,1963 BPC por beneficiario; \u003e7,4012 y hasta 12,3380 BPC -\u003e 0,0982 BPC; \u003e12,3380 BPC -\u003e no corresponde.", "AF Decreto-Ley 15.084 - edades: hasta 14 (primaria), 15 (pension invalidez estudiando), 16 (enfermedad o distancia \u003e5 km), 18 (secundaria/UTU), de por vida (incapacidad).", "AF Plan de Equidad (Ley 18.227): no contributiva para hogares en vulnerabilidad socioeconomica; visitas del equipo tecnico de Mides.", "AF Embarazos y nacimientos multiples (Ley 17.474 y 20.365): pago hasta los 18 anos; monto x3 hasta 5 anos, x2 entre 6 y 12, comun de 13 a 18.", "Protesis y lentes: lentes comunes renovacion cada 2 anos (cambio de graduacion \u003e15 %); medias de descanso cada 6 meses; protesis \u003e35 UR requiere aprobacion por expediente.", "Regimenes de pasividad: Ley 6.962 (Industria y Comercio), Ley 9.940 (Civil y Escolar), Ley 11.617 (Rural y Servicio Domestico); Acto Institucional n.9 (1979) unifico; Ley 16.713 (vigencia 1/4/1996); Ley 20.130 SPC (mayo 2023).", "Computo ficto por carga de familia (Ley 18.395): 1 ano por hijo/a, maximo 5; Ley 20.130 agrega 2 anos por hijo/a con discapacidad severa, sin maximo.", "Ley 16.713 - Jubilacion comun: 60 anos y 35 servicios (Ley 16.713) / 60 y 30 (Ley 18.395).", "Ley 16.713 - Jubilacion por edad avanzada: 70/15; tipos B 69/17, C 68/19, D 67/21, E 66/23, F 65/25.", "Ley 16.713 niveles: reparto BPS hasta $96.279 (1/1/2026); ahorro AFAP de $96.279 a $288.836; ahorro voluntario sobre $288.836.", "Ley 20.130 - jubilacion normal desde 2033; edad por ano de nacimiento: 1973-\u003e61, 1974-\u003e62, 1975-\u003e63, 1976-\u003e64, 1977 en adelante-\u003e65 (con 30 anos de trabajo).", "Ley 20.130 - SBJ: promedio de los 20 anos de mejor remuneracion; convergencia de regimenes para ceses entre 1/1/2033 y 31/12/2042.", "Jubilacion por incapacidad total: vitalicia; hasta 25 anos requiere 6 meses de actividad, mas de 25 requiere 2 anos; si la incapacidad es post-cese requiere 10 anos.", "Subsidio transitorio por incapacidad parcial: maximo 3 anos; mismos minimos de actividad (6 meses / 2 anos segun edad).", "SEIC (Ley 18.395 y 20.130): maximo 2 anos; minimo 28 anos de trabajo; monto 40 % del promedio de 6 meses, no menor a 1 BPC ni mayor a 8 BPC.", "Pension por sobrevivencia: 2 anos de actividad para viudo/a (6 meses si el generante es menor de 25); 3 anos para padre/madre; sin minimo para hijos/as.", "Pension sobrevivencia - duracion viudo/a: \u003c30 anos 2 anos; 30-39 anos 5 anos; \u003e40 anos de por vida.", "Pension a victimas de delitos violentos (Ley 19.039): pension mensual de 6 BPC ($41.184, 1/5/2026).", "Pension Ley 18.850 (violencia domestica): pension $17.222 + asignacion familiar especial $2.583,20 (o $3.484,76) depositada hasta los 18 anos.", "Pension vejez: no contributiva, $18.575 (1/1/2026), 70 anos, carencia de recursos, 10 anos de residencia en los ultimos 20.", "Pension vejez por cuidados: $18.575 (1/1/2026), 65 a 70 anos, cuidado directo y no remunerado por minimo 7 anos.", "Pension invalidez: no contributiva, $18.575 (1/1/2026), dictamen comun (requiere carencia) o severo (sin otra gestion si cumple residencia).", "Asistencia a la vejez es un programa de transferencia monetaria de Mides para personas mayores en pobreza extrema o indigencia (Asistencia a la vejez, BPS).", "Asistencia a la vejez: personas de entre 65 y 69 años en situación de vulnerabilidad socioeconómica extrema (Asistencia a la vejez, BPS).", "Consultas de Asistencia a la vejez: Mides al 0800 7263 y WhatsApp 092643370 (Asistencia a la vejez, BPS).", "Crenadecer es el Centro de Referencia Nacional de Defectos Congénitos y Enfermedades Raras (Crenadecer, BPS).", "Crenadecer se integra por Unidades de Atención, Pesquisa Neonatal y Medicina Embriofetal y Perinatal (Crenadecer, BPS).", "La Pesquisa Neonatal es universal, gratuita y obligatoria para todos los nacidos en el país (Pesquisa Neonatal, BPS).", "La muestra de pesquisa se toma del talón por punción, luego de las 40 horas de vida y antes del alta de la maternidad (Pesquisa Neonatal, BPS).", "La pesquisa obligatoria detecta HC, PKU, HSC, FQ y 24 enfermedades del metabolismo de los aminoácidos, acidemias orgánicas y defectos de la beta oxidación de ácidos grasos (Pesquisa Neonatal, BPS).", "Ayuda extraordinaria (Ayex), montos vigencia 1/2026: Instituto $ 8.575,05; Transporte $ 4.201,82; Boletos $ 4.201,82 (Ayuda extraordinaria, BPS).", "La Ayex se otorga, en general, a hijos o menores a cargo hasta los 18 años de edad (Ayuda extraordinaria, BPS).", "Las ayudas de instituto y de transporte de la Ayex son incompatibles entre sí, salvo resolución del Directorio del BPS (Ayuda extraordinaria, BPS).", "Soluciones habitacionales tiene tres modalidades: vivienda, cupos cama y subsidio de alquiler (Soluciones habitacionales, BPS).", "Soluciones habitacionales: tope de ingresos nominales de 12 UR ($ 23.056,32) para jubilados y pensionistas por sobrevivencia del BPS (Soluciones habitacionales, BPS).", "Préstamos sociales: préstamo en efectivo para jubilados y pensionistas del BPS, en línea o presencial (Préstamos sociales, BPS).", "Las prestaciones de Salud del BPS son: Servicios Asistenciales de Salud, Evaluación Médica, Discapacidad y Afiliación Mutual (Salud, BPS)."], "teoria_resumida": "\u003cp\u003e\u003cstrong\u003eConceptos generales.\u003c/strong\u003e Una \u003cstrong\u003econtingencia\u003c/strong\u003e es un hecho que genera a la persona una necesidad economica, por baja de ingresos o aumento de gastos. La \u003cstrong\u003eprestacion\u003c/strong\u003e es el conjunto de medidas juridicas para asegurar igualdad de oportunidades y mejor calidad de vida. Las prestaciones se clasifican: segun aporte previo en \u003cstrong\u003econtributivas y no contributivas\u003c/strong\u003e; segun la forma en \u003cstrong\u003edinero, especie o servicio\u003c/strong\u003e; segun el plazo en \u003cstrong\u003elargo o corto plazo\u003c/strong\u003e; y segun su relacion con el salario en \u003cstrong\u003esustitutivas\u003c/strong\u003e (reemplazan el salario perdido: desempleo, maternidad, enfermedad) y \u003cstrong\u003ecomplementarias\u003c/strong\u003e (ayudan con gastos extra: afiliacion mutual, asignaciones familiares, protesis y lentes). Las sustitutivas estan gravadas (aportan a la seguridad social y Fonasa); las complementarias no.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePrestaciones de actividad.\u003c/strong\u003e El \u003cstrong\u003esubsidio por desempleo\u003c/strong\u003e cubre a quien queda involuntariamente sin trabajo; los requisitos varian por tipo de aporte y remuneracion; las causales son despido (6 meses, monto decreciente), suspension (4 meses, 50 %) y reduccion laboral (\u003e25 %). El \u003cstrong\u003esubsidio por maternidad\u003c/strong\u003e da 98 dias (6+8 semanas) y se paga de una vez. El \u003cstrong\u003esubsidio por paternidad\u003c/strong\u003e da 20 dias (3 empresa + 17 BPS). El \u003cstrong\u003esubsidio para cuidados parentales\u003c/strong\u003e permite medio horario hasta los 6 meses, cobrando el 50 %. El \u003cstrong\u003esubsidio por enfermedad\u003c/strong\u003e paga el 70 % del jornal desde el 4to dia, por hasta 1 ano (extensible a 2).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSalud.\u003c/strong\u003e El \u003cstrong\u003eSNIS\u003c/strong\u003e (desde 2008) garantiza cobertura integral; el Seguro Nacional de Salud se financia con el \u003cstrong\u003eFonasa\u003c/strong\u003e, BPS recauda y paga, y la \u003cstrong\u003eJunasa\u003c/strong\u003e administra. Hay 180 dias para cambiar el prestador asignado de oficio.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAsignaciones familiares.\u003c/strong\u003e Tres regimenes desarrollados: \u003cstrong\u003egeneral (Decreto-Ley 15.084)\u003c/strong\u003e, contributivo y de actividad, con montos por franja de ingresos y edades segun escolaridad; \u003cstrong\u003ePlan de Equidad (Ley 18.227)\u003c/strong\u003e, no contributivo para hogares vulnerables; y \u003cstrong\u003eembarazos y nacimientos multiples (Ley 17.474 y 20.365)\u003c/strong\u003e, con montos multiplicados por la edad.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePasividades.\u003c/strong\u003e La \u003cstrong\u003eLey 16.713\u003c/strong\u003e (1996) creo el sistema mixto (reparto BPS + AFAP) con regimenes de transicion y mixto. La \u003cstrong\u003eLey 20.130\u003c/strong\u003e (2023) creo el \u003cstrong\u003eSistema Previsional Comun\u003c/strong\u003e, con jubilacion normal desde 2033 y edad creciente segun ano de nacimiento. Existen ademas \u003cstrong\u003ejubilacion por incapacidad total\u003c/strong\u003e, \u003cstrong\u003esubsidio transitorio por incapacidad parcial\u003c/strong\u003e (3 anos), \u003cstrong\u003eSEIC\u003c/strong\u003e (2 anos, 40 %), \u003cstrong\u003epensiones por sobrevivencia\u003c/strong\u003e, \u003cstrong\u003eexpensas funerarias\u003c/strong\u003e, pensiones especiales (Ley 19.039, Ley 18.850) y las \u003cstrong\u003epensiones no contributivas\u003c/strong\u003e de vejez, vejez por cuidados e invalidez ($18.575 a 1/1/2026).\u003c/p\u003e", "teoria_exhaustiva": [{"ref": "Conceptos generales", "titulo": "Contingencia y prestacion", "cita": "Entendemos por contingencia un hecho que genera a la persona una necesidad economica (producto de una disminucion de los ingresos o de un aumento de los gastos).", "explicacion": "La seguridad social busca sustituir o compensar esa necesidad economica mediante prestaciones, que son medidas y tecnicas organizadas juridicamente.", "ejemplo": "Quedarse sin empleo (baja de ingresos) o tener un hijo (aumento de gastos) son contingencias."}, {"ref": "Conceptos generales", "titulo": "Clasificaciones de las prestaciones", "cita": "Segun requieran o no aporte previo, las dividimos en prestaciones contributivas y no contributivas... encontramos prestaciones en dinero, en especie o en servicio... de largo o corto plazo.", "explicacion": "El material agrupa las prestaciones por criterios cruzados: aporte previo, forma de entrega y plazo. Permite ubicar cada prestacion concreta.", "ejemplo": "El subsidio por desempleo es contributivo, en dinero y de corto plazo."}, {"ref": "Conceptos generales", "titulo": "Sustitutivas y complementarias", "cita": "Las primeras cumplen la funcion de sustituir el salario que se deja de percibir... Las segundas tienen por objeto complementar el salario.", "explicacion": "Las sustitutivas (despido, maternidad, enfermedad) estan gravadas y aportan a la seguridad social y Fonasa; las complementarias (afiliacion mutual, asignaciones, protesis, lentes, ordenes, ayudas) no llevan esos descuentos.", "ejemplo": "La asignacion familiar es complementaria: ayuda con gastos sin reemplazar el salario."}, {"ref": "Subsidio por desempleo", "titulo": "Objetivo y beneficiarios", "cita": "Cubrir las necesidades basicas de las personas que involuntariamente queden desempleadas, e incentivarlas a conseguir un nuevo empleo.", "explicacion": "Prestacion contributiva en dinero de corto plazo. La desocupacion debe ser forzosa, no imputable a la voluntad ni capacidad de la persona. No tienen derecho jubilados, quienes egresan voluntariamente, despedidos por razones disciplinarias, ni quienes esten en huelga.", "ejemplo": "Un trabajador de la actividad privada despedido sin causa disciplinaria puede pedirlo; quien renuncia, no."}, {"ref": "Subsidio por desempleo", "titulo": "Requisitos por aportacion", "cita": "Se deben cumplir requisitos asociados al tipo de aportacion (industria y comercio, rural, servicio domestico) y de remuneracion (mensual, destajista y jornalera).", "explicacion": "Cada combinacion exige dias en planilla y/o jornales o BPC minimos. Por ejemplo Industria y Comercio mensual: 180 dias en 12 meses; Rural mensual: 270 dias en 30 meses.", "ejemplo": "Un jornalero de Industria y Comercio necesita 180 dias en planilla y 150 jornales efectivos en los ultimos 12 meses."}, {"ref": "Subsidio por desempleo", "titulo": "Causales que habilitan", "cita": "Despido, suspension del trabajo o reduccion laboral... La reduccion laboral... debe ser mayor al 25 %.", "explicacion": "Despido (causa ajena al trabajador), suspension total/parcial, reduccion mayor al 25 % y multiempleo. Los mensuales no tienen derecho a la causal de reduccion.", "ejemplo": "Si la empresa baja la jornada un 30 %, configura causal por reduccion (salvo remuneracion mensual)."}, {"ref": "Subsidio por desempleo", "titulo": "Calculo y montos por despido", "cita": "El Subsidio por desempleo por despido tiene una duracion de 6 meses o 72 jornales... Si la persona tiene 50 anos... se extiende por 6 meses mas.", "explicacion": "El monto decrece mes a mes para incentivar la busqueda de empleo: 66 %, 57 %, 50 %, 45 %, 42 %, 40 % del promedio de 6 meses (mensual/destajista). Jornaleros cobran 16, 14, 12, 11, 10, 9 jornales.", "ejemplo": "Un mensual con promedio de $30.000 cobra $19.800 el primer mes (66 %)."}, {"ref": "Subsidio por desempleo", "titulo": "Suspension, reduccion, suplemento y plazo", "cita": "Por causal suspension tiene una duracion de 4 meses o 48 jornales... el equivalente al 50 %... suplemento del 20 %... dentro de los 30 dias.", "explicacion": "Suspension: 50 % por 4 meses (jornaleros 12 jornales/mes). Reduccion: igual a suspension menos lo trabajado. Suplemento del 20 % por familia a cargo. Hay que solicitarlo en 30 dias o se pierde un mes por cada 30 dias de demora.", "ejemplo": "Casado con hijos a cargo cobra su subsidio + 20 % de suplemento."}, {"ref": "Subsidio por desempleo", "titulo": "Topes, descuentos y prorrogas", "cita": "El monto del subsidio no podra ser inferior a 1,2335 BPC... el tope maximo sera el equivalente a 9,8709 BPC mensuales (suspension).", "explicacion": "Despido tiene topes decrecientes (13,5715 a 7,4012 BPC). Se descuentan otros ingresos dependientes, pensiones y rentas; deudas patronales hasta 70 % del liquido. No genera aguinaldo ni licencia ni IRPF. Prorrogas de suspension: 36 jornales/3 meses, extensible a 144/12.", "ejemplo": "Un alquiler (renta de capital) se descuenta del subsidio; la indemnizacion por despido no."}, {"ref": "Subsidio por maternidad", "titulo": "Beneficiarias y cobertura", "cita": "El periodo de amparo de este subsidio es de 98 dias (14 semanas): 6 semanas antes... y 8 semanas posteriores.", "explicacion": "Prestacion contributiva, en dinero, de corto plazo. No exige antiguedad minima. Incluye a embarazadas despedidas o en seguro de paro. Extensiones por complejidad (6 meses de edad), multiple/bajo peso (18 semanas) o prematuro (33 semanas de gestacion).", "ejemplo": "Una trabajadora despedida estando embarazada igual cobra el subsidio."}, {"ref": "Subsidio por maternidad", "titulo": "Calculo y monto", "cita": "Recibe en un solo pago un monto que corresponde al equivalente a los 98 jornales de su remuneracion habitual... En ningun caso... inferior a 2 BPC por mes.", "explicacion": "Promedio de montos gravados de los 6 meses previos; para dependientes incluye cuota parte de licencia, aguinaldo y vacacional. No tiene tope maximo. Si hubo subsidios previos se hace el calculo mas beneficioso.", "ejemplo": "Si la empresa adeuda aportes, la trabajadora cobra igual."}, {"ref": "Ley 17.215", "titulo": "Cambio temporario de actividades", "cita": "Toda trabajadora del ambito privado que se encuentre embarazada o en periodo de lactancia tendra derecho a obtener cambio temporario en tareas.", "explicacion": "El cambio no baja la remuneracion ni implica suspension/despido. Si la empresa no puede otorgarlo, debe presentar declaracion jurada ante BPS; si la negativa es fundada, BPS da licencia especial cobrando la mitad del salario.", "ejemplo": "Una embarazada en tareas riesgosas pasa a otra funcion sin perder sueldo."}, {"ref": "Subsidio por paternidad", "titulo": "Cobertura y monto", "cita": "La Ley 18.345 establece... tres dias de licencia pagos por la empresa... 17 dias pagos por BPS (Ley 19.161), totalizando 20 dias corridos.", "explicacion": "Prestacion sustitutiva, contributiva, corto plazo. Extensible hasta 30 dias (Ley 20.000) por nacimiento multiple, bajo peso, complejidad o prematuro. Monto: 10 jornales de una vez; minimo 2 BPC, sin tope. No tienen derecho quienes deben pension alimenticia o estan en otro subsidio.", "ejemplo": "Un padre dependiente recibe 20 dias corridos desde el parto."}, {"ref": "Subsidio para cuidados parentales", "titulo": "Medio horario y monto", "cita": "Sustituye parte del salario durante el tiempo que el padre o la madre cumplan con la mitad del horario habitual... hasta los seis meses de edad.", "explicacion": "Lo usan padre o madre en forma alternada tras la maternidad, hasta los 6 meses (9 si hubo extension por complejidad). La jornada no supera la mitad del horario ni 4 horas. Monto: 50 % del jornal promedio; pago mensual a mes vencido. Incompatible con otro subsidio por inactividad compensada.", "ejemplo": "Quien trabaja 8 horas pasa a 4 y cobra el 50 % de complemento."}, {"ref": "Licencias por adopcion", "titulo": "Dos regimenes", "cita": "Existen dos leyes... Decreto-Ley 15.084 y... Ley 17.292 y modificativas, que se diferencian en cuanto al ambito de aplicacion y a los derechos otorgados.", "explicacion": "Decreto-Ley 15.084: 42 dias desde la tenencia judicial, sin medio horario. Ley 17.292: 42 dias para una parte y 10 dias habiles para la otra, con derecho a subsidio parental por cuidados. Plazo para solicitar: 30 dias o se pierde el beneficio.", "ejemplo": "Una pareja que adopta bajo Ley 17.292 reparte 42 + 10 dias y accede al medio horario."}, {"ref": "Subsidio por enfermedad", "titulo": "Derecho y requisitos", "cita": "Suma de dinero que paga BPS en forma mensual a aquella persona que, por razones medicas, esta imposibilitada de trabajar.", "explicacion": "Prestacion contributiva sustitutiva. Requisitos: dependiente mensual 3 meses de actividad en el ano anterior; jornalero/destajista 75 jornales. Las embarazadas no requieren minimo. Patrones de I y C o rural con hasta 5 dependientes tambien tienen derecho.", "ejemplo": "Un mensual con 3 meses trabajados en el ano puede ampararse."}, {"ref": "Subsidio por enfermedad", "titulo": "Cobertura, calculo y casos especiales", "cita": "Se abona a partir del cuarto dia de certificacion, salvo internacion... se pagara el 70 % con un tope mensual de 9,8709 BPC.", "explicacion": "Plazo maximo 1 ano, extensible a otro ano; periodos por la misma dolencia en 4 anos se acumulan. La empresa puede complementar hasta el 100 %. Accidente laboral: BSE 66,67 % + BPS 3,33 %. Internacion psiquiatrica cubierta tras 30 dias. No se puede despedir durante la certificacion sin indemnizacion doble.", "ejemplo": "Internado desde el primer dia; certificado domiciliario desde el cuarto."}, {"ref": "Afiliaciones mutuales / SNIS", "titulo": "Sistema Nacional Integrado de Salud", "cita": "El Seguro Nacional de Salud (SNS) esta financiado por el Fondo Nacional de Salud (Fonasa) y BPS es el organismo recaudador.", "explicacion": "El SNIS rige desde 2008 y da cobertura integral. La Junasa (organismo desconcentrado del MSP) administra el SNS, suscribe contratos de gestion con los prestadores y controla. Criterios: conduccion del Estado, acceso universal y aporte segun ingresos.", "ejemplo": "BPS cobra el Fonasa y paga la cuota salud a la mutualista elegida."}, {"ref": "Afiliaciones mutuales / SNIS", "titulo": "Beneficiarios y movilidad", "cita": "Trabajadoras y trabajadores dependientes... que cumplen con un minimo de 13 jornales... o perciben mensualmente el equivalente a 1,25 BPC o mas.", "explicacion": "Cubre dependientes, no dependientes, hijos menores de 18 o con discapacidad, conyuge sin cobertura propia, jubilados y profesionales. Tras la afiliacion de oficio hay 180 dias para cambiar de prestador; la movilidad regulada exige 23 meses en el mismo prestador.", "ejemplo": "Un nuevo trabajador es afiliado de oficio y tiene 180 dias para elegir mutualista."}, {"ref": "Asignaciones familiares", "titulo": "Regimenes y caracteristicas", "cita": "A la fecha contamos con cuatro regimenes de asignacion familiar... solo la... Decreto-Ley 15.084 es considerada una prestacion de actividad.", "explicacion": "Beneficio irrenunciable, inembargable y no cedible (art. 9). No puede haber mas de una asignacion por menor. El derecho lo genera quien trabaja; los beneficiarios son los ninos, ninas y adolescentes.", "ejemplo": "Si padre y madre generan derecho, deben optar quien cobra."}, {"ref": "Decreto-Ley 15.084, art. 2", "titulo": "AF regimen general", "cita": "Prestacion en dinero que se sirve a todo empleado de la actividad privada que preste servicios remunerados a terceros y que tenga hijos o menores a su cargo.", "explicacion": "Contributiva y de actividad. Se cobra desde la comprobacion del embarazo (con controles). Edades: 14 (primaria), 15 (pension invalidez estudiando), 16 (enfermedad/distancia \u003e5 km), 18 (secundaria/UTU), de por vida (incapacidad). Pago bimestral, retroactividad hasta 1 ano.", "ejemplo": "Un adolescente que cursa secundaria mantiene la asignacion hasta los 18."}, {"ref": "Decreto-Ley 15.084", "titulo": "AF general - montos por franja", "cita": "Si la suma de los ingresos no supera 7,4012 BPC, se percibe por cada beneficiario/a 0,1963 BPC.", "explicacion": "Franja 2 (\u003e7,4012 y hasta 12,3380 BPC): 0,0982 BPC. Franja 3 (\u003e12,3380 BPC): no corresponde, pero mantiene asistencia materno-infantil. Desde el tercer beneficiario el tope sube 1,2338 BPC. Beneficiarios con incapacidad reciben el doble.", "ejemplo": "Un hogar con ingresos de 5 BPC cobra 0,1963 BPC por cada hijo."}, {"ref": "Ley 18.227", "titulo": "AF Plan de Equidad", "cita": "Prestacion en dinero que cobra mensualmente un nucleo familiar en el que hay menores de edad y que este en situacion de vulnerabilidad socioeconomica.", "explicacion": "No contributiva. Requiere inscripcion y asistencia a la ensenanza y controles de salud. BPS determina los hogares (ingresos, vivienda, composicion, salud) usando las Encuestas Continuas de Hogares; Mides visita y puede otorgar o denegar. Preferencia de titularidad: la mujer.", "ejemplo": "Un nino en hogar vulnerable cobra aunque nadie del hogar aporte."}, {"ref": "Ley 17.474 y Ley 20.365", "titulo": "AF embarazos y nacimientos multiples", "cita": "Asignacion familiar especial para el caso de mujeres que cursan un embarazo multiple o a familias que tengan a su cargo dos o mas hijos producto de un nacimiento multiple.", "explicacion": "Se basa en el Decreto-Ley 15.084. Pago bimestral hasta los 18 anos. En gestacion y hasta 5 anos: triple; entre 6 y 12: doble; de 13 a 18: comun. Incluye atencion medica domiciliaria hasta los 3 anos y prioridad en consultorio hasta los 9.", "ejemplo": "Gemelos de 4 anos cobran el triple del monto general por cada uno."}, {"ref": "Protesis y lentes", "titulo": "Cobertura por perdida de integridad psicofisica", "cita": "Las protesis son los productos sanitarios que sustituyen total o parcialmente una estructura corporal o una funcion fisiologica.", "explicacion": "Prestacion contributiva complementaria; cubre lentes, protesis, ortesis y asistencias especiales cuando no las dan los prestadores integrales ni el Fondo Nacional de Recursos. Lentes renovacion cada 2 anos (o si cambia la graduacion \u003e15 %). Protesis \u003e35 UR requiere aprobacion por expediente.", "ejemplo": "BPS emite una orden con monto preestablecido para lentes comunes."}, {"ref": "Regimenes de pasividad", "titulo": "Evolucion historica", "cita": "El Acto Institucional n.o 9, del 23/10/1979, unifico las distintas leyes en un solo regimen... En setiembre de 1995 se promulgo la Ley 16.713.", "explicacion": "Antes existian cajas por actividad (Ley 6.962, 9.940, 11.617). El AI n.9 (1979) unifico. La Ley 16.713 (vigencia 1/4/1996) creo el sistema mixto. La Ley 20.130 (mayo 2023) creo el Sistema Previsional Comun, que convive con los regimenes anteriores.", "ejemplo": "Quien registro su primera actividad despues del 1/12/2023 queda en el SPC."}, {"ref": "Conceptos fundamentales", "titulo": "Servicios, SBJ, tasa de reemplazo y ficto", "cita": "El monto jubilatorio a percibir surge de aplicar la tasa de reemplazo sobre el sueldo basico jubilatorio (SBJ).", "explicacion": "Servicios = actividad laboral reconocida; desde el 1/4/1996 rige la historia laboral. El SBJ es el promedio de asignaciones computables. Computo ficto por carga de familia (Ley 18.395): 1 ano por hijo, max 5; Ley 20.130 suma 2 anos por hijo con discapacidad severa.", "ejemplo": "Una madre con 3 hijos suma 3 anos fictos de servicios."}, {"ref": "Ley 16.713", "titulo": "Regimenes de transicion y mixto", "cita": "En esta ley encontramos dos regimenes: el de transicion y el mixto.", "explicacion": "Transicion: solo BPS, solidaridad intergeneracional, para afiliados con 40 o mas anos al 1/4/1996 sin causal al 31/12/1996. Mixto: BPS + AFAP + aseguradoras, para menores de 40 al 1/4/1996 o ingresados entre 1/4/1996 y 30/11/2023.", "ejemplo": "Quien tenia 38 anos en 1996 quedo en el regimen mixto."}, {"ref": "Ley 16.713", "titulo": "Jubilacion comun y por edad avanzada", "cita": "Jubilacion comun: 60 anos y 35 servicios (Ley 16.713); 60 y 30 (Ley 18.395). Edad avanzada: 70/15... F 65/25.", "explicacion": "La Ley 18.395 flexibilizo el acceso. Edad avanzada admite combinaciones edad/servicios (tipos A a F). Los tipos B-F son incompatibles con otra jubilacion en todos los regimenes.", "ejemplo": "Con 65 anos y 25 de servicios se accede por edad avanzada tipo F."}, {"ref": "Ley 16.713", "titulo": "Niveles del regimen mixto", "cita": "Primer nivel... ingresos hasta $96.279... Segundo nivel... hasta $288.836... Tercer nivel (ahorro voluntario).", "explicacion": "Primer nivel: reparto BPS. Segundo: ahorro AFAP obligatorio entre los topes. Tercero: ahorro voluntario sobre el tope mayor (valores a 1/1/2026). Al jubilarse, la AFAP traspasa el saldo a una aseguradora que paga la renta.", "ejemplo": "Un sueldo de $200.000 aporta a BPS hasta $96.279 y a la AFAP por el resto."}, {"ref": "Ley 20.130", "titulo": "Jubilacion normal - SPC", "cita": "Las jubilaciones de causal normal comenzaran a otorgarse a partir del ano 2033.", "explicacion": "Con 30 anos de trabajo, la edad sube por ano de nacimiento (1973-\u003e61... 1977 en adelante-\u003e65). Sin los 30 anos hay causales alternativas (65/25 hasta 70/15). El SBJ es el promedio de los 20 anos de mejor remuneracion; hay convergencia de regimenes para ceses 2033-2042.", "ejemplo": "Nacido en 1975, con 30 anos de trabajo, se jubila a los 63."}, {"ref": "Ley 20.130", "titulo": "Jubilacion por incapacidad total", "cita": "Se adquiere cuando la trabajadora o el trabajador presentan una incapacidad absoluta y permanente para todo tipo de trabajo.", "explicacion": "Contributiva, vitalicia, sujeta a controles. Requiere dictamen del area Evaluacion de Incapacidad. Minimos: 6 meses (hasta 25 anos), 2 anos (mas de 25); sin minimo si es a causa del trabajo; 10 anos si la incapacidad es post-cese.", "ejemplo": "Un joven de 24 anos con 6 meses de actividad e incapacidad total puede acceder."}, {"ref": "Ley 20.130", "titulo": "Subsidio transitorio por incapacidad parcial", "cita": "Tienen derecho las y los trabajadores que presentan una imposibilidad fisica para su tarea habitual.", "explicacion": "Prestacion de actividad por maximo 3 anos o hasta configurar otra causal jubilatoria. Requiere dictamen de incapacidad absoluta y permanente para el empleo o profesion habitual. Mismos minimos de actividad que la incapacidad total.", "ejemplo": "Un albanil que no puede seguir en su tarea pero si en otra cobra el subsidio transitorio."}, {"ref": "Ley 18.395 y Ley 20.130", "titulo": "SEIC", "cita": "Prestacion economica que se otorga por un periodo maximo de dos anos a quienes... no pueden acceder a la jubilacion por falta de edad o anos de trabajo.", "explicacion": "Requiere al menos 28 anos de trabajo y la edad segun ano de nacimiento, un ano de desocupacion en el pais y no tener otros ingresos (salvo pension de sobrevivencia). Monto: 40 % del promedio de 6 meses, entre 1 y 8 BPC.", "ejemplo": "Nacido en 1974, 60 anos, 28 de trabajo y un ano sin empleo: accede al SEIC."}, {"ref": "Ley 20.130", "titulo": "Envejecimiento activo", "cita": "Establece diferentes opciones para que las personas puedan mantener su trabajo a tiempo completo o parcial... y cobrar una jubilacion o dejar de realizar los aportes.", "explicacion": "Da flexibilidad para combinar trabajo y jubilacion segun la situacion de cada persona.", "ejemplo": "Una persona jubilada que sigue trabajando part-time bajo las opciones previstas."}, {"ref": "Pensiones por sobrevivencia", "titulo": "Generantes y beneficiarios", "cita": "Prestacion economica mensual que se genera a partir del fallecimiento, desaparicion o ausencia de una persona.", "explicacion": "Generan jubilados, trabajadores en actividad o con subsidio (con minimos de actividad segun el beneficiario) y personas con 10 anos de trabajo. Beneficiarios: viudos/equiparados, hijos (menores de 21, o hasta 23 estudiando, o incapaces) y padres/madres incapacitados dependientes.", "ejemplo": "Sin minimo de actividad si la pension beneficia a hijos/as."}, {"ref": "Pensiones por sobrevivencia", "titulo": "Ingresos, deducciones y duracion", "cita": "Mejora de fortuna... cuando el promedio mensual actualizado de los ingresos... supere los topes establecidos.", "explicacion": "Hay topes por sexo (viuda $271.146; viudo $201.346, 1/5/2026). Si los ingresos superan el 50 % del tope, se deduce. Duracion viudo/a: \u003c30 anos 2 anos; 30-39 anos 5 anos; \u003e40 de por vida. Cambios por mejora/empeoramiento de fortuna.", "ejemplo": "Una viuda de 45 anos cobra de por vida; una de 28, solo 2 anos."}, {"ref": "Subsidio por expensas funerarias", "titulo": "Cobertura del sepelio", "cita": "Prestacion economica que se abona por unica vez para cubrir los gastos funebres... de un/a trabajador/a o jubilado/a de BPS sin cobertura funebre.", "explicacion": "Si la persona tenia cobertura funebre no se paga el subsidio, pero se reintegran gastos complementarios (salas velatorias, traslado). Lo recibe quien acredite haberse hecho cargo de los gastos.", "ejemplo": "Un familiar que pago el sepelio de un jubilado sin cobertura solicita el subsidio."}, {"ref": "Ley 19.039 (mod. Ley 19.889)", "titulo": "Pension a victimas de delitos violentos", "cita": "Prestacion mensual que se genera como consecuencia de un hecho delictivo que deriva en el fallecimiento de la victima o cuando esta resulta incapacitada.", "explicacion": "Pension mensual de 6 BPC ($41.184, 1/5/2026). Beneficiarios: conyuge/concubino, hijos menores de 21 (o mayores incapaces), la propia victima incapacitada, padres con tenencia. Incompatible con otras prestaciones salvo AF de Ley 18.850 y renta de AFAP.", "ejemplo": "La viuda de una victima de homicidio cobra 6 BPC mensuales."}, {"ref": "Ley 18.850", "titulo": "Pension y AF por violencia domestica", "cita": "Pension mensual para hijas e hijos de personas fallecidas a consecuencia de un hecho de violencia domestica.", "explicacion": "Pension de $17.222 + asignacion familiar especial mensual ($2.583,20 o $3.484,76) depositada en el BROU hasta los 18 anos. Incluye tratamiento psicologico. Beneficiarios: hijos solteros menores de 21 (sin medios propios) o mayores incapaces.", "ejemplo": "El hijo de una victima de femicidio cobra la pension y la AF se acumula hasta su mayoria de edad."}, {"ref": "Pension vejez", "titulo": "Pension no contributiva por vejez", "cita": "Prestacion no contributiva... su monto es de $18.575 (vigencia 1/1/2026)... personas de 70 anos de edad que carecen de recursos.", "explicacion": "Requiere 10 anos de residencia en los ultimos 20 (o vivir a \u003c5 km de la frontera con Argentina o Brasil). Se estudian ingresos propios y de familiares obligados. Compatible con actividad, sobrevivencia, alimenticia o rentas (se descuenta el 50 %). Incompatible con otras pensiones no contributivas.", "ejemplo": "Una persona de 72 anos sin recursos ni jubilacion accede a la pension vejez."}, {"ref": "Pension vejez por cuidados", "titulo": "Pension por anos de cuidado", "cita": "Tienen derecho las personas de entre 65 y 70 anos... que acrediten haber estado al cuidado directo y no remunerado... por un lapso minimo de 7 anos.", "explicacion": "No contributiva, $18.575 (1/1/2026). Cuidado de hijos, padres, hermanos o nietos. Residencia 10 en 20 anos (o frontera). Compatible con actividad, sobrevivencia, alimenticia o rentas (descuento 50 %). Incompatible con otras pensiones no contributivas.", "ejemplo": "Quien cuido a un padre dependiente 7 anos y tiene 66 puede solicitarla."}, {"ref": "Pension invalidez", "titulo": "Pension no contributiva por invalidez", "cita": "Tienen derecho las personas que tengan algun tipo de discapacidad y tengan un dictamen medico... que puede ser un dictamen comun o severo.", "explicacion": "No contributiva, $18.575 (1/1/2026). Dictamen severo + residencia: se otorga sin mas gestion. Dictamen comun: requiere carencia de recursos. Ingresos por actividad hasta 3 veces la pension: cobra integro; sobre eso se deduce el 33 % del excedente.", "ejemplo": "Una persona con dictamen severo y residencia cumplida cobra sin estudio de ingresos."}, {"ref": "Asistencia a la vejez (Ley 18.241)", "titulo": "Qué es la Asistencia a la vejez", "cita": "Es un programa de transferencia monetaria, de Mides, a personas mayores en situación de pobreza extrema o indigencia.", "explicacion": "Es una prestación no contributiva de transferencia de dinero administrada por el Mides (no es una jubilación ni una pensión por vejez del BPS). Cubre a quienes todavía no tienen edad jubilatoria pero ya son adultos mayores en pobreza extrema.", "ejemplo": "Una persona de 66 años sin ingresos formales ni cobertura jubilatoria, en situación de indigencia, puede acceder a esta transferencia mensual de Mides."}, {"ref": "Asistencia a la vejez (Ley 18.241)", "titulo": "A quién corresponde y rango de edad", "cita": "Personas de entre 65 y 69 años de edad que se encuentren en situación de vulnerabilidad socioeconómica extrema.", "explicacion": "El requisito clave es doble: la franja etaria 65 a 69 años (justo por debajo de los 70, edad mínima de la pensión a la vejez) y la situación de vulnerabilidad socioeconómica extrema. A los 70 años la persona puede pasar a la pensión por vejez.", "ejemplo": "Un hombre de 70 años ya no entra en este programa: por la edad correspondería evaluar la pensión por vejez."}, {"ref": "Asistencia a la vejez (Ley 18.241)", "titulo": "Cómo se tramita y dónde se consulta", "cita": "Deberá presentarse un integrante del núcleo familiar mayor de edad con cédula de identidad vigente y en buen estado.", "explicacion": "El trámite lo puede iniciar un integrante adulto del hogar, que debe poder responder preguntas sobre composición del hogar, nivel educativo, trayectoria laboral e ingresos nominales de todos sus integrantes. Las consultas se canalizan por Mides (0800 7263, WhatsApp 092643370 u oficinas territoriales).", "ejemplo": "La hija de un beneficiario potencial concurre a la Oficina Territorial Mides con su cédula y declara los datos del hogar."}, {"ref": "Salud — Crenadecer", "titulo": "Crenadecer: centro de referencia nacional", "cita": "El Crenadecer es el Centro de Referencia Nacional de Defectos Congénitos y Enfermedades Raras.", "explicacion": "Es la unidad del BPS especializada en enfermedades poco frecuentes (raras), que requieren alta especialización. Su objetivo es brindar prevención, diagnóstico, tratamiento y rehabilitación. Está integrado por Unidades de Atención, Pesquisa Neonatal y Medicina Embriofetal y Perinatal.", "ejemplo": "Un recién nacido con sospecha de una enfermedad metabólica rara es derivado al Crenadecer para diagnóstico y seguimiento interdisciplinario."}, {"ref": "Salud — Pesquisa Neonatal", "titulo": "Pesquisa Neonatal: universal, gratuita y obligatoria", "cita": "Se estudian todos los nacidos en el país... Es universal, gratuita y obligatoria.", "explicacion": "Busca enfermedades que no dan síntomas al nacer pero que se detectan por análisis bioquímicos. La muestra se toma del talón por punción luego de las 40 horas de vida y antes del alta. Se pesquisan HC, PKU, HSC, FQ y 24 enfermedades del metabolismo.", "ejemplo": "Antes de dar el alta a un bebé, en la maternidad le pinchan el talón para la muestra que se envía al Laboratorio de Pesquisa Neonatal de BPS."}, {"ref": "Salud — Atención primaria", "titulo": "Atención primaria y promoción de salud", "cita": "Afiliados a ASSE (Administración de los Servicios de Salud del Estado) derivados por convenios de complementariedad.", "explicacion": "El BPS brinda atención primaria a través de convenios de complementariedad con ASSE, y a hijos/funcionarios del BPS en ciertos servicios. Comprende atención médica general, embarazo, salud sexual y reproductiva, PAP, odontología, inmunizaciones y apoyo psicosocial, en los centros Cordón, Cerro y Pando.", "ejemplo": "Una usuaria de ASSE derivada por convenio se atiende un PAP y la atención de su embarazo en el centro del Cordón del BPS."}, {"ref": "Salud — Evaluación Médica", "titulo": "Evaluación de incapacidad", "cita": "Se encarga de determinar la incapacidad de adultos y menores, así como la incapacidad laboral definitiva y transitoria del trabajador.", "explicacion": "Es la instancia médica que evalúa la incapacidad de la persona para emitir un dictamen que puede derivar en una prestación económica (por ejemplo jubilación por incapacidad o pensión por invalidez). Junto con Certificaciones médicas y el Programa de reinserción laboral integra el área de Evaluación Médica.", "ejemplo": "Un trabajador con una enfermedad invalidante es citado a la junta médica del BPS, que dictamina su grado de incapacidad."}, {"ref": "Salud — Discapacidad / Prótesis y Ortesis", "titulo": "Prótesis, órtesis, lentes y audífonos", "cita": "Es una prestación económica que se otorga a niños y adolescentes por la totalidad de los lentes... y el monto fijo para el armazón.", "explicacion": "Dentro de Discapacidad, el BPS otorga prestaciones para lentes, audífonos y prótesis/órtesis a niños y adolescentes con enfermedades congénitas, además de las contribuciones generales para prótesis, órtesis y lentes.", "ejemplo": "A un niño con una enfermedad congénita visual el BPS le cubre el costo total de los cristales según receta más un monto fijo para el armazón."}, {"ref": "Salud — Ayuda extraordinaria", "titulo": "Ayuda extraordinaria (Ayex): qué es", "cita": "Es una prestación económica, no contributiva... a personas con discapacidad o alteraciones en el desarrollo.", "explicacion": "La Ayex ayuda a solventar el costo de institutos de rehabilitación/escuelas habilitadas y del transporte (o boletos del acompañante) hacia y desde esas instituciones. Es no contributiva y requiere comprobación previa del equipo técnico del BPS.", "ejemplo": "Un niño con discapacidad que asiste a un instituto de rehabilitación habilitado recibe la Ayex para cubrir la cuota mensual o el transporte."}, {"ref": "Salud — Ayuda extraordinaria", "titulo": "Ayex: beneficiarios e incompatibilidades", "cita": "Las ayudas para instituto serán incompatibles con las de transporte y viceversa, salvo... resolución favorable del Directorio.", "explicacion": "Acceden, entre otros, hijos de trabajadores privados atributarios del BPS (hasta 18 años), beneficiarios de pensión por invalidez y pacientes del Crenadecer. Las ayudas de instituto y transporte son incompatibles entre sí, y todas son incompatibles con prestaciones obligatorias del PIAS para hogares con ingresos mayores a 46,51 U.R.", "ejemplo": "Una familia no puede cobrar simultáneamente la ayuda de instituto y la de transporte por el mismo beneficiario, salvo resolución del Directorio."}, {"ref": "Sociales — Soluciones habitacionales", "titulo": "Soluciones habitacionales: tres modalidades", "cita": "Este programa tiene tres tipos de soluciones: vivienda, cupos cama y subsidio de alquiler.", "explicacion": "Es una prestación social para jubilados y pensionistas por sobrevivencia del BPS con bajos ingresos. Las tres soluciones son: vivienda (complejos del BPS), cupos cama y subsidio de alquiler.", "ejemplo": "Un jubilado de bajos ingresos sin vivienda propia se inscribe para acceder a una vivienda en un complejo habitacional del BPS."}, {"ref": "Sociales — Soluciones habitacionales", "titulo": "Soluciones habitacionales: requisitos de ingreso", "cita": "Jubilados y pensionistas por sobrevivencia de BPS... cuyos ingresos nominales no pueden superar las 12 UR ($ 23.056,32).", "explicacion": "El tope de ingresos es 12 UR (computando todos los ingresos nominales, con ciertas excepciones). Es impedimento ser propietario, copropietario, usufructuario, promitente comprador o titular de otros programas de vivienda. Quien declare cohabitar debe cumplir los mismos requisitos.", "ejemplo": "Un pensionista que ya es propietario de una casa no puede acceder al programa, porque
