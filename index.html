 de promocion y proteccion de la salud de los trabajadores mediante prevencion y control de enfermedades y accidentes y eliminacion de factores/condiciones de peligro (Salud y salud ocupacional).", "id": "8-4"}, {"front": "Que significa CYMAT y que factores la componen?", "back": "Condiciones y Medioambiente de Trabajo; factores fisicos, quimicos, biologicos, ergonomicos y psicosociales (CYMAT).", "id": "8-5"}, {"front": "Como definen Moreno y Baez (2010) los riesgos psicosociales?", "back": "'Hechos, situaciones o estados de la organizacion con una alta probabilidad de danar la salud de los trabajadores de forma importante' (p.17) (Riesgos).", "id": "8-6"}, {"front": "Cual es la diferencia central entre riesgos y factores psicosociales?", "back": "Los riesgos son hechos puntuales con alta probabilidad de danar; los factores son condiciones presentes en la organizacion, que pueden ser de riesgo pero no necesariamente negativas (Factores psicosociales).", "id": "8-7"}, {"front": "Sobre quien recae el peso del analisis de los riesgos psicosociales?", "back": "Sobre la organizacion, no sobre la persona (Riesgos).", "id": "8-8"}, {"front": "Que significa el termino 'psicosocial'?", "back": "La interaccion entre aspectos psicologicos (emociones, pensamientos, comportamientos) y sociales (relaciones, contexto cultural, entorno social) (recuadro).", "id": "8-9"}, {"front": "Cuales son las consecuencias de los riesgos psicosociales concretados?", "back": "Baja del rendimiento, aumento del ausentismo, mas accidentes de trabajo, mayor aislamiento e incremento del estres (Riesgos).", "id": "8-10"}, {"front": "Cuales son los 6 riesgos psicosociales que profundizan Moreno y Baez?", "back": "Violencia, acoso laboral, acoso sexual, inseguridad laboral, burnout y estres; agregan conflicto trabajo-familia y trabajo emocional (Riesgos).", "id": "8-11"}, {"front": "Cual es el principal riesgo psicosocial y por que?", "back": "El estres, porque actua como respuesta general ante los demas riesgos (Moreno y Baez) (El estres).", "id": "8-12"}, {"front": "Es el estres siempre negativo?", "back": "No; es una respuesta natural y adaptativa del organismo; solo bajo determinadas condiciones sus consecuencias se vuelven negativas (El estres).", "id": "8-13"}, {"front": "Como define la OIT (2003) la violencia laboral?", "back": "'Toda accion, incidente o comportamiento que se aparta de lo razonable en la cual una persona es agredida, amenazada, humillada o lesionada como consecuencia directa de su trabajo' (Violencia).", "id": "8-14"}, {"front": "Cuales son los 3 tipos de violencia en el trabajo?", "back": "De personas ajenas a la organizacion (ej. robo), de clientes/usuarios (reclamos) y de miembros de la organizacion (companeros, supervisores) (Violencia).", "id": "8-15"}, {"front": "Diferencia entre bullying y mobbing", "back": "Bullying refiere al acoso en ambitos educativos; mobbing al acoso en ambientes laborales (Acoso laboral).", "id": "8-16"}, {"front": "Que es el abuso emocional respecto del mobbing?", "back": "Un componente del mobbing: conducta de desconsideracion, menos sistematica, sin contacto fisico; por si solo no constituye acoso (Acoso laboral).", "id": "8-17"}, {"front": "Que tiene de particular el acoso sexual en Uruguay?", "back": "Es el unico riesgo psicosocial con cobertura legal, contemplado en el Art. 2 de la Ley 18.561 (Acoso sexual).", "id": "8-18"}, {"front": "Cuales son los 2 tipos de acoso sexual?", "back": "Chantaje sexual (favores a cambio de beneficios o de evitar perjuicios, desde una posicion de poder) y ambiente hostil (discriminacion y valoracion de atributos sexuales) (Acoso sexual).", "id": "8-19"}, {"front": "Mencionar tres factores psicosociales del listado", "back": "Por ejemplo: condiciones ambientales, participacion en la toma de decisiones, estilos de mando, relaciones interpersonales, desarrollo de carrera, contrato psicologico, formacion, desempeno de rol, pausas y descansos (Factores psicosociales).", "id": "8-20"}, {"front": "Por que un factor psicosocial puede ser protector?", "back": "Porque no tiene carga necesariamente negativa; por ejemplo, las buenas relaciones interpersonales favorecen el bienestar y protegen la salud (Factores psicosociales).", "id": "8-21"}, {"front": "Que articulos de la Constitucion protegen la salud en el trabajo?", "back": "Los arts. 7, 44, 53 y 54 (Marco normativo).", "id": "8-22"}, {"front": "Que convenios ratifico la Ley 15.965 (1988)?", "back": "Los Convenios de OIT 148 (medio ambiente de trabajo), 155 (seguridad y salud) y 161 (servicios de salud en el trabajo) (Marco normativo).", "id": "8-23"}, {"front": "Que reglamenta el Decreto 291/007?", "back": "El Convenio 155 de OIT; fija disposiciones minimas obligatorias de prevencion y promueve la cooperacion bipartita (Marco normativo).", "id": "8-24"}, {"front": "Quien es el organismo de contralor en la materia?", "back": "El Ministerio de Trabajo y Seguridad Social; fiscaliza a traves de la Inspeccion General del Trabajo (Marco normativo).", "id": "8-25"}, {"front": "Que establecen los arts. 34 y 50 del Estatuto del Funcionario de BPS?", "back": "Art. 34: higiene, salubridad y seguridad en el trabajo; Art. 50: proteccion del funcionario ante ataques, injurias o difamacion (Normativa BPS).", "id": "8-26"}, {"front": "Cuales son las dos areas de BPS a cargo de salud y seguridad?", "back": "Asuntos Laborales (Gestion Humana) y Salud Ocupacional (Gerencia de Prestaciones de Salud) (Areas).", "id": "8-27"}, {"front": "Desde cuando existe el Plan de Salud y Seguridad Laboral de BPS?", "back": "Desde 2007 (Programas).", "id": "8-28"}, {"front": "Que protocolos de BPS atienden acoso y violencia, y desde cuando?", "back": "Protocolo de acoso o discriminacion laboral (2018) y Protocolo de violencia desde usuarios hacia trabajadores (2019) (Programas).", "id": "8-29"}, {"front": "Que es ATSS y que rol cumple?", "back": "Asociacion de Trabajadores de la Seguridad Social; participa en ambitos bipartitos como la Comision Bipartita de Salud Laboral (Programas).", "id": "8-30"}], "practica": [{"subtema": "Marco general y corresponsabilidad", "q": "En que convenio internacional se enmarca este material?", "opciones": ["Convenio 187 de OIT (2006)", "Convenio 155 de OIT (1981)", "Convenio 161 de OIT", "Convenio 98 de OIT"], "correcta": 0, "expl": "El material se enmarca en el Convenio 187 de OIT (2006), que prioriza la prevencion (Introduccion).", "id": "8-0", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Marco general y corresponsabilidad", "q": "Segun la corresponsabilidad, quien tiene la responsabilidad principal en salud y seguridad?", "opciones": ["Las organizaciones", "Cada trabajador individualmente", "El Estado exclusivamente", "Los sindicatos"], "correcta": 0, "expl": "Las organizaciones tienen la responsabilidad principal; los trabajadores cumplen un papel crucial (Corresponsabilidad).", "id": "8-1", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Marco general y corresponsabilidad", "q": "Cual NO es una accion de corresponsabilidad del trabajador?", "opciones": ["Decidir unilateralmente las politicas de seguridad de la empresa", "Seguir las politicas de seguridad", "Participar en la formacion ofrecida", "Comunicar problemas o inquietudes"], "correcta": 0, "expl": "El trabajador sigue politicas, se forma y comunica; las politicas son responsabilidad principal de la organizacion (Corresponsabilidad).", "id": "8-2", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Trabajo y empleo", "q": "Que caracteriza al empleo frente al trabajo?", "opciones": ["Es una relacion formalizada por contrato a cambio de compensacion", "Incluye toda actividad que genera valor aunque no sea remunerada", "Es siempre informal", "No genera derechos ni obligaciones"], "correcta": 0, "expl": "El empleo se formaliza por contrato a cambio de compensacion economica; el trabajo es mas amplio (Trabajo y empleo).", "id": "8-3", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Trabajo y empleo", "q": "Cual de estas es trabajo pero no empleo?", "opciones": ["Cuidar a un familiar sin contrato ni salario", "Trabajar en una oficina con contrato", "Prestar servicios a cambio de un sueldo", "Una relacion laboral institucionalizada"], "correcta": 0, "expl": "El trabajo abarca actividades que generan valor fuera de lo remunerado y contractual (Trabajo y empleo).", "id": "8-4", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Salud y salud ocupacional", "q": "Segun la OMS (1946), la salud es:", "opciones": ["El completo bienestar fisico, mental y social, no solo ausencia de enfermedad", "La ausencia de enfermedades", "Solo el bienestar fisico", "La capacidad de trabajar"], "correcta": 0, "expl": "La definicion de la OMS (1946) incluye bienestar fisico, mental y social (Salud y salud ocupacional).", "id": "8-5", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Salud y salud ocupacional", "q": "La salud ocupacional, segun la OMS, se caracteriza por ser:", "opciones": ["Una actividad multidisciplinaria de promocion y proteccion", "Una tarea exclusivamente medica", "Una responsabilidad solo individual", "Una actividad reactiva ante accidentes"], "correcta": 0, "expl": "Es multidisciplinaria, preventiva e integral (fisico, mental y social) (Salud y salud ocupacional).", "id": "8-6", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "CYMAT", "q": "Cuales son los tipos de factores que componen las CYMAT?", "opciones": ["Fisicos, quimicos, biologicos, ergonomicos y psicosociales", "Solo fisicos y psicosociales", "Economicos y politicos", "Individuales y colectivos"], "correcta": 0, "expl": "Las CYMAT abarcan factores fisicos, quimicos, biologicos, ergonomicos y psicosociales (CYMAT).", "id": "8-7", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "CYMAT", "q": "El concepto de CYMAT desplaza la idea anterior de que el deterioro de la salud era:", "opciones": ["Una problematica exclusivamente individual", "Responsabilidad del Estado", "Algo inevitable del trabajo", "Un problema solo fisico"], "correcta": 0, "expl": "Antes se entendia como problematica exclusivamente individual; CYMAT incorpora el contexto organizacional (CYMAT).", "id": "8-8", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Riesgos y factores: distincion", "q": "Segun Moreno y Baez (2010), los riesgos psicosociales son:", "opciones": ["Hechos o estados con alta probabilidad de danar la salud de forma importante", "Condiciones siempre positivas del trabajo", "Caracteristicas inofensivas de la organizacion", "Factores exclusivamente fisicos"], "correcta": 0, "expl": "Definicion textual de Moreno y Baez (2010, p.17) (Riesgos).", "id": "8-9", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Riesgos y factores: distincion", "q": "Cual es una diferencia clave entre factores y riesgos psicosociales?", "opciones": ["Los factores no tienen carga necesariamente negativa; los riesgos si danan la salud", "Los factores siempre danan mas que los riesgos", "Son sinonimos", "Los riesgos pueden ser protectores"], "correcta": 0, "expl": "Los factores pueden incluso ser protectores; los riesgos son hechos que danan la salud (Factores psicosociales).", "id": "8-10", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Riesgos y factores: distincion", "q": "El peso del analisis de los riesgos psicosociales recae sobre:", "opciones": ["La organizacion", "La persona afectada", "El sindicato", "El Estado"], "correcta": 0, "expl": "Aunque influyen variables personales, el peso del analisis recae sobre la organizacion (Riesgos).", "id": "8-11", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Riesgos y factores: distincion", "q": "El termino 'psicosocial' refiere a la interaccion entre:", "opciones": ["Aspectos psicologicos y sociales", "Aspectos fisicos y quimicos", "Lo economico y lo legal", "Lo individual y lo genetico"], "correcta": 0, "expl": "Psicosocial = interaccion entre factores psicologicos y sociales (recuadro).", "id": "8-12", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Consecuencias", "q": "Cual NO es una consecuencia de los riesgos psicosociales concretados?", "opciones": ["Aumento del rendimiento laboral", "Aumento del ausentismo", "Mas accidentes de trabajo", "Incremento del estres"], "correcta": 0, "expl": "Las consecuencias incluyen DISMINUCION del rendimiento, no aumento (Riesgos).", "id": "8-13", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Estres", "q": "Por que el estres es considerado el principal riesgo psicosocial?", "opciones": ["Porque actua como respuesta general ante los demas riesgos", "Porque es el unico legalmente cubierto", "Porque siempre es negativo", "Porque solo afecta a la organizacion"], "correcta": 0, "expl": "Moreno y Baez plantean que el estres actua como respuesta general ante los demas riesgos (El estres).", "id": "8-14", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Estres", "q": "Respecto del estres, es correcto afirmar que:", "opciones": ["Es una respuesta natural y adaptativa, negativa solo bajo ciertas condiciones", "Siempre es perjudicial", "No tiene componente subjetivo", "Es solo un fenomeno fisico"], "correcta": 0, "expl": "Es un proceso adaptativo; sus consecuencias se vuelven negativas solo bajo determinadas condiciones (El estres).", "id": "8-15", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Estres", "q": "La definicion de estres laboral usada en el material proviene de:", "opciones": ["La Comision Europea (2002), citada en Moreno y Baez", "La OIT (2003)", "La OMS (1946)", "La Ley 18.561"], "correcta": 0, "expl": "El estres laboral se define segun la Comision Europea (2002), citada en Moreno y Baez 2010 (El estres).", "id": "8-16", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Violencia", "q": "La definicion de violencia laboral del material corresponde a:", "opciones": ["La OIT (2003)", "La OMS (1995)", "La Comision Europea", "Moreno y Baez"], "correcta": 0, "expl": "La violencia laboral se define segun la OIT (2003) (Violencia).", "id": "8-17", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Violencia", "q": "Cual de estos NO es uno de los tres tipos de violencia laboral?", "opciones": ["Violencia ejercida por la propia victima sobre si misma", "De personas ajenas a la organizacion", "De clientes o usuarios", "De miembros de la organizacion"], "correcta": 0, "expl": "Los tres tipos son: ajenos, clientes/usuarios e integrantes de la organizacion (Violencia).", "id": "8-18", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Acoso laboral", "q": "El termino que designa el acoso en ambientes laborales es:", "opciones": ["Mobbing", "Bullying", "Burnout", "Incivismo"], "correcta": 0, "expl": "Mobbing = acoso laboral; bullying se reserva a ambitos educativos (Acoso laboral).", "id": "8-19", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Acoso laboral", "q": "El abuso emocional, respecto del mobbing:", "opciones": ["Es un componente, menos sistematico, sin contacto fisico; por si solo no es acoso", "Es mas grave y sistematico que el mobbing", "Implica siempre contacto fisico", "Es ajeno al acoso laboral"], "correcta": 0, "expl": "El abuso emocional es un componente menos sistematico y por si mismo no constituye acoso (Acoso laboral).", "id": "8-20", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Acoso sexual", "q": "Que tiene de singular el acoso sexual en Uruguay?", "opciones": ["Es el unico riesgo psicosocial con cobertura legal", "No esta regulado", "Es el riesgo menos frecuente", "Solo aplica al sector privado"], "correcta": 0, "expl": "Es el unico riesgo psicosocial con cobertura legal, en el Art. 2 de la Ley 18.561 (Acoso sexual).", "id": "8-21", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Acoso sexual", "q": "El acoso sexual esta contemplado en:", "opciones": ["El articulo 2 de la Ley 18.561", "El Decreto 291/007", "La Ley 15.965", "El Convenio 187 de OIT"], "correcta": 0, "expl": "Esta contemplado y sancionado en el Art. 2 de la Ley 18.561 (Acoso sexual).", "id": "8-22", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Acoso sexual", "q": "El 'chantaje sexual' como tipo de acoso se caracteriza por:", "opciones": ["Solicitar favores sexuales a cambio de beneficios o de evitar perjuicios", "Crear solo un ambiente hostil sin pedidos directos", "No involucrar relaciones de poder", "Ser ajeno al ambito laboral"], "correcta": 0, "expl": "El chantaje sexual implica favores a cambio de beneficios o de no sufrir perjuicios, desde una posicion de poder (Acoso sexual).", "id": "8-23", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Factores psicosociales", "q": "Cual de los siguientes es un factor psicosocial del listado?", "opciones": ["Estilos de mando", "Robo en el lugar de trabajo", "Acoso sexual", "Burnout"], "correcta": 0, "expl": "Estilos de mando es un factor psicosocial; los otros son riesgos o hechos (Factores psicosociales).", "id": "8-24", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Factores psicosociales", "q": "Por que las relaciones interpersonales se citan como ejemplo de factor?", "opciones": ["Porque pueden ser un factor protector para la salud", "Porque siempre danan la salud", "Porque son un riesgo psicosocial", "Porque estan legalmente reguladas"], "correcta": 0, "expl": "Las relaciones interpersonales pueden ser protectoras y favorecer el bienestar (Factores psicosociales).", "id": "8-25", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Marco normativo", "q": "Que convenios de OIT ratifico la Ley 15.965 (1988)?", "opciones": ["148, 155 y 161", "187, 155 y 161", "98, 87 y 100", "29, 105 y 138"], "correcta": 0, "expl": "La Ley 15.965 ratifico los Convenios 148, 155 y 161 (Marco normativo).", "id": "8-26", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Marco normativo", "q": "El Decreto 291/007 reglamenta el Convenio:", "opciones": ["155 de OIT", "187 de OIT", "161 de OIT", "148 de OIT"], "correcta": 0, "expl": "El Decreto 291/007 reglamenta el Convenio 155 de OIT (Marco normativo).", "id": "8-27", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Marco normativo", "q": "El organismo de contralor en la materia es:", "opciones": ["El Ministerio de Trabajo y Seguridad Social", "El BPS", "La OIT", "El Ministerio de Salud Publica"], "correcta": 0, "expl": "El contralor es el MTSS, que fiscaliza via la Inspeccion General del Trabajo (Marco normativo).", "id": "8-28", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Normativa y areas de BPS", "q": "Que articulo del Estatuto del Funcionario de BPS refiere a higiene, salubridad y seguridad?", "opciones": ["Art. 34", "Art. 50", "Art. 7", "Art. 2"], "correcta": 0, "expl": "El Art. 34 refiere a higiene, salubridad y seguridad; el Art. 50, a la proteccion del funcionario (Normativa BPS).", "id": "8-29", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Normativa y areas de BPS", "q": "De que gerencia depende la seccion Salud Ocupacional en BPS?", "opciones": ["De la Gerencia de Prestaciones de Salud", "De la Gerencia de Asuntos Laborales", "De Gestion Humana directamente", "Del Centro de Estudios"], "correcta": 0, "expl": "Salud Ocupacional depende de la Gerencia de Prestaciones de Salud; Asuntos Laborales es de Gestion Humana (Areas).", "id": "8-30", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Programas y protocolos de BPS", "q": "Desde que ano cuenta BPS con el Plan de Salud y Seguridad Laboral?", "opciones": ["2007", "2014", "2018", "2019"], "correcta": 0, "expl": "El Plan de Salud y Seguridad Laboral existe desde 2007 (Programas).", "id": "8-31", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Programas y protocolos de BPS", "q": "El Protocolo de actuacion frente a violencia desde usuarios hacia trabajadores rige desde:", "opciones": ["2019", "2007", "2014", "2018"], "correcta": 0, "expl": "El protocolo de violencia desde usuarios es de 2019; el de acoso/discriminacion, de 2018 (Programas).", "id": "8-32", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}, {"subtema": "Programas y protocolos de BPS", "q": "Con que organizacion sindical se promueven ambitos bipartitos en BPS?", "opciones": ["ATSS (Asociacion de Trabajadores de la Seguridad Social)", "PIT-CNT exclusivamente", "OIT", "MTSS"], "correcta": 0, "expl": "Se promueven ambitos bipartitos con la ATSS (Programas).", "id": "8-33", "tema_id": 8, "tema_nombre": "Salud en el trabajo: factores y riesgos psicosociales"}], "autoeval": [{"q": "Explica la diferencia entre riesgos y factores psicosociales.", "a": "Los riesgos psicosociales son hechos, situaciones o estados de la organizacion con alta probabilidad de danar la salud de forma importante (Moreno y Baez, 2010). Los factores psicosociales son condiciones presentes en la organizacion, ligadas a la situacion de cada persona; pueden representar un riesgo pero no tienen carga necesariamente negativa e incluso pueden ser protectores (Factores psicosociales)."}, {"q": "Por que se considera que el estres es el principal riesgo psicosocial?", "a": "Porque, segun Moreno y Baez, actua como respuesta general ante los demas riesgos. Es un proceso adaptativo natural que solo bajo ciertas condiciones se vuelve negativo, deteriorando el funcionamiento y la salud fisica y mental (El estres)."}, {"q": "Describi los tres tipos de violencia laboral.", "a": "1) Actos de personas ajenas a la organizacion (ej. un robo); 2) actos de clientes o usuarios (en general por reclamos de servicios); 3) actos de personas de la propia organizacion (companeros, supervisores). La violencia laboral (OIT, 2003) puede ser fisica o psicologica (Violencia)."}, {"q": "Que caracteriza al acoso sexual en el marco normativo uruguayo?", "a": "Es una forma de violencia y un tipo de acoso laboral, tratado de manera independiente. En Uruguay es el unico riesgo psicosocial con cobertura legal, contemplado en el Art. 2 de la Ley 18.561. Tiene dos tipos: chantaje sexual (quid pro quo desde una posicion de poder) y ambiente hostil (Acoso sexual)."}, {"q": "Enumera el marco normativo nacional e internacional de la salud y seguridad en el trabajo en Uruguay.", "a": "Constitucion (arts. 7, 44, 53 y 54); Ley 15.965 (1988) que ratifica los Convenios OIT 148, 155 y 161; Decreto 291/007 que reglamenta el Convenio 155; y normas internacionales (DUDH 1948, Pacto de San Jose 1969, Pacto de San Salvador 1988, Declaracion Sociolaboral del Mercosur 1998, entre otras). Contralor: MTSS via Inspeccion General del Trabajo (Marco normativo)."}, {"q": "Que areas y programas implementa BPS en materia de salud y seguridad?", "a": "Areas: Asuntos Laborales (Gestion Humana) y Salud Ocupacional (Gerencia de Prestaciones de Salud). Programas y protocolos: Plan de Salud y Seguridad Laboral (2007), Programa de salud mental y condiciones psicosociales (2014), Protocolo de acoso o discriminacion (2018) y Protocolo de violencia desde usuarios (2019), con ambitos bipartitos junto a ATSS (Areas; Programas)."}, {"q": "Que es la salud ocupacional y que la diferencia de un enfoque puramente individual?", "a": "Es una actividad multidisciplinaria de promocion y proteccion de la salud de los trabajadores mediante prevencion y control de enfermedades y accidentes (OMS, 1995). A diferencia del enfoque previo (que veia el deterioro como problema individual), el concepto de CYMAT considera el contexto organizacional, fisico, tecnologico y relacional (Salud y salud ocupacional; CYMAT)."}, {"q": "Explica el concepto de corresponsabilidad en la cultura de seguridad y salud.", "a": "Implica que organizaciones, empleadores y trabajadores comparten el cuidado de la salud y seguridad: las organizaciones tienen la responsabilidad principal y los trabajadores un papel crucial (seguir politicas, formarse, comunicar inquietudes y cuidar su salud fisica y emocional), en linea con el Convenio 187 de OIT (Corresponsabilidad)."}], "huecos": ["El documento es conceptual/tecnico (no una norma articulada), por lo que las citas se hacen por seccion/concepto y no articulo por articulo, salvo las referencias legales explicitas (Ley 18.561 art. 2; Estatuto BPS arts. 34 y 50; Constitucion arts. 7, 44, 53 y 54).", "El material lista 'inseguridad laboral', 'burnout', 'incivismo', 'conflicto familia-trabajo' y 'trabajo emocional' como riesgos pero no desarrolla una definicion propia extensa de cada uno (salvo mencion de que el burnout es desgaste profesional); no se inventaron definiciones adicionales.", "No se transcribio integramente el contenido del anexo del Protocolo de 2018 (practicas/conductas consideradas acoso) porque el PDF solo lo menciona, no lo detalla.", "El PDF se obtuvo completo via web_fetch (paginas 5 a 21); no hubo truncamiento relevante. Algunos artefactos de codificacion del encabezado se ignoraron por ser ruido de extraccion."]}, {"id": 9, "tema": "Seguridad de la Información", "fuente_pagina": "https://www.bps.gub.uy/24269/", "fuente_pdf": "https://www.bps.gub.uy/bps/file/24269/1/seguridad-de-la-informacion.pdf", "fuente_nombre": "Seguridad de la Información (BPS, Centro de Estudios en Seguridad Social, Salud y Administración, edición 2026)", "ficha": "Material de estudio del BPS que explica qué es la seguridad de la información, sus tres pilares (confidencialidad, integridad y disponibilidad), las amenazas y vulnerabilidades, el resguardo de la información, el Sistema de Gestión de la Seguridad de la Información (SGSI) con la metodología PHVA, la clasificación de la información y las políticas institucionales de seguridad. Su alcance es conceptual y aplicado a la realidad del BPS, alineado con la norma UNIT-ISO/IEC 27002 y la normativa uruguaya vigente.", "eli5": "Imaginá que la información del BPS es como el dinero de un banco. La seguridad de la información son todas las cosas que hacés para que ese tesoro esté a salvo: que solo lo vean quienes deben (confidencialidad), que nadie lo cambie a escondidas (integridad) y que esté disponible cuando hace falta usarlo (disponibilidad). Hay ladrones (amenazas) que buscan puertas mal cerradas (vulnerabilidades), así que el banco arma reglas, copias de respaldo y cajas fuertes (políticas, backups y cifrado) para protegerlo. Y cada empleado tiene la llave de su parte y debe cuidarla.", "esquema": ["1. Conceptos generales", "  - Datos vs. información (datos procesados y organizados)", "  - Tecnología de la Información (TI) y sistema de información", "  - Software y hardware", "  - Activos y activos de información", "2. Seguridad de la información: definición y medidas", "  - Conjunto de medidas preventivas y reactivas", "  - Tres pilares: confidencialidad, integridad, disponibilidad (CID)", "3. Pilares", "  - Confidencialidad (mínimos privilegios)", "  - Integridad (exacta y completa; solo modifican autorizados)", "  - Disponibilidad (acceso cuando se requiere; dos niveles en BPS)", "4. Amenazas y vulnerabilidades", "  - Amenaza, riesgo, incidente, impacto", "  - Origen: natural, humana, técnica", "  - Relación (interna/externa) e intención (premeditada/accidental)", "  - Flujo: amenaza -\u003e vulnerabilidad -\u003e activo -\u003e impacto", "  - Análisis de riesgo", "5. Resguardo de la información", "  - Medidas: control de acceso, respaldos, cifrado, herramientas, seguridad física, políticas, auditoría, capacitación", "  - Control de acceso (físico y lógico)", "  - Respaldos (backups)", "  - Cifrado (datos en reposo y en tránsito)", "6. Sistema de Gestión de la Seguridad de la Información (SGSI)", "  - Definición y objetivo", "  - Metodología PHVA (Planificar, Hacer, Verificar, Actuar)", "7. Clasificación de la información", "  - Ley 18.381 (acceso) y Ley 18.331 (datos personales)", "  - RD 12-1/2012 (Criterios de clasificación)", "  - Información pública / no pública (secreta, reservada, confidencial)", "  - Información secreta: tributario, funcionariado, estadístico, profesional", "8. Políticas de seguridad de la información", "  - Definición y beneficios", "  - Políticas en BPS (UNIT-ISO/IEC 27002)", "  - Política de Seguridad Corporativa (física y lógica)", "  - Responsabilidades y legislación vigente"], "datos_duros": ["La seguridad de la información se basa en TRES pilares: confidencialidad, integridad y disponibilidad (CID) (sección Seguridad de la información, pág. 6).", "Confidencialidad: se protege otorgando MÍNIMOS PRIVILEGIOS de acuerdo con la función y las tareas asignadas (Pilares, pág. 8).", "Integridad: la información debe ser exacta y completa; solo los agentes autorizados pueden modificarla (Pilares, pág. 8).", "Disponibilidad: BPS la protege en DOS niveles: tecnológico (sistema sin degradación) y de los usuarios (no usar recursos de forma irresponsable) (Pilares, pág. 9).", "Amenaza por ORIGEN: naturales, humanas o técnicas (Amenazas y vulnerabilidades, pág. 10).", "Amenaza por RELACIÓN: internas o externas; por INTENCIÓN: premeditada o accidental (pág. 10).", "Flujo del riesgo: la amenaza explota la VULNERABILIDAD, esta afecta el ACTIVO y provoca el IMPACTO (imagen pág. 11).", "Medidas de resguardo desarrolladas en la unidad: control de acceso, respaldos y cifrado (las tres primeras) (Resguardo, pág. 12).", "Control de acceso: físico (cerraduras, biométricos) y lógico (contraseñas y otros mecanismos); en BPS rige la política 'Control de acceso lógico' (pág. 12).", "Respaldos: deben almacenarse en DIFERENTES UBICACIONES; si la clasificación lo amerita, se deben CIFRAR (encriptar) (pág. 12).", "Cifrado: aplica un algoritmo matemático con una clave; se usa para datos en REPOSO (respaldos) y en TRÁNSITO (navegar en internet) (pág. 12-13).", "Metodología del SGSI: PHVA = Planificar, Hacer, Verificar, Actuar (cuatro etapas) (SGSI, pág. 14).", "Clasificación regulada por la Ley 18.381 (Acceso a la Información Pública, 17/10/2008) y la Ley 18.331 (Protección de Datos Personales, 11/08/2008) (Clasificación, pág. 15).", "Documento 'Criterios de clasificación de la información institucional' aprobado por la RD 12-1/2012 (pág. 15).", "La información no pública en BPS se clasifica como SECRETA, RESERVADA o CONFIDENCIAL. La secreta la define la LEY; la reservada/confidencial queda en la órbita de cada organismo (pág. 15-16).", "Tipos de secreto vinculados a BPS: tributario, del funcionariado, estadístico y profesional (Información secreta, pág. 16).", "Secreto tributario: Ley 14.306, art. 47; en BPS lo aplica ATYR (Asesoría Tributaria y Recaudación) (pág. 16).", "Los procedimientos disciplinarios en BPS son de carácter SECRETO (Reglamento de Procedimiento Administrativo, Decreto 500/991); su violación es FALTA GRAVE (pág. 16).", "Políticas de seguridad en BPS basadas en la norma UNIT-ISO/IEC 27002 (Políticas en BPS, pág. 18).", "La Política de Seguridad de la Información forma parte de la Política de Seguridad Corporativa: seguridad física (Gerencia de Administración) y lógica (Coordinación de Servicios Informáticos) (pág. 18).", "En setiembre de 2025 BPS aprobó la última versión de la Política General de la Seguridad de la Información (pág. 18).", "Todos los funcionarios, usuarios y empresas contratadas son RESPONSABLES del cumplimiento de la política; quienes la violen serán sancionados según la normativa vigente (pág. 19).", "Legislación citada: Ley 18.331 (Datos Personales); Ley 19.670 de Rendición de Cuentas (arts. 37-40 incorporan estándares del RGPD de la UE); Ley 20.327 de Ciberdelincuencia (25/09/2024); Decreto 66/025 de ciberseguridad (pág. 19-20)."], "teoria_resumida": "\u003cp\u003eLa \u003cstrong\u003eseguridad de la información\u003c/strong\u003e es el conjunto de \u003cstrong\u003emedidas preventivas y reactivas\u003c/strong\u003e de las organizaciones y de los sistemas tecnológicos que permiten \u003cstrong\u003eresguardar la información\u003c/strong\u003e. Una medida organizativa es contar con políticas (documentos); una medida tecnológica es un módulo de control de acceso (usuario y contraseña) (pág. 6).\u003c/p\u003e\u003cp\u003eAntes hay que distinguir \u003cstrong\u003edatos\u003c/strong\u003e (hechos, cifras o palabras sin procesar) de \u003cstrong\u003einformación\u003c/strong\u003e (datos procesados de forma sistemática que forman un mensaje coherente). Los \u003cstrong\u003eactivos\u003c/strong\u003e son todos los recursos con valor para la organización; los \u003cstrong\u003eactivos de información\u003c/strong\u003e son los datos, la información y los conocimientos relevantes, estén donde estén (pág. 5-6).\u003c/p\u003e\u003cp\u003eLa seguridad se basa en \u003cstrong\u003etres pilares (CID)\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eConfidencialidad:\u003c/strong\u003e que la información no se divulgue a quien no está autorizado; se protege con \u003cstrong\u003emínimos privilegios\u003c/strong\u003e según la función (pág. 8).\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eIntegridad:\u003c/strong\u003e que la información sea \u003cstrong\u003eexacta y completa\u003c/strong\u003e; solo los autorizados pueden crearla, modificarla o destruirla (pág. 8).\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eDisponibilidad:\u003c/strong\u003e poder acceder a la información cuando se requiere. BPS la cuida en \u003cstrong\u003edos niveles\u003c/strong\u003e: tecnológico (sistema sin degradación) y de los usuarios (uso responsable de los recursos) (pág. 9).\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eUna \u003cstrong\u003eamenaza\u003c/strong\u003e es la posibilidad de un evento con consecuencias negativas; el \u003cstrong\u003eriesgo\u003c/strong\u003e es el potencial de que se materialice; al materializarse genera un \u003cstrong\u003eincidente\u003c/strong\u003e con un \u003cstrong\u003eimpacto\u003c/strong\u003e. Las amenazas se clasifican por \u003cstrong\u003eorigen\u003c/strong\u003e (natural, humana, técnica), \u003cstrong\u003erelación\u003c/strong\u003e (interna/externa) e \u003cstrong\u003eintención\u003c/strong\u003e (premeditada/accidental). El daño surge cuando una amenaza \u003cstrong\u003eexplota una vulnerabilidad\u003c/strong\u003e (debilidad de un activo): amenaza \u0026rarr; vulnerabilidad \u0026rarr; activo \u0026rarr; impacto (pág. 10-11).\u003c/p\u003e\u003cp\u003eEl \u003cstrong\u003eresguardo de la información\u003c/strong\u003e incluye control de acceso, respaldos, cifrado, herramientas (antivirus, monitoreo), seguridad física, políticas, auditoría y capacitación. El \u003cstrong\u003econtrol de acceso\u003c/strong\u003e (físico o lógico) limita el acceso a agentes autorizados; los \u003cstrong\u003erespaldos\u003c/strong\u003e (backups) se guardan en distintas ubicaciones y se cifran si la clasificación lo amerita; el \u003cstrong\u003ecifrado\u003c/strong\u003e protege datos en reposo y en tránsito (pág. 12-13).\u003c/p\u003e\u003cp\u003eEl \u003cstrong\u003eSGSI\u003c/strong\u003e (Sistema de Gestión de la Seguridad de la Información) es un enfoque sistemático que evalúa riesgos y establece controles, aplicando la metodología \u003cstrong\u003ePHVA\u003c/strong\u003e: \u003cstrong\u003eP\u003c/strong\u003elanificar, \u003cstrong\u003eH\u003c/strong\u003eacer, \u003cstrong\u003eV\u003c/strong\u003eerificar, \u003cstrong\u003eA\u003c/strong\u003ectuar (pág. 13-14).\u003c/p\u003e\u003cp\u003eLa \u003cstrong\u003eclasificación de la información\u003c/strong\u003e surge de armonizar la Ley 18.381 (acceso a la información pública) y la Ley 18.331 (protección de datos personales), más el documento institucional aprobado por la \u003cstrong\u003eRD 12-1/2012\u003c/strong\u003e. La información del Estado es \u003cstrong\u003een principio pública\u003c/strong\u003e (principio de máxima publicación); la no pública se clasifica como \u003cstrong\u003esecreta, reservada o confidencial\u003c/strong\u003e. La secreta la define la ley (tributario, funcionariado, estadístico, profesional); la reservada/confidencial queda en cada organismo (pág. 15-16).\u003c/p\u003e\u003cp\u003eLas \u003cstrong\u003epolíticas de seguridad\u003c/strong\u003e del BPS se basan en la norma \u003cstrong\u003eUNIT-ISO/IEC 27002\u003c/strong\u003e. La Política de Seguridad de la Información integra la \u003cstrong\u003ePolítica de Seguridad Corporativa\u003c/strong\u003e (física y lógica). \u003cstrong\u003eTodos\u003c/strong\u003e los funcionarios, usuarios y empresas contratadas son responsables de cumplirla, y su violación se sanciona (pág. 18-19).\u003c/p\u003e", "teoria_exhaustiva": [{"ref": "Conceptos generales (pág. 5)", "titulo": "Datos vs. información", "cita": "La información es un conjunto organizado de datos procesados de forma sistemática, que constituye un mensaje coherente y comprensible.", "explicacion": "Los datos son hechos, cifras o palabras en bruto; al procesarlos con una intención se convierten en información, que genera conocimiento y permite decidir mejor.", "ejemplo": "Una lista de números de aportes (datos) procesada se transforma en el informe de aportes de un contribuyente (información)."}, {"ref": "Conceptos generales (pág. 5)", "titulo": "TI y sistema de información", "cita": "La información puede ser administrada y procesada por medios electrónicos, a esto se le denomina Tecnología de la Información (TI).", "explicacion": "La TI agiliza procesos. Requiere un sistema de información para recolectar, almacenar, manipular, procesar y distribuir la información, compuesto por software y/o hardware.", "ejemplo": "Software es el sistema operativo y las aplicaciones; hardware son los servidores, computadoras y pendrives."}, {"ref": "Conceptos generales (pág. 6)", "titulo": "Activos y activos de información", "cita": "Activos: todos los recursos que tienen valor para la organización y son necesarios para desempeñar las tareas.", "explicacion": "Activos incluye edilicios, equipos, humanos y datos. Los activos de información son específicamente los datos, la información y los conocimientos relevantes, estén donde estén.", "ejemplo": "Documentos en papel, bases de datos, software, hardware, procedimientos, planes de continuidad y personas."}, {"ref": "Seguridad de la información (pág. 6)", "titulo": "Definición y pilares", "cita": "La seguridad de la información es el conjunto de medidas preventivas y reactivas... que permiten resguardar la información.", "explicacion": "Combina medidas de la organización (políticas) y de los sistemas (control de acceso). Se basa en tres pilares: confidencialidad, integridad y disponibilidad.", "ejemplo": "Medida organizativa: una política escrita. Medida tecnológica: el módulo de usuario y contraseña."}, {"ref": "Pilares (pág. 8)", "titulo": "Confidencialidad", "cita": "Es la propiedad que indica el nivel de exposición que puede tener determinada información... que no sea divulgada a personas, entidades o procesos no autorizados.", "explicacion": "Se protege otorgando mínimos privilegios según la función. Al vulnerarse se produce una fuga de información (datos secretos, confidenciales o reservados).", "ejemplo": "Vicente conserva acceso a una base de datos que ya no necesita tras un ascenso: al no dar de baja el permiso se viola la confidencialidad."}, {"ref": "Pilares (pág. 8)", "titulo": "Integridad", "cita": "Es la propiedad de la información de ser exacta y completa, por lo tanto, confiable.", "explicacion": "Solo los agentes autorizados pueden modificar la información; no debe ser alterada por personas, sistemas o procesos no autorizados, ni accidental ni intencionadamente. Se protege evitando accesos no autorizados, usando canales válidos, respaldando y guardando el papel bajo llave.", "ejemplo": "Un funcionario con acceso privilegiado altera obligaciones de contribuyentes para generar beneficios indebidos: compromete la integridad."}, {"ref": "Pilares (pág. 9)", "titulo": "Disponibilidad", "cita": "Capacidad de acceder a la información o a otros recursos en el momento en que se requiere.", "explicacion": "BPS la protege en dos niveles: tecnológico (sistema sin degradación de acceso) y de los usuarios (uso responsable de los recursos para no enlentecer los sistemas).", "ejemplo": "Un contribuyente intenta obtener su historia laboral y el sistema devuelve un error: se afecta la disponibilidad. A nivel usuario: no descargar archivos personales ni enviar correos masivos."}, {"ref": "Amenazas y vulnerabilidades (pág. 10)", "titulo": "Amenaza, riesgo e incidente", "cita": "Una amenaza es la posibilidad de que ocurra un evento con consecuencias negativas.", "explicacion": "El riesgo es el potencial de que la amenaza se materialice y cause daños materiales o pérdidas inmateriales. Cuando se materializa, puede dar lugar a un incidente.", "ejemplo": "La posibilidad de un incendio es la amenaza; que efectivamente ocurra el incendio es el incidente."}, {"ref": "Amenazas y vulnerabilidades (pág. 10)", "titulo": "Clasificación de amenazas", "cita": "Por su origen pueden ser naturales, humanas o técnicas.", "explicacion": "Origen: naturales (inundaciones, incendios, tormentas), humanas (escuchas, borrado de archivos) o técnicas (defectos de software/hardware). Relación: internas o externas. Intención: premeditada o accidental.", "ejemplo": "Un empleado que borra archivos a propósito es una amenaza humana, interna y premeditada."}, {"ref": "Amenazas y vulnerabilidades (pág. 10-11)", "titulo": "Vulnerabilidad y flujo del riesgo", "cita": "Una vulnerabilidad representa la facilidad con la cual un activo puede ser dañado.", "explicacion": "Por sí sola no causa daño; el daño surge cuando una amenaza la explota. El flujo es: amenaza -\u003e explota vulnerabilidad -\u003e afecta activo -\u003e provoca impacto. El análisis de riesgo identifica y gestiona estos escenarios.", "ejemplo": "Incendio (amenaza) + personal sin saber usar extintores e información sin respaldo (vulnerabilidades) -\u003e pérdida de equipos e información (impacto)."}, {"ref": "Resguardo (pág. 12)", "titulo": "Medidas de resguardo", "cita": "Conjunto de medidas preventivas y reactivas adoptadas para proteger el almacenamiento, procesamiento y transformación de la información.", "explicacion": "Conserva los tres pilares y la continuidad. Incluye control de acceso, respaldos, cifrado, herramientas (antivirus, monitoreo), seguridad física, políticas, auditoría y capacitación.", "ejemplo": "Previene la pérdida, el hurto, la modificación o la divulgación no autorizada."}, {"ref": "Resguardo (pág. 12)", "titulo": "Control de acceso", "cita": "Garantiza que solamente van a poder acceder a los activos aquellos agentes que fueron debidamente autorizados.", "explicacion": "Puede ser físico (cerraduras, biométricos) o lógico (contraseñas y otros mecanismos). Incide sobre los tres pilares. En BPS rige la política 'Control de acceso lógico'.", "ejemplo": "Un sistema biométrico para entrar a la sala de servidores (físico); usuario y contraseña para una aplicación (lógico)."}, {"ref": "Resguardo (pág. 12)", "titulo": "Respaldos (backups)", "cita": "Su objetivo es garantizar la recuperación efectiva e íntegra de la información en tiempo y forma.", "explicacion": "Preservan integridad, disponibilidad y continuidad. Deben almacenarse en diferentes ubicaciones para reducir el riesgo de pérdida; si la clasificación lo amerita, se cifran.", "ejemplo": "Guardar una copia de la base de datos en otra sede para que un incendio no destruya el único ejemplar."}, {"ref": "Resguardo (pág. 12-13)", "titulo": "Cifrado", "cita": "Aplicación de un algoritmo matemático a un mensaje o texto utilizando una clave, de tal forma que el resultado es ilegible para todos los que no la conocen.", "explicacion": "Protege confidencialidad e integridad. Se usa para datos en reposo (respaldos) y en tránsito (navegar en internet).", "ejemplo": "Encriptar un respaldo para que, si alguien lo roba, no pueda leerlo sin la clave."}, {"ref": "SGSI (pág. 13)", "titulo": "Sistema de Gestión de la Seguridad de la Información", "cita": "Enfoque sistemático que tiene como finalidad evaluar los riesgos y establecer medidas de control adecuadas.", "explicacion": "Su objetivo es garantizar la protección y preservación de la integridad y confidencialidad de los datos y de los sistemas que los procesan. Todas las personas de la organización deben conocer esta planificación.", "ejemplo": "Definir protocolos y procedimientos de tratamiento de la información que todo el personal debe seguir."}, {"ref": "SGSI (pág. 14)", "titulo": "Metodología PHVA", "cita": "El SGSI aplica la metodología PHVA, la cual se compone de cuatro etapas.", "explicacion": "Planificar (analizar riesgos y definir políticas), Hacer (implementar y seguir el plan), Verificar (comparar resultados obtenidos con esperados) y Actuar (medidas correctivas y preventivas). Es un ciclo de mejora continua.", "ejemplo": "Tras verificar que hubo fugas de datos (Verificar), se ajustan los permisos (Actuar) y se reinicia el ciclo."}, {"ref": "Clasificación (pág. 15)", "titulo": "Marco normativo y RD 12-1/2012", "cita": "Surge el documento Criterios de clasificación de la información institucional, aprobado por la RD 12-1/2012.", "explicacion": "Armoniza la Ley 18.381 (acceso a la información pública) y la Ley 18.331 (protección de datos personales). El Directorio definió qué información clasificar como reservada, secreta y confidencial en cada sector.", "ejemplo": "El acceso a la información pública es un derecho humano y solo puede limitarse por ley y en función del interés general."}, {"ref": "Clasificación - Información pública (pág. 15)", "titulo": "Principio de máxima publicación", "cita": "La información generada o que se encuentre en posesión de BPS... es pública, salvo las excepciones.", "explicacion": "La información del Estado es en principio pública y puede solicitarse sin justificar las razones. La no pública se clasifica como secreta, reservada o confidencial.", "ejemplo": "Un ciudadano puede pedir información pública del BPS sin explicar para qué la quiere."}, {"ref": "Clasificación - Información secreta (pág. 16)", "titulo": "Tipos de secreto en BPS", "cita": "Secreto tributario, secreto que debe guardar el funcionariado público, secreto estadístico, secreto profesional.", "explicacion": "La información secreta está definida por la ley. La reservada o confidencial queda en la órbita de cada organismo.", "ejemplo": "El secreto tributario (Ley 14.306, art. 47) lo aplica BPS a través de ATYR."}, {"ref": "Clasificación - Información secreta (pág. 16)", "titulo": "Secreto tributario", "cita": "Es aquel que debe guardar la Administración Tributaria en relación con todas las actuaciones administrativas o judiciales (Ley 14.306, art. 47).", "explicacion": "La información obtenida solo debe usarse para investigar, fiscalizar y recaudar, no para fines ajenos. Puede levantarse, por ejemplo, con autorización expresa del titular.", "ejemplo": "ATYR accede a datos de la esfera íntima del contribuyente y solo puede usarlos para el fin recaudatorio."}, {"ref": "Clasificación - Información secreta (pág. 16)", "titulo": "Secreto del funcionariado", "cita": "Todos los procedimientos disciplinarios son de carácter secreto.", "explicacion": "El Reglamento de Procedimiento Administrativo (Decreto 500/991) obliga a guardar secreto sobre hechos y documentos conocidos en el ejercicio de las tareas. La violación es falta grave.", "ejemplo": "Un funcionario que difunde el contenido de un sumario disciplinario comete una falta grave."}, {"ref": "Políticas (pág. 17)", "titulo": "Definición y beneficios", "cita": "Orientaciones o directrices que rigen la actuación de una persona o entidad en un asunto o campo determinado (DRAE).", "explicacion": "Muestran el posicionamiento de la organización y sirven de base para procedimientos. Beneficios: aumentan la seguridad, mejoran la planificación, permiten mejora continua, aumentan involucramiento y conocimiento, y mejoran el cumplimiento de leyes.", "ejemplo": "Tener clasificados los activos permite priorizar la protección de los más críticos."}, {"ref": "Políticas en BPS (pág. 18)", "titulo": "UNIT-ISO/IEC 27002 y Política Corporativa", "cita": "Documentos basados en lo que indica la norma UNIT-ISO/IEC 27002.", "explicacion": "La Política de Seguridad de la Información integra la Política de Seguridad Corporativa, que cubre seguridad física (Gerencia de Administración) y lógica (Coordinación de Servicios Informáticos). En setiembre de 2025 se aprobó la última versión de la Política General.", "ejemplo": "La seguridad se consigue implantando un conjunto adecuado de controles (políticas, procedimientos, software, infraestructura)."}, {"ref": "Políticas en BPS (pág. 19)", "titulo": "Responsabilidades del funcionario y legislación", "cita": "Todos los funcionarios, usuarios y empresas contratadas... son responsables del cumplimiento de esta política.", "explicacion": "Quienes violen la política serán sancionados según la normativa vigente. Se debe conocer la legislación de protección de datos.", "ejemplo": "Leyes vinculadas: 18.331 (datos personales), 19.670 (RGPD en arts. 37-40), 20.327 (ciberdelincuencia) y Decreto 66/025 (ciberseguridad)."}], "flashcards": [{"front": "¿Qué es la seguridad de la información?", "back": "El conjunto de medidas preventivas y reactivas de las organizaciones y de los sistemas tecnológicos que permiten resguardar la información (pág. 6).", "id": "9-0"}, {"front": "¿Cuáles son los tres pilares de la seguridad de la información (CID)?", "back": "Confidencialidad, Integridad y Disponibilidad (pág. 6).", "id": "9-1"}, {"front": "¿Qué es la confidencialidad?", "back": "La propiedad que indica el nivel de exposición de la información; busca que no sea divulgada a personas, entidades o procesos no autorizados (pág. 8).", "id": "9-2"}, {"front": "¿Cómo se protege la confidencialidad?", "back": "Otorgando mínimos privilegios (permisos) de acuerdo con la función y las tareas asignadas (pág. 8).", "id": "9-3"}, {"front": "¿Qué es la integridad?", "back": "La propiedad de la información de ser exacta y completa, por lo tanto confiable; solo los agentes autorizados pueden modificarla (pág. 8).", "id": "9-4"}, {"front": "¿Qué es la disponibilidad?", "back": "La capacidad de acceder a la información o recursos en el momento en que se requiere, sin importar ubicación ni método (pág. 9).", "id": "9-5"}, {"front": "¿En qué dos niveles protege BPS la disponibilidad?", "back": "A nivel tecnológico (sistema sin degradación de acceso) y a nivel de los usuarios (uso responsable de los recursos) (pág. 9).", "id": "9-6"}, {"front": "Diferencia entre datos e información", "back": "Los datos son hechos, cifras o palabras en bruto; la información son datos procesados y organizados de forma sistemática que forman un mensaje coherente (pág. 5).", "id": "9-7"}, {"front": "¿Qué es un activo de información?", "back": "Los datos, la información y los conocimientos relevantes para la organización, estén donde estén (documentos, bases de datos, software, personas, etc.) (pág. 6).", "id": "9-8"}, {"front": "¿Qué es una amenaza?", "back": "La posibilidad de que ocurra un evento con consecuencias negativas (pág. 10).", "id": "9-9"}, {"front": "¿Qué es una vulnerabilidad?", "back": "La facilidad con la cual un activo puede ser dañado; por sí sola no causa daño, el daño surge cuando una amenaza la explota (pág. 10).", "id": "9-10"}, {"front": "¿Cuál es el flujo del riesgo?", "back": "La amenaza explota la vulnerabilidad, esta afecta el activo y provoca el impacto (pág. 11).", "id": "9-11"}, {"front": "¿Cómo se clasifican las amenazas por su origen?", "back": "Naturales, humanas y técnicas (pág. 10).", "id": "9-12"}, {"front": "¿Cómo se clasifican las amenazas por relación e intención?", "back": "Por relación: internas o externas. Por intención: premeditadas o accidentales (pág. 10).", "id": "9-13"}, {"front": "¿Qué es un incidente?", "back": "La materialización de una amenaza; cuando la amenaza se concreta y genera consecuencias (pág. 10).", "id": "9-14"}, {"front": "¿Qué tres medidas de resguardo desarrolla la unidad?", "back": "Control de acceso, respaldos (backups) y cifrado (pág. 12).", "id": "9-15"}, {"front": "¿Qué es el control de acceso y qué tipos hay?", "back": "Garantiza que solo accedan agentes autorizados; puede ser físico (cerraduras, biométricos) o lógico (contraseñas) (pág. 12).", "id": "9-16"}, {"front": "¿Dónde deben almacenarse los respaldos y cuándo se cifran?", "back": "En diferentes ubicaciones para disminuir el riesgo de pérdida; se cifran si la clasificación de la información lo amerita (pág. 12).", "id": "9-17"}, {"front": "¿Para qué sirve el cifrado y a qué datos se aplica?", "back": "Protege confidencialidad e integridad; se aplica a datos en reposo (respaldos) y en tránsito (navegar en internet) (pág. 12-13).", "id": "9-18"}, {"front": "¿Qué es el SGSI?", "back": "El Sistema de Gestión de la Seguridad de la Información: enfoque sistemático para evaluar riesgos y establecer medidas de control (pág. 13).", "id": "9-19"}, {"front": "¿Qué significa PHVA y cuáles son sus etapas?", "back": "Planificar, Hacer, Verificar y Actuar: la metodología de cuatro etapas que aplica el SGSI (pág. 14).", "id": "9-20"}, {"front": "¿Qué dos leyes regulan la clasificación de la información en BPS?", "back": "La Ley 18.381 (Acceso a la Información Pública) y la Ley 18.331 (Protección de Datos Personales) (pág. 15).", "id": "9-21"}, {"front": "¿Qué establece la Ley 18.331?", "back": "Es la Ley de Protección de Datos Personales del 11/08/2008; limita la publicación de información que comprometa datos personales (pág. 15 y 19).", "id": "9-22"}, {"front": "¿Qué documento clasifica la información en BPS y por qué resolución?", "back": "Los 'Criterios de clasificación de la información institucional', aprobados por la RD 12-1/2012 (pág. 15).", "id": "9-23"}, {"front": "¿Cómo se clasifica la información no pública en BPS?", "back": "Como secreta, reservada o confidencial. La secreta la define la ley; la reservada/confidencial queda en la órbita de cada organismo (pág. 15-16).", "id": "9-24"}, {"front": "¿Cuáles son los tipos de secreto vinculados a BPS?", "back": "Secreto tributario, del funcionariado, estadístico y profesional (pág. 16).", "id": "9-25"}, {"front": "¿Qué es el secreto tributario y quién lo aplica en BPS?", "back": "El que guarda la Administración Tributaria sobre sus actuaciones (Ley 14.306, art. 47); en BPS lo aplica ATYR (pág. 16).", "id": "9-26"}, {"front": "¿Qué carácter tienen los procedimientos disciplinarios en BPS?", "back": "Son secretos (Reglamento de Procedimiento Administrativo, Decreto 500/991); divulgarlos es falta grave (pág. 16).", "id": "9-27"}, {"front": "¿En qué norma se basan las políticas de seguridad del BPS?", "back": "En la norma UNIT-ISO/IEC 27002 (pág. 18).", "id": "9-28"}, {"front": "¿De qué política forma parte la Política de Seguridad de la Información?", "back": "De la Política de Seguridad Corporativa, que cubre seguridad física (Gerencia de Administración) y lógica (Coordinación de Servicios Informáticos) (pág. 18).", "id": "9-29"}, {"front": "¿Quiénes son responsables del cumplimiento de la política de seguridad?", "back": "Todos los funcionarios, usuarios y empresas contratadas relacionadas con el manejo de la información; su violación se sanciona (pág. 19).", "id": "9-30"}, {"front": "¿Qué buenas prácticas a nivel usuario cuidan la disponibilidad?", "back": "No descargar archivos para beneficio personal, no enviar correos personales masivos y no ver videos ajenos a la función (pág. 9).", "id": "9-31"}, {"front": "¿Qué leyes y decreto recientes cita el material en materia de datos y ciberseguridad?", "back": "Ley 19.670 (estándares RGPD, arts. 37-40), Ley 20.327 de Ciberdelincuencia (2024) y Decreto 66/025 de ciberseguridad (pág. 19-20).", "id": "9-32"}], "practica": [{"subtema": "Definición y conceptos generales", "q": "¿Cómo define el material a la seguridad de la información?", "opciones": ["Solo el uso de antivirus en las computadoras", "El conjunto de medidas preventivas y reactivas de las organizaciones y de los sistemas tecnológicos que permiten resguardar la información", "La obligación de cambiar la contraseña cada mes", "Un software que cifra los respaldos"], "correcta": 1, "expl": "Es el conjunto de medidas preventivas y reactivas que permiten resguardar la información (pág. 6).", "id": "9-0", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Definición y conceptos generales", "q": "¿Qué diferencia a los datos de la información?", "opciones": ["No hay diferencia, son sinónimos", "Los datos son siempre numéricos y la información siempre textual", "La información son datos procesados y organizados de forma sistemática que forman un mensaje coherente", "Los datos solo existen en papel"], "correcta": 2, "expl": "La información es un conjunto organizado de datos procesados sistemáticamente (pág. 5).", "id": "9-1", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Definición y conceptos generales", "q": "¿Cuál de los siguientes es un ejemplo de activo de información?", "opciones": ["El edificio de la oficina", "Las bases de datos y los documentos", "El presupuesto anual", "El estacionamiento"], "correcta": 1, "expl": "Los activos de información son datos, información y conocimientos: documentos, bases de datos, software, personas, etc. (pág. 6).", "id": "9-2", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Definición y conceptos generales", "q": "¿Qué es el hardware según el material?", "opciones": ["El componente lógico que se aloja en el hardware", "La parte física de los dispositivos (servidores, computadoras, pendrives)", "Una red de comunicación", "Un plan de continuidad"], "correcta": 1, "expl": "Hardware es la parte física de los dispositivos; el software es el componente lógico (pág. 5, notas).", "id": "9-3", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Pilares (CID)", "q": "¿Cuáles son los tres pilares de la seguridad de la información?", "opciones": ["Confidencialidad, integridad y disponibilidad", "Privacidad, respaldo y antivirus", "Autenticación, autorización y auditoría", "Hardware, software y redes"], "correcta": 0, "expl": "Los tres pilares son confidencialidad, integridad y disponibilidad (pág. 6).", "id": "9-4", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Pilares (CID)", "q": "¿Cómo se protege principalmente la confidencialidad?", "opciones": ["Haciendo respaldos diarios", "Cifrando todos los correos", "Otorgando mínimos privilegios según la función y las tareas", "Apagando los servidores de noche"], "correcta": 2, "expl": "Se protege otorgando mínimos privilegios de acuerdo con la función y las tareas asignadas (pág. 8).", "id": "9-5", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Pilares (CID)", "q": "La propiedad de la información de ser exacta y completa, y por lo tanto confiable, es la:", "opciones": ["Disponibilidad", "Confidencialidad", "Integridad", "Trazabilidad"], "correcta": 2, "expl": "La integridad es la propiedad de la información de ser exacta y completa (pág. 8).", "id": "9-6", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Pilares (CID)", "q": "Vicente conserva el acceso a una base de datos que ya no necesita tras un ascenso. ¿Qué principio se viola al no dar de baja el permiso?", "opciones": ["La disponibilidad", "La confidencialidad", "La integridad", "La continuidad"], "correcta": 1, "expl": "Al no dar de baja los permisos de acceso se viola el principio de confidencialidad (pág. 8).", "id": "9-7", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Pilares (CID)", "q": "Un contribuyente intenta obtener su historia laboral y el sistema le devuelve un error pidiéndole reintentar. ¿Qué pilar se ve afectado?", "opciones": ["La confidencialidad", "La integridad", "La disponibilidad", "El secreto tributario"], "correcta": 2, "expl": "Cuando el sistema no responde y la información no está accesible, se afecta la disponibilidad (pág. 9).", "id": "9-8", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Pilares (CID)", "q": "¿En qué dos niveles protege BPS la disponibilidad de la información?", "opciones": ["Nivel físico y nivel jurídico", "Nivel tecnológico y nivel de los usuarios", "Nivel interno y nivel externo", "Nivel preventivo y nivel reactivo"], "correcta": 1, "expl": "BPS la protege a nivel tecnológico (sistema sin degradación) y a nivel de los usuarios (uso responsable) (pág. 9).", "id": "9-9", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Pilares (CID)", "q": "Un funcionario con acceso privilegiado altera intencionalmente las obligaciones de algunos contribuyentes. ¿Qué pilar compromete?", "opciones": ["La disponibilidad", "La integridad", "La confidencialidad", "La trazabilidad"], "correcta": 1, "expl": "La manipulación no autorizada de datos compromete la integridad de la información (pág. 9).", "id": "9-10", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Amenazas y vulnerabilidades", "q": "¿Qué es una amenaza?", "opciones": ["La facilidad con que un activo puede ser dañado", "La posibilidad de que ocurra un evento con consecuencias negativas", "La materialización de un daño", "El impacto sobre la organización"], "correcta": 1, "expl": "Una amenaza es la posibilidad de que ocurra un evento con consecuencias negativas (pág. 10).", "id": "9-11", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Amenazas y vulnerabilidades", "q": "¿Qué es una vulnerabilidad?", "opciones": ["Un evento con consecuencias negativas", "La probabilidad de que ocurra un incidente", "La facilidad con la cual un activo puede ser dañado", "El impacto económico de un ataque"], "correcta": 2, "expl": "La vulnerabilidad es la facilidad con la cual un activo puede ser dañado; el daño surge cuando una amenaza la explota (pág. 10).", "id": "9-12", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Amenazas y vulnerabilidades", "q": "¿Cuál es el orden correcto del flujo del riesgo?", "opciones": ["Activo -\u003e amenaza -\u003e vulnerabilidad -\u003e impacto", "Amenaza -\u003e vulnerabilidad -\u003e activo -\u003e impacto", "Vulnerabilidad -\u003e amenaza -\u003e impacto -\u003e activo", "Impacto -\u003e activo -\u003e amenaza -\u003e vulnerabilidad"], "correcta": 1, "expl": "La amenaza explota la vulnerabilidad, esta afecta el activo y provoca el impacto (pág. 11).", "id": "9-13", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Amenazas y vulnerabilidades", "q": "Según su origen, las amenazas se clasifican en:", "opciones": ["Internas y externas", "Premeditadas y accidentales", "Naturales, humanas y técnicas", "Físicas y lógicas"], "correcta": 2, "expl": "Por su origen pueden ser naturales, humanas o técnicas (pág. 10).", "id": "9-14", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Amenazas y vulnerabilidades", "q": "Un empleado que borra archivos a propósito constituye una amenaza:", "opciones": ["Natural y externa", "Humana, interna y premeditada", "Técnica y accidental", "Natural y accidental"], "correcta": 1, "expl": "Es humana (acción de persona), interna (integra la organización) y premeditada (intencional) (pág. 10).", "id": "9-15", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Amenazas y vulnerabilidades", "q": "En el ejemplo del incendio, ¿qué representa la falta de respaldo de la información?", "opciones": ["La amenaza", "El impacto", "Una vulnerabilidad", "El incidente"], "correcta": 2, "expl": "Que la información no estuviera respaldada es una vulnerabilidad explotada por la amenaza del incendio (pág. 11).", "id": "9-16", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Resguardo de la información", "q": "¿Cuál de estas NO es una medida de resguardo mencionada en el material?", "opciones": ["Control de acceso", "Respaldos (backups)", "Cifrado de datos", "Eliminación de todas las contraseñas"], "correcta": 3, "expl": "Las medidas incluyen control de acceso, respaldos, cifrado, antivirus, seguridad física, etc.; eliminar contraseñas no es una medida (pág. 12).", "id": "9-17", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Resguardo de la información", "q": "¿Qué tipos de control de acceso existen?", "opciones": ["Preventivo y reactivo", "Físico y lógico", "Interno y externo", "Manual y automático"], "correcta": 1, "expl": "El control de acceso puede ser físico (cerraduras, biométricos) o lógico (contraseñas) (pág. 12).", "id": "9-18", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Resguardo de la información", "q": "Sobre los respaldos, el material indica que deben:", "opciones": ["Guardarse todos en el mismo servidor", "Almacenarse en diferentes ubicaciones y cifrarse si la clasificación lo amerita", "Realizarse una vez al año", "Eliminarse después de 24 horas"], "correcta": 1, "expl": "Deben almacenarse en diferentes ubicaciones para disminuir el riesgo de pérdida y cifrarse según la clasificación (pág. 12).", "id": "9-19", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Resguardo de la información", "q": "El cifrado protege la información y se aplica a datos:", "opciones": ["Solo en papel", "En reposo (respaldos) y en tránsito (navegar en internet)", "Solo cuando se imprimen", "Únicamente en horario laboral"], "correcta": 1, "expl": "El cifrado se usa para datos en reposo (respaldos) y en tránsito (internet) (pág. 12-13).", "id": "9-20", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Resguardo de la información", "q": "¿Sobre qué pilares incide directamente el control de acceso?", "opciones": ["Solo sobre la confidencialidad", "Sobre confidencialidad, integridad y disponibilidad", "Solo sobre la disponibilidad", "Sobre ninguno"], "correcta": 1, "expl": "El control de acceso incide directamente sobre los tres pilares (pág. 12).", "id": "9-21", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "SGSI y PHVA", "q": "¿Qué es el SGSI?", "opciones": ["Un antivirus institucional", "Un enfoque sistemático para evaluar riesgos y establecer medidas de control", "Una contraseña corporativa", "Un tipo de respaldo"], "correcta": 1, "expl": "El SGSI es un enfoque sistemático que evalúa riesgos y establece medidas de control (pág. 13).", "id": "9-22", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "SGSI y PHVA", "q": "Las cuatro etapas de la metodología PHVA son:", "opciones": ["Prevenir, Hacer, Validar, Auditar", "Planificar, Hacer, Verificar, Actuar", "Proteger, Habilitar, Vigilar, Archivar", "Programar, Habilitar, Verificar, Aprobar"], "correcta": 1, "expl": "PHVA = Planificar, Hacer, Verificar, Actuar (pág. 14).", "id": "9-23", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "SGSI y PHVA", "q": "En la metodología PHVA, comparar los resultados obtenidos con los esperados corresponde a la etapa:", "opciones": ["Planificar", "Hacer", "Verificar", "Actuar"], "correcta": 2, "expl": "Verificar consiste en comparar los resultados obtenidos con los esperados, analizando desviaciones (pág. 14).", "id": "9-24", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "SGSI y PHVA", "q": "Poner en práctica medidas correctivas y preventivas que reduzcan las desviaciones detectadas corresponde a:", "opciones": ["Planificar", "Hacer", "Verificar", "Actuar"], "correcta": 3, "expl": "Actuar es aplicar medidas correctivas y preventivas que eliminen o reduzcan las desviaciones (pág. 14).", "id": "9-25", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Clasificación de la información", "q": "¿Qué dos leyes se armonizan para clasificar la información en BPS?", "opciones": ["Ley 18.331 y Ley 18.381", "Ley 14.306 y Decreto 500/991", "Ley 19.670 y Ley 20.327", "Ley 18.331 y Decreto 66/025"], "correcta": 0, "expl": "Se armonizan la Ley 18.381 (acceso) y la Ley 18.331 (datos personales) (pág. 15).", "id": "9-26", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Clasificación de la información", "q": "¿Por qué resolución se aprobó el documento 'Criterios de clasificación de la información institucional'?", "opciones": ["Por la RD 12-1/2012", "Por el Decreto 500/991", "Por la Ley 18.331", "Por la norma UNIT-ISO/IEC 27002"], "correcta": 0, "expl": "Fue aprobado por la RD 12-1/2012 (pág. 15).", "id": "9-27", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Clasificación de la información", "q": "La información no pública del BPS se clasifica como:", "opciones": ["Urgente, normal o baja", "Secreta, reservada o confidencial", "Interna o externa", "Crítica o no crítica"], "correcta": 1, "expl": "La información no pública se clasifica como secreta, reservada o confidencial (pág. 15-16).", "id": "9-28", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Clasificación de la información", "q": "¿Quién define la información secreta y quién la reservada o confidencial?", "opciones": ["Ambas las define cada organismo", "Ambas las define la ley", "La secreta la define la ley; la reservada/confidencial cada organismo", "La secreta cada organismo; la reservada la ley"], "correcta": 2, "expl": "La secreta está definida por la ley; la reservada o confidencial queda en la órbita de cada organismo (pág. 15-16).", "id": "9-29", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Clasificación de la información", "q": "El derecho de acceso a la información pública se puede ejercer:", "opciones": ["Solo presentando un motivo válido", "Sin necesidad de justificar las razones de la solicitud", "Solo por funcionarios del BPS", "Únicamente con orden judicial"], "correcta": 1, "expl": "Puede ejercerse sin necesidad de justificar las razones por las cuales se solicita (pág. 15).", "id": "9-30", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Información secreta", "q": "¿En qué ley y artículo se basa el secreto tributario?", "opciones": ["Ley 18.331, art. 1", "Ley 14.306, art. 47", "Decreto 500/991, art. 12", "Ley 20.327, art. 5"], "correcta": 1, "expl": "El secreto tributario se basa en la Ley 14.306, art. 47 (pág. 16).", "id": "9-31", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Información secreta", "q": "¿A través de qué área aplica BPS el secreto tributario?", "opciones": ["La Coordinación de Servicios Informáticos", "ATYR (Asesoría Tributaria y Recaudación)", "La Gerencia de Administración", "El Directorio"], "correcta": 1, "expl": "BPS está regido por el secreto tributario a través de ATYR (pág. 16).", "id": "9-32", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Información secreta", "q": "Según el material, ¿qué carácter tienen los procedimientos disciplinarios en BPS?", "opciones": ["Públicos", "Reservados", "Secretos, y su divulgación es falta grave", "Confidenciales pero divulgables"], "correcta": 2, "expl": "Son de carácter secreto (Decreto 500/991) y su violación es falta grave (pág. 16).", "id": "9-33", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Políticas de seguridad", "q": "¿En qué norma internacional se basan las políticas de seguridad del BPS?", "opciones": ["ISO 9001", "UNIT-ISO/IEC 27002", "RGPD", "ISO 14001"], "correcta": 1, "expl": "Las políticas del BPS se basan en la norma UNIT-ISO/IEC 27002 (pág. 18).", "id": "9-34", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Políticas de seguridad", "q": "La Política de Seguridad de la Información forma parte de:", "opciones": ["La Ley 18.331", "La Política de Seguridad Corporativa", "El SGSI exclusivamente", "El Reglamento de Procedimiento Administrativo"], "correcta": 1, "expl": "Forma parte de la Política de Seguridad Corporativa, que cubre seguridad física y lógica (pág. 18).", "id": "9-35", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Políticas de seguridad", "q": "¿Quién tiene a cargo la seguridad lógica en BPS?", "opciones": ["La Gerencia de Administración", "La Coordinación de Servicios Informáticos", "ATYR", "El Centro de Estudios"], "correcta": 1, "expl": "La seguridad lógica está a cargo de la Coordinación de Servicios Informáticos; la física, de la Gerencia de Administración (pág. 18).", "id": "9-36", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Responsabilidades del funcionario", "q": "¿Quiénes son responsables del cumplimiento de la política de seguridad de la información?", "opciones": ["Solo el personal informático", "Solo el Directorio", "Todos los funcionarios, usuarios y empresas contratadas relacionadas con el manejo de la información", "Solo las empresas contratadas"], "correcta": 2, "expl": "Todos los funcionarios, usuarios y empresas contratadas son responsables; su violación se sanciona (pág. 19).", "id": "9-37", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Responsabilidades del funcionario", "q": "¿Cuál de estas es una buena práctica del usuario para cuidar la disponibilidad?", "opciones": ["Enviar correos personales de forma masiva", "Ver videos ajenos a la función", "No descargar archivos de internet para beneficio personal", "Descargar películas en horario laboral"], "correcta": 2, "expl": "No descargar archivos para beneficio personal evita enlentecer los sistemas y cuida la disponibilidad (pág. 9).", "id": "9-38", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Legislación de datos personales", "q": "¿Qué ley uruguaya regula la protección de datos personales?", "opciones": ["La Ley 18.381", "La Ley 18.331", "La Ley 14.306", "La Ley 20.327"], "correcta": 1, "expl": "La Ley 18.331, del 11/08/2008, es la de Protección de Datos Personales (pág. 15 y 19).", "id": "9-39", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Legislación de datos personales", "q": "¿Qué ley uruguaya tipifica delitos como el acceso indebido a sistemas y la suplantación de identidad?", "opciones": ["La Ley 18.331", "La Ley 19.670", "La Ley 20.327 de Prevención y Represión de la Ciberdelincuencia", "El Decreto 500/991"], "correcta": 2, "expl": "La Ley 20.327 (2024) tipifica acceso indebido, daño informático, estafa digital y suplantación de identidad (pág. 19-20).", "id": "9-40", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}, {"subtema": "Legislación de datos personales", "q": "Los artículos 37 a 40 de la Ley 19.670 incorporan estándares de:", "opciones": ["La norma ISO 27002", "El Reglamento General de Protección de Datos (RGPD) de la Unión Europea", "El Decreto 66/025", "La Ley 14.306"], "correcta": 1, "expl": "Incorporan estándares del RGPD de la UE, como la aplicación extraterritorial y reportar vulneraciones (pág. 19).", "id": "9-41", "tema_id": 9, "tema_nombre": "Seguridad de la Información"}], "autoeval": [{"q": "Definí seguridad de la información y dá un ejemplo de medida organizativa y otra tecnológica.", "a": "Es el conjunto de medidas preventivas y reactivas de las organizaciones y los sistemas que permiten resguardar la información. Medida organizativa: contar con políticas (documentos). Medida tecnológica: un módulo de control de acceso con usuario y contraseña (pág. 6)."}, {"q": "Explicá los tres pilares de la seguridad de la información.", "a": "Confidencialidad: que la información no se divulgue a personas no autorizadas (mínimos privilegios). Integridad: que sea exacta y completa, modificable solo por autorizados. Disponibilidad: poder acceder a ella cuando se requiere (pág. 8-9)."}, {"q": "¿En qué dos niveles protege BPS la disponibilidad y qué hace cada uno?", "a": "Tecnológico: el sistema informático se mantiene sin degradación de acceso para los agentes autorizados. De los usuarios: usar los recursos de forma responsable (no descargas personales, no correos masivos, no videos ajenos) para no enlentecer los sistemas (pág. 9)."}, {"q": "Diferenciá amenaza, vulnerabilidad, riesgo, incidente e impacto con el ejemplo del incendio.", "a": "Amenaza: posibilidad de que ocurra el incendio. Vulnerabilidad: personal no capacitado en extintores e información sin respaldo. Riesgo: probabilidad de que el incendio dañe los activos. Incidente: el incendio efectivamente ocurrido. Impacto: pérdida de equipos e información e interrupción de actividades (pág. 11)."}, {"q": "¿Cómo se clasifican las amenazas? Mencioná las tres dimensiones.", "a": "Por origen (naturales, humanas, técnicas), por relación (internas o externas) y por intención (premeditadas o accidentales) (pág. 10)."}, {"q": "Enumerá las medidas de resguardo de la información y describí las tres que desarrolla la unidad.", "a": "Control de acceso, respaldos, cifrado, herramientas (antivirus, monitoreo), seguridad física, políticas, auditoría y capacitación. Control de acceso: limita el acceso a agentes autorizados (físico o lógico). Respaldos: copias en distintas ubicaciones, cifradas si la clasificación lo amerita. Cifrado: vuelve ilegible la información con un algoritmo y una clave, para datos en reposo y en tránsito (pág. 12-13)."}, {"q": "¿Qué es el SGSI y cuáles son las etapas de la metodología PHVA?", "a": "El SGSI es un enfoque sistemático para evaluar riesgos y establecer controles. PHVA: Planificar (analizar riesgos y definir políticas), Hacer (implementar el plan), Verificar (comparar resultados con esperados) y Actuar (medidas correctivas y preventivas) (pág. 13-14)."}, {"q": "¿Cómo se clasifica la información en BPS y quién define cada categoría?", "a": "La información es en principio pública (principio de máxima publicación). La no pública se clasifica como secreta, reservada o confidencial. La secreta la define la ley; la reservada/confidencial queda en la órbita de cada organismo (RD 12-1/2012) (pág. 15-16)."}, {"q": "Explicá el secreto tributario y el secreto del funcionariado en BPS.", "a": "Secreto tributario (Ley 14.306, art. 47): lo guarda la Administración Tributaria sobre sus actuaciones; en BPS lo aplica ATYR y los datos solo se usan para investigar, fiscalizar y recaudar. Secreto del funcionariado: los procedimientos disciplinarios son secretos (Decreto 500/991) y divulgarlos es falta grave (pág. 16)."}, {"q": "¿En qué norma se basan las políticas del BPS y cuáles son las responsabilid
