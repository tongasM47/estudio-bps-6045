": "Un hecho que, al ocurrir, genera a la persona una necesidad económica, ya sea por reducción de ingresos (vejez, enfermedad) o aumento de gastos (nacimiento) (pág. 16).", "id": "4-10"}, {"front": "¿Cómo se clasifican las prestaciones?", "back": "Por financiamiento (contributivas / no contributivas), por forma (dinero, especie, servicios) y por duración (largo plazo / corto plazo) (pág. 18).", "id": "4-11"}, {"front": "¿Cuáles son los tres niveles de la escalera de protección social de la OIT?", "back": "1) Piso de garantías básicas para todas las personas; 2) prestaciones contributivas; 3) prestaciones voluntarias reguladas por el Estado (pág. 21).", "id": "4-12"}, {"front": "¿Cuál fue la primera prestación universal y no contributiva de América Latina?", "back": "La Pensión por vejez de Uruguay, aprobada en 1919 (Ley 6.874), para mayores de 65 años en indigencia (pág. 24 y 30).", "id": "4-13"}, {"front": "¿Por qué el Día del Trabajador del BPS es el 28 de mayo?", "back": "Porque el 28 de mayo de 1896 se aprobó el proyecto de ley Ciganda-Palomeque que creó la primera caja de financiamiento tripartito de América (Caja Escolar) (pág. 27).", "id": "4-14"}, {"front": "¿Qué dos leyes son los pilares del sistema previsional uruguayo?", "back": "La ley Ciganda (Caja Escolar, 1896) y la ley Carnelli (Ley 6.962, 1919, Caja de servicios públicos) (pág. 31).", "id": "4-15"}, {"front": "¿Qué artículo de la Constitución crea el BPS y con qué carácter?", "back": "El artículo 195 de la Constitución de 1967, que crea el BPS con carácter de Ente Autónomo (pág. 33).", "id": "4-16"}, {"front": "Según el art. 195, ¿cuál es el cometido del BPS?", "back": "Coordinar los servicios estatales de previsión social y organizar la seguridad social, ajustándose a las normas que establezca la ley (pág. 33).", "id": "4-17"}, {"front": "¿Qué significa que el BPS sea un Ente Autónomo?", "back": "Que tiene el mayor grado de autonomía e independencia técnica y administrativa frente al gobierno central, dando cumplimiento al objetivo de independencia de la institución (pág. 34).", "id": "4-18"}, {"front": "¿Cuáles fueron los tres elementos básicos del diseño del BPS?", "back": "Organización bancaria de los servicios, carácter autónomo de la institución e integración del Directorio con participación de los actores involucrados (pág. 34).", "id": "4-19"}, {"front": "¿Cómo se integra el Directorio del BPS según la Constitución?", "back": "Siete miembros: cuatro designados por el Poder Ejecutivo (uno lo preside), uno electo por afiliados activos, uno por afiliados pasivos y uno por las empresas contribuyentes (pág. 34).", "id": "4-20"}, {"front": "¿En qué año se eligieron por primera vez por votación directa las representaciones sociales del Directorio?", "back": "En 2006 (en 1992 se integró por primera vez con siete representantes, designados por el Poder Ejecutivo) (pág. 34).", "id": "4-21"}, {"front": "¿Qué pasó con el BPS durante la dictadura?", "back": "El Acto Institucional 9 (1979) lo sustituyó por la Dirección General de Seguridad Social (DGSS) (pág. 35).", "id": "4-22"}, {"front": "¿Qué ley reinstitucionalizó el BPS y en qué año?", "back": "La Ley 15.800, en 1985, que a la vez suprimió la DGSS (pág. 36).", "id": "4-23"}, {"front": "¿Qué período abarca el plan estratégico vigente del BPS?", "back": "El período 2025-2030 (el BPS planifica estratégicamente desde 2006) (pág. 42).", "id": "4-24"}, {"front": "¿Cuál es la misión del BPS?", "back": "Garantizar el acceso a los derechos y el cumplimiento de las obligaciones de seguridad social, administrando los recursos eficientemente y brindando atención oportuna y satisfactoria al usuario (pág. 42).", "id": "4-25"}, {"front": "¿Cuál es la visión del BPS?", "back": "Ser un Instituto cercano y de gestión transparente, que acompañe a las personas en todas las etapas de su vida, con un equipo humano comprometido, profesional y orientado a la mejora continua (pág. 43).", "id": "4-26"}, {"front": "Nombrá al menos cinco valores del BPS.", "back": "Responsabilidad social, Transparencia, Acceso universal y equitativo, Calidad de atención, Participación, Solidaridad, Articulación interinstitucional, Mejora continua e innovación, Compromiso con la gestión humana (pág. 43-44).", "id": "4-27"}, {"front": "¿Cuántos lineamientos estratégicos define el BPS?", "back": "Ocho lineamientos estratégicos, con objetivos asociados (pág. 44-45).", "id": "4-28"}, {"front": "¿Cómo está integrado el Directorio según el organigrama actual de funciones?", "back": "Órgano colegiado de siete miembros: cuatro por designación del Poder Ejecutivo y tres por elección de la ciudadanía (pág. 46).", "id": "4-29"}, {"front": "¿Cuál es la función de la Gerencia General y Subgerencia General?", "back": "Llevar adelante las políticas definidas por el Directorio, coordinando las acciones para cumplir los planes estratégicos y operativos (pág. 46).", "id": "4-30"}, {"front": "¿Qué hace la Dirección Técnica de Prestaciones?", "back": "Brinda las prestaciones económicas, sociales y de salud para cubrir las contingencias de vejez, invalidez y sobrevivencia (pág. 47).", "id": "4-31"}, {"front": "¿Qué significa ATYR y cuál es su función?", "back": "Asesoría Tributaria y Recaudación: asegura la recaudación y fiscalización de las obligaciones de los contribuyentes, lleva la historia laboral y distribuye los aportes personales (pág. 47).", "id": "4-32"}, {"front": "¿Qué función cumple la Asesoría General en Seguridad Social?", "back": "Analiza la información estadística y actuarial para contribuir a la sostenibilidad del sistema y asesora al Directorio sobre resultados y proyecciones (pág. 46).", "id": "4-33"}, {"front": "¿De qué se ocupan las Unidades Descentralizadas?", "back": "Gestionan y supervisan los servicios del BPS en todo el país (agencias y sucursales del interior), con modelos de atención adaptados a las realidades locales (pág. 47).", "id": "4-34"}, {"front": "¿Qué centro gestiona el área de Prestaciones de Salud?", "back": "El Centro de Referencia Nacional de Defectos Congénitos y Enfermedades Raras (Crenadecer) (pág. 48).", "id": "4-35"}, {"front": "¿Qué quedó fuera de la órbita del BPS al crearse?", "back": "Las cajas paraestatales (Bancaria, Notarial y de Profesionales Universitarios) y los Servicios de Retiro y Pensiones Militar y Policial (pág. 33).", "id": "4-36"}, {"front": "¿Qué son las cajas paraestatales jurídicamente?", "back": "Personas públicas no estatales: organizaciones de interés público, sin fines de lucro, creadas por ley, regidas por derecho privado, fuera de la estructura del Estado pero controladas por él (pág. 40).", "id": "4-37"}], "practica": [{"subtema": "Concepto de protección y seguridad social", "q": "Según la OIT, la seguridad social busca compensar principalmente:", "opciones": ["La falta o reducción de ingresos por contingencias como enfermedad, vejez o desempleo", "Únicamente los gastos de salud privada", "Solo las pérdidas patrimoniales de las empresas", "Exclusivamente los daños por catástrofes naturales"], "correcta": 0, "expl": "La definición de la OIT habla de compensar la falta o reducción de ingresos por enfermedad, maternidad, accidentes, desempleo, invalidez, vejez y muerte del sostén de familia (pág. 6).", "id": "4-0", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Concepto de protección y seguridad social", "q": "¿Cuál de estas afirmaciones describe mejor la protección social?", "opciones": ["Es sinónimo exacto de seguridad social", "Es un concepto más amplio que incluye acciones públicas y privadas, contributivas y no contributivas", "Solo abarca prestaciones contributivas", "Solo se aplica a quienes tienen empleo formal"], "correcta": 1, "expl": "La protección social es amplia: incluye toda acción pública y privada, dirigida a toda la población aporte o no (pág. 7).", "id": "4-1", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Concepto de protección y seguridad social", "q": "Las prestaciones no contributivas también se conocen como:", "opciones": ["Prestaciones bancarias", "Prestaciones asistenciales", "Prestaciones tributarias", "Prestaciones voluntarias"], "correcta": 1, "expl": "Las no contributivas no requieren aportes previos y se conocen como prestaciones asistenciales (pág. 18).", "id": "4-2", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Funciones y principios", "q": "¿Cuál NO es una de las funciones principales de los sistemas de seguridad social?", "opciones": ["Sustituir los ingresos", "Garantizar pisos mínimos de bienestar", "Maximizar la ganancia de las aseguradoras privadas", "Redistribuir la riqueza"], "correcta": 2, "expl": "Las funciones son: pisos mínimos de bienestar, sustituir ingresos, inserción/reinserción y redistribución de la riqueza (pág. 8).", "id": "4-3", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Funciones y principios", "q": "El principio considerado fundador de la seguridad social es:", "opciones": ["La obligatoriedad", "La unidad", "La solidaridad", "La equidad"], "correcta": 2, "expl": "La solidaridad es el principio fundador; cada quien aporta según su capacidad y recibe según su necesidad (pág. 13).", "id": "4-4", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Funciones y principios", "q": "La universalidad objetiva se refiere a:", "opciones": ["Las personas que ampara el sistema", "Las contingencias o riesgos que se cubren", "El financiamiento del sistema", "Los órganos de dirección"], "correcta": 1, "expl": "La objetiva está referida a los riesgos/contingencias cubiertas; la subjetiva, a las personas amparadas (pág. 13).", "id": "4-5", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Funciones y principios", "q": "Según Américo Plá Rodríguez, la triple función de los principios es:", "opciones": ["Informadora, integradora e interpretativa", "Legislativa, ejecutiva y judicial", "Recaudadora, fiscalizadora y prestacional", "Económica, social y cultural"], "correcta": 0, "expl": "Plá Rodríguez (1957) señala las funciones informadora, integradora e interpretativa (pág. 12).", "id": "4-6", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Evolución histórica del término", "q": "El primer país en crear un programa de seguro social fue:", "opciones": ["Estados Unidos", "Inglaterra", "Alemania", "Uruguay"], "correcta": 2, "expl": "Alemania, impulsado por Bismarck con tres leyes en la década de 1880 (pág. 9-10).", "id": "4-7", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Evolución histórica del término", "q": "El Informe Beveridge fue presentado en:", "opciones": ["1919", "1935", "1942", "1952"], "correcta": 2, "expl": "William Beveridge presentó su plan en 1942, en Inglaterra (pág. 9).", "id": "4-8", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Evolución histórica del término", "q": "El Convenio 102 de la OIT (1952) es relevante porque:", "opciones": ["Prohíbe las prestaciones no contributivas", "Establece estándares mínimos y define las ramas de la seguridad social", "Crea el BPS", "Elimina el financiamiento tripartito"], "correcta": 1, "expl": "Fija estándares mínimos de protección y define las 9 ramas, permitiendo a cada Estado adaptarlo (pág. 17).", "id": "4-9", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Conceptos fundamentales", "q": "Una jubilación es una prestación de:", "opciones": ["Corto plazo y en especie", "Largo plazo y en dinero", "Corto plazo y en servicios", "Largo plazo y en especie"], "correcta": 1, "expl": "Las jubilaciones son prestaciones de largo plazo, pagadas en dinero (pág. 18).", "id": "4-10", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Conceptos fundamentales", "q": "El nacimiento de un hijo, como contingencia, se caracteriza por:", "opciones": ["Reducir los ingresos de la persona", "Aumentar los gastos cotidianos", "No tener efecto económico", "Eliminar la necesidad de prestaciones"], "correcta": 1, "expl": "Hay contingencias que reducen ingresos (vejez) y otras que aumentan gastos, como el nacimiento (pág. 16).", "id": "4-11", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Piso de protección social", "q": "En la escalera de protección social de la OIT, el primer nivel (piso) consiste en:", "opciones": ["Prestaciones contributivas", "Prestaciones voluntarias privadas", "Garantías básicas para todas las personas", "Solo asistencia médica de pago"], "correcta": 2, "expl": "El primer nivel es un conjunto de garantías básicas para todas las personas (pág. 21).", "id": "4-12", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Protección social en Uruguay", "q": "La primera prestación universal y no contributiva de América Latina fue:", "opciones": ["La Caja Bancaria", "La Pensión por vejez de 1919 en Uruguay", "El Social Security Act", "La Caja Notarial"], "correcta": 1, "expl": "La Pensión por vejez de 1919 (Ley 6.874) en Uruguay fue la primera de ese tipo en la región (pág. 24 y 30).", "id": "4-13", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Protección social en Uruguay", "q": "La Caja Escolar de Jubilaciones y Pensiones (1896) se destaca por:", "opciones": ["Ser la primera caja de financiamiento tripartito de América", "Ser una caja privada", "No tener fondo propio", "Ser administrada por el BPS"], "correcta": 0, "expl": "Fue la primera caja de administración y financiamiento tripartito de América (ley Ciganda) (pág. 27).", "id": "4-14", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Protección social en Uruguay", "q": "Las dos leyes consideradas pilares del sistema previsional uruguayo son:", "opciones": ["Ley 15.800 y Ley 16.713", "Ley Ciganda (1896) y ley Carnelli (1919)", "Ley 20.130 y la LUC", "Acto Institucional 9 y Ley 11.034"], "correcta": 1, "expl": "La ley Ciganda y la ley Carnelli son los pilares que dieron lugar al sistema previsional (pág. 31).", "id": "4-15", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Creación y naturaleza jurídica del BPS", "q": "El BPS fue creado por:", "opciones": ["La Ley 15.800 de 1985", "El artículo 195 de la Constitución de 1967", "El Convenio 102 de la OIT", "El Acto Institucional 9 de 1979"], "correcta": 1, "expl": "El art. 195 de la Constitución que rige desde 1967 crea el BPS (pág. 33).", "id": "4-16", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Creación y naturaleza jurídica del BPS", "q": "El carácter jurídico del BPS es:", "opciones": ["Persona pública no estatal", "Empresa privada", "Ente Autónomo", "Servicio descentralizado del Ministerio del Interior"], "correcta": 2, "expl": "El art. 195 lo crea con carácter de Ente Autónomo (pág. 33).", "id": "4-17", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Creación y naturaleza jurídica del BPS", "q": "Según el art. 195, el cometido del BPS es:", "opciones": ["Recaudar impuestos generales del Estado", "Coordinar los servicios estatales de previsión social y organizar la seguridad social", "Administrar las cajas paraestatales", "Dirigir el sistema de salud privado"], "correcta": 1, "expl": "El art. 195 establece ese cometido (pág. 33).", "id": "4-18", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Creación y naturaleza jurídica del BPS", "q": "¿Cuál de estos quedó FUERA de la órbita del BPS al crearse?", "opciones": ["La Pensión a la vejez", "La Caja Notarial", "La Caja Civil", "La Caja Escolar"], "correcta": 1, "expl": "Quedaron fuera las cajas paraestatales (Bancaria, Notarial, Profesionales) y los servicios militar y policial (pág. 33).", "id": "4-19", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Creación y naturaleza jurídica del BPS", "q": "Los tres elementos básicos del diseño del BPS fueron:", "opciones": ["Privatización, descentralización y tercerización", "Organización bancaria, carácter autónomo y Directorio con participación social", "Reparto, capitalización y AFAP", "Impuestos, primas y donaciones"], "correcta": 1, "expl": "Esos son los tres elementos básicos descritos (pág. 34).", "id": "4-20", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Etapas del BPS", "q": "Durante la dictadura, el BPS fue sustituido por:", "opciones": ["El Ministerio de Trabajo", "La Dirección General de Seguridad Social (DGSS)", "ASSE", "La Caja de Industria y Comercio"], "correcta": 1, "expl": "El Acto Institucional 9 (1979) sustituyó al BPS por la DGSS (pág. 35).", "id": "4-21", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Etapas del BPS", "q": "El BPS fue reinstitucionalizado por la:", "opciones": ["Ley 15.800 (1985)", "Ley 16.713 (1996)", "Ley 6.874 (1919)", "Ley 20.130 (2023)"], "correcta": 0, "expl": "La Ley 15.800 (1985) reinstitucionalizó el BPS y suprimió la DGSS (pág. 36).", "id": "4-22", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Directorio e integración", "q": "El Directorio del BPS se integra con:", "opciones": ["Cinco miembros, todos del Poder Ejecutivo", "Siete miembros: cuatro del Poder Ejecutivo y tres electos por la ciudadanía", "Tres miembros electos por los trabajadores", "Nueve miembros designados por el Parlamento"], "correcta": 1, "expl": "Siete miembros: cuatro del Poder Ejecutivo (uno preside) y tres electos (activos, pasivos y empresas) (pág. 34 y 46).", "id": "4-23", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Directorio e integración", "q": "Según la Constitución, ¿quién elige al representante de los afiliados pasivos en el Directorio?", "opciones": ["El Poder Ejecutivo", "Los afiliados pasivos (jubilados y pensionistas)", "Las empresas contribuyentes", "El Parlamento"], "correcta": 1, "expl": "Un miembro es electo por los afiliados pasivos (pág. 34).", "id": "4-24", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Directorio e integración", "q": "Las representaciones sociales del Directorio se eligieron por votación directa por primera vez en:", "opciones": ["1967", "1985", "1992", "2006"], "correcta": 3, "expl": "En 2006 se cumplió cabalmente la disposición y se eligieron por votación directa (pág. 34).", "id": "4-25", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Plan estratégico: misión, visión, valores", "q": "El plan estratégico vigente del BPS abarca el período:", "opciones": ["2020-2025", "2025-2030", "2015-2020", "2023-2028"], "correcta": 1, "expl": "El Plan vigente abarca el período 2025-2030 (pág. 42).", "id": "4-26", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Plan estratégico: misión, visión, valores", "q": "'Ser un Instituto cercano y de gestión transparente, que acompañe a las personas en todas las etapas de su vida...' corresponde a:", "opciones": ["La misión", "La visión", "Un valor", "Un lineamiento estratégico"], "correcta": 1, "expl": "Es el texto de la visión del BPS (pág. 43).", "id": "4-27", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Plan estratégico: misión, visión, valores", "q": "¿Cuál de los siguientes es un valor del BPS?", "opciones": ["Maximización de utilidades", "Transparencia", "Confidencialidad absoluta de la gestión", "Centralización total"], "correcta": 1, "expl": "La transparencia es uno de los nueve valores del BPS (pág. 43).", "id": "4-28", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Plan estratégico: misión, visión, valores", "q": "¿Cuántos lineamientos estratégicos establece el BPS?", "opciones": ["Cuatro", "Seis", "Ocho", "Diez"], "correcta": 2, "expl": "Se establecen ocho lineamientos estratégicos con objetivos asociados (pág. 44-45).", "id": "4-29", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Estructura organizativa", "q": "La función de la Gerencia General es:", "opciones": ["Definir las políticas del organismo", "Llevar adelante las políticas definidas por el Directorio", "Elegir a los directores", "Fiscalizar a los contribuyentes"], "correcta": 1, "expl": "Ejecuta las políticas del Directorio coordinando planes estratégicos y operativos (pág. 46).", "id": "4-30", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Estructura organizativa", "q": "¿Qué área se encarga de la recaudación, la fiscalización y la historia laboral?", "opciones": ["Dirección Técnica de Prestaciones", "Dirección Técnica de ATYR", "Asesoría Legal General", "Auditoría Interna"], "correcta": 1, "expl": "ATYR (Asesoría Tributaria y Recaudación) recauda, fiscaliza, lleva la historia laboral y distribuye aportes (pág. 47).", "id": "4-31", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Estructura organizativa", "q": "La Dirección Técnica de Prestaciones cubre principalmente las contingencias de:", "opciones": ["Desempleo e informalidad", "Vejez, invalidez y sobrevivencia", "Evasión tributaria", "Inversiones financieras"], "correcta": 1, "expl": "Brinda prestaciones económicas, sociales y de salud para vejez, invalidez y sobrevivencia (pág. 47).", "id": "4-32", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Estructura organizativa", "q": "El análisis estadístico y actuarial para la sostenibilidad del sistema corresponde a:", "opciones": ["La Asesoría General en Seguridad Social", "La Coordinación de Servicios Informáticos", "Gestión Humana", "Finanzas"], "correcta": 0, "expl": "La Asesoría General en Seguridad Social analiza información estadística y actuarial y asesora al Directorio (pág. 46).", "id": "4-33", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Estructura organizativa", "q": "El Centro de Referencia Nacional de Defectos Congénitos y Enfermedades Raras (Crenadecer) es gestionado por:", "opciones": ["Prestaciones Sociales", "Prestaciones de Salud", "ATYR", "Unidades Descentralizadas"], "correcta": 1, "expl": "El área de Prestaciones de Salud garantiza la gestión de Crenadecer (pág. 48).", "id": "4-34", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}, {"subtema": "Estructura organizativa", "q": "Las agencias y sucursales del interior del país dependen de:", "opciones": ["Unidades Descentralizadas", "Asesoría Legal General", "Secretaría General de Directorio", "Auditoría Interna"], "correcta": 0, "expl": "Las Unidades Descentralizadas gestionan y supervisan los servicios del BPS en todo el país (pág. 47).", "id": "4-35", "tema_id": 4, "tema_nombre": "Protección Social, misión, visión y organización del BPS"}], "autoeval": [{"q": "Explicá la diferencia entre seguridad social y protección social.", "a": "La seguridad social es el conjunto de medidas públicas que compensan la falta o reducción de ingresos por contingencias (enfermedad, vejez, desempleo, etc.). La protección social es un concepto más amplio que la engloba: incluye toda acción pública y privada destinada a proteger a las personas, contributiva y no contributiva, dirigida a toda la población aporte o no, e incluye la asistencia social (pág. 6-7)."}, {"q": "¿Cuál es la naturaleza jurídica del BPS y en qué norma se funda?", "a": "El BPS es un Ente Autónomo, creado por el artículo 195 de la Constitución que rige desde 1967, con el cometido de coordinar los servicios estatales de previsión social y organizar la seguridad social. Su condición de ente autónomo le otorga el mayor grado de autonomía e independencia técnica y administrativa (pág. 33-34)."}, {"q": "Describí la integración del Directorio del BPS.", "a": "Es un órgano colegiado de siete miembros: cuatro designados por el Poder Ejecutivo (uno lo preside), uno electo por los afiliados activos, uno por los afiliados pasivos y uno por las empresas contribuyentes. Esta composición plasma el principio de administración democrática; en 2006 se eligieron por primera vez por votación directa las representaciones sociales (pág. 34 y 46)."}, {"q": "Enunciá la misión y la visión del BPS.", "a": "Misión: garantizar el acceso a los derechos de las personas y el cumplimiento de las obligaciones de seguridad social, administrando los recursos eficientemente y brindando atención oportuna y satisfactoria al usuario, en el marco de la Constitución y la Ley. Visión: ser un Instituto cercano y de gestión transparente, que acompañe a las personas en todas las etapas de su vida, con un equipo humano comprometido, profesional y orientado a la mejora continua (pág. 42-43)."}, {"q": "¿Qué función cumple la Dirección Técnica de ATYR y qué significa la sigla?", "a": "ATYR significa Asesoría Tributaria y Recaudación. Es el área a cargo de asegurar la recaudación y la fiscalización de las obligaciones de los contribuyentes, llevar el registro de la historia laboral y distribuir los aportes personales (pág. 47)."}, {"q": "¿Qué hace la Dirección Técnica de Prestaciones y qué áreas operan en su ámbito?", "a": "Brinda las prestaciones económicas, sociales y de salud destinadas a cubrir las contingencias derivadas de vejez, invalidez y sobrevivencia. En su ámbito operan áreas como Prestaciones de Salud (incluido Crenadecer), Prestaciones Económicas y Prestaciones Sociales (pág. 47-48)."}, {"q": "Mencioná tres valores del BPS y explicá uno.", "a": "Tres valores: Transparencia, Solidaridad y Participación. La transparencia implica actuar con integridad, imparcialidad y autonomía técnica en la gestión de los recursos públicos para asegurar la igualdad de trato según la normativa vigente (pág. 43-44)."}, {"q": "Relatá brevemente las etapas del BPS desde su creación.", "a": "Primera etapa (1967): definición de cometidos y estructura como ente autónomo. Segunda etapa: intervención durante la dictadura, sustituido por la DGSS mediante el Acto Institucional 9 (1979). Tercera etapa: reinstitucionalización por la Ley 15.800 (1985) y posteriores reformas (Ley 16.713 de 1996, Ley 20.130 de 2023) (pág. 34-38)."}, {"q": "¿Por qué se considera que el BPS tiene una organización 'bancaria' y qué órganos ejecutan las políticas?", "a": "Por la idea del legislador (Demicheli) de aplicar la mentalidad y métodos del sector financiero para sanear la administración de los beneficios sociales. Las políticas las define el Directorio y las ejecutan la Gerencia General y la Subgerencia General, coordinando las direcciones técnicas y áreas (pág. 34 y 46)."}, {"q": "¿Cuáles son los 10 principios de la seguridad social y cuál es el fundador?", "a": "Solidaridad, Igualdad, Universalidad, Suficiencia o integridad, Responsabilidad del Estado, Equidad, Obligatoriedad, Participación, Unidad y Respeto de los derechos adquiridos. El principio fundador es la solidaridad (pág. 12-13)."}], "huecos": ["El recuadro de la página 43 contiene el título 'Visión' inmediatamente antes del texto de la visión; el orden visual en el PDF ubica el texto de la visión al final de la página 43 dentro de la sección de valores, pero corresponde a la Visión (verificado por contexto).", "El organigrama (pág. 45) incluye una cadena de caracteres ilegibles producto de una fuente no extraíble; por contexto corresponde a un rótulo del organigrama (probablemente un área/dirección) que no pudo leerse con certeza.", "Los nombres de las personas que integran el Directorio actual (pág. 46) se transcriben del PDF (edición 2026) pero pueden quedar desactualizados; conviene verificarlos contra la web oficial vigente antes de un examen."]}, {"id": 5, "tema": "Reglamento de Licencias y Modificativas (BPS)", "fuente_pagina": "https://www.bps.gub.uy/24266/", "fuente_pdf": "https://www.bps.gub.uy/bps/file/24266/1/reglamento-de-licencias-y-modificativas.pdf", "fuente_nombre": "Reglamento de Licencias del BPS, aprobado por R.D. N° 34-2/2022 (12.10.2022) y modificativas R.D. N° 10-2/2024 (17.04.2024) y R.D. N° 14-5/2024 (22.05.2024)", "ficha": "Es la norma interna del Banco de Previsión Social que regula TODAS las licencias de sus funcionarios: tipos, duraciones, requisitos, plazos de solicitud y autorización, suspensión y disposiciones generales. Fue aprobado por R.D. N° 34-2/2022 (que sustituyó al de 2007) y luego modificado por las R.D. N° 10-2/2024 y N° 14-5/2024 en materia de maternidad, paternidad y reducción horaria. Aplica a todos los funcionarios del BPS según el Estatuto del Funcionario.", "eli5": "Imaginá el BPS como una escuela muy grande con un reglamento que dice exactamente cuántos días libres te corresponden y por qué motivo: tus vacaciones anuales, si te casás, si tenés un bebé, si te enfermás, si fallece un familiar, si donás sangre, si rendís un examen, etc. Para cada situación hay un número fijo de días y un papelito que tenés que presentar para probarlo. Algunos números cambiaron en 2024 (esas son las 'modificativas'), sobre todo los de maternidad y paternidad.", "esquema": ["Cap. I - Ámbito de aplicación (Art. 1)", "Cap. II - Licencia ordinaria / reglamentaria (Arts. 2 a 10)", "  - Anual: 20 días hábiles mínimo (Art. 2)", "  - Antigüedad: 1 día por cada 4 años, tras 5 años de servicios (Art. 3)", "  - Adquisición del derecho, goce, denegatoria, proporcionalidad (Arts. 4-10)", "Cap. III - Licencia por matrimonio: 15 días corridos (Art. 11)", "Cap. IV - Licencia por maternidad: 14 semanas (18 en casos especiales) (Arts. 12-16) [modif. R.D. 10-2/2024]", "Cap. V - Licencia por paternidad: 10 días hábiles (30 corridos en casos especiales) (Art. 17) [modif. R.D. 10-2/2024]", "Cap. VI - Licencia por adopción y legitimación adoptiva: 6 semanas (Arts. 18-22) [art. 22 modif. R.D. 10-2/2024 y 14-5/2024]", "Cap. VII - Licencia por enfermedad (Arts. 23-40)", "Cap. VIII - Licencia por duelo: 10/4/2 días hábiles segun parentesco (Art. 41)", "Cap. IX - Licencia por donación de sangre, órganos y tejidos (Art. 42)", "Cap. X - Licencia por estudio: hasta 20 días hábiles anuales (Arts. 43-44)", "Cap. XI - Licencias por leyes especiales: Corte Electoral, Censo, Juntas, feriado departamental (Arts. 45-48)", "Cap. XII - Licencia por horas a compensar (Arts. 49-50)", "Cap. XIII - Licencia por exámenes génito-mamarios y urológicos: 1 día (Arts. 51-52)", "Cap. XIV - Licencia gremial: tope 2.000 horas mensuales (Arts. 53-55)", "Cap. XV - Licencia especial por reproducción asistida (Art. 56)", "Cap. XVI - Licencia para perfeccionamiento: hasta 10 días al año (Art. 57)", "Cap. XVII - Licencia en apoyo a deportistas (Art. 58)", "Cap. XVIII - Licencia especial sin goce de sueldo: hasta 1 año (Art. 59)", "Cap. XIX - Licencia especial por familiar enfermo: hasta 10/15 días hábiles (Art. 60)", "Cap. XX - Disposiciones generales (Arts. 61-72)"], "datos_duros": ["Aplica a TODOS los funcionarios del BPS conforme al art. 1 del Estatuto del Funcionario, Decreto N° 237/06 (Art. 1).", "Licencia anual remunerada: 20 días hábiles como mínimo, en un solo período (puede fraccionarse si no perjudica el servicio) (Art. 2).", "Licencia por antigüedad: 1 día complementario por cada 4 años de antigüedad, para quienes tengan más de 5 años de servicios en cualquier organismo estatal (Art. 3).", "Para adquirir el derecho a licencia anual: 12 meses o 24 quincenas o 52 semanas de trabajo (Art. 4).", "Proporcionalidad de licencia ordinaria: coeficiente 1,67 por cada mes trabajado o fracción (Art. 9).", "No se pueden denegar licencias de modo que se acumulen más de 2 períodos anuales (Art. 6).", "Licencia por matrimonio: 15 días corridos a partir de la celebración, con documentación probatoria (Art. 11). Extendida a unión concubinaria (R.D. 16-63/2010) y matrimonio igualitario (Ley 19.075).", "Licencia por maternidad: 14 semanas en total; cesar 1 semana antes de la fecha probable de parto y no reintegrarse hasta 13 semanas después del parto; se puede adelantar el inicio hasta 6 semanas antes (Art. 12, modif. R.D. 10-2/2024).", "Maternidad ampliada a 18 semanas: nacimientos múltiples, pretérminos o peso al nacer menor o igual a 1,5 kg (Art. 14 lit. f, modif. R.D. 10-2/2024). En la redacción original 2022 era 'múltiples, pretérminos o con alguna discapacidad' (Art. 12, R.D. 34-2/2022).", "Maternidad: si el parto sobreviene a partir de las 24 semanas de gestación, aun si el niño nace sin vida, corresponde la licencia puerperal de 13 semanas (Art. 14 lit. c).", "Maternidad extendida hasta que el hijo cumpla 6 meses de edad: cuando el recién nacido presente trastorno/enfermedad con riesgo de vida (lit. d) o discapacidades sensoriales/físicas/intelectuales (lit. e) (Art. 14, modif. R.D. 10-2/2024).", "Reducción horaria por maternidad: a la mitad de la jornada; la usan en forma alternada padre o madre hasta que el hijo cumpla 1 año; mínimo a alternar 1 mes (Art. 16, modif. R.D. 10-2/2024). En la redacción 2022 eran 6 meses prorrogables por lactancia hasta 1 año.", "Licencia por paternidad: 10 días hábiles a partir de la fecha de nacimiento (Art. 17).", "Licencia por paternidad ampliada a 30 días corridos en los casos de nacimientos de los literales d, e y f del Art. 14 (Art. 17, modif. R.D. 10-2/2024).", "Licencia por adopción/legitimación adoptiva: 6 semanas continuas, a partir de la entrega efectiva del menor (Art. 18).", "Adopción: si ambos padres son beneficiarios y uno solicita el beneficio, al otro cónyuge le corresponden 10 días hábiles (Art. 19).", "Adopción: el beneficio caduca de pleno derecho si no se reclama antes de 30 días desde la entrega efectiva del o los menores (Art. 21).", "Reducción horaria por adopción: a la mitad; la usan alternadamente padre o madre, se extiende hasta el año de la entrega efectiva del menor; mínimo a alternar 1 mes (Art. 22, modif. R.D. 14-5/2024).", "Ausentismo médico: se analiza la situación de quien supere 30 días de licencia médica en 12 meses o 50 días en 24 meses (Art. 35).", "Comisiones especiales para acompañar a hijo con enfermedad grave: máximo 20 horas anuales por funcionario (Art. 28).", "Subsidio transitorio por incapacidad absoluta y permanente para la tarea habitual: hasta 3 años, con reserva del cargo por igual período (Art. 36 lit. b).", "Plazo para iniciar trámites jubilatorios/subsidio tras separación del cargo: 30 días corridos; en su defecto retención de hasta 50% de haberes (Art. 36).", "Horario especial de labor: plazo máximo 2 años; a los 12 meses se realiza Junta Médica (Art. 39).", "Retención de haberes hasta 50% si el funcionario no comparece a 2 citaciones consecutivas de los servicios médicos (Art. 34).", "Licencia por duelo: 10 días hábiles por fallecimiento de padres, cónyuges, hijos, hijos adoptivos, padres adoptantes y concubinos; 4 días hábiles por hermanos; 2 días hábiles por abuelos, nietos, padres/hijos/hermanos políticos, padrastros/hijastros, tíos y sobrinos (Art. 41).", "Licencia por donación de sangre: 1 día por cada donación, con tope de 2 días en el año; por órganos/tejidos, los días que estimen los médicos para la recuperación total (Art. 42).", "Licencia por estudio: hasta 20 días hábiles anuales para rendir exámenes o pruebas finales; puede fraccionarse; debe acreditarse haber rendido dentro del mes siguiente (Art. 43).", "Estudio - requisitos: terciaria/universitaria, aprobar mínimo 2 materias en el año civil anterior; secundaria, aprobar al menos 75% de las materias del año cursado; no se exige a quienes usan la licencia por primera vez (Art. 44).", "Estudio: la licencia se reduce a máximo 10 días hábiles cuando solo se aprobaron 2 materias en los 2 años civiles inmediatos precedentes (Art. 44).", "Horas a compensar: días hábiles coeficiente 1,5; días hábiles horario nocturno 1,5 + 25%; días inhábiles o de descanso coeficiente 2 (Art. 49).", "Licencia por exámenes génito-mamarios: las funcionarias tienen 1 día al año para Papanicolaou y/o radiografía mamaria (Art. 51).", "Licencia por examen urológico: los funcionarios tienen 1 día para antígeno prostático (PSA) o ecografía o examen urológico (Art. 52).", "Licencia gremial: tope de 2.000 horas mensuales (Art. 54); cada solicitud no puede exceder 15 días corridos desde su inicio (Art. 55). Excluidos del tope: Presidente, Secretario General de Montevideo, Secretario General del Interior y tres miembros más del Consejo Directivo Nacional (Art. 54).", "Reproducción asistida (mujeres): de 1 a 5 días previos a la punción para extracción folicular; 48 horas entre punción e implantación; máximo 72 horas desde la implantación (Art. 56).", "Reproducción asistida (hombres): licencia no mayor a 24 horas (Art. 56).", "Licencia para perfeccionamiento: hasta 10 días al año para cursos, pasantías, congresos o simposios relacionados con el puesto (ampliable por Directorio) (Art. 57).", "Licencia en apoyo a deportistas: desde 2 días antes del certamen hasta 2 días después de finalizada la participación de la delegación (Art. 58).", "Licencia especial sin goce de sueldo: plazo máximo de hasta 1 año; no puede solicitarse nuevamente hasta transcurridos 4 años del vencimiento; excepciones por servicios en el exterior, organismos internacionales (hasta 5 años), estudios/investigaciones en el extranjero, cargos docentes y consultorías (Art. 59).", "Licencia especial por familiar enfermo: hasta 10 días hábiles, y hasta 15 días hábiles por año en caso de internación; no exige agotar otros saldos ni antigüedad mínima; si el enfermo es familiar de 2 funcionarios, la goza uno de ellos (Art. 60).", "Plazo para solicitar licencias: hasta el día de inicio (no aplica a enfermedad) (Art. 62).", "Plazo para autorizar licencias: hasta el día de inicio o por excepción hasta 3 días hábiles posteriores; fuera de fecha hasta 7 días hábiles; desde el 8° día se solicita ingreso a RRHH. Estudio, paternidad, duelo, adopción y matrimonio: hasta 30 días corridos desde el inicio (Art. 63).", "Pago de licencias no gozadas al cese: equivalente en dinero, sin exceder 60 días corridos (Art. 67).", "El derecho a la licencia anual reglamentaria y/o complementaria no caduca (Art. 68) y es irrenunciable (Art. 69).", "Descuento por faltas: por cada 15 inasistencias imputables (con/sin aviso, suspensiones, licencias sin goce) en el año se descuenta 1 día de licencia, además del descuento de haberes (Art. 66)."], "teoria_resumida": "\u003cp\u003eEl \u003cstrong\u003eReglamento de Licencias del BPS\u003c/strong\u003e (R.D. N° 34-2/2022 y modificativas R.D. N° 10-2/2024 y N° 14-5/2024) ordena artículo por artículo todos los tipos de licencia de los funcionarios. Es \u003cstrong\u003elo más evaluable del tema 5 por sus números exactos\u003c/strong\u003e. Aplica a todos los funcionarios del BPS (Art. 1).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLicencia ordinaria (Cap. II):\u003c/strong\u003e mínimo \u003cstrong\u003e20 días hábiles\u003c/strong\u003e anuales (Art. 2), más \u003cstrong\u003e1 día por cada 4 años de antigüedad\u003c/strong\u003e a quienes tengan más de 5 años de servicios estatales (Art. 3). El derecho se adquiere con 12 meses / 24 quincenas / 52 semanas (Art. 4); la proporcionalidad usa el coeficiente \u003cstrong\u003e1,67 por mes\u003c/strong\u003e (Art. 9). No pueden acumularse más de 2 períodos por denegatoria (Art. 6).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVida familiar:\u003c/strong\u003e matrimonio \u003cstrong\u003e15 días corridos\u003c/strong\u003e (Art. 11); maternidad \u003cstrong\u003e14 semanas\u003c/strong\u003e (1 antes y 13 después del parto), ampliable a \u003cstrong\u003e18 semanas\u003c/strong\u003e por parto múltiple, pretérmino o peso menor o igual a 1,5 kg, y hasta los 6 meses del bebé si nace con afección grave o discapacidad (Arts. 12-16, modif. 2024); paternidad \u003cstrong\u003e10 días hábiles\u003c/strong\u003e, o \u003cstrong\u003e30 días corridos\u003c/strong\u003e en esos casos especiales (Art. 17, modif. 2024); adopción \u003cstrong\u003e6 semanas\u003c/strong\u003e (Art. 18). La \u003cstrong\u003ereducción horaria a la mitad\u003c/strong\u003e la usan alternadamente padre o madre hasta el año del hijo (Arts. 16 y 22, modif. 2024).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSalud y solidaridad:\u003c/strong\u003e enfermedad (Cap. VII, sin tope de días pero con controles: 30 días en 12 meses o 50 en 24 meses gatillan análisis - Art. 35); duelo \u003cstrong\u003e10 / 4 / 2 días hábiles\u003c/strong\u003e según parentesco (Art. 41); donación de sangre \u003cstrong\u003e1 día por donación, tope 2 al año\u003c/strong\u003e (Art. 42); familiar enfermo hasta \u003cstrong\u003e10 (o 15 con internación) días hábiles\u003c/strong\u003e (Art. 60).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEstudio y otras:\u003c/strong\u003e estudio hasta \u003cstrong\u003e20 días hábiles\u003c/strong\u003e anuales (10 si solo aprobó 2 materias en los 2 años previos) con requisitos de aprobación (Arts. 43-44); exámenes génito-mamarios / urológicos \u003cstrong\u003e1 día\u003c/strong\u003e (Arts. 51-52); horas a compensar con coeficientes \u003cstrong\u003e1,5 / 1,5+25% / 2\u003c/strong\u003e (Art. 49); gremial tope \u003cstrong\u003e2.000 horas mensuales\u003c/strong\u003e (Art. 54); reproducción asistida (Art. 56); perfeccionamiento hasta \u003cstrong\u003e10 días\u003c/strong\u003e (Art. 57); deportistas (Art. 58); sin goce de sueldo hasta \u003cstrong\u003e1 año\u003c/strong\u003e (Art. 59).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDisposiciones generales (Cap. XX):\u003c/strong\u003e plazos de solicitud (Art. 62) y autorización (Art. 63), causales de suspensión (Art. 64), pago al cese sin exceder \u003cstrong\u003e60 días corridos\u003c/strong\u003e (Art. 67), no caducidad (Art. 68) e irrenunciabilidad (Art. 69) de la licencia anual.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImportante para el examen:\u003c/strong\u003e recordá que las \u003cem\u003emodificativas de 2024\u003c/em\u003e cambiaron los artículos 12, 14, 16, 17 y 22 (maternidad, paternidad y reducción horaria). El BPS suele preguntar la redacción \u003cstrong\u003evigente\u003c/strong\u003e.\u003c/p\u003e", "teoria_exhaustiva": [{"ref": "R.D. N° 34-2/2022 y modificativas", "titulo": "Encuadre normativo", "cita": "Modifícase el Reglamento de Licencias aprobado por R.D. N° 10-1/2007 y modificativas; apruébase la nueva versión.", "explicacion": "El reglamento vigente fue aprobado el 12.10.2022 sustituyendo al de 2007. Luego se modificó por R.D. N° 10-2/2024 (arts. 12, 14, 16, 17 y 22) y R.D. N° 14-5/2024 (art. 22).", "ejemplo": "Una pregunta de examen sobre maternidad debe responderse con la redacción 2024, no la original de 2022."}, {"ref": "Art. 1", "titulo": "Ámbito de aplicación", "cita": "De aplicación a todos los funcionarios del BPS de acuerdo al art. 1 del Estatuto del Funcionario, Decreto N° 237/06.", "explicacion": "El reglamento alcanza a la totalidad de los funcionarios del organismo.", "ejemplo": "Tanto un administrativo como un médico del BPS quedan comprendidos (con reglamentación específica de salud, Art. 71)."}, {"ref": "Art. 2", "titulo": "Licencia reglamentaria (anual)", "cita": "Derecho a licencia anual remunerada de veinte días hábiles como mínimo, en un solo período; puede fraccionarse.", "explicacion": "Es la licencia ordinaria base. Se goza idealmente de una vez, pero puede fraccionarse si el funcionario lo pide y no perjudica el servicio.", "ejemplo": "Un funcionario toma 15 días en enero y 5 en julio, previa autorización."}, {"ref": "Art. 3", "titulo": "Licencia por antigüedad", "cita": "Con más de cinco años de servicios en cualquier organismo estatal: un día complementario por cada cuatro años de antigüedad.", "explicacion": "A los 20 días base se suma 1 día por cada 4 años, una vez superados 5 años de servicios estatales. Puede gozarse junta o separadamente.", "ejemplo": "Con 12 años de servicio: 20 + 3 días complementarios."}, {"ref": "Art. 4", "titulo": "Adquisición del derecho", "cita": "Deberá haber computado doce meses o veinticuatro quincenas o cincuenta y dos semanas de trabajo.", "explicacion": "Define el tiempo mínimo trabajado para generar la licencia. Quien ingresa durante el año tiene derecho proporcional desde su designación al 31 de diciembre.", "ejemplo": "Quien entra el 1 de julio genera la parte proporcional de ese semestre."}, {"ref": "Art. 6", "titulo": "Denegatoria de licencia", "cita": "En ningún caso podrán denegarse licencias en forma que se acumulen más de dos períodos anuales.", "explicacion": "La licencia solo puede negarse por razones de servicio justificadas y documentadas, y nunca al punto de acumular más de 2 períodos.", "ejemplo": "Si se deniega 2022, se acumula a 2023, pero no puede negarse también 2023 generando un tercer período."}, {"ref": "Art. 9", "titulo": "Proporcionalidad", "cita": "El cálculo proporcional se efectuará aplicando el coeficiente 1,67 por cada mes trabajado o fracción.", "explicacion": "Para quien no completa el año, la licencia se calcula con el coeficiente 1,67 por mes (o fracción).", "ejemplo": "6 meses trabajados: 6 x 1,67 = aprox. 10 días."}, {"ref": "Art. 10", "titulo": "Inaplicabilidad de descuentos", "cita": "No se descontarán los días no trabajados por festividades, asuetos, enfermedad y otras causas no imputables.", "explicacion": "Las ausencias no imputables al funcionario (incluida enfermedad común, profesional y accidentes de trabajo) no reducen la licencia.", "ejemplo": "Días de asueto o licencia médica no se restan del cómputo anual."}, {"ref": "Art. 11", "titulo": "Licencia por matrimonio", "cita": "Por contraer matrimonio, quince días corridos de licencia a partir de su celebración.", "explicacion": "Son 15 días corridos con documentación probatoria. El beneficio se extendió a unión concubinaria (R.D. 16-63/2010) y matrimonio igualitario (Ley 19.075).", "ejemplo": "Quien se casa un viernes cuenta los 15 días corridos incluyendo fines de semana."}, {"ref": "Art. 12 (modif. R.D. 10-2/2024)", "titulo": "Licencia por maternidad - duración", "cita": "La duración total será de catorce semanas; cesar una semana antes de la fecha probable de parto y no reintegrarse hasta trece semanas después.", "explicacion": "14 semanas en total: 1 antes y 13 después del parto; puede adelantarse el inicio hasta 6 semanas antes de la fecha presunta.", "ejemplo": "La funcionaria puede empezar la licencia 6 semanas antes si el médico lo indica."}, {"ref": "Art. 14 (modif. R.D. 10-2/2024)", "titulo": "Maternidad - situaciones especiales", "cita": "Parto desde las 24 semanas, aun sin vida: licencia puerperal de 13 semanas. Múltiples, pretérminos o peso menor o igual a 1,5 kg: 18 semanas.", "explicacion": "Regula partos tardíos/anticipados, sin vida, y amplía a 18 semanas por nacimiento múltiple, pretérmino o bajo peso. Los lit. d y e extienden la licencia hasta los 6 meses del bebé si nace con afección grave o discapacidad.", "ejemplo": "Mellizos: 18 semanas. Bebé que nace con afección grave: extensión hasta sus 6 meses."}, {"ref": "Art. 16 (modif. R.D. 10-2/2024)", "titulo": "Reducción horaria (maternidad)", "cita": "Reducir su horario a la mitad; la usa alternadamente padre o madre hasta que el hijo cumpla un año; mínimo a alternar un mes.", "explicacion": "Tras la licencia, reducción del 50% de la jornada que puede compartirse entre padre y madre hasta el año del hijo, alternando por períodos no menores a 1 mes. No se puede hacer horario extraordinario.", "ejemplo": "La madre usa la reducción 2 meses y luego el padre 2 meses."}, {"ref": "Art. 17 (modif. R.D. 10-2/2024)", "titulo": "Licencia por paternidad", "cita": "Diez días hábiles a partir de la fecha de nacimiento. En los casos de los literales d, e y f del art. 14: treinta días corridos.", "explicacion": "Regla general 10 días hábiles; sube a 30 días corridos cuando el bebé nace con afección grave, discapacidad o bajo peso/múltiple (lit. d, e, f del Art. 14).", "ejemplo": "Padre de mellizos prematuros: 30 días corridos."}, {"ref": "Art. 18", "titulo": "Licencia por adopción y legitimación adoptiva", "cita": "Derecho a una licencia especial de seis semanas continuas; se ejerce a partir de la entrega efectiva del menor.", "explicacion": "6 semanas continuas por recibir uno o más menores para adopción/legitimación adoptiva (disposición legal, judicial o del INAU).", "ejemplo": "La licencia arranca el día en que el INAU hace la entrega efectiva."}, {"ref": "Art. 19", "titulo": "Beneficiarios de la licencia por adopción", "cita": "Cuando ambos padres sean beneficiarios y uno solicite el beneficio, la licencia del otro cónyuge será de diez días hábiles.", "explicacion": "La de 6 semanas la usa uno solo de los integrantes; al otro le corresponden 10 días hábiles.", "ejemplo": "Un cónyuge toma 6 semanas y el otro 10 días hábiles."}, {"ref": "Art. 21", "titulo": "Goce y caducidad de la adopción", "cita": "El beneficio caducará de pleno derecho si no se reclama antes de los treinta días desde la entrega efectiva.", "explicacion": "No puede sustituirse por dinero y caduca a los 30 días de la entrega si no se reclama.", "ejemplo": "Si pasan 31 días sin pedirla, se pierde."}, {"ref": "Art. 22 (modif. R.D. 14-5/2024)", "titulo": "Reducción horaria (adopción)", "cita": "Reducción a la mitad; alternada entre padre o madre; se extenderá hasta el año de la entrega efectiva del menor; mínimo a alternar un mes.", "explicacion": "La R.D. 14-5/2024 ajustó que el plazo se cuenta hasta el año de la entrega efectiva del menor (no del nacimiento).", "ejemplo": "Si la entrega fue en marzo, la reducción puede usarse hasta marzo del año siguiente."}, {"ref": "Art. 23", "titulo": "Enfermedad - causal", "cita": "Toda afección física o psíquica, aguda o crónica en empuje agudo, que implique imposibilidad de desempeñar las tareas.", "explicacion": "Define qué cuenta como enfermedad. Pequeñas heridas o contusiones sin imposibilidad no son causal.", "ejemplo": "Una gripe con fiebre alta sí; un raspón leve sin contraindicación médica, no."}, {"ref": "Art. 24", "titulo": "Enfermedad - comunicación", "cita": "Deberán dar aviso dentro de las dos horas siguientes al comienzo del horario de labor.", "explicacion": "Obligación de avisar en las 2 horas posteriores al inicio del horario (o antes en servicios que lo justifiquen).", "ejemplo": "Entrada 9:00: avisar antes de las 11:00."}, {"ref": "Arts. 26-27", "titulo": "Certificación y facultades médicas", "cita": "El médico del Prestador Integral de Salud certifica; los servicios médicos del organismo controlan, auditan, modifican o suspenden.", "explicacion": "Certifica el prestador de salud del funcionario; los servicios médicos del BPS controlan, pueden citar, modificar o suspender períodos y constituirse en el domicilio.", "ejemplo": "Si el control no encuentra al funcionario en su domicilio, se lo cita para justificar en 3 días."}, {"ref": "Art. 28", "titulo": "Situaciones especiales y comisiones", "cita": "Comisión especial para acompañar a hijo con enfermedad grave: máximo 20 horas anuales por funcionario.", "explicacion": "Habilita horario especial, fisioterapia, comisiones especiales para acompañar a un hijo enfermo (tope 20 horas anuales, salvo atención en Gerencia Salud), etc.", "ejemplo": "Acompañar a un hijo a controles médicos hasta agotar las 20 horas anuales."}, {"ref": "Art. 35", "titulo": "Ausentismo por razones médicas", "cita": "Analizará a quienes incurran en más de 30 días de licencia médica en 12 meses o 50 en 24 meses.", "explicacion": "Umbrales de ausentismo médico que disparan medidas de control y seguimiento.", "ejemplo": "32 días de licencia médica en un año habilitan el análisis del caso."}, {"ref": "Art. 36", "titulo": "Comprobación de aptitud / incapacidad", "cita": "Subsidio transitorio por hasta 3 años por incapacidad absoluta y permanente para la tarea habitual, con reserva del cargo.", "explicacion": "Si superado el tope y por Junta Médica/Comisión Técnica se constata incapacidad, se inician procedimientos (jubilación por incapacidad o subsidio transitorio hasta 3 años). Plazo de 30 días corridos para iniciar trámites, bajo riesgo de retención de hasta 50% de haberes.", "ejemplo": "Dictamen de incapacidad para la tarea habitual: subsidio transitorio hasta 3 años y reserva del cargo."}, {"ref": "Art. 39", "titulo": "Horario especial de labor", "cita": "El plazo máximo para autorizar un horario especial será de 2 años; a los 12 meses se realiza Junta Médica.", "explicacion": "Horario especial por enfermedad, con control periódico, Junta Médica a los 12 meses y tope de 2 años.", "ejemplo": "Tras 2 años de horario especial se evalúa la aptitud según el Art. 36."}, {"ref": "Art. 41", "titulo": "Licencia por duelo", "cita": "Diez días hábiles por padres, cónyuges, hijos, hijos adoptivos, padres adoptantes y concubinos; cuatro por hermanos; dos por abuelos, nietos, parientes políticos, padrastros/hijastros, tíos y sobrinos.", "explicacion": "Escala de días según el grado de parentesco; la causal debe justificarse fehacientemente.", "ejemplo": "Fallece un hermano: 4 días hábiles. Fallece un tío: 2 días hábiles."}, {"ref": "Art. 42", "titulo": "Donación de sangre, órganos y tejidos", "cita": "Un día por cada donación de sangre con tope de dos días en el año, y los días que estimen los médicos para la recuperación en órganos/tejidos.", "explicacion": "1 día por donación de sangre (máx. 2 al año); para órganos/tejidos, lo que indiquen los médicos. Requiere certificado del servicio correspondiente.", "ejemplo": "Dos donaciones de sangre en el año: 2 días."}, {"ref": "Art. 43", "titulo": "Licencia por estudio - alcance", "cita": "Hasta veinte días hábiles anuales para rendir exámenes o pruebas finales; puede gozarse fraccionada.", "explicacion": "Hasta 20 días hábiles para exámenes; debe coincidir con la fecha del examen o el día hábil anterior, y acreditarse haber rendido dentro del mes siguiente.", "ejemplo": "Quien rinde 5 exámenes usa días en cada fecha hasta el tope de 20."}, {"ref": "Art. 44", "titulo": "Estudio - condiciones", "cita": "Terciaria/universitaria: aprobar mínimo dos materias en el año civil anterior; secundaria: aprobar al menos el 75% de las materias del año cursado.", "explicacion": "Requisitos de rendimiento. Si solo se aprobaron 2 materias en los 2 años previos, la licencia se reduce a 10 días hábiles. No se exige a quienes la usan por primera vez (deben estar inscriptos).", "ejemplo": "Estudiante terciario con 2 materias aprobadas en 2 años: solo 10 días."}, {"ref": "Arts. 45-48", "titulo": "Licencias por leyes especiales (electoral, censo, juntas, feriado)", "cita": "Comisión Receptora de Votos: normas de la Ley Electoral; censo: la licencia que en cada caso se establezca; juntas y feriado departamental según la norma respectiva.", "explicacion": "Remite a leyes electorales y a las normas que en cada caso fijan días por actuación en comicios, censo, juntas departamentales/locales/electorales y feriados departamentales.", "ejemplo": "Designado por la Corte Electoral para una elección: rige la Ley Electoral."}, {"ref": "Art. 49", "titulo": "Horas a compensar", "cita": "Hábiles: x1,5; hábiles nocturno: x1,5 + 25%; inhábiles o de descanso: x2.", "explicacion": "Coeficientes para convertir horas extra autorizadas en horas a compensar.", "ejemplo": "4 horas en domingo: 4 x 2 = 8 horas a compensar."}, {"ref": "Arts. 51-52", "titulo": "Exámenes génito-mamarios y urológicos", "cita": "Funcionarias: un día al año para Papanicolaou y/o radiografía mamaria. Funcionarios: un día para PSA, ecografía o examen urológico.", "explicacion": "1 día de licencia preventiva para mujeres (génito-mamario) y 1 día para hombres (urológico), acreditando el examen.", "ejemplo": "Una funcionaria toma su día anual para hacerse el Papanicolaou."}, {"ref": "Arts. 53-55", "titulo": "Licencia gremial", "cita": "Tope de 2.000 horas mensuales; cada solicitud no podrá exceder un período de 15 días corridos desde su inicio.", "explicacion": "Para integrantes de los órganos y nóminas de ATSS. Excluidos del tope: Presidente, Secretarios Generales de Montevideo e Interior y tres miembros más del Consejo Directivo Nacional.", "ejemplo": "Un delegado de núcleo bajo nómina solicita licencia gremial por reunión sindical."}, {"ref": "Art. 56", "titulo": "Reproducción asistida", "cita": "Mujeres: 1 a 5 días previos a la punción; 48 horas entre punción e implantación; máximo 72 horas desde la implantación. Hombres: no mayor a 24 horas.", "explicacion": "Licencia segmentada para el tratamiento de reproducción asistida acorde al criterio médico.", "ejemplo": "Una funcionaria usa 3 días antes de la punción folicular."}, {"ref": "Art. 57", "titulo": "Licencia para perfeccionamiento", "cita": "Hasta 10 días de licencia especial al año para cursos, pasantías, congresos, simposios relacionados con el puesto.", "explicacion": "Hasta 10 días anuales, ampliables por el Directorio, para formación vinculada al cargo o profesión.", "ejemplo": "Asistir a un congreso de seguridad social de 4 días."}, {"ref": "Art. 58", "titulo": "Licencia en apoyo a deportistas", "cita": "Desde dos días antes del certamen hasta dos días después de finalizada la participación de la delegación.", "explicacion": "Para funcionarios que integran delegaciones deportivas oficiales en certámenes internacionales, con informe de la Secretaría Nacional del Deporte.", "ejemplo": "Atleta que viaja a un torneo internacional oficial."}, {"ref": "Art. 59", "titulo": "Licencia especial sin goce de sueldo", "cita": "Sin goce de sueldo, plazo máximo de hasta un año; no podrá solicitarse nuevamente hasta transcurridos 4 años del vencimiento.", "explicacion": "El Directorio puede concederla en casos fundados; tope 1 año y espera de 4 años para repetir. Excepciones (sin tope de 1 año): cónyuge funcionario en el exterior, organismos internacionales (hasta 5 años), estudios/investigaciones en el extranjero, cargos docentes de gobierno universitario y consultorías con el Estado.", "ejemplo": "Acompañar al cónyuge funcionario destinado al exterior por más de un año."}, {"ref": "Art. 60", "titulo": "Licencia especial por familiar enfermo", "cita": "Hasta 10 días hábiles y en caso de internación hasta 15 días hábiles por año.", "explicacion": "Por hijo/a, padre/madre, cónyuge o concubino/a en estado grave/terminal, accidente con riesgo de vida o situación excepcional ineludible. No exige agotar otros saldos ni antigüedad mínima.", "ejemplo": "Internación de un hijo: hasta 15 días hábiles en el año."}, {"ref": "Arts. 62-63", "titulo": "Plazos de solicitud y autorización", "cita": "Solicitar hasta el día de inicio. Autorizar hasta el inicio o por excepción 3 días hábiles después; estudio, paternidad, duelo, adopción y matrimonio hasta 30 días corridos.", "explicacion": "Las licencias se piden hasta su inicio (salvo enfermedad). La autorización tiene plazos escalonados; ciertas licencias documentadas se aprueban hasta 30 días corridos desde el inicio.", "ejemplo": "Licencia por matrimonio: puede aprobarse al presentar el certificado, hasta 30 días corridos desde el inicio."}, {"ref": "Art. 64", "titulo": "Suspensión de licencias", "cita": "La licencia anual, por antigüedad, Corte Electoral, Censo, estudios y horas a compensar podrá suspenderse por razones de servicio, enfermedad, duelo, maternidad, paternidad o adopción.", "explicacion": "Si sobreviene una causal mayor durante la licencia, se suspende y se conserva el derecho a continuarla luego.", "ejemplo": "Si durante las vacaciones el funcionario se enferma, la licencia anual se suspende."}, {"ref": "Arts. 66-69", "titulo": "Descuentos, pago al cese, caducidad e irrenunciabilidad", "cita": "Por cada 15 inasistencias imputables se descuenta un día de licencia; al cese se paga hasta 60 días corridos; la licencia anual no caduca y es irrenunciable.", "explicacion": "Reglas de cierre: descuento por faltas, pago en dinero de licencias no gozadas al cese (tope 60 días corridos), no caducidad e irrenunciabilidad del derecho.", "ejemplo": "Al renunciar, se le abona el equivalente de la licencia generada y no gozada, sin pasar de 60 días corridos."}, {"ref": "Arts. 70-72", "titulo": "Contralor, reglamentación específica y derogación", "cita": "El contralor corresponde a RRHH y a los jerarcas; funcionarios de Salud tienen disposiciones específicas; se derogan las normas opuestas.", "explicacion": "Cierra el reglamento fijando responsables de su aplicación, la remisión a normas específicas para Salud y la derogación de disposiciones contrarias.", "ejemplo": "Un jerarca de unidad es responsable de controlar la correcta aplicación del reglamento."}], "flashcards": [{"front": "Cuantos dias hábiles minimos de licencia anual tiene un funcionario del BPS?", "back": "20 dias hábiles como minimo, en un solo periodo (puede fraccionarse) (Art. 2).", "id": "5-0"}, {"front": "Como se calcula la licencia por antigüedad?", "back": "1 dia complementario por cada 4 años de antigüedad, para quienes tengan mas de 5 años de servicios estatales (Art. 3).", "id": "5-1"}, {"front": "Que tiempo de trabajo se necesita para adquirir el derecho a licencia anual?", "back": "12 meses, o 24 quincenas, o 52 semanas de trabajo (Art. 4).", "id": "5-2"}, {"front": "Cual es el coeficiente de proporcionalidad de la licencia ordinaria?", "back": "1,67 por cada mes trabajado o fracción (Art. 9).", "id": "5-3"}, {"front": "Cuantos periodos de licencia anual como maximo pueden acumularse por denegatoria?", "back": "No mas de 2 periodos anuales (Art. 6).", "id": "5-4"}, {"front": "Cuantos dias dura la licencia por matrimonio?", "back": "15 dias corridos a partir de la celebración (Art. 11). Extendida a unión concubinaria y matrimonio igualitario.", "id": "5-5"}, {"front": "Cuantas semanas dura la licencia por maternidad?", "back": "14 semanas: 1 antes y 13 después del parto; se puede adelantar el inicio hasta 6 semanas antes (Art. 12, modif. R.D. 10-2/2024).", "id": "5-6"}, {"front": "En que casos la licencia por maternidad se amplia a 18 semanas?", "back": "Nacimientos múltiples, pretérminos o peso al nacer menor o igual a 1,5 kg (Art. 14 lit. f, modif. R.D. 10-2/2024).", "id": "5-7"}, {"front": "Hasta cuando puede extenderse la maternidad si el bebé nace con afección grave o discapacidad?", "back": "Hasta que el hijo cumpla 6 meses de edad (Art. 14 lit. d y e, modif. R.D. 10-2/2024).", "id": "5-8"}, {"front": "Cuantos dias es la licencia por paternidad?", "back": "10 dias hábiles desde la fecha de nacimiento (Art. 17); 30 dias corridos en los casos de los lit. d, e y f del Art. 14 (modif. R.D. 10-2/2024).", "id": "5-9"}, {"front": "Cuanto dura la licencia por adopción o legitimación adoptiva?", "back": "6 semanas continuas, a partir de la entrega efectiva del menor (Art. 18).", "id": "5-10"}, {"front": "Si ambos padres adoptantes son funcionarios y uno toma la licencia, que le corresponde al otro?", "back": "10 dias hábiles (Art. 19).", "id": "5-11"}, {"front": "En cuanto tiempo caduca la licencia por adopción si no se reclama?", "back": "A los 30 dias desde la entrega efectiva del o los menores (Art. 21).", "id": "5-12"}, {"front": "Hasta cuando se extiende la reducción horaria por adopción?", "back": "Hasta el año de la entrega efectiva del menor, alternable entre padre/madre con mínimo 1 mes (Art. 22, modif. R.D. 14-5/2024).", "id": "5-13"}, {"front": "Que umbrales de ausentismo médico disparan el análisis del caso?", "back": "Mas de 30 dias de licencia médica en 12 meses, o 50 en 24 meses (Art. 35).", "id": "5-14"}, {"front": "Cual es el tope de horas anuales de comisión especial para acompañar a un hijo enfermo?", "back": "20 horas anuales por funcionario (Art. 28), salvo atención en Gerencia Salud.", "id": "5-15"}, {"front": "Cuantos dias de duelo por fallecimiento de padres, cónyuge, hijos o concubino?", "back": "10 dias hábiles (Art. 41).", "id": "5-16"}, {"front": "Cuantos dias de duelo por fallecimiento de un hermano?", "back": "4 dias hábiles (Art. 41).", "id": "5-17"}, {"front": "Cuantos dias de duelo por abuelos, nietos, parientes políticos, tíos o sobrinos?", "back": "2 dias hábiles (Art. 41).", "id": "5-18"}, {"front": "Cuantos dias por donación de sangre y cual es el tope anual?", "back": "1 dia por cada donación, con tope de 2 dias en el año (Art. 42).", "id": "5-19"}, {"front": "Cuantos dias hábiles anuales de licencia por estudio?", "back": "Hasta 20 dias hábiles anuales para rendir exámenes o pruebas finales (Art. 43).", "id": "5-20"}, {"front": "Cuando se reduce la licencia por estudio a 10 dias hábiles?", "back": "Cuando solo se aprobaron 2 materias en los 2 años civiles inmediatos precedentes (Art. 44).", "id": "5-21"}, {"front": "Que requisito de aprobación rige para la licencia por estudio en secundaria?", "back": "Aprobar al menos el 75% de las materias del año cursado (Art. 44).", "id": "5-22"}, {"front": "Cuales son los coeficientes de horas a compensar?", "back": "Hábiles x1,5; hábiles nocturno x1,5 + 25%; inhábiles o de descanso x2 (Art. 49).", "id": "5-23"}, {"front": "Cuantos dias de licencia por exámenes génito-mamarios (mujeres)?", "back": "1 dia al año para Papanicolaou y/o radiografía mamaria (Art. 51).", "id": "5-24"}, {"front": "Cuantos dias de licencia por examen urológico (hombres)?", "back": "1 dia para PSA, ecografía o examen urológico (Art. 52).", "id": "5-25"}, {"front": "Cual es el tope mensual de la licencia gremial?", "back": "2.000 horas mensuales (Art. 54); cada solicitud no puede exceder 15 dias corridos (Art. 55).", "id": "5-26"}, {"front": "Licencia por reproducción asistida para mujeres?", "back": "1 a 5 dias previos a la punción; 48 horas entre punción e implantación; máximo 72 horas desde la implantación (Art. 56).", "id": "5-27"}, {"front": "Licencia por reproducción asistida para hombres?", "back": "No mayor a 24 horas (Art. 56).", "id": "5-28"}, {"front": "Cuantos dias de licencia para perfeccionamiento al año?", "back": "Hasta 10 dias al año para cursos, pasantías, congresos o simposios relacionados con el puesto (Art. 57); ampliable por Directorio.", "id": "5-29"}, {"front": "Periodo de la licencia en apoyo a deportistas?", "back": "Desde 2 dias antes del certamen hasta 2 dias después de finalizada la participación de la delegación (Art. 58).", "id": "5-30"}, {"front": "Plazo máximo de la licencia sin goce de sueldo y espera para repetirla?", "back": "Hasta 1 año; no puede pedirse de nuevo hasta transcurridos 4 años del vencimiento (Art. 59).", "id": "5-31"}, {"front": "Cuantos dias por familiar enfermo, y cuanto con internación?", "back": "Hasta 10 dias hábiles, y hasta 15 dias hábiles por año en caso de internación (Art. 60).", "id": "5-32"}, {"front": "Hasta que tope se paga en dinero la licencia no gozada al cese?", "back": "Sin exceder 60 dias corridos (Art. 67).", "id": "5-33"}, {"front": "El derecho a la licencia anual, caduca? Es renunciable?", "back": "No caduca (Art. 68) y es irrenunciable (Art. 69).", "id": "5-34"}, {"front": "Que articulos modificaron las R.D. de 2024 y sobre que temas?", "back": "R.D. 10-2/2024 modificó arts. 12, 14, 16, 17 y 22 (maternidad, paternidad, reducción horaria); R.D. 14-5/2024 modificó nuevamente el art. 22 (reducción horaria por adopción).", "id": "5-35"}, {"front": "Cual es el plazo general para solicitar una licencia?", "back": "Hasta el día de inicio de la misma; no aplica a la licencia por enfermedad (Art. 62).", "id": "5-36"}], "practica": [{"subtema": "Licencia ordinaria / antigüedad", "q": "Cual es la licencia anual remunerada minima de un funcionario del BPS?", "opciones": ["15 dias hábiles", "20 dias hábiles", "25 dias hábiles", "30 dias corridos"], "correcta": 1, "expl": "El minimo es de 20 dias hábiles, en un solo periodo, fraccionable (Art. 2).", "id": "5-0", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia ordinaria / antigüedad", "q": "La licencia por antigüedad otorga:", "opciones": ["1 dia por cada 2 años, sin requisito previo", "1 dia por cada 4 años, con mas de 5 años de servicios estatales", "2 dias por cada 5 años de servicio", "5 dias fijos a los 10 años"], "correcta": 1, "expl": "1 dia complementario por cada 4 años de antigüedad, exigiendo mas de 5 años de servicios en cualquier organismo estatal (Art. 3).", "id": "5-1", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia ordinaria / antigüedad", "q": "Para adquirir el derecho a la licencia anual se requiere haber computado:", "opciones": ["6 meses o 12 quincenas", "12 meses, 24 quincenas o 52 semanas", "9 meses o 40 semanas", "24 meses de servicio"], "correcta": 1, "expl": "El Art. 4 exige 12 meses, 24 quincenas o 52 semanas de trabajo.", "id": "5-2", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia ordinaria / antigüedad", "q": "El cálculo proporcional de la licencia ordinaria utiliza el coeficiente:", "opciones": ["1,5 por mes", "1,67 por mes trabajado o fracción", "2 por mes", "1,25 por mes"], "correcta": 1, "expl": "El Art. 9 fija el coeficiente 1,67 por cada mes trabajado o fracción.", "id": "5-3", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia ordinaria / antigüedad", "q": "Por denegatoria de licencia, el maximo que puede acumularse es:", "opciones": ["1 periodo anual", "2 periodos anuales", "3 periodos anuales", "Sin límite"], "correcta": 1, "expl": "En ningún caso pueden denegarse de modo que se acumulen mas de 2 periodos anuales (Art. 6).", "id": "5-4", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por matrimonio", "q": "La licencia por matrimonio es de:", "opciones": ["10 dias hábiles", "15 dias corridos", "15 dias hábiles", "7 dias corridos"], "correcta": 1, "expl": "Son 15 dias corridos a partir de la celebración, con documentación probatoria (Art. 11).", "id": "5-5", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por matrimonio", "q": "El derecho a licencia por matrimonio se extendió a:", "opciones": ["Solo el matrimonio civil", "Unión concubinaria reconocida y matrimonio igualitario", "Solo parejas con hijos", "Únicamente concubinato de 5 años"], "correcta": 1, "expl": "Se extendió por R.D. 16-63/2010 (unión concubinaria) y Ley 19.075 (matrimonio igualitario) (nota al Cap. III).", "id": "5-6", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por maternidad", "q": "La duración total de la licencia por maternidad es de:", "opciones": ["12 semanas", "13 semanas", "14 semanas", "16 semanas"], "correcta": 2, "expl": "14 semanas en total: 1 antes y 13 después del parto (Art. 12, modif. R.D. 10-2/2024).", "id": "5-7", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por maternidad", "q": "La licencia por maternidad se amplía a 18 semanas cuando:", "opciones": ["La madre tiene mas de 35 años", "Hay nacimientos múltiples, pretérminos o peso al nacer menor o igual a 1,5 kg", "Es el primer hijo", "El parto es por cesárea"], "correcta": 1, "expl": "El Art. 14 lit. f (modif. R.D. 10-2/2024) fija 18 semanas para nacimientos múltiples, pretérminos o peso menor o igual a 1,5 kg.", "id": "5-8", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por maternidad", "q": "Hasta cuanto antes de la fecha presunta de parto puede adelantar el inicio de la licencia?", "opciones": ["2 semanas", "4 semanas", "6 semanas", "8 semanas"], "correcta": 2, "expl": "Puede adelantar el inicio hasta 6 semanas antes de la fecha presunta de parto (Art. 12).", "id": "5-9", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por maternidad", "q": "Si el parto sobreviene a partir de las 24 semanas de gestación y el niño nace sin vida, corresponde:", "opciones": ["Ninguna licencia", "La licencia puerperal de 13 semanas", "Solo 4 semanas", "Las 18 semanas completas"], "correcta": 1, "expl": "El Art. 14 lit. c reconoce igualmente la licencia puerperal de 13 semanas.", "id": "5-10", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por paternidad", "q": "La licencia por paternidad general es de:", "opciones": ["3 dias hábiles", "10 dias hábiles", "10 dias corridos", "14 dias corridos"], "correcta": 1, "expl": "10 dias hábiles a partir de la fecha de nacimiento (Art. 17).", "id": "5-11", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por paternidad", "q": "En los nacimientos de los literales d, e y f del Art. 14, la licencia por paternidad es de:", "opciones": ["15 dias hábiles", "20 dias corridos", "30 dias corridos", "10 dias hábiles"], "correcta": 2, "expl": "Sube a 30 dias corridos en esos casos especiales (Art. 17, modif. R.D. 10-2/2024).", "id": "5-12", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por adopción", "q": "La licencia por adopción o legitimación adoptiva es de:", "opciones": ["4 semanas", "6 semanas continuas", "8 semanas", "10 dias hábiles"], "correcta": 1, "expl": "6 semanas continuas a partir de la entrega efectiva del menor (Art. 18).", "id": "5-13", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por adopción", "q": "Si ambos padres adoptantes son funcionarios y uno usa las 6 semanas, al otro le corresponden:", "opciones": ["6 semanas también", "10 dias hábiles", "Ningún dia", "3 semanas"], "correcta": 1, "expl": "El Art. 19 le otorga 10 dias hábiles al otro cónyuge.", "id": "5-14", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por adopción", "q": "La reducción horaria por adopción se extiende hasta:", "opciones": ["Los 6 meses del menor", "El año de la entrega efectiva del menor", "Los 2 años del menor", "El fin de la licencia especial"], "correcta": 1, "expl": "Por R.D. 14-5/2024 (Art. 22) la reducción se extiende hasta el año de la entrega efectiva del menor.", "id": "5-15", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por enfermedad", "q": "Dentro de que plazo debe avisar el funcionario que no concurre por enfermedad?", "opciones": ["Antes del horario de entrada siempre", "Dentro de las 2 horas siguientes al inicio del horario de labor", "Dentro de las 24 horas", "Dentro de las 4 horas"], "correcta": 1, "expl": "El Art. 24 exige avisar dentro de las 2 horas siguientes al comienzo del horario.", "id": "5-16", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por enfermedad", "q": "El ausentismo médico se analiza cuando el funcionario supera:", "opciones": ["20 dias en 12 meses o 40 en 24 meses", "30 dias en 12 meses o 50 en 24 meses", "15 dias en 6 meses", "60 dias en 24 meses"], "correcta": 1, "expl": "El Art. 35 fija mas de 30 dias en 12 meses o 50 en 24 meses.", "id": "5-17", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por enfermedad", "q": "El subsidio transitorio por incapacidad absoluta y permanente para la tarea habitual se otorga por hasta:", "opciones": ["1 año", "2 años", "3 años", "5 años"], "correcta": 2, "expl": "El Art. 36 lit. b establece subsidio transitorio por hasta 3 años, con reserva del cargo por igual periodo.", "id": "5-18", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por enfermedad", "q": "El plazo máximo para autorizar un horario especial de labor es de:", "opciones": ["6 meses", "1 año", "2 años", "3 años"], "correcta": 2, "expl": "El Art. 39 fija un plazo máximo de 2 años, con Junta Médica a los 12 meses.", "id": "5-19", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por duelo", "q": "La licencia por duelo por fallecimiento de un hijo es de:", "opciones": ["4 dias hábiles", "10 dias hábiles", "2 dias hábiles", "5 dias corridos"], "correcta": 1, "expl": "10 dias hábiles por padres, cónyuge, hijos, hijos adoptivos, padres adoptantes y concubinos (Art. 41).", "id": "5-20", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por duelo", "q": "La licencia por duelo por fallecimiento de un abuelo o un sobrino es de:", "opciones": ["10 dias hábiles", "4 dias hábiles", "2 dias hábiles", "1 dia hábil"], "correcta": 2, "expl": "2 dias hábiles por abuelos, nietos, parientes políticos, padrastros/hijastros, tíos y sobrinos (Art. 41).", "id": "5-21", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por donación", "q": "Por donación de sangre, el funcionario tiene derecho a:", "opciones": ["1 dia por donación, tope 2 dias al año", "2 dias por donación sin tope", "Medio dia por donación", "5 dias al año"], "correcta": 0, "expl": "El Art. 42 otorga 1 dia por cada donación con tope de 2 dias en el año.", "id": "5-22", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por estudio", "q": "El máximo de licencia por estudio para rendir exámenes es de:", "opciones": ["10 dias hábiles", "15 dias hábiles", "20 dias hábiles anuales", "30 dias corridos"], "correcta": 2, "expl": "Hasta 20 dias hábiles anuales para rendir exámenes o pruebas finales (Art. 43).", "id": "5-23", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por estudio", "q": "La licencia por estudio se reduce a 10 dias hábiles cuando:", "opciones": ["El funcionario tiene menos de 1 año de antigüedad", "Solo aprobó 2 materias en los 2 años civiles inmediatos precedentes", "Estudia a distancia", "Cursa postgrado"], "correcta": 1, "expl": "El Art. 44 reduce a máximo 10 dias hábiles cuando solo se aprobaron 2 materias en los 2 años civiles previos.", "id": "5-24", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencia por estudio", "q": "Para estudios de nivel secundario, el requisito de aprobación es:", "opciones": ["Aprobar 2 materias", "Aprobar al menos el 75% de las materias del año cursado", "Aprobar el 100%", "No hay requisito"], "correcta": 1, "expl": "El Art. 44 exige aprobar al menos el 75% de las materias del año cursado en secundaria.", "id": "5-25", "tema_id": 5, "tema_nombre": "Reglamento de Licencias y Modificativas (BPS)"}, {"subtema": "Licencias por leyes especiales (electoral, censo, juntas)", "q": "Los funcionarios designados por la Corte Electoral para actos eleccionarios se rigen por:", "opciones": ["Este reglamento exclusivamente", "Las normas de la Ley Electoral", "El Estatuto del Funcionario", "Una resolución de RRHH"], "correcta": 1, "expl": "El Art. 45 remite a las normas establecidas por la Ley Electoral.", "id": "5-26", "tema_id": 5, "
