la propiedad es un impedimento."}, {"ref": "Sociales — Préstamos sociales", "titulo": "Préstamos sociales para pasivos", "cita": "Es un préstamo en efectivo para jubilados y pensionistas de BPS.", "explicacion": "Permite solicitar o renovar préstamos (común o múltiple) a quienes perciben jubilaciones del BPS, pensiones de sobrevivencia, graciables, pensión reparatoria Ley 18.033 y pensiones de vejez o invalidez. Se puede hacer en línea (con usuario personal BPS) o presencial.", "ejemplo": "Un jubilado con usuario personal BPS simula y solicita un préstamo desde la app BPS Personas sin ir a una oficina."}, {"ref": "Sociales — Servicios sociales / Calidad de vida", "titulo": "Servicios sociales y Calidad de vida", "cita": "Son actividades agrupadas en forma de talleres, jornadas o instancias de formación... de los adultos mayores.", "explicacion": "Servicios sociales agrupa Calidad de vida, Atención integral, Apoyo a organizaciones civiles sin fines de lucro, Apoyo económico para instituciones y Apoyo a madres adolescentes y jóvenes. Calidad de vida ofrece talleres y actividades para pasivos del programa de vivienda, con múltiples convenios (EUTM, ANTEL, INAU, etc.).", "ejemplo": "En un complejo habitacional del BPS se dicta un taller de prevención de salud y una actividad recreativa para los adultos mayores residentes."}, {"ref": "Sociales — Turismo social y Educación permanente", "titulo": "Turismo social y Educación permanente", "cita": "El BPS fomenta el desarrollo de potencialidades en personas adultas... mejorar la salud por medio de la actividad física.", "explicacion": "Turismo social comprende Estadías vacacionales y Caminatas barriales. Educación permanente busca elevar la autoestima, la integración social y la salud de personas adultas, e incluye el Convenio UNI 3.", "ejemplo": "Un grupo de jubilados participa de una estadía vacacional organizada por el turismo social del BPS."}, {"ref": "Salud (índice)", "titulo": "Cómo se organizan las prestaciones de Salud", "cita": "Servicios Asistenciales de Salud; Evaluación Médica; Discapacidad; Afiliación Mutual.", "explicacion": "Las prestaciones de Salud del BPS se agrupan en cuatro grandes áreas: Servicios Asistenciales de Salud (Crenadecer y Atención primaria), Evaluación Médica, Discapacidad y Afiliación Mutual.", "ejemplo": "Si una pregunta menciona el Crenadecer, hay que ubicarlo dentro de Servicios Asistenciales de Salud, no en Discapacidad."}], "flashcards": [{"front": "Que es una contingencia en seguridad social?", "back": "Un hecho que genera a la persona una necesidad economica, por disminucion de ingresos o aumento de gastos (Conceptos generales).", "id": "3-0"}, {"front": "Diferencia entre prestaciones contributivas y no contributivas", "back": "Las contributivas requieren aporte previo; las no contributivas no (Conceptos generales).", "id": "3-1"}, {"front": "Diferencia entre prestaciones sustitutivas y complementarias", "back": "Las sustitutivas reemplazan el salario perdido (desempleo, maternidad, enfermedad) y estan gravadas; las complementarias ayudan con gastos extra (asignaciones, protesis, lentes) y no llevan descuentos (Conceptos generales).", "id": "3-2"}, {"front": "Cuanto dura el subsidio por desempleo por despido?", "back": "6 meses o 72 jornales; +6 meses si la persona tiene 50 anos al despido (Subsidio por desempleo).", "id": "3-3"}, {"front": "Porcentajes del subsidio por desempleo por despido (mensual)", "back": "1er mes 66 %, 2do 57 %, 3ro 50 %, 4to 45 %, 5to 42 %, 6to 40 % del promedio de 6 meses (Subsidio por desempleo).", "id": "3-4"}, {"front": "Cuando configura causal de reduccion laboral el desempleo?", "back": "Cuando la reduccion de jornada o dias es mayor al 25 %; los mensuales no tienen derecho a esta causal (Subsidio por desempleo).", "id": "3-5"}, {"front": "Plazo para solicitar el subsidio por desempleo", "back": "30 dias desde la causal; se pierde un mes por cada 30 dias de demora (Subsidio por desempleo).", "id": "3-6"}, {"front": "Cuanto dura y cuanto paga el subsidio por desempleo por suspension?", "back": "4 meses o 48 jornales; mensual/destajista 50 % del promedio; jornalero 12 jornales por mes (Subsidio por desempleo).", "id": "3-7"}, {"front": "Duracion del subsidio por maternidad", "back": "98 dias (14 semanas): 6 antes y 8 despues del parto; cobertura total no menor a 14 semanas (Subsidio por maternidad).", "id": "3-8"}, {"front": "Monto minimo del subsidio por maternidad", "back": "No puede ser inferior a 2 BPC por mes; no tiene tope maximo (Subsidio por maternidad).", "id": "3-9"}, {"front": "Que pasa si la empresa no puede dar el cambio temporario de actividades (Ley 17.215)?", "back": "Debe presentar declaracion jurada ante BPS; si la negativa es fundada, BPS da licencia especial cobrando la mitad del salario (Ley 17.215).", "id": "3-10"}, {"front": "Cuantos dias dura el subsidio por paternidad y como se reparten?", "back": "20 dias corridos: 3 los paga la empresa (Ley 18.345) y 17 BPS (Ley 19.161); extensible a 30 (Ley 20.000) (Subsidio por paternidad).", "id": "3-11"}, {"front": "Hasta que edad se puede usar el subsidio para cuidados parentales?", "back": "Hasta los 6 meses del nino/a (9 meses si hubo extension por complejidad); monto 50 % del jornal promedio (Subsidio para cuidados parentales).", "id": "3-12"}, {"front": "Cuantos dias de licencia por adopcion da el Decreto-Ley 15.084?", "back": "42 dias desde la tenencia judicial, sin medio horario (Licencias por adopcion).", "id": "3-13"}, {"front": "Desde que dia se paga el subsidio por enfermedad?", "back": "Desde el 4to dia de certificacion; desde el 1er dia si hay internacion (Subsidio por enfermedad).", "id": "3-14"}, {"front": "Cuanto paga el subsidio por enfermedad?", "back": "70 % del jornal promedio (6 meses sin aguinaldo), con tope mensual de 9,8709 BPC (Subsidio por enfermedad).", "id": "3-15"}, {"front": "Plazo maximo del subsidio por enfermedad", "back": "Un ano, extensible hasta un ano mas; periodos por la misma dolencia en 4 anos se acumulan (Subsidio por enfermedad).", "id": "3-16"}, {"front": "En accidente laboral, como se reparte el pago entre BSE y BPS?", "back": "El BSE abona el 66,67 % y BPS cubre la diferencia hasta el 70 % (3,33 %) (Subsidio por enfermedad - casos especiales).", "id": "3-17"}, {"front": "Desde cuando rige el SNIS y quien financia el Seguro Nacional de Salud?", "back": "Rige desde 2008; el SNS se financia con el Fonasa, BPS recauda y paga y la Junasa administra (SNIS).", "id": "3-18"}, {"front": "Requisito de Fonasa para dependientes privados", "back": "Minimo 13 jornales (104 horas) en el mes o percibir 1,25 BPC o mas (SNIS).", "id": "3-19"}, {"front": "Cuanto tiempo hay para cambiar el prestador asignado de oficio?", "back": "180 dias desde la afiliacion de oficio (Afiliaciones mutuales).", "id": "3-20"}, {"front": "Cual de los regimenes de asignacion familiar es prestacion de actividad?", "back": "Solo el regimen general del Decreto-Ley 15.084, porque el hecho generador es la actividad laboral (Asignaciones familiares).", "id": "3-21"}, {"front": "Montos de AF general por franja de ingresos", "back": "Hasta 7,4012 BPC: 0,1963 BPC; \u003e7,4012 y hasta 12,3380 BPC: 0,0982 BPC; \u003e12,3380 BPC: no corresponde (Decreto-Ley 15.084).", "id": "3-22"}, {"front": "Hasta que edad se cobra la AF general si se cursa secundaria?", "back": "Hasta los 18 anos si cursa secundaria, UTU u otros estudios superiores (Decreto-Ley 15.084).", "id": "3-23"}, {"front": "Que caracteriza a la AF del Plan de Equidad (Ley 18.227)?", "back": "Es no contributiva, para hogares en vulnerabilidad socioeconomica; Mides visita y puede otorgar o denegar (Ley 18.227).", "id": "3-24"}, {"front": "Como se multiplica el monto en AF por nacimientos multiples (Ley 17.474/20.365)?", "back": "Triple hasta los 5 anos, doble entre 6 y 12, comun de 13 a 18; pago hasta los 18 anos (Ley 17.474 y 20.365).", "id": "3-25"}, {"front": "Cada cuanto se renuevan los lentes comunes?", "back": "Cada 2 anos, o antes si hay cambio de graduacion mayor al 15 % (Protesis y lentes).", "id": "3-26"}, {"front": "Que protesis requiere aprobacion especial por expediente?", "back": "Las de costo superior a 35 UR (Protesis y lentes).", "id": "3-27"}, {"front": "Que cambio introdujo la Ley 16.713 en 1996?", "back": "Creo el sistema mixto: reparto por solidaridad intergeneracional (BPS) mas capitalizacion individual (AFAP), con vigencia desde el 1/4/1996 (Ley 16.713).", "id": "3-28"}, {"front": "Que creo la Ley 20.130 de 2023?", "back": "El Sistema Previsional Comun (SPC), para quienes registren su primera actividad en BPS desde el 1/12/2023; convive con los regimenes anteriores (Ley 20.130).", "id": "3-29"}, {"front": "Requisitos de jubilacion comun segun Ley 18.395", "back": "60 anos de edad y 30 anos de servicios (la Ley 16.713 exigia 60 y 35) (Ley 16.713 / 18.395).", "id": "3-30"}, {"front": "Edad de jubilacion normal del SPC para nacidos desde 1977", "back": "65 anos de edad con 30 anos de trabajo registrado (Ley 20.130).", "id": "3-31"}, {"front": "Como se calcula el SBJ en el SPC (Ley 20.130)?", "back": "Promedio de los 20 anos con mejor remuneracion de la historia laboral (Ley 20.130).", "id": "3-32"}, {"front": "Duracion maxima del subsidio transitorio por incapacidad parcial", "back": "Tres anos, o hasta configurar otra causal jubilatoria por la misma afiliacion (Subsidio transitorio por incapacidad parcial).", "id": "3-33"}, {"front": "Que es el SEIC y cuanto dura?", "back": "Subsidio especial por inactividad compensada (Ley 18.395 y 20.130): maximo 2 anos, 40 % del promedio de 6 meses, entre 1 y 8 BPC; requiere al menos 28 anos de trabajo (SEIC).", "id": "3-34"}, {"front": "Cuanto dura la pension por sobrevivencia para un viudo/a?", "back": "Menores de 30 anos: 2 anos; 30 a 39: 5 anos; mayores de 40: de por vida (Pensiones por sobrevivencia).", "id": "3-35"}, {"front": "Que monto tiene la pension a victimas de delitos violentos (Ley 19.039)?", "back": "6 BPC ($41.184, vigencia 1/5/2026) (Ley 19.039).", "id": "3-36"}, {"front": "Monto de las pensiones no contributivas de vejez e invalidez", "back": "$18.575 (vigencia 1/1/2026) (Pension vejez / Pension invalidez).", "id": "3-37"}, {"front": "Edad y requisitos clave de la pension vejez", "back": "70 anos, carencia de recursos y al menos 10 anos de residencia en los ultimos 20 (Pension vejez).", "id": "3-38"}, {"front": "Diferencia entre dictamen comun y severo en la pension invalidez", "back": "El severo (con residencia) se otorga sin mas gestion; el comun requiere ademas carencia de recursos (Pension invalidez).", "id": "3-39"}, {"front": "¿Qué es la Asistencia a la vejez?", "back": "Un programa de transferencia monetaria de Mides para personas mayores en pobreza extrema o indigencia. (Asistencia a la vejez, BPS)", "id": "3-40"}, {"front": "¿Qué edad deben tener los beneficiarios de la Asistencia a la vejez?", "back": "Entre 65 y 69 años, en situación de vulnerabilidad socioeconómica extrema. (Asistencia a la vejez, BPS)", "id": "3-41"}, {"front": "¿Qué organismo administra la Asistencia a la vejez?", "back": "El Mides (no es una jubilación ni pensión del BPS). (Asistencia a la vejez, BPS)", "id": "3-42"}, {"front": "¿Qué es el Crenadecer?", "back": "El Centro de Referencia Nacional de Defectos Congénitos y Enfermedades Raras. (Crenadecer, BPS)", "id": "3-43"}, {"front": "¿Por qué unidades está integrado el Crenadecer?", "back": "Unidades de Atención, Pesquisa Neonatal y Medicina Embriofetal y Perinatal. (Crenadecer, BPS)", "id": "3-44"}, {"front": "¿Cómo es la Pesquisa Neonatal en cuanto a alcance y costo?", "back": "Universal, gratuita y obligatoria, para todos los nacidos en el país. (Pesquisa Neonatal, BPS)", "id": "3-45"}, {"front": "¿Cómo y cuándo se toma la muestra de la Pesquisa Neonatal?", "back": "Del talón por punción con lanceta, luego de las 40 horas de vida y antes del alta de la maternidad. (Pesquisa Neonatal, BPS)", "id": "3-46"}, {"front": "¿Qué enfermedades pesquisa obligatoriamente el sistema?", "back": "HC, PKU, HSC, FQ y 24 enfermedades del metabolismo de aminoácidos, acidemias orgánicas y defectos de la beta oxidación. (Pesquisa Neonatal, BPS)", "id": "3-47"}, {"front": "¿Qué es la Ayuda extraordinaria (Ayex)?", "back": "Prestación económica no contributiva del BPS a personas con discapacidad o alteraciones en el desarrollo, para institutos y transporte. (Ayuda extraordinaria, BPS)", "id": "3-48"}, {"front": "¿Son compatibles las ayudas de instituto y de transporte de la Ayex?", "back": "No, son incompatibles entre sí, salvo resolución favorable del Directorio del BPS. (Ayuda extraordinaria, BPS)", "id": "3-49"}, {"front": "¿Qué evalúa la Evaluación de incapacidad?", "back": "La incapacidad de adultos y menores y la incapacidad laboral definitiva y transitoria del trabajador, emitiendo un dictamen médico. (Evaluación de incapacidad, BPS)", "id": "3-50"}, {"front": "¿Qué tres modalidades tiene Soluciones habitacionales?", "back": "Vivienda, cupos cama y subsidio de alquiler. (Soluciones habitacionales, BPS)", "id": "3-51"}, {"front": "¿Cuál es el tope de ingresos para Soluciones habitacionales?", "back": "12 UR ($ 23.056,32) de ingresos nominales. (Soluciones habitacionales, BPS)", "id": "3-52"}, {"front": "¿A quiénes corresponden los Préstamos sociales?", "back": "A jubilados y pensionistas del BPS (jubilaciones, pensiones de sobrevivencia, graciables, reparatoria 18.033, vejez o invalidez). (Préstamos sociales, BPS)", "id": "3-53"}, {"front": "¿En qué se agrupan los Servicios sociales del BPS?", "back": "Calidad de vida, Atención integral, Apoyo a organizaciones civiles sin fines de lucro, Apoyo económico para instituciones y Apoyo a madres adolescentes y jóvenes. (Servicios sociales, BPS)", "id": "3-54"}, {"front": "¿Qué incluye el Turismo social?", "back": "Estadías vacacionales y Caminatas barriales. (Turismo social, BPS)", "id": "3-55"}, {"front": "¿Cuáles son las cuatro áreas de las prestaciones de Salud del BPS?", "back": "Servicios Asistenciales de Salud, Evaluación Médica, Discapacidad y Afiliación Mutual. (Salud, BPS)", "id": "3-56"}, {"front": "¿Cuáles son las cuatro áreas de las prestaciones Sociales del BPS?", "back": "Soluciones habitacionales, Servicios sociales, Turismo social y Educación permanente. (Sociales, BPS)", "id": "3-57"}], "practica": [{"subtema": "Conceptos generales", "q": "Una contingencia en seguridad social se define como:", "opciones": ["Un beneficio fijo mensual", "Un hecho que genera necesidad economica por baja de ingresos o suba de gastos", "Un aporte obligatorio al Fonasa", "Una sancion por incumplimiento"], "correcta": 1, "expl": "Es un hecho que genera necesidad economica por disminucion de ingresos o aumento de gastos (Conceptos generales).", "id": "3-0", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Conceptos generales", "q": "Las prestaciones que reemplazan el salario perdido se denominan:", "opciones": ["Complementarias", "No contributivas", "Sustitutivas", "En especie"], "correcta": 2, "expl": "Las sustitutivas sustituyen el salario que se deja de percibir (Conceptos generales).", "id": "3-1", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Conceptos generales", "q": "Cual de estas prestaciones es complementaria?", "opciones": ["Subsidio por desempleo", "Subsidio por enfermedad", "Asignacion familiar", "Subsidio por maternidad"], "correcta": 2, "expl": "Las complementarias (asignaciones, protesis, lentes) ayudan con gastos y no llevan descuentos (Conceptos generales).", "id": "3-2", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Conceptos generales", "q": "Las prestaciones sustitutivas, respecto de las contribuciones a la seguridad social:", "opciones": ["Estan exoneradas siempre", "Estan gravadas y aportan a la seguridad social y Fonasa", "Solo aportan IRPF", "No tienen relacion con el salario"], "correcta": 1, "expl": "Las sustitutivas estan gravadas; las complementarias no llevan esos descuentos (Conceptos generales).", "id": "3-3", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por desempleo", "q": "Cuanto dura el subsidio por desempleo por causal despido?", "opciones": ["3 meses", "4 meses o 48 jornales", "6 meses o 72 jornales", "12 meses"], "correcta": 2, "expl": "Por despido dura 6 meses o 72 jornales, con +6 meses si tiene 50 anos (Subsidio por desempleo).", "id": "3-4", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por desempleo", "q": "El porcentaje del primer mes del subsidio por despido (mensual) es:", "opciones": ["50 %", "57 %", "66 %", "40 %"], "correcta": 2, "expl": "La escala decreciente arranca en 66 % el primer mes (Subsidio por desempleo).", "id": "3-5", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por desempleo", "q": "Para configurar causal de reduccion laboral, la reduccion debe ser:", "opciones": ["Mayor al 10 %", "Mayor al 25 %", "Exactamente del 50 %", "De cualquier porcentaje"], "correcta": 1, "expl": "La reduccion de jornada o dias debe ser mayor al 25 % (Subsidio por desempleo).", "id": "3-6", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por desempleo", "q": "Que sucede si la persona se presenta a solicitar el subsidio fuera del plazo de 30 dias?", "opciones": ["Pierde todo el subsidio", "Pierde un mes por cada 30 dias de demora", "No pasa nada", "Debe pagar una multa"], "correcta": 1, "expl": "Pierde un mes de subsidio por cada 30 dias de demora (Subsidio por desempleo).", "id": "3-7", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por desempleo", "q": "El suplemento del 20 % del subsidio por desempleo corresponde por:", "opciones": ["Antiguedad mayor a 10 anos", "Familia a cargo (conyuge, menores o mayores con discapacidad)", "Tener estudios terciarios", "Trabajar en zona rural"], "correcta": 1, "expl": "Se otorga por conyuge/concubino, menores o mayores con discapacidad, o descendientes menores de 21 (Subsidio por desempleo).", "id": "3-8", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por desempleo", "q": "El requisito para Industria y Comercio remuneracion mensual es:", "opciones": ["270 dias en 30 meses", "180 dias en planilla en los ultimos 12 meses", "150 jornales en 12 meses", "9 BPC en 30 meses"], "correcta": 1, "expl": "Industria y Comercio mensual: 180 dias en planilla en 12 meses (Subsidio por desempleo).", "id": "3-9", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por maternidad", "q": "El subsidio por maternidad cubre:", "opciones": ["60 dias", "90 dias", "98 dias (14 semanas)", "120 dias"], "correcta": 2, "expl": "Son 98 dias: 6 semanas antes y 8 despues del parto (Subsidio por maternidad).", "id": "3-10", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por maternidad", "q": "El monto del subsidio por maternidad no puede ser inferior a:", "opciones": ["1 BPC", "2 BPC por mes", "5 BPC", "9,8709 BPC"], "correcta": 1, "expl": "No puede ser inferior a 2 BPC por mes y no tiene tope maximo (Subsidio por maternidad).", "id": "3-11", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por maternidad", "q": "En caso de nacimientos multiples o bajo peso (\u003c=1,5 kg), el amparo se extiende hasta:", "opciones": ["12 semanas", "16 semanas", "18 semanas en total", "6 meses de edad"], "correcta": 2, "expl": "Multiple o bajo peso se extiende hasta 18 semanas en total (Subsidio por maternidad).", "id": "3-12", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por paternidad", "q": "El subsidio por paternidad totaliza:", "opciones": ["10 dias", "14 dias", "20 dias corridos", "30 dias fijos"], "correcta": 2, "expl": "3 dias paga la empresa (Ley 18.345) + 17 dias BPS (Ley 19.161) = 20 dias corridos (Subsidio por paternidad).", "id": "3-13", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por paternidad", "q": "El subsidio por paternidad se puede extender hasta 30 dias por:", "opciones": ["Solicitud del trabajador", "Nacimiento multiple, bajo peso, complejidad o prematuro (Ley 20.000)", "Tener mas de dos hijos", "Antiguedad laboral"], "correcta": 1, "expl": "Se extiende hasta 30 dias por esos casos segun la Ley 20.000 (Subsidio por paternidad).", "id": "3-14", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio para cuidados parentales", "q": "El subsidio para cuidados parentales permite trabajar:", "opciones": ["La jornada completa cobrando extra", "La mitad del horario habitual, sin superar 4 horas diarias", "Solo los fines de semana", "Un maximo de 6 horas"], "correcta": 1, "expl": "Medio horario, sin superar la mitad del horario ni 4 horas diarias, cobrando el 50 % (Subsidio para cuidados parentales).", "id": "3-15", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio para cuidados parentales", "q": "El subsidio para cuidados parentales se paga:", "opciones": ["De una sola vez", "Mensualmente y a mes vencido", "Semanalmente", "Cada bimestre"], "correcta": 1, "expl": "Se paga mensualmente y a mes vencido, a diferencia de maternidad y paternidad (Subsidio para cuidados parentales).", "id": "3-16", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Licencias por adopcion", "q": "La licencia por adopcion del Decreto-Ley 15.084 es de:", "opciones": ["20 dias", "42 dias desde la tenencia judicial", "98 dias", "10 dias habiles"], "correcta": 1, "expl": "42 dias desde la tenencia judicial, sin derecho a medio horario (Licencias por adopcion).", "id": "3-17", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Licencias por adopcion", "q": "El plazo para solicitar el subsidio por adopcion es de:", "opciones": ["15 dias", "30 dias desde que reciben al menor", "60 dias", "90 dias"], "correcta": 1, "expl": "30 dias a partir de recibir al nino/a; si no, se pierde el beneficio (Licencias por adopcion).", "id": "3-18", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por enfermedad", "q": "El subsidio por enfermedad se abona a partir del:", "opciones": ["Primer dia siempre", "Cuarto dia de certificacion (primero si hay internacion)", "Septimo dia", "Decimo dia"], "correcta": 1, "expl": "Desde el 4to dia de certificacion; desde el 1ro en caso de internacion (Subsidio por enfermedad).", "id": "3-19", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por enfermedad", "q": "El monto del subsidio por enfermedad es:", "opciones": ["50 % con tope de 8 BPC", "70 % del jornal promedio con tope de 9,8709 BPC", "100 % del salario", "40 % sin tope"], "correcta": 1, "expl": "70 % del jornal promedio de 6 meses, con tope mensual de 9,8709 BPC (Subsidio por enfermedad).", "id": "3-20", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por enfermedad", "q": "En un accidente laboral, BPS cubre:", "opciones": ["El 70 % completo", "El 66,67 %", "La diferencia entre el 66,67 % del BSE y el 70 % (3,33 %)", "Nada, lo cubre todo el BSE"], "correcta": 2, "expl": "El BSE paga 66,67 % y BPS cubre el 3,33 % restante hasta el 70 % (Subsidio por enfermedad).", "id": "3-21", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Subsidio por enfermedad", "q": "El plazo maximo del subsidio por enfermedad es:", "opciones": ["6 meses", "Un ano, extensible a otro ano", "3 anos", "Sin limite"], "correcta": 1, "expl": "Plazo maximo de un ano, extensible hasta un ano mas (Subsidio por enfermedad).", "id": "3-22", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Afiliaciones mutuales / SNIS", "q": "El Seguro Nacional de Salud se financia con:", "opciones": ["Rentas generales", "El Fonasa (Fondo Nacional de Salud)", "Aportes de las mutualistas", "Donaciones"], "correcta": 1, "expl": "El SNS se financia con el Fonasa; BPS recauda y paga (SNIS).", "id": "3-23", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Afiliaciones mutuales / SNIS", "q": "Que organismo administra el Seguro Nacional de Salud?", "opciones": ["El MEF", "La Junasa (Junta Nacional de Salud)", "ASSE", "El Fondo Nacional de Recursos"], "correcta": 1, "expl": "La Junasa administra el SNS y firma contratos de gestion con los prestadores (SNIS).", "id": "3-24", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Afiliaciones mutuales / SNIS", "q": "Tras una afiliacion de oficio, el plazo para cambiar de prestador es:", "opciones": ["30 dias", "90 dias", "180 dias", "1 ano"], "correcta": 2, "expl": "Cada persona tiene 180 dias para elegir otro prestador (Afiliaciones mutuales).", "id": "3-25", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Asignaciones familiares", "q": "Cual regimen de asignacion familiar es prestacion de actividad?", "opciones": ["Plan de Equidad (Ley 18.227)", "Regimen general (Decreto-Ley 15.084)", "Nacimientos multiples (Ley 17.474)", "Todos"], "correcta": 1, "expl": "Solo el del Decreto-Ley 15.084, porque el hecho generador es la actividad laboral (Asignaciones familiares).", "id": "3-26", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Asignaciones familiares", "q": "En la AF general, si la suma de ingresos no supera 7,4012 BPC se cobra por beneficiario:", "opciones": ["0,0982 BPC", "0,1963 BPC", "1,2338 BPC", "No corresponde"], "correcta": 1, "expl": "Primera franja: 0,1963 BPC por beneficiario (Decreto-Ley 15.084).", "id": "3-27", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Asignaciones familiares", "q": "La AF general se mantiene hasta los 18 anos cuando:", "opciones": ["El beneficiario trabaja", "Cursa secundaria, UTU u otros estudios superiores", "Tiene pension de invalidez", "Vive en zona rural"], "correcta": 1, "expl": "Hasta 18 si cursa estudios de nivel secundario en institutos habilitados (Decreto-Ley 15.084).", "id": "3-28", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Asignaciones familiares", "q": "La AF del Plan de Equidad (Ley 18.227) es:", "opciones": ["Contributiva y de actividad", "No contributiva, para hogares en vulnerabilidad socioeconomica", "Solo para empleados publicos", "Un pago unico"], "correcta": 1, "expl": "Es no contributiva para hogares vulnerables; Mides visita y resuelve (Ley 18.227).", "id": "3-29", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Asignaciones familiares", "q": "En AF por nacimientos multiples, el monto se multiplica por tres:", "opciones": ["Hasta los 18 anos", "En gestacion y hasta los 5 anos inclusive", "Solo en gestacion", "Hasta los 12 anos"], "correcta": 1, "expl": "Triple en gestacion y hasta los 5 anos; doble de 6 a 12; comun de 13 a 18 (Ley 17.474 y 20.365).", "id": "3-30", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Protesis y lentes", "q": "Los lentes comunes se renuevan, como regla, cada:", "opciones": ["6 meses", "1 ano", "2 anos", "3 anos"], "correcta": 2, "expl": "Cada 2 anos, salvo cambio de graduacion mayor al 15 % (Protesis y lentes).", "id": "3-31", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Protesis y lentes", "q": "Una protesis requiere aprobacion especial por expediente cuando su costo supera:", "opciones": ["10 UR", "35 UR", "50 UR", "100 UR"], "correcta": 1, "expl": "Las protesis de costo superior a 35 UR exigen aprobacion por expediente (Protesis y lentes).", "id": "3-32", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Regimenes de pasividad / Ley 16.713", "q": "La Ley 16.713 (1996) creo:", "opciones": ["Solo el regimen de reparto", "El sistema mixto: reparto BPS mas capitalizacion AFAP", "Las cajas por actividad", "El SPC"], "correcta": 1, "expl": "Creo el sistema mixto combinando solidaridad intergeneracional (BPS) y ahorro individual (AFAP) (Ley 16.713).", "id": "3-33", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Regimenes de pasividad / Ley 16.713", "q": "La jubilacion comun segun la Ley 18.395 requiere:", "opciones": ["60 anos y 35 servicios", "60 anos y 30 servicios", "65 anos y 25 servicios", "70 anos y 15 servicios"], "correcta": 1, "expl": "La Ley 18.395 flexibilizo a 60 anos y 30 servicios (la 16.713 exigia 60 y 35) (Ley 16.713).", "id": "3-34", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Ley 20.130 (SPC)", "q": "El Sistema Previsional Comun aplica a quienes registren su primera actividad en BPS desde:", "opciones": ["1/4/1996", "1/1/2009", "1/12/2023", "1/1/2033"], "correcta": 2, "expl": "El SPC cambia la distribucion de aportes para primeras actividades desde el 1/12/2023 (Ley 20.130).", "id": "3-35", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Ley 20.130 (SPC)", "q": "La edad de jubilacion normal del SPC para nacidos desde 1977 (con 30 anos de trabajo) es:", "opciones": ["60", "63", "65", "70"], "correcta": 2, "expl": "Para nacidos en 1977 en adelante: 65 anos con 30 de trabajo (Ley 20.130).", "id": "3-36", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Ley 20.130 (SPC)", "q": "El SBJ en el SPC se calcula con el promedio de:", "opciones": ["Los ultimos 3 anos", "Los 10 mejores anos", "Los 20 anos de mejor remuneracion", "Toda la vida laboral"], "correcta": 2, "expl": "Promedio de los 20 anos con mejor remuneracion de la historia laboral (Ley 20.130).", "id": "3-37", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Incapacidad", "q": "La jubilacion por incapacidad total es:", "opciones": ["Transitoria por 3 anos", "Contributiva vitalicia sujeta a controles", "No contributiva", "Un pago unico"], "correcta": 1, "expl": "Es contributiva, vitalicia y sujeta a controles de incompatibilidad (Jubilacion por incapacidad total).", "id": "3-38", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Incapacidad", "q": "El subsidio transitorio por incapacidad parcial dura como maximo:", "opciones": ["1 ano", "2 anos", "3 anos", "5 anos"], "correcta": 2, "expl": "Maximo 3 anos o hasta configurar otra causal jubilatoria (Subsidio transitorio por incapacidad parcial).", "id": "3-39", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "SEIC", "q": "El SEIC (Ley 18.395 y 20.130) requiere un minimo de trabajo de:", "opciones": ["15 anos", "20 anos", "28 anos", "35 anos"], "correcta": 2, "expl": "Requiere al menos 28 anos de trabajo registrado en BPS (SEIC).", "id": "3-40", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "SEIC", "q": "El monto del SEIC equivale al:", "opciones": ["70 % del salario", "40 % del promedio de 6 meses, entre 1 y 8 BPC", "50 % sin tope", "100 % de la jubilacion"], "correcta": 1, "expl": "40 % del promedio de remuneraciones de 6 meses; minimo 1 BPC, maximo 8 BPC (SEIC).", "id": "3-41", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Pensiones por sobrevivencia", "q": "La pension por sobrevivencia para un viudo/a mayor de 40 anos es:", "opciones": ["Por 2 anos", "Por 5 anos", "De por vida", "Solo si estudia"], "correcta": 2, "expl": "Mayores de 40 anos cobran de por vida (Pensiones por sobrevivencia).", "id": "3-42", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Pensiones por sobrevivencia", "q": "Para que la pension beneficie a hijos/as, el minimo de actividad del generante es:", "opciones": ["2 anos", "3 anos", "Sin minimo", "10 anos"], "correcta": 2, "expl": "Sin minimo de actividad cuando la pension beneficia a hijos/as (Pensiones por sobrevivencia).", "id": "3-43", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Pensiones especiales", "q": "La pension a victimas de delitos violentos (Ley 19.039) equivale a:", "opciones": ["2 BPC", "6 BPC", "8 BPC", "10 BPC"], "correcta": 1, "expl": "Es de 6 BPC ($41.184, vigencia 1/5/2026) (Ley 19.039).", "id": "3-44", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Pensiones especiales", "q": "La asignacion familiar especial de la Ley 18.850 se deposita en el BROU hasta que el beneficiario cumple:", "opciones": ["14 anos", "16 anos", "18 anos", "21 anos"], "correcta": 2, "expl": "Se deposita hasta los 18 anos, cuando el beneficiario puede acceder a los fondos (Ley 18.850).", "id": "3-45", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Pensiones no contributivas", "q": "La pension vejez se otorga a personas de:", "opciones": ["60 anos", "65 anos", "70 anos que carecen de recursos", "Cualquier edad con discapacidad"], "correcta": 2, "expl": "70 anos, carencia de recursos y 10 anos de residencia en los ultimos 20 (Pension vejez).", "id": "3-46", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Pensiones no contributivas", "q": "La pension vejez por cuidados exige haber cuidado de forma no remunerada por un minimo de:", "opciones": ["3 anos", "5 anos", "7 anos", "10 anos"], "correcta": 2, "expl": "Cuidado directo y no remunerado por al menos 7 anos, entre los 65 y 70 anos (Pension vejez por cuidados).", "id": "3-47", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Pensiones no contributivas", "q": "En la pension invalidez, el dictamen severo (con residencia):", "opciones": ["Requiere ademas carencia de recursos", "Se otorga sin otra gestion", "No da derecho a la pension", "Exige 10 anos de aportes"], "correcta": 1, "expl": "Con dictamen severo y residencia cumplida, se otorga sin otra gestion; el comun requiere carencia (Pension invalidez).", "id": "3-48", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Pensiones no contributivas", "q": "El monto de las pensiones no contributivas (vejez/invalidez) a 1/1/2026 es:", "opciones": ["$17.222", "$18.575", "$41.184", "$96.279"], "correcta": 1, "expl": "$18.575 (vigencia 1/1/2026) (Pension vejez / Pension invalidez).", "id": "3-49", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Asistencia a la vejez", "q": "¿Qué tipo de prestación es la Asistencia a la vejez?", "opciones": ["Una pensión por invalidez", "Un programa de transferencia monetaria de Mides para mayores en pobreza extrema", "Una jubilación común del BPS", "Un préstamo en efectivo"], "correcta": 1, "expl": "Es un programa de transferencia monetaria de Mides a personas mayores en pobreza extrema o indigencia. (Asistencia a la vejez, BPS)", "id": "3-50", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Asistencia a la vejez", "q": "¿Cuál es el rango de edad de los beneficiarios de la Asistencia a la vejez?", "opciones": ["Cualquier edad", "Entre 65 y 69 años", "Entre 60 y 64 años", "70 años o más"], "correcta": 1, "expl": "Personas de entre 65 y 69 años en situación de vulnerabilidad socioeconómica extrema. (Asistencia a la vejez, BPS)", "id": "3-51", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Asistencia a la vejez", "q": "Además de la edad, ¿qué condición exige la Asistencia a la vejez?", "opciones": ["Ser propietario de vivienda", "Estar afiliado a una mutualista", "Tener 30 años de aportes", "Situación de vulnerabilidad socioeconómica extrema"], "correcta": 3, "expl": "Se exige situación de vulnerabilidad socioeconómica extrema. (Asistencia a la vejez, BPS)", "id": "3-52", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Prestaciones de salud", "q": "¿Qué es el Crenadecer?", "opciones": ["Un programa de turismo social", "Un complejo habitacional para jubilados", "El Centro de Referencia Nacional de Defectos Congénitos y Enfermedades Raras", "Una caja de préstamos"], "correcta": 2, "expl": "El Crenadecer es el Centro de Referencia Nacional de Defectos Congénitos y Enfermedades Raras. (Crenadecer, BPS)", "id": "3-53", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Prestaciones de salud", "q": "La Pesquisa Neonatal del sistema nacional es:", "opciones": ["Solo para hijos de funcionarios del BPS", "Universal, gratuita y obligatoria", "Opcional y paga", "Solo para afiliados a mutualistas"], "correcta": 1, "expl": "Es universal, gratuita y obligatoria para todos los nacidos en el país. (Pesquisa Neonatal, BPS)", "id": "3-54", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Prestaciones de salud", "q": "¿Cuándo se toma la muestra de sangre para la Pesquisa Neonatal?", "opciones": ["Del talón, luego de las 40 horas de vida y antes del alta", "Recién al año de edad", "Al cumplir un mes de vida", "Antes de nacer"], "correcta": 0, "expl": "Se toma del talón por punción luego de las 40 horas de vida y antes del alta de la maternidad. (Pesquisa Neonatal, BPS)", "id": "3-55", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Prestaciones de salud", "q": "¿Cuál de estas NO es una enfermedad de la pesquisa neonatal obligatoria nombrada por el BPS?", "opciones": ["Fenilcetonuria (PKU)", "Fibrosis Quística (FQ)", "Diabetes tipo 2", "Hipotiroidismo Congénito (HC)"], "correcta": 2, "expl": "Las pesquisadas son HC, PKU, HSC, FQ y 24 enfermedades metabólicas; la diabetes tipo 2 no figura. (Pesquisa Neonatal, BPS)", "id": "3-56", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Prestaciones de salud", "q": "¿Qué hace la Evaluación de incapacidad?", "opciones": ["Adjudica viviendas", "Otorga préstamos a pasivos", "Organiza turismo social", "Determina la incapacidad y emite un dictamen médico que puede derivar en una prestación económica"], "correcta": 3, "expl": "Determina la incapacidad de adultos y menores y la laboral del trabajador, emitiendo un dictamen médico. (Evaluación de incapacidad, BPS)", "id": "3-57", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Prestaciones de salud", "q": "La Ayuda extraordinaria (Ayex) es una prestación dirigida a:", "opciones": ["Personas con discapacidad o alteraciones en el desarrollo", "Estudiantes universitarios", "Todos los jubilados sin excepción", "Empresas con deudas"], "correcta": 0, "expl": "Es una prestación económica no contributiva del BPS para personas con discapacidad o alteraciones en el desarrollo. (Ayuda extraordinaria, BPS)", "id": "3-58", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Prestaciones de salud", "q": "Respecto de la Ayex, las ayudas de instituto y de transporte son:", "opciones": ["Solo para mayores de 70 años", "Siempre acumulables", "Incompatibles entre sí, salvo resolución del Directorio", "Gestionadas por Mides exclusivamente"], "correcta": 2, "expl": "Son incompatibles entre sí, salvo resolución favorable del Directorio del BPS. (Ayuda extraordinaria, BPS)", "id": "3-59", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Prestaciones sociales", "q": "¿Cuáles son las tres modalidades de Soluciones habitacionales?", "opciones": ["Estadías, caminatas y talleres", "Vivienda, cupos cama y subsidio de alquiler", "Préstamo, beca y pensión", "Lentes, prótesis y audífonos"], "correcta": 1, "expl": "Tiene tres tipos de soluciones: vivienda, cupos cama y subsidio de alquiler. (Soluciones habitacionales, BPS)", "id": "3-60", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Prestaciones sociales", "q": "¿Cuál es el tope de ingresos para acceder a Soluciones habitacionales?", "opciones": ["Sin tope", "12 UR", "46,51 UR", "20 UR"], "correcta": 1, "expl": "El tope es de 12 UR ($ 23.056,32) de ingresos nominales. (Soluciones habitacionales, BPS)", "id": "3-61", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Prestaciones sociales", "q": "¿Qué es un impedimento para acceder a Soluciones habitacionales?", "opciones": ["Residir en el interior", "Tener entre 65 y 69 años", "Cobrar por banco", "Ser propietario o usufructuario de una vivienda"], "correcta": 3, "expl": "Es impedimento ser propietario, copropietario, usufructuario, promitente comprador o titular de otros programas de vivienda. (Soluciones habitacionales, BPS)", "id": "3-62", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Prestaciones sociales", "q": "Los Préstamos sociales del BPS están dirigidos a:", "opciones": ["Jubilados y pensionistas del BPS", "Empresas privadas", "Trabajadores en actividad únicamente", "Estudiantes"], "correcta": 0, "expl": "Es un préstamo en efectivo para jubilados y pensionistas del BPS. (Préstamos sociales, BPS)", "id": "3-63", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Prestaciones sociales", "q": "¿Qué subprograma integra los Servicios sociales del BPS?", "opciones": ["Pesquisa Neonatal", "Crenadecer", "Calidad de vida", "Evaluación de incapacidad"], "correcta": 2, "expl": "Servicios sociales incluye Calidad de vida, Atención integral, Apoyo a organizaciones civiles, Apoyo económico para instituciones y Apoyo a madres adolescentes y jóvenes. (Servicios sociales, BPS)", "id": "3-64", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Prestaciones sociales", "q": "¿Cuáles son las cuatro áreas de las prestaciones Sociales del BPS?", "opciones": ["Soluciones habitacionales, Servicios sociales, Turismo social y Educación permanente", "Lentes, prótesis, audífonos y órtesis", "Jubilaciones, pensiones, subsidios y préstamos", "Crenadecer, Atención primaria, Evaluación Médica y Discapacidad"], "correcta": 0, "expl": "Las prestaciones Sociales son Soluciones habitacionales, Servicios sociales, Turismo social y Educación permanente. (Sociales, BPS)", "id": "3-65", "tema_id": 3, "tema_nombre": "Prestaciones"}, {"subtema": "Prestaciones sociales", "q": "El Turismo social del BPS comprende:", "opciones": ["Lentes y audífonos", "PAP y colposcopía", "Préstamos y subsidios", "Estadías vacacionales y Caminatas barriales"], "correcta": 3, "expl": "Turismo social incluye Estadías vacacionales y Caminatas barriales. (Turismo social, BPS)", "id": "3-66", "tema_id": 3, "tema_nombre": "Prestaciones"}], "autoeval": [{"q": "Explica la diferencia entre prestaciones sustitutivas y complementarias y su tratamiento tributario.", "a": "Las sustitutivas reemplazan el salario perdido por una contingencia (desempleo, maternidad, enfermedad) y estan gravadas, por lo que aportan contribuciones a la seguridad social y Fonasa. Las complementarias ayudan con gastos extra (afiliacion mutual, asignaciones familiares, protesis y lentes, ordenes y ayudas) y no llevan esos descuentos (Conceptos generales)."}, {"q": "Describe las causales que habilitan el subsidio por desempleo.", "a": "Despido (fin de la relacion por causa ajena al trabajador), suspension total o parcial del trabajo, reduccion laboral mayor al 25 % (no aplica a mensuales) y multiempleo (despido o suspension en uno de varios empleos) (Subsidio por desempleo)."}, {"q": "Detalla la cobertura y el monto del subsidio por maternidad.", "a": "98 dias (14 semanas): 6 antes y 8 despues del parto, con extensiones por complejidad (6 meses), multiple/bajo peso (18 semanas) o prematuro (33 semanas). Se paga de una vez por 98 jornales del promedio de 6 meses gravados; minimo 2 BPC por mes, sin tope (Subsidio por maternidad)."}, {"q": "Como se compone el subsidio por paternidad y cuando se extiende?", "a": "20 dias corridos: 3 los paga la empresa (Ley 18.345) y 17 BPS (Ley 19.161). Se extiende hasta 30 dias por nacimiento multiple, bajo peso, complejidad o prematuro (Ley 20.000). Monto: 10 jornales, minimo 2 BPC, sin tope (Subsidio por paternidad)."}, {"q": "Explica el funcionamiento del SNIS, el Fonasa y la Junasa.", "a": "El SNIS rige desde 2008 y da cobertura integral. El Seguro Nacional de Salud se financia con el Fonasa: BPS recauda los aportes y paga las cuotas salud a los prestadores segun las ordenes de la Junasa, organismo desconcentrado del MSP que administra el seguro y firma contratos de gestion (SNIS)."}, {"q": "Compara los tres regimenes de asignacion familiar desarrollados.", "a": "General (Decreto-Ley 15.084): contributivo y de actividad, montos por franja de ingresos y edades segun escolaridad. Plan de Equidad (Ley 18.227): no contributivo para hogares vulnerables, con intervencion de Mides. Nacimientos multiples (Ley 17.474 y 20.365): basado en el 15.084, con montos x3/x2/comun segun la edad, hasta los 18 anos (Asignaciones familiares)."}, {"q": "Que cambios introdujeron la Ley 16.713 y la Ley 20.130?", "a": "La Ley 16.713 (1996) creo el sistema mixto (reparto BPS + capitalizacion AFAP) con regimenes de transicion y mixto. La Ley 20.130 (2023) creo el Sistema Previsional Comun, con jubilacion normal desde 2033, edad creciente por ano de nacimiento, SBJ con los 20 mejores anos y convergencia de regimenes para ceses 2033-2042 (Ley 16.713 / Ley 20.130)."}, {"q": "Describe el SEIC: requisitos, duracion y monto.", "a": "El Subsidio especial por inactividad compensada (Ley 18.395 y 20.130) se otorga por maximo 2 anos a quien quedo sin empleo y no puede jubilarse por falta de edad o anos. Requiere al menos 28 anos de trabajo, la edad segun ano de nacimiento, un ano de desocupacion en el pais y no tener otros ingresos (salvo sobrevivencia). Monto: 40 % del promedio de 6 meses, entre 1 y 8 BPC (SEIC)."}, {"q": "Quienes pueden ser beneficiarios de la pension por sobrevivencia y por cuanto tiempo cobran los viudos?", "a": "Beneficiarios: viudos/equiparados, hijos (menores de 21, hasta 23 estudiando, o incapaces) y padres/madres incapacitados dependientes. Los viudos cobran 2 anos si tienen menos de 30, 5 anos entre 30 y 39 y de por vida si son mayores de 40 (Pensiones por sobrevivencia)."}, {"q": "Compara las pensiones no contributivas de vejez, vejez por cuidados e invalidez.", "a": "Las tres son no contributivas y de $18.575 (1/1/2026). Vejez: 70 anos y carencia de recursos. Vejez por cuidados: 65-70 anos con 7 anos de cuidado no remunerado. Invalidez: dictamen comun (requiere carencia) o severo (se otorga con la residencia). Todas exigen 10 anos de residencia en los ultimos 20 y son incompatibles con otras pensiones no contributivas (Pension vejez / por cuidados / invalidez)."}], "huecos": ["Las páginas oficiales del BPS no publican el número de Ley 18.241 textual ni el monto vigente de la Asistencia a la vejez, ni los montos de Soluciones habitacionales/Préstamos sociales (solo condiciones y topes de ingreso). Esos importes se actualizan periódicamente; consultá bps.gub.uy para el valor del día.", "Subprogramas sociales como 'apoyo a organizaciones civiles' y 'personas mayores en situación de calle' figuran listados en el índice oficial sin desarrollo extenso en la página consultada."], "fuentes_extra": [{"nombre": "Asistencia a la vejez - BPS", "url": "https://www.bps.gub.uy/21159/asistencia-a-la-vejez.html"}, {"nombre": "Salud - BPS", "url": "https://www.bps.gub.uy/9513/salud.html"}, {"nombre": "Servicios Asistenciales de Salud - BPS", "url": "https://www.bps.gub.uy/9515/servicios-asistenciales-de-salud.html"}, {"nombre": "Crenadecer - BPS", "url": "https://www.bps.gub.uy/10594/crenadecer.html"}, {"nombre": "Pesquisa Neonatal - BPS", "url": "https://www.bps.gub.uy/3543/pesquisa-neonatal.html"}, {"nombre": "Atención primaria - BPS", "url": "https://www.bps.gub.uy/22362/atencion-primaria.html"}, {"nombre": "Atención primaria y promoción de salud - BPS", "url": "https://www.bps.gub.uy/10289/atencion-primaria-y-promocion-de-salud.html"}, {"nombre": "Evaluación Médica - BPS", "url": "https://www.bps.gub.uy/22363/evaluacion-medica.html"}, {"nombre": "Evaluación de incapacidad - BPS", "url": "https://www.bps.gub.uy/22364/evaluacion-de-incapacidad.html"}, {"nombre": "Discapacidad - BPS", "url": "https://www.bps.gub.uy/22366/discapacidad.html"}, {"nombre": "Prótesis y Ortesis - BPS", "url": "https://www.bps.gub.uy/22367/protesis-y-ortesis.html"}, {"nombre": "Ayuda extraordinaria - BPS", "url": "https://www.bps.gub.uy/3555/ayudas-extraordinarias.html"}, {"nombre": "Sociales - BPS", "url": "https://www.bps.gub.uy/9514/sociales.html"}, {"nombre": "Soluciones habitacionales - BPS", "url": "https://www.bps.gub.uy/11425/soluciones-habitacionales.html"}, {"nombre": "Préstamos sociales - BPS", "url": "https://www.bps.gub.uy/11390/prestamos-sociales.html"}, {"nombre": "Servicios sociales - BPS", "url": "https://www.bps.gub.uy/10277/servicios-sociales.html"}, {"nombre": "Calidad de vida - BPS", "url": "https://www.bps.gub.uy/10278/calidad-de-vida.html"}, {"nombre": "Turismo social - BPS", "url": "https://www.bps.gub.uy/6385/turismo-social.html"}, {"nombre": "Educación permanente - BPS", "url": "https://www.bps.gub.uy/23865/educacion-permanente.html"}], "nota_fuentes": "Las secciones de Asistencia a la vejez, Prestaciones de salud y Prestaciones sociales se completaron desde las páginas oficiales del BPS (ver 'Fuentes complementarias') porque el PDF base se truncó en la descarga en la pág. 62/74."}, {"id": 4, "tema": "Protección Social, misión, visión y organización del BPS", "fuente_pagina": "https://www.bps.gub.uy/24265/", "fuente_pdf": "https://www.bps.gub.uy/bps/file/24265/1/proteccion-social-mision-vision-y-organizacion-del-bps.pdf", "fuente_nombre": "Protección Social, misión, visión y organización del BPS (edición 2026) - Centro de Estudios de Seguridad Social, Salud y Administración, BPS", "ficha": "Material de estudio oficial del BPS que recorre los conceptos de protección y seguridad social (origen, principios y financiamiento), la evolución de la protección social en Uruguay y la creación del BPS como ente autónomo por el artículo 195 de la Constitución de 1967. Desarrolla además el plan estratégico vigente (misión, visión, valores, lineamientos) y la estructura organizativa del organismo (Directorio, Gerencia General, direcciones técnicas y áreas de apoyo). Sirve para entender qué es la seguridad social, qué naturaleza jurídica tiene el BPS y cómo está organizado para cumplir sus cometidos.", "eli5": "Imaginá un club al que todos los vecinos aportan una cuota mientras pueden trabajar. Cuando alguien se enferma, se queda sin trabajo, tiene un hijo o se hace grande, el club le da plata o servicios para que no quede desamparado: eso es la seguridad social. En Uruguay ese club gigante y oficial es el BPS, una especie de banco del Estado pero independiente (ente autónomo). Lo dirige un Directorio en el que mandan juntos el gobierno, los trabajadores, las empresas y los jubilados, y tiene áreas: una que cobra los aportes (ATYR) y otras que reparten las jubilaciones, la salud y la ayuda social.", "esquema": ["1. Protección social y seguridad social (concepto)", "  - Seguridad social: medidas públicas que compensan la falta/reducción de ingresos (OIT)", "  - Protección social: concepto más amplio (acciones públicas y privadas, contributivas y no contributivas)", "  - Asistencia social y prestaciones no contributivas", "2. Funciones de los sistemas de seguridad social", "  - Niveles mínimos de bienestar, sustituir ingresos, inserción/reinserción, redistribución", "3. Nacimiento y evolución del término", "  - Bismarck (1880s), Social Security Act EE.UU. (1935), Informe Beveridge (1942)", "  - OIT: Convenio 102 (1952), Recomendación 202 (2012)", "4. Principios de la seguridad social (10)", "  - Solidaridad, Igualdad, Universalidad, Suficiencia, Responsabilidad del Estado, Equidad, Obligatoriedad, Participación, Unidad, Derechos adquiridos", "5. Conceptos fundamentales: contingencia, prestación, clasificación de prestaciones", "6. Financiamiento y piso de protección social (escalera de 3 niveles)", "7. Protección social en Uruguay (evolución histórica)", "  - Pensión a la vejez 1919 (Ley 6.874), Caja Ciganda 1896, Caja Carnelli 1919", "8. Creación y caracterización del BPS", "  - Art. 195 Constitución 1967: Ente Autónomo", "  - Tres elementos: organización bancaria, autonomía, Directorio con participación social", "  - Etapas: cometidos/estructura, intervención (DGSS), reinstitucionalización (Ley 15.800)", "9. Plan estratégico (período 2025-2030)", "  - Misión, Visión, 9 Valores, 8 Lineamientos estratégicos", "10. Estructura organizativa y funciones", "  - Directorio (7 miembros), Gerencia/Subgerencia General", "  - Direcciones Técnicas: Prestaciones y ATYR", "  - Áreas de asesoría, apoyo y prestaciones (salud, económicas, sociales)"], "datos_duros": ["Definición de seguridad social (OIT): serie de medidas públicas que buscan proteger a la sociedad para compensar la falta o reducción de ingresos por enfermedad, maternidad, accidentes de trabajo, desempleo, invalidez, vejez y muerte de quien sostiene la familia (Introducción, pág. 6).", "Alemania fue el primer país en crear un programa de seguro social (vejez), impulsado por Otto von Bismarck mediante tres leyes en la década de 1880 (Nacimiento y evolución, pág. 9-10).", "Social Security Act: aprobada el 14 de agosto de 1935 por Franklin D. Roosevelt en EE.UU. (Nacimiento y evolución, pág. 9).", "Informe Beveridge: plan presentado en 1942 por William Beveridge en Inglaterra (Nacimiento y evolución, pág. 9).", "Convenio 102 de la OIT (1952): establece estándares mínimos de protección y define 9 ramas de la seguridad social (Conceptos fundamentales, pág. 17).", "Recomendación 202 de la OIT sobre pisos de protección social: adoptada en Ginebra en 2012 (Piso de protección social, pág. 20).", "Hoy el 52 % de la población mundial está cubierta por algún tipo de protección social; 3.800 millones de personas siguen totalmente desprotegidas (Los principios, pág. 11).", "Los 10 principios de la seguridad social: 1. Solidaridad, 2. Igualdad, 3. Universalidad, 4. Suficiencia o integridad, 5. Responsabilidad del Estado, 6. Equidad, 7. Obligatoriedad, 8. Participación, 9. Unidad, 10. Respeto de los derechos adquiridos o en curso de adquisición (Los principios, pág. 12).", "Triple función de los principios (Américo Plá Rodríguez, 1957): informadora, integradora e interpretativa (Los principios, pág. 12).", "Escalera de protección social (OIT), 3 niveles: 1) piso de garantías básicas para todas las personas, 2) prestaciones contributivas, 3) prestaciones voluntarias reguladas por el Estado (Piso de protección social, pág. 21).", "1919: Uruguay aprobó la Pensión por vejez, primera prestación universal y no contributiva de América Latina (Protección social en Uruguay, pág. 24). Ley 6.874 del 11 de febrero de 1919 amparaba a mayores de 65 años en indigencia (pág. 30).", "Caja Escolar de Jubilaciones y Pensiones creada en 1896 por la ley Ciganda; primera caja de administración y financiamiento tripartito de América (Protección social en Uruguay, pág. 27).", "Día del Trabajador del BPS: 28 de mayo (aprobación en 1896 del proyecto de ley Ciganda-Palomeque); el art. 69 del Decreto 616/006 faculta a otorgar asueto (recuadro, pág. 27).", "Ley 6.962 (ley Carnelli, 1919) creó la Caja de Jubilaciones y Pensiones de empleados y obreros de los servicios públicos. La ley Ciganda y la ley Carnelli son los pilares del sistema previsional uruguayo (pág. 30-31).", "Instituto de Jubilaciones y Pensiones del Uruguay: creado en 1934 bajo el gobierno de Gabriel Terra para contrarrestar la dispersión administrativa (pág. 31).", "El BPS fue creado por el artículo 195 de la Constitución que rige desde 1967, con carácter de Ente Autónomo (Creación y caracterización, pág. 33-34).", "Texto del art. 195: 'Créase el Banco de Previsión Social, con carácter de Ente Autónomo, con el cometido de coordinar los servicios estatales de previsión social y organizar la seguridad social...' (pág. 33).", "Tres elementos básicos de la organización del BPS: organización bancaria de los servicios, carácter autónomo de la institución e integración del directorio con participación de los actores involucrados (Características generales, pág. 34).", "Integración del Directorio (norma constitucional): a) cuatro miembros del Poder Ejecutivo, uno lo preside; b) uno electo por afiliados activos; c) uno electo por afiliados pasivos; d) uno electo por las empresas contribuyentes (pág. 34).", "En 1992 el Directorio se integró por primera vez con siete representantes; en 2006 se eligieron las representaciones sociales por votación directa (pág. 34).", "Acto Institucional 9 (octubre de 1979): sustituyó al BPS por la Dirección General de Seguridad Social (DGSS) (Segunda etapa, pág. 35).", "Ley 15.800 (1985): reinstitucionalizó el BPS y suprimió la DGSS (Tercera etapa, pág. 36).", "Ley 16.713: sistema mixto de previsión social en vigencia desde el 1 de abril de 1996 (Tercera etapa, pág. 36).", "Ley 20.130, promulgada el 2 de mayo de 2023: crea el nuevo Sistema Previsional Común (pág. 37-38).", "El BPS se basa en planificación estratégica desde 2006; el Plan vigente abarca el período 2025-2030 (Plan estratégico, pág. 42).", "Misión (texto): 'Garantizar el acceso a los derechos de las personas y el cumplimiento de las obligaciones de Seguridad Social, administrando los recursos en forma eficiente y brindando una atención oportuna y satisfactoria para el usuario...' (Plan estratégico, pág. 42).", "Visión (texto): 'Ser un Instituto cercano y de gestión transparente, que acompañe a las personas en todas las etapas de su vida, con un equipo humano comprometido, profesional y orientado a la mejora continua.' (pág. 43).", "Valores del BPS (9): Responsabilidad social, Articulación interinstitucional, Transparencia, Acceso universal y equitativo, Calidad de atención, Participación, Solidaridad, Mejora continua e innovación, Compromiso con la gestión humana (pág. 43-44).", "Se establecen ocho lineamientos estratégicos con objetivos asociados (Plan estratégico, pág. 44-45).", "Directorio actual: órgano colegiado de siete miembros, cuatro por designación del Poder Ejecutivo y tres por elección de la ciudadanía (Funciones, pág. 46).", "Dirección Técnica de ATYR = Asesoría Tributaria y Recaudación: asegura la recaudación y fiscalización, registra la historia laboral y distribuye los aportes personales (Estructura, pág. 47).", "Dirección Técnica de Prestaciones: brinda prestaciones económicas, sociales y de salud para cubrir las contingencias de vejez, invalidez y sobrevivencia (Estructura, pág. 47).", "Quedaron fuera de la órbita del BPS las cajas paraestatales (Bancaria, Notarial y de Profesionales Universitarios) y los servicios de retiro Militar y Policial (Creación, pág. 33)."], "teoria_resumida": "\u003cp\u003eEl TEMA 4 articula tres bloques: \u003cstrong\u003equé es la seguridad/protección social\u003c/strong\u003e, \u003cstrong\u003ecómo nació el BPS y su naturaleza jurídica\u003c/strong\u003e, y \u003cstrong\u003ecómo está organizado hoy\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSeguridad social vs. protección social.\u003c/strong\u003e La \u003cstrong\u003eseguridad social\u003c/strong\u003e es el conjunto de medidas públicas que compensan la falta o reducción de ingresos por enfermedad, maternidad, accidentes de trabajo, desempleo, invalidez, vejez y muerte del sostén de familia (definición OIT, pág. 6). La \u003cstrong\u003eprotección social\u003c/strong\u003e es un concepto más amplio: incluye toda acción pública y privada para proteger a las personas, abarcando prestaciones contributivas y no contributivas (asistencia social), sin importar si la persona aporta o trabaja (pág. 7). El término moderno nace con \u003cstrong\u003eBismarck\u003c/strong\u003e (Alemania, leyes de 1880), la \u003cstrong\u003eSocial Security Act\u003c/strong\u003e de EE.UU. (1935) y el \u003cstrong\u003eInforme Beveridge\u003c/strong\u003e (1942), consolidándose con el \u003cstrong\u003eConvenio 102 de la OIT (1952)\u003c/strong\u003e.\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eFunciones\u003c/strong\u003e de los sistemas: garantizar pisos mínimos de bienestar, sustituir ingresos, favorecer la inserción/reinserción social y \u003cstrong\u003eredistribuir la riqueza\u003c/strong\u003e (pág. 8).\u003c/li\u003e\u003cli\u003e\u003cstrong\u003e10 principios\u003c/strong\u003e: solidaridad, igualdad, universalidad, suficiencia, responsabilidad del Estado, equidad, obligatoriedad, participación, unidad y respeto de derechos adquiridos (pág. 12). La \u003cstrong\u003esolidaridad\u003c/strong\u003e es el principio fundador.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eConceptos\u003c/strong\u003e: la \u003cstrong\u003econtingencia\u003c/strong\u003e es el hecho que genera una necesidad económica; la \u003cstrong\u003eprestación\u003c/strong\u003e es la herramienta para atenderla (en dinero, especie o servicios; contributiva o no contributiva; de corto o largo plazo).\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eNaturaleza jurídica del BPS.\u003c/strong\u003e El BPS fue creado por el \u003cstrong\u003eartículo 195 de la Constitución de 1967\u003c/strong\u003e con \u003cstrong\u003ecarácter de Ente Autónomo\u003c/strong\u003e y el cometido de \u003cstrong\u003ecoordinar los servicios estatales de previsión social y organizar la seguridad social\u003c/strong\u003e (pág. 33). Se concibió bajo tres ideas: organización bancaria de los servicios, carácter autónomo e integración del Directorio con participación de los actores sociales (pág. 34). Pasó por una \u003cstrong\u003eintervención\u003c/strong\u003e en la dictadura (Acto Institucional 9 de 1979, sustituido por la DGSS) y fue \u003cstrong\u003ereinstitucionalizado por la Ley 15.800 (1985)\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePlan estratégico (2025-2030).\u003c/strong\u003e Define \u003cstrong\u003emisión\u003c/strong\u003e (garantizar derechos y obligaciones de seguridad social administrando recursos eficientemente), \u003cstrong\u003evisión\u003c/strong\u003e (ser un Instituto cercano y transparente que acompañe en todas las etapas de la vida), \u003cstrong\u003e9 valores\u003c/strong\u003e y \u003cstrong\u003e8 lineamientos estratégicos\u003c/strong\u003e (pág. 42-45).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOrganización.\u003c/strong\u003e El máximo órgano es el \u003cstrong\u003eDirectorio\u003c/strong\u003e, colegiado de \u003cstrong\u003esiete miembros\u003c/strong\u003e: cuatro designados por el Poder Ejecutivo (uno lo preside) y tres electos por la ciudadanía (un activo, un pasivo y un representante de las empresas contribuyentes) (pág. 34, 46). La \u003cstrong\u003eGerencia General y Subgerencia General\u003c/strong\u003e ejecutan las políticas del Directorio. Las dos grandes direcciones técnicas son la \u003cstrong\u003eDirección Técnica de Prestaciones\u003c/strong\u003e (otorga prestaciones por vejez, invalidez y sobrevivencia) y la \u003cstrong\u003eDirección Técnica de ATYR\u003c/strong\u003e (Asesoría Tributaria y Recaudación: recauda, fiscaliza, lleva la historia laboral y distribuye aportes) (pág. 47).\u003c/p\u003e", "teoria_exhaustiva": [{"ref": "Introducción (pág. 6)", "titulo": "Definición de seguridad social", "cita": "Serie de medidas públicas que buscan la protección de la sociedad a sus miembros para compensar la falta o reducción de ingresos (OIT).", "explicacion": "Es la respuesta organizada del Estado frente a las contingencias que reducen los ingresos de las personas. El modelo no es único: cada sociedad elige el suyo respetando principios básicos (prestaciones seguras y obligatorias, gestión transparente, costos bajos, participación de interlocutores sociales).", "ejemplo": "Una jubilación que sustituye el salario perdido al llegar a la vejez."}, {"ref": "Protección social (pág. 7)", "titulo": "Protección social y asistencia social", "cita": "El concepto de protección social es amplio, ya que incluye todas las acciones públicas y privadas destinadas a proteger a las personas.", "explicacion": "La protección social es más amplia que la seguridad social: incluye planes voluntarios, servicios comunitarios y la asistencia social (prestaciones no contributivas para quienes no aportan por vulnerabilidad). Se dirige a toda la población, aporte o no.", "ejemplo": "Una pensión no contributiva a la vejez para una persona en situación de indigencia."}, {"ref": "Principales funciones (pág. 8)", "titulo": "Funciones de los sistemas", "cita": "Garantizar niveles mínimos de bienestar; sustituir ingresos; favorecer la inserción o reinserción social; redistribución de la riqueza.", "explicacion": "La redistribución puede ser horizontal (entre trabajadores y quienes enfrentan enfermedad/desempleo) o vertical (de mayores a menores ingresos); esta última es la que principalmente se busca promover.", "ejemplo": "El seguro de desempleo sustituye ingresos durante el tiempo sin trabajo."}, {"ref": "Nacimiento y evolución (pág. 9-10)", "titulo": "Hitos del término seguridad social", "cita": "Alemania fue el primer país en crear un programa de seguro social... impulsado por el canciller Otto von Bismarck.", "explicacion": "Bismarck (leyes de 1880) inaugura el seguro social obligatorio tripartito; la Social Security Act de EE.UU. (1935, Roosevelt) incorpora el término al mundo occidental; el Informe Beveridge (1942) modela los sistemas universales.", "ejemplo": "El financiamiento tripartito (trabajadores, empleadores y Estado) proviene del modelo bismarckiano."}, {"ref": "Convenio 102 OIT (pág. 17)", "titulo": "Las 9 ramas de la seguridad social", "cita": "El Convenio 102 define quién tiene derecho a qué y en qué condiciones, para todas y cada una de las ramas de la seguridad social.", "explicacion": "Las 9 ramas (Normas Internacionales OIT) son: asistencia médica, prestaciones de desempleo, de trabajo y accidentes profesionales, de maternidad, monetarias de enfermedad, de invalidez, familiares, de sobrevivientes y de vejez.", "ejemplo": "Las prestaciones de maternidad y las de vejez son dos ramas distintas amparadas."}, {"ref": "Los principios (pág. 12-15)", "titulo": "Los 10 principios", "cita": "Solidaridad, Igualdad, Universalidad, Suficiencia o integridad, Responsabilidad del Estado, Equidad, Obligatoriedad, Participación, Unidad, Respeto de los derechos adquiridos.", "explicacion": "La solidaridad es el principio fundador (cada quien aporta según su capacidad y recibe según su necesidad). La universalidad tiene vertiente objetiva (cubrir todas las contingencias) y subjetiva (amparar a todas las personas). La participación incluye, en Uruguay, a jubilados y pensionistas.", "ejemplo": "La obligatoriedad implica que el ingreso al sistema no es voluntario."}, {"ref": "Conceptos fundamentales (pág. 16)", "titulo": "Contingencia y prestación", "cita": "Se entiende por contingencia determinado hecho que, al ocurrir, le genera a la persona una necesidad económica.", "explicacion": "La contingencia puede reducir ingresos (vejez, enfermedad, desempleo) o aumentar gastos (nacimiento). La prestación es el instrumento jurídico para atenderla; para acceder hay que constatar la contingencia y cumplir requisitos.", "ejemplo": "El nacimiento de un hijo es una contingencia que aumenta los gastos y habilita prestaciones familiares."}, {"ref": "Clasificación de prestaciones (pág. 18)", "titulo": "Tipos de prestaciones", "cita": "En dinero, en especie, en servicios; contributivas y no contributivas; de largo plazo y corto plazo.", "explicacion": "Por financiamiento: contributivas (requieren aportes previos) o no contributivas/asistenciales. Por forma: dinero (jubilación), especie (lentes, vivienda) o servicios (salud). Por duración: largo plazo (jubilaciones, pensiones) o corto plazo (salud, desempleo, maternidad).", "ejemplo": "El subsidio por desempleo es una prestación de corto plazo en dinero."}, {"ref": "Piso de protección social (pág. 21)", "titulo": "Escalera de protección social (OIT)", "cita": "La OIT sugiere una protección escalonada que incluye tres niveles.", "explicacion": "Nivel 1: piso de garantías básicas para todas las personas. Nivel 2: prestaciones contributivas (financiadas por trabajadores y empleadores). Nivel 3: prestaciones voluntarias, públicas/privadas/mixtas, reguladas por el Estado.", "ejemplo": "Una pensión no contributiva pertenece al primer nivel (piso)."}, {"ref": "Protección social en Uruguay (pág. 24, 30)", "titulo": "Pensión a la vejez de 1919", "cita": "La aprobación en 1919 de la primera prestación de carácter universal y no contributiva de América Latina: la Pensión por vejez.", "explicacion": "La Ley 6.874 (11/2/1919) amparaba a personas mayores de 65 años (o de cualquier edad con invalidez absoluta) en situación de indigencia, sin exigir aportes previos. Marcó un avance por su grado de universalidad.", "ejemplo": "Un anciano indigente sin historia de aportes podía acceder a esta pensión."}, {"ref": "Protección social en Uruguay (pág. 27)", "titulo": "Caja Escolar (ley Ciganda, 1896)", "cita": "La creación de la Caja Escolar de Jubilaciones y Pensiones en 1896 mediante la ley Ciganda.", "explicacion": "Primera caja con financiamiento tripartito de América (afiliados, Estado como patrón e impuestos). Independizó el financiamiento de rentas generales mediante un fondo propio. El 28 de mayo es el Día del Trabajador del BPS en su conmemoración.", "ejemplo": "El financiamiento tripartito de la Caja Escolar sirvió de modelo a otras cajas."}, {"ref": "Creación del BPS (pág. 33)", "titulo": "Artículo 195 de la Constitución (1967)", "cita": "Créase el Banco de Previsión Social, con carácter de Ente Autónomo, con el cometido de coordinar los servicios estatales de previsión social y organizar la seguridad social.", "explicacion": "El BPS nace en la Constitución que rige desde 1967 como ente autónomo (máximo grado de autonomía e independencia). Sus directores no pueden ser candidatos a cargos electivos hasta transcurrido un período de gobierno desde su cese (remite al art. 201). Quedaron fuera las cajas paraestatales y los servicios militar y policial.", "ejemplo": "Por ser ente autónomo, el BPS tiene independencia técnica frente al gobierno central."}, {"ref": "Características generales (pág. 34)", "titulo": "Tres elementos del diseño del BPS", "cita": "La organización bancaria de estos servicios, el carácter autónomo de la nueva institución, la integración en su directorio con participación de los actores involucrados.", "explicacion": "El legislador Demicheli defendió la mentalidad bancaria para sanear la administración. La autonomía le da independencia. El Directorio con representación social cumple el principio de administración democrática.", "ejemplo": "La 'mentalidad bancaria' explica por qué se llama Banco de Previsión Social aunque no sea un banco comercial."}, {"ref": "Integración del Directorio (pág. 34)", "titulo": "Composición constitucional del Directorio", "cita": "a) cuatro miembros designados por el Poder Ejecutivo, uno de los cuales lo presidirá; b) uno electo por los afiliados activos; c) uno electo por los afiliados pasivos; d) uno electo por las empresas contribuyentes.", "explicacion": "Siete miembros en total. En 1992 se integró por primera vez con siete representantes y en 2006 se eligieron las representaciones sociales por votación directa, cumpliendo cabalmente la disposición constitucional.", "ejemplo": "El representante de los pasivos (jubilados y pensionistas) es electo por ese colectivo."}, {"ref": "Segunda y tercera etapa (pág. 35-36)", "titulo": "Intervención y reinstitucionalización", "cita": "El Acto Institucional 9... sustituyó a BPS por la Dirección General de Seguridad Social (DGSS).", "explicacion": "En 1979 (dictadura) el BPS fue sustituido por la DGSS y se derogaron aportes patronales (recaudados vía IVA). En 1985 la Ley 15.800 reinstitucionalizó el BPS y suprimió la DGSS, recuperando su independencia técnica y administrativa.", "ejemplo": "La DGSS administró el fondo de seguridad social durante la dictadura hasta 1985."}, {"ref": "Plan estratégico - Misión (pág. 42)", "titulo": "Misión del BPS", "cita": "Garantizar el acceso a los derechos de las personas y el cumplimiento de las obligaciones de Seguridad Social, administrando los recursos en forma eficiente y brindando una atención oportuna y satisfactoria para el usuario.", "explicacion": "Tres ejes: garantizar el acceso a los derechos, eficiente administración de recursos y atención oportuna y satisfactoria, en el marco de las competencias que le asignan la Constitución y la Ley.", "ejemplo": "Resolver un trámite jubilatorio en plazo y bien es cumplir la misión."}, {"ref": "Plan estratégico - Visión (pág. 43)", "titulo": "Visión del BPS", "cita": "Ser un Instituto cercano y de gestión transparente, que acompañe a las personas en todas las etapas de su vida, con un equipo humano comprometido, profesional y orientado a la mejora continua.", "explicacion": "La visión es la imagen futura deseada: cercanía, transparencia, acompañamiento en todo el ciclo de vida y un equipo humano profesional.", "ejemplo": "Atender a una persona desde el nacimiento (asignación familiar) hasta la vejez (jubilación) refleja 'todas las etapas de la vida'."}, {"ref": "Plan estratégico - Valores (pág. 43-44)", "titulo": "Los 9 valores del BPS", "cita": "Responsabilidad social; Articulación interinstitucional; Transparencia; Acceso universal y equitativo; Calidad de atención; Participación; Solidaridad; Mejora continua e innovación; Compromiso con la gestión humana.", "explicacion": "Guían la conducta institucional. La transparencia incluye actuar con integridad, imparcialidad y autonomía técnica; la solidaridad expresa el compromiso colectivo y la redistribución de recursos.", "ejemplo": "Coordinar con MIDES para una respuesta integral es 'articulación interinstitucional'."}, {"ref": "Lineamientos estratégicos (pág. 44-45)", "titulo": "Los 8 lineamientos estratégicos", "cita": "Se establecen ocho lineamientos estratégicos, a los cuales se les asocian diferentes objetivos.", "explicacion": "Incluyen: facilitar la gestión del ciudadano; optimizar el otorgamiento de beneficios; fortalecer la gestión tributaria (formalización); transformar la gestión interna con foco en el usuario; impulsar el desarrollo de las personas que trabajan en el Instituto; fortalecer vínculos interinstitucionales; promover el conocimiento sobre seguridad social; y potenciar la transformación digital y la gobernanza.", "ejemplo": "Mejorar los canales de autogestión web responde al lineamiento 1 (facilitar la gestión)."}, {"ref": "Estructura - Directorio (pág. 46)", "titulo": "Directorio (funciones)", "cita": "Es un órgano colegiado que se integra con siete miembros: cuatro por designación del Poder Ejecutivo y tres por elección de la ciudadanía.", "explicacion": "Es el órgano de conducción superior. Define las políticas que la Gerencia General ejecuta. Su carácter colegiado y la participación social plasman el principio de administración democrática.", "ejemplo": "El Directorio aprueba el Plan Estratégico que luego ejecutan las gerencias."}, {"ref": "Estructura - Gerencia General (pág. 46)", "titulo": "Gerencia y Subgerencia General", "cita": "Su función es llevar adelante las políticas definidas por el Directorio, coordinando y realizando las acciones necesarias para cumplir los planes estratégicos y operativos.", "explicacion": "Es el brazo ejecutivo de las decisiones del Directorio; coordina las direcciones técnicas y áreas para ejecutar planes estratégicos y operativos.", "ejemplo": "La Gerencia General coordina a Prestaciones y ATYR para implementar una reforma."}, {"ref": "Estructura - Asesorías y apoyo (pág. 46-47)", "titulo": "Áreas de asesoría al Directorio", "cita": "Asesoría General en Seguridad Social... analizar la información estadística y actuarial... Auditoría Interna... fortalecer los sistemas de control interno.", "explicacion": "Asesoran al Directorio: la Asesoría General en Seguridad Social (análisis estadístico-actuarial para la sostenibilidad), la Auditoría Interna (control y gestión de riesgos), la Secretaría General de Directorio, la Asesoría Legal General y la Asesoría en Informática y Tecnología.", "ejemplo": "Las proyecciones actuariales de sostenibilidad son producidas por la Asesoría General en Seguridad Social."}, {"ref": "Estructura - Dirección Técnica de Prestaciones (pág. 47)", "titulo": "Dirección Técnica de Prestaciones", "cita": "Es el área a cargo de brindar las prestaciones económicas, sociales y de salud destinadas a cubrir las contingencias derivadas de la vejez, invalidez y sobrevivencia.", "explicacion": "Es una de las dos grandes direcciones técnicas. Bajo ella operan áreas como Prestaciones de Salud, Prestaciones Económicas y Prestaciones Sociales.", "ejemplo": "El otorgamiento de una jubilación por vejez se gestiona en el ámbito de esta dirección."}, {"ref": "Estructura - Dirección Técnica de ATYR (pág. 47)", "titulo": "ATYR (Asesoría Tributaria y Recaudación)", "cita": "Es el área a cargo de asegurar la recaudación y fiscalización de las obligaciones de los contribuyentes. Realiza el registro de la historia laboral y la distribución de los aportes personales.", "explicacion": "ATYR es el área recaudadora y fiscalizadora. Lleva la historia laboral de los trabajadores y distribuye los aportes personales (por ejemplo, entre BPS y AFAP en el régimen mixto).", "ejemplo": "Cuando una empresa paga aportes mensuales, ATYR los recauda y registra en la historia laboral del trabajador."}, {"ref": "Estructura - otras áreas (pág. 47-48)", "titulo": "Áreas de soporte y prestaciones específicas", "cita": "Unidades Descentralizadas... gestionar y supervisar los servicios de BPS en todo el país; Finanzas; Administración; Gestión Humana; Prestaciones de Salud (Crenadecer); Prestaciones Económicas; Prestaciones Sociales.", "explicacion": "Las Unidades Descentralizadas gestionan agencias y sucursales del interior. Prestaciones de Salud incluye el Centro de Referencia Nacional de Defectos Congénitos y Enfermedades Raras (Crenadecer). Prestaciones Sociales atiende a adultos mayores y personas con discapacidad.", "ejemplo": "Una sucursal del BPS en una ciudad del interior depende de Unidades Descentralizadas."}], "flashcards": [{"front": "¿Cómo define la OIT la seguridad social?", "back": "Serie de medidas públicas que buscan proteger a la sociedad para compensar la falta o reducción de ingresos por enfermedad, maternidad, accidentes de trabajo, desempleo, invalidez, vejez y muerte del sostén de familia (pág. 6).", "id": "4-0"}, {"front": "¿Qué diferencia hay entre protección social y seguridad social?", "back": "La protección social es un concepto más amplio: incluye toda acción pública y privada para proteger a las personas (contributiva y no contributiva), dirigida a toda la población aporte o no. La seguridad social es parte de ella (pág. 7).", "id": "4-1"}, {"front": "¿Qué son las prestaciones no contributivas?", "back": "Medidas de protección (asistencia social) para personas que no aportan al sistema por estar en situación de vulnerabilidad; pueden darse en dinero o servicios (pág. 7).", "id": "4-2"}, {"front": "¿Cuáles son las 4 funciones principales de los sistemas de seguridad social?", "back": "Garantizar pisos mínimos de bienestar, sustituir ingresos, favorecer la inserción/reinserción social y redistribuir la riqueza (pág. 8).", "id": "4-3"}, {"front": "¿Quién creó el primer programa de seguro social y cuándo?", "back": "Otto von Bismarck, en Alemania, mediante tres leyes en la década de 1880 (primero para la vejez) (pág. 9-10).", "id": "4-4"}, {"front": "¿Qué es la Social Security Act y de qué año es?", "back": "La Ley de Seguridad Social de EE.UU., aprobada el 14 de agosto de 1935 por Franklin D. Roosevelt; incorporó el término al mundo occidental (pág. 9).", "id": "4-5"}, {"front": "¿Qué importancia tiene el Convenio 102 de la OIT (1952)?", "back": "Establece estándares mínimos de protección y define las 9 ramas de la seguridad social; cada Estado lo adapta a su realidad (pág. 17).", "id": "4-6"}, {"front": "Enumerá los 10 principios de la seguridad social.", "back": "Solidaridad, Igualdad, Universalidad, Suficiencia o integridad, Responsabilidad del Estado, Equidad, Obligatoriedad, Participación, Unidad y Respeto de los derechos adquiridos o en curso de adquisición (pág. 12).", "id": "4-7"}, {"front": "¿Cuál es el principio fundador de la seguridad social?", "back": "La solidaridad: cada quien aporta según su capacidad contributiva y recibe según sus necesidades; puede ser intergeneracional (horizontal) o intrageneracional/vertical (pág. 13).", "id": "4-8"}, {"front": "¿Cuáles son las dos vertientes de la universalidad?", "back": "Objetiva (cubrir todas las contingencias a las que está expuesta la persona) y subjetiva (amparar a todas las personas sin discriminación) (pág. 13).", "id": "4-9"}, {"front": "¿Qué es una contingencia en seguridad social?", "back
