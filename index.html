 Matrimonio, Nacimiento, Antigüedad, Hogar Constituido, Prestaciones por Hijos, Compensación a la Persona, Prestación por Alimentación, Fondo de Participación, Cuota Mutual, Guardería Interior, Jardín Maternal de Montevideo (Art. 51).", "Procedimiento disciplinario: rige el principio non bis in ídem (Art. 60).", "Todos los procedimientos disciplinarios son de carácter secreto; su violación es falta grave (Art. 61).", "La suspensión preventiva es preceptiva cuando los hechos imputados constituyan falta grave, con retención de los medios sueldos (Art. 69).", "La suspensión preventiva y la retención de medios sueldos no pueden exceder los 6 meses (Art. 70).", "Faltas clasificadas como leves, semigraves o graves (Art. 63).", "La destitución como medida disciplinaria solo procede por las causales de ineptitud, omisión o delito (Art. 73 inc. g).", "La relación funcional se extingue por 10 causales (Art. 73, incs. a-j).", "Comisión bipartita permanente integrada por representantes del BPS y ATSS (Art. 74).", "Todos los Reglamentos del Estatuto son aprobados exclusivamente por el Directorio del BPS (Art. 76)."], "teoria_resumida": "\u003cp\u003eEl \u003cstrong\u003eEstatuto del Funcionario del BPS\u003c/strong\u003e es la norma marco (76 artículos, Caps. I-XIII) que regula la relación laboral de quienes trabajan en el Banco de Previsión Social. Conviene estudiarlo como un recorrido del vínculo: cómo se entra, cómo se trabaja y cómo se sale.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuién es funcionario y cómo se ingresa (Caps. I-III).\u003c/strong\u003e Es funcionario quien es designado por el Directorio, en forma permanente o temporal, en subordinación jerárquica (Art. 1). Para ingresar hay que cumplir requisitos: ciudadanía (natural o 3 años de legal), edad legal, aptitud física por Carné de Salud, haber votado, declaración jurada de ausencia de incompatibilidad y todo otro requisito legal (Art. 2, incs. a-f). Toda designación de ingreso es \u003cstrong\u003eprecaria y revocable dentro de 6 meses\u003c/strong\u003e (Art. 3): es el período de prueba. El ingreso se hace por \u003cstrong\u003econcurso de oposición y méritos, concurso de méritos y prueba de aptitud/suficiencia, o sorteo\u003c/strong\u003e (Art. 4), siempre por el último grado del escalafón (Art. 5).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCarrera: capacitación y escalafones (Caps. IV-V).\u003c/strong\u003e La Administración distingue \u003cstrong\u003eentrenamiento\u003c/strong\u003e (habilidad para el cargo actual, Art. 9), \u003cstrong\u003ecapacitación\u003c/strong\u003e (acceder a cargos superiores, Art. 10) y \u003cstrong\u003edesarrollo\u003c/strong\u003e (conocimientos que trascienden el cargo, Art. 11). Hay \u003cstrong\u003e7 escalafones\u003c/strong\u003e (Art. 13): \u003cstrong\u003eR\u003c/strong\u003e Gerencial, \u003cstrong\u003eA\u003c/strong\u003e Profesional Universitario (carrera de 4+ años), \u003cstrong\u003eB\u003c/strong\u003e Técnico Universitario (2+ años), \u003cstrong\u003eC\u003c/strong\u003e Administrativo, \u003cstrong\u003eD\u003c/strong\u003e Especializado, \u003cstrong\u003eE\u003c/strong\u003e de Oficios, \u003cstrong\u003eF\u003c/strong\u003e Servicios Auxiliares. \u003cem\u003eEl aspirante administrativo es el escalafón C\u003c/em\u003e: registro, clasificación, manejo y archivo de datos y documentos, más tareas de planificación, coordinación, organización, dirección y control.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCalificaciones, evaluaciones y ascensos (Cap. VI).\u003c/strong\u003e Los funcionarios se \u003cstrong\u003ecalifican anualmente\u003c/strong\u003e (Art. 17); la calificación pesa en incentivos y ascensos (Art. 18). La \u003cstrong\u003eevaluación\u003c/strong\u003e va de jefatura a gerencia (Art. 19, con excepciones de cúpula). Los \u003cstrong\u003eascensos\u003c/strong\u003e son por concurso de mérito y antecedentes o de oposición y méritos (Art. 21), y entre el llamado y la provisión no se pueden superar \u003cstrong\u003e18 meses\u003c/strong\u003e (Art. 22).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eObligaciones, prohibiciones e incompatibilidades (Cap. VII).\u003c/strong\u003e Las obligaciones (Art. 23, incs. a-m) incluyen prestar el cargo personalmente, trato respetuoso, lealtad al servicio, reserva, buena conducta, comunicar irregularidades, declarar domicilio (cambios en 48 hs hábiles) y vínculos de parentesco hasta 2.º grado, y mantener el Carné de Salud. Las prohibiciones abarcan no trabajar en dependencia jerárquica directa con parientes hasta 2.º grado (Art. 24), no integrar consultoras/gestoras vinculadas (Art. 25), no presentarse a licitaciones del Organismo (Art. 26), no aceptar dádivas para torcer un acto (Art. 28-30) y no hacer proselitismo político en el trabajo (Art. 31).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSubrogación (Cap. VIII).\u003c/strong\u003e La \u003cstrong\u003eacefalía\u003c/strong\u003e es la ausencia temporal o definitiva de un cargo (Art. 32). La subrogación de Jefatura o Gerencia se dispone por resolución fundada del Directorio; el sustituto cobra la diferencia salarial \u003cstrong\u003ea partir de los 45 días\u003c/strong\u003e de la ausencia del titular, y el cargo se provee por ascenso dentro de \u003cstrong\u003e18 meses\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDerechos, garantías y licencias (Cap. IX).\u003c/strong\u003e Incluyen derecho al ascenso y justa calificación (Art. 35), condiciones de higiene y seguridad (Art. 34), reconversión (Art. 38), garantías ante traslados (Art. 39, que \u003cem\u003eno\u003c/em\u003e puede usarse como sanción), asociación gremial (Art. 44), \u003cstrong\u003ehuelga\u003c/strong\u003e (Art. 45), convenios colectivos (Art. 46), legajo individual (Arts. 47-48) y un amplio menú de \u003cstrong\u003ebeneficios/primas\u003c/strong\u003e (Art. 51). La \u003cstrong\u003elicencia anual\u003c/strong\u003e es de \u003cstrong\u003e20 días hábiles como mínimo\u003c/strong\u003e (Art. 54), hay licencias especiales (Art. 55, incs. a-m) y asueto el \u003cstrong\u003e28 de mayo\u003c/strong\u003e, día del funcionario (Art. 56).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProcedimiento disciplinario (Cap. X).\u003c/strong\u003e Rige el \u003cstrong\u003enon bis in ídem\u003c/strong\u003e (Art. 60); los procedimientos son \u003cstrong\u003esecretos\u003c/strong\u003e (Art. 61). La \u003cstrong\u003efalta administrativa\u003c/strong\u003e es todo acto u omisión, intencional o culposo, que incumpla deberes o viole prohibiciones (Art. 62), y se clasifica en leve, semigrave o grave (Art. 63). Las faltas no de constatación directa requieren \u003cstrong\u003einvestigación administrativa\u003c/strong\u003e (Art. 65) o \u003cstrong\u003esumario\u003c/strong\u003e (Art. 66). La \u003cstrong\u003esuspensión preventiva\u003c/strong\u003e es preceptiva en faltas graves (Art. 69) y no puede exceder \u003cstrong\u003e6 meses\u003c/strong\u003e (Art. 70).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExtinción del vínculo y disposiciones finales (Caps. XI-XIII).\u003c/strong\u003e La relación funcional se extingue por 10 causales (Art. 73, incs. a-j): renuncia aceptada, fallecimiento, revocación por legalidad, cesantía por abandono, cesantía por falta superviniente de calidades, cese por edad máxima, \u003cstrong\u003edestitución disciplinaria (solo por ineptitud, omisión o delito)\u003c/strong\u003e, cesantía del Art. 3, destitución por incapacidad y redistribución como excedentario. Existe una \u003cstrong\u003ecomisión bipartita BPS-ATSS\u003c/strong\u003e (Art. 74) y todos los Reglamentos se aprueban exclusivamente por el Directorio (Art. 76).\u003c/p\u003e", "teoria_exhaustiva": [{"ref": "Art. 1", "titulo": "Ámbito de aplicación", "cita": "Es funcionario toda persona incorporada regularmente al Organismo, mediante designación por el Directorio, con carácter permanente o temporal, en subordinación jerárquica.", "explicacion": "Define a quién se aplica el Estatuto y qué es ser funcionario del BPS. El criterio clave es la designación por el Directorio y el régimen de subordinación jerárquica, sin importar la forma de remuneración. Otras modalidades de contratación se rigen por sus contratos/convenios, pero el Estatuto se aplica supletoriamente en lo compatible.", "ejemplo": "Un administrativo designado por el Directorio para tareas de archivo es funcionario; un contrato de servicios personales se rige por su convenio, salvo lo que el Estatuto agregue de forma compatible."}, {"ref": "Art. 2", "titulo": "Requisitos de ingreso (incs. a-f)", "cita": "Para ingresar se requiere: a) ciudadanía (natural o 3 años de legal); b) edad legal; c) aptitud física por Carné de Salud; d) voto obligatorio cumplido; e) declaración jurada de ausencia de incompatibilidad; f) todo otro requisito legal.", "explicacion": "Es la lista de condiciones para entrar como funcionario público al BPS. Memorizar los seis incisos por letra. El inc. e remite a las prohibiciones e incompatibilidades del Cap. VII Sección II. La omisión de voto no se subsana con multa, salvo que la ley lo permita.", "ejemplo": "Un postulante ciudadano natural, mayor con Carné de Salud vigente, que votó en la última elección y firma la declaración jurada de no tener cargo público incompatible, cumple los requisitos."}, {"ref": "Art. 3", "titulo": "Designación precaria de 6 meses", "cita": "Toda designación de ingreso es precaria y revocable por resolución fundada dentro de los seis meses desde la toma de posesión; el superior eleva informe con 30 días de anticipación, plazo no prorrogable.", "explicacion": "Es el período de prueba del ingresante. Durante 6 meses la designación puede revocarse de forma fundada. El superior debe informar, con no menos de 30 días de anticipación al vencimiento, recomendando mantener o no el vínculo. Omitir ese informe es falta administrativa.", "ejemplo": "A los 5 meses de ingresar, el jefe eleva un informe recomendando el mantenimiento; si no lo eleva a tiempo, incurre en falta administrativa."}, {"ref": "Art. 4", "titulo": "Formas de selección de personal", "cita": "El ingreso se realiza mediante concurso de oposición y méritos, concurso de méritos y prueba de aptitud o suficiencia, o sorteo, salvo que la normativa prevea otra forma.", "explicacion": "Establece los mecanismos válidos de selección. La regla es el concurso; el sorteo es una de las opciones previstas. La reglamentación detalla las pruebas. Importante para entender por qué hay concursos (llamados) como el del aspirante.", "ejemplo": "Un llamado para el escalafón C puede consistir en un concurso de méritos más prueba de suficiencia."}, {"ref": "Art. 5", "titulo": "Incorporación por último grado", "cita": "La incorporación como presupuestado o contratado se hace por el último grado del presupuesto o del escalafón y de la serie o especialidad correspondiente.", "explicacion": "Quien ingresa entra por el grado más bajo del escalafón/serie correspondiente al llamado. La carrera se construye luego mediante ascensos.", "ejemplo": "El nuevo administrativo ingresa por el grado inicial del escalafón C, no por un grado intermedio."}, {"ref": "Art. 6", "titulo": "Prioridad del personal presupuestado", "cita": "La presupuestación de contratados y la incorporación de redistribuidos está condicionada a la previa realización de promociones y cobertura de vacantes por el personal presupuestado.", "explicacion": "Da prioridad al personal presupuestado: primero se hacen sus promociones y se cubren vacantes, y recién después se presupuesta contratados o se incorpora personal redistribuido.", "ejemplo": "Antes de presupuestar a un contratado, el BPS debe haber agotado las promociones disponibles del personal presupuestado."}, {"ref": "Art. 7", "titulo": "Nómina de excedentarios de la ONSC", "cita": "Previa evaluación de necesidades del servicio, el Directorio deberá requerir a la ONSC la nómina de funcionarios excedentarios de otros Organismos Públicos.", "explicacion": "Antes de incorporar personal, el Directorio debe consultar a la ONSC (Oficina Nacional del Servicio Civil) la lista de funcionarios excedentarios de otros organismos, para priorizar su reubicación.", "ejemplo": "Ante una necesidad de personal, primero se revisa si hay excedentarios disponibles en la nómina de la ONSC."}, {"ref": "Arts. 8-9", "titulo": "Entrenamiento", "cita": "La Administración entrena, capacita y fomenta el desarrollo de sus funcionarios. El entrenamiento consiste en aumentar el conocimiento y la habilidad para el desempeño de determinado cargo y función.", "explicacion": "El entrenamiento apunta al cargo actual: mejorar la habilidad para hacer la tarea que ya se tiene. Es el primer escalón de la formación.", "ejemplo": "Capacitar a un administrativo en el sistema informático que usa a diario es entrenamiento."}, {"ref": "Art. 10", "titulo": "Capacitación", "cita": "La capacitación consiste en incorporar conocimientos, aptitudes y actitudes para acceder al desempeño de cargos de mayor jerarquía o funciones diferentes.", "explicacion": "La capacitación mira hacia arriba o hacia los costados: prepara para cargos superiores o funciones distintas a las actuales. Diferenciarla del entrenamiento es punto de examen.", "ejemplo": "Un curso de gestión de equipos para preparar a un administrativo a un cargo de jefatura es capacitación."}, {"ref": "Art. 11", "titulo": "Desarrollo", "cita": "El desarrollo es la capacitación que proporciona conocimientos que trascienden lo exigido por el cargo, preparándolo para funciones más complejas y su crecimiento profesional.", "explicacion": "El desarrollo va más allá de lo que el cargo exige hoy: busca el crecimiento profesional de largo plazo. Es el nivel más amplio de los tres conceptos.", "ejemplo": "Una formación estratégica que excede el puesto actual, orientada al crecimiento profesional, es desarrollo."}, {"ref": "Art. 12", "titulo": "Cursos, seminarios y congresos", "cita": "El BPS podrá autorizar la participación en cursos universitarios, de especialización o perfeccionamiento, seminarios o congresos, asegurando el retorno de los conocimientos adquiridos.", "explicacion": "Permite que el BPS habilite formación externa siempre que aporte al Organismo y se garantice, por reglamento, que el conocimiento adquirido vuelva a la institución.", "ejemplo": "El BPS autoriza a un funcionario a un congreso técnico con el compromiso de transmitir lo aprendido a su equipo."}, {"ref": "Art. 13", "titulo": "Los 7 escalafones (R, A, B, C, D, E, F)", "cita": "Escalafones: R Gerencial; A Profesional Universitario (4+ años); B Técnico Universitario (2+ años); C Administrativo; D Especializado; E de Oficios; F Servicios Auxiliares.", "explicacion": "Es uno de los artículos más evaluables. Hay 7 escalafones en orden. R es la cúpula gerencial; A exige título de 4+ años; B exige 2+ años (o 3 años aprobados de carrera del escalafón A); C es Administrativo (registro, clasificación, manejo y archivo de datos/documentos, más planificación, coordinación, organización, dirección y control); D Especializado (labor intelectual con técnicas de nivel medio/inicial universitario); E de Oficios (esfuerzo físico o habilidad manual con máquinas/herramientas); F Servicios Auxiliares (limpieza, portería, conducción, transporte, vigilancia, conservación). EL ASPIRANTE ADMINISTRATIVO ES ESCALAFÓN C.", "ejemplo": "Un aspirante a tareas administrativas de archivo y registro de datos se ubica en el escalafón C; un médico, en el A; un chofer/limpieza, en el F."}, {"ref": "Art. 14", "titulo": "Orden jerárquico de los cargos", "cita": "Dentro de cada escalafón y serie, los cargos se ordenan jerárquicamente; las categorías inferiores se subordinan a las superiores según el Organigrama del BPS.", "explicacion": "Define la estructura interna: dentro de cada escalafón hay grados ordenados, y la dependencia directa la marca el organigrama institucional.", "ejemplo": "Un administrativo grado inicial depende jerárquicamente de su jefatura según el organigrama."}, {"ref": "Art. 15", "titulo": "Manual Descriptivo de cargos", "cita": "Se mantendrá actualizado un Manual Descriptivo de cargos y funciones, con listas de tareas/competencias, descripciones generales y los requisitos para cada cargo.", "explicacion": "El Manual Descriptivo es la herramienta que detalla qué hace cada cargo y qué requisitos exige. Sirve de base para concursos, ascensos y evaluación.", "ejemplo": "Para un ascenso, se consulta el Manual para verificar los requisitos del cargo a proveer."}, {"ref": "Art. 16-18", "titulo": "Calificaciones", "cita": "La calificación pondera el desempeño global del funcionario. Deben ser calificados anualmente. Los puntajes se consideran para incentivos y ascensos.", "explicacion": "La calificación es una valoración anual del desempeño global, regida por el Reglamento de Calificaciones. Su puntaje influye en incentivos y ascensos. Clave: es ANUAL (Art. 17).", "ejemplo": "Cada año el funcionario recibe una calificación que luego pesa en su posibilidad de ascender."}, {"ref": "Art. 19", "titulo": "Evaluaciones", "cita": "La evaluación valora el desempeño del personal desde los niveles de jefatura al gerencial. Se exceptúan Gerente General, Secretario General y Directores Técnicos de Atyr y de Prestaciones.", "explicacion": "Mientras la calificación es general y anual, la evaluación apunta a los mandos (de jefatura a gerencia). Hay cargos de cúpula expresamente exceptuados. Memorizar las 4 excepciones.", "ejemplo": "Una jefa de sección es evaluada en su desempeño de conducción; el Gerente General queda exceptuado."}, {"ref": "Art. 20-21", "titulo": "Ascensos: concepto y modalidad", "cita": "El ascenso es la promoción en la carrera, seleccionando al que mejor cumple los requisitos. Se realiza por concurso de mérito y antecedentes o de oposición y méritos. Las subrogaciones no suponen mérito adicional.", "explicacion": "El ascenso es un derecho-interés legítimo: derecho a competir para probar que se es el más apto. Se hace por concurso. Dato fino: haber subrogado (Art. 32) NO da mérito adicional para ascender.", "ejemplo": "Para subir de grado, el administrativo concursa por mérito y antecedentes contra otros aspirantes."}, {"ref": "Art. 22", "titulo": "Plazo de provisión de vacantes: 18 meses", "cita": "La provisión de vacantes y cargos creados se hace por la vía del ascenso. Entre el llamado a concurso y la provisión no se puede exceder el plazo de 18 meses.", "explicacion": "Las vacantes se cubren por ascenso, y hay un tope temporal: máximo 18 meses entre el llamado y la provisión. Es un plazo memorizable (coincide con el de subrogación del Art. 32).", "ejemplo": "Si se llama a concurso para cubrir una vacante, debe resolverse en no más de 18 meses."}, {"ref": "Art. 23", "titulo": "Obligaciones del funcionario (incs. a-m)", "cita": "Obligaciones: a) prestación personal y continua; b) respeto a funcionarios y público; c) lealtad al servicio; d) reserva; e) buena conducta; f) comunicar irregularidades; g) capacitarse; h) declarar domicilio (cambios en 48 hs hábiles); i) estar informado; j) difundir órdenes; k) declarar parentesco hasta 2.º grado; l) sustituir al superior; m) mantener Carné de Salud.", "explicacion": "Lista de 13 deberes (incs. a a m). Los datos duros memorizables: comunicar cambios de domicilio en 48 horas hábiles (h) y declarar vínculos de parentesco hasta el segundo grado de consanguinidad o afinidad (k). También el deber de reserva (d) y de comunicar irregularidades (f).", "ejemplo": "Si un administrativo se muda, debe avisar el nuevo domicilio dentro de las 48 horas hábiles (inc. h)."}, {"ref": "Art. 24", "titulo": "Prohibición de dependencia entre parientes", "cita": "No podrán desempeñar funciones en la misma sección, departamento o unidad, en dependencia jerárquica directa entre sí, los cónyuges o parientes dentro del 2.º grado de consanguinidad o afinidad.", "explicacion": "Prohíbe que parientes cercanos (hasta 2.º grado) o cónyuges trabajen en relación de jefe-subordinado directo en la misma unidad, para evitar conflictos de interés.", "ejemplo": "Un funcionario no puede ser el jefe directo de su hermano o su cónyuge en la misma sección."}, {"ref": "Art. 25", "titulo": "Prohibición de consultoras/gestoras y gestiones a terceros", "cita": "No podrán integrar, ser dependientes o asesores de consultoras, gestoras o empresas similares con fines de lucro vinculadas a los cometidos del Organismo, ni realizar gestiones para diligenciar trámites a terceros (falta administrativa grave).", "explicacion": "Doble prohibición: no integrar empresas que se vinculen a las funciones del BPS, y no actuar como gestor de trámites para terceros. Lo segundo configura falta administrativa grave, salvo excepciones reglamentarias.", "ejemplo": "Un funcionario no puede asesorar a una gestora que tramita jubilaciones ante el BPS."}, {"ref": "Art. 26", "titulo": "Prohibición de presentarse a licitaciones", "cita": "Queda prohibido presentarse en los llamados a licitación del Organismo, en nombre propio o de una empresa vinculada. Exceptuados quienes no intervienen en el proceso ni pertenecen a las oficinas que lo tramitan.", "explicacion": "Evita conflictos de interés en compras públicas: los funcionarios no pueden ser oferentes en licitaciones del BPS, salvo que no tengan ninguna intervención y dejen asentada esa circunstancia.", "ejemplo": "Un funcionario de Compras no puede presentar una oferta a una licitación del BPS."}, {"ref": "Art. 27", "titulo": "Declaración jurada de actividades privadas", "cita": "Los funcionarios vinculados con actividades privadas sujetas al contralor del Organismo deben formular declaración jurada; el Organismo determina por resolución fundada la incompatibilidad o no.", "explicacion": "Si un funcionario tiene actividades privadas que el BPS controla, debe declararlas; el Organismo decide si son compatibles con su cargo.", "ejemplo": "Un funcionario con una empresa fiscalizada por el BPS debe declararla para que se evalúe la compatibilidad."}, {"ref": "Art. 28", "titulo": "Prohibición de dádivas y sobornos", "cita": "Prohíbese solicitar o aceptar dinero, dádivas, beneficios, regalos, favores, promesas u otras ventajas, para sí o terceros, a fin de ejecutar, acelerar, retardar u omitir un acto del empleo.", "explicacion": "Es la prohibición central anti-corrupción: nada de aceptar ventajas para torcer la actuación funcional, ni siquiera por un acto ya cumplido. Se complementa con los Arts. 29 y 30.", "ejemplo": "No se puede aceptar un regalo de un proveedor a cambio de agilizar un pago."}, {"ref": "Art. 29", "titulo": "Circunstancias agravantes del regalo (incs. a-d)", "cita": "Se tendrá especialmente en cuenta que el regalo provenga de quien: a) realice actividades fiscalizadas por el Organismo; b) explote concesiones del Organismo; c) sea contratista/proveedor o esté en selección; d) tenga intereses afectados por la decisión del organismo.", "explicacion": "Detalla cuándo el origen del regalo es particularmente sospechoso: cuando viene de alguien regulado, concesionario, proveedor o con intereses en juego. Refuerza el Art. 28.", "ejemplo": "Un regalo de un proveedor que está participando en una selección de compras cae de lleno en este artículo (inc. c)."}, {"ref": "Art. 30", "titulo": "Excepciones a la prohibición de dádivas (incs. a-d)", "cita": "No están incluidos: a) reconocimientos protocolares de Gobiernos/Organismos Internacionales/entidades sin fines de lucro; b) gastos de viaje/estadía para conferencias o cursos; c) atenciones razonables en fiestas tradicionales; d) colectas autorizadas por la Superioridad.", "explicacion": "Aclara qué NO cuenta como dádiva prohibida: reconocimientos protocolares, gastos académicos, atenciones de cortesía en fiestas y colectas autorizadas. Es el límite razonable del Art. 28.", "ejemplo": "Aceptar el pago del viaje para dictar una conferencia académica no viola la prohibición (inc. b)."}, {"ref": "Art. 31", "titulo": "Prohibición de proselitismo político", "cita": "Los funcionarios están al servicio de la Nación y no de una fracción política. En lugares y horas de trabajo queda prohibida toda actividad ajena a la función, reputándose ilícito el proselitismo.", "explicacion": "Asegura la imparcialidad política: nada de proselitismo en el trabajo ni de agrupaciones políticas que usen el nombre de la repartición. La función pública sirve a la Nación, no a un partido.", "ejemplo": "No se puede repartir propaganda de un partido dentro de la oficina en horario laboral."}, {"ref": "Art. 32", "titulo": "Subrogación de cargos y acefalía", "cita": "Acefalía es la ausencia temporal o definitiva de un cargo. La subrogación de Jefatura/Gerencia la dispone el Directorio por resolución fundada. El sustituto cobra la diferencia salarial a partir de los 45 días de ausencia del titular; el cargo se provee por ascenso dentro de 18 meses.", "explicacion": "Cuando un cargo de jefatura o gerencia queda vacante (acefalía), el Directorio puede designar un subrogante idóneo. Datos memorizables: la diferencia de sueldo se cobra desde los 45 días de ausencia del titular (salvo resolución distinta), y el cargo debe proveerse por ascenso dentro de 18 meses. Subrogar no da mérito adicional para ascender (Art. 21).", "ejemplo": "Si una jefa se ausenta y un funcionario la subroga, este cobra la diferencia de sueldo desde el día 45 de la ausencia."}, {"ref": "Arts. 33-37", "titulo": "Derechos: principios generales", "cita": "Derecho a la protección de la independencia moral y cívica (33); higiene, salubridad y seguridad laboral (34); ascenso y justa calificación (35); jornada que no supere el máximo legal (36); desempeño de las tareas del cargo (37).", "explicacion": "Bloque de derechos básicos del funcionario: independencia, condiciones dignas de trabajo, carrera (ascenso y calificación justa), límite de jornada y derecho a hacer las tareas propias del cargo para el que fue designado.", "ejemplo": "El funcionario tiene derecho a que su jornada no exceda el máximo legal (Art. 36)."}, {"ref": "Art. 38", "titulo": "Derecho a la reconversión", "cita": "Los funcionarios tendrán derecho a ser reconvertidos por cambios organizacionales, administrativos o tecnológicos, priorizando a los presupuestados; se asignan tareas compatibles con su cargo y grado, que no se modifican.", "explicacion": "Ante cambios o reorganizaciones, el funcionario tiene derecho a ser recapacitado para nuevas tareas sin perder su cargo ni su grado presupuestal. Protege la estabilidad frente a la modernización.", "ejemplo": "Si se digitaliza un proceso, el funcionario es reconvertido a nuevas tareas manteniendo su grado."}, {"ref": "Art. 39", "titulo": "Garantías ante el traslado", "cita": "El traslado debe ser por resolución fundada y escrita, por razones de servicio o como medida preventiva en un sumario. Es improcedente el traslado como sanción disciplinaria. Se hace a cargos de nivel equivalente y, en general, en la misma localidad.", "explicacion": "El traslado tiene límites: debe fundarse por escrito, no puede usarse como castigo y debe respetar el nivel jerárquico. Si es fuera de la localidad y no fue pedido por el funcionario, hay reembolso de gastos.", "ejemplo": "No se puede trasladar a un funcionario a otra oficina como forma de sancionarlo."}, {"ref": "Arts. 40-43", "titulo": "Capacitación, orden por escrito y notificación", "cita": "Derecho a entrenamiento/capacitación/desarrollo (40) y a los cursos del BPS (41). Ante una orden que pueda generar responsabilidad, derecho a pedirla por escrito, fechada y firmada (42). Derecho a ser notificado de resoluciones relevantes (43).", "explicacion": "Agrupa derechos prácticos: formarse, recibir cursos, exigir por escrito una orden riesgosa (para deslindar responsabilidad) y ser notificado por medio idóneo de lo que afecta su trabajo.", "ejemplo": "Si un jefe da una orden dudosa, el funcionario puede pedirla por escrito antes de cumplirla (Art. 42)."}, {"ref": "Arts. 44-46", "titulo": "Asociación, huelga y convenios colectivos", "cita": "Pueden constituir asociaciones para defender sus intereses laborales (44, Art. 57 Constitución). Se declara la huelga como derecho gremial (45). Podrán celebrar Convenios Colectivos con la Administración (46).", "explicacion": "Reconoce los derechos colectivos: sindicalización, huelga y negociación colectiva, en línea con la Constitución y los Convenios Internacionales del Trabajo.", "ejemplo": "El sindicato del BPS puede negociar un convenio colectivo con la Administración (Art. 46)."}, {"ref": "Arts. 47-48", "titulo": "Legajo individual", "cita": "A cada funcionario le corresponde un legajo individual; toda anotación desfavorable exige cumplir el Art. 66 de la Constitución. El funcionario puede obtener vista y copia autenticada de su legajo en cualquier momento.", "explicacion": "El legajo registra la historia funcional. Para anotar algo desfavorable hay que respetar la garantía constitucional (derecho de defensa). El funcionario tiene acceso pleno a su legajo.", "ejemplo": "Antes de anotar una sanción en el legajo, se debe dar al funcionario la posibilidad de defenderse (Art. 66 Const.)."}, {"ref": "Arts. 49-50", "titulo": "Discapacidad y protección del funcionario", "cita": "Los funcionarios con discapacidad tendrán medios laborales y de accesibilidad que aseguren igualdad (49). La Administración protege al funcionario de ataques o difamación por el ejercicio de su cargo y asume su defensa ante la justicia penal en ciertos casos (50).", "explicacion": "Garantiza accesibilidad e igualdad para funcionarios con discapacidad, y obliga a la Administración a proteger y defender al funcionario atacado por cumplir su función (incluso asumiendo su defensa penal).", "ejemplo": "Si un funcionario es demandado por un acto regular de su cargo, el BPS asume su defensa (Art. 50)."}, {"ref": "Art. 51", "titulo": "Beneficios y primas", "cita": "Derecho a beneficios: Prima por Matrimonio, Nacimiento, Antigüedad, Hogar Constituido, Prestaciones por Hijos, Compensación a la Persona, Prestación por Alimentación, Fondo de Participación, Cuota Mutual, Guardería Interior, Jardín Maternal de Montevideo, y otros.", "explicacion": "Lista de prestaciones económicas y sociales. No hace falta memorizarlas todas, pero conviene reconocer varias (Matrimonio, Nacimiento, Antigüedad, Hogar Constituido, Cuota Mutual).", "ejemplo": "Al casarse, el funcionario puede acceder a la Prima por Matrimonio (Art. 51)."}, {"ref": "Arts. 52-53", "titulo": "Protección del presupuestado y carrera", "cita": "Ningún presupuestado puede ser nombrado excedentario mientras haya tareas similares hechas por contratados u otra forma no presupuestada (52). Los presupuestados tienen derecho a la carrera administrativa (53).", "explicacion": "Refuerza la estabilidad del personal presupuestado: no se lo declara excedentario si esas tareas las hacen contratados, y se le garantiza la carrera administrativa.", "ejemplo": "No se puede declarar excedentario a un presupuestado si un contratado hace la misma tarea (Art. 52)."}, {"ref": "Art. 54", "titulo": "Licencia anual: 20 días hábiles", "cita": "Todo funcionario tiene derecho a una licencia anual remunerada de veinte días hábiles como mínimo, en un solo período; se admite el fraccionamiento si no perjudica el servicio.", "explicacion": "Dato duro central: la licencia anual es de 20 días hábiles como mínimo. La regla es gozarla en un solo período, pero puede fraccionarse a pedido del funcionario si el servicio lo permite.", "ejemplo": "Un administrativo puede pedir tomar su licencia anual en dos tramos si no afecta el servicio."}, {"ref": "Art. 55", "titulo": "Licencias especiales (incs. a-m)", "cita": "Licencia con goce de sueldo, entre otros: a) matrimonio; b) maternidad/paternidad; c) enfermedad; d) duelo; e) donación de sangre/órganos/tejidos; f) estudio; g) Mesas Receptoras de Voto y Censo; h) horas a compensar; i) antigüedad; j) Ley 17242; k) actividad gremial; l) reproducción asistida; m) otras.", "explicacion": "Catálogo de licencias especiales remuneradas. Conviene reconocer las principales: matrimonio, maternidad/paternidad, enfermedad, duelo, estudio, gremial. La lista es enunciativa (entre otros).", "ejemplo": "Por el fallecimiento de un familiar, el funcionario accede a la licencia por duelo (inc. d)."}, {"ref": "Art. 56", "titulo": "Asueto del 28 de mayo", "cita": "Los funcionarios tienen derecho a asueto el día 28 de mayo de cada año, día del funcionario del Banco de Previsión Social, salvo servicios no susceptibles de interrupción.", "explicacion": "Dato puntual memorizable: el 28 de mayo es el día del funcionario del BPS, con asueto, salvo en servicios esenciales que no pueden interrumpirse.", "ejemplo": "Cada 28 de mayo las oficinas administrativas gozan de asueto por el día del funcionario."}, {"ref": "Arts. 57-58", "titulo": "Licencia sin goce de sueldo y reglamentación", "cita": "En casos especiales fundados, derecho a licencia sin goce de sueldo según la normativa (57). El derecho a las licencias y su aplicación se rige por la Reglamentación correspondiente (58).", "explicacion": "Prevé la licencia sin goce de sueldo en situaciones especiales justificadas, y remite el detalle del régimen de licencias a la reglamentación.", "ejemplo": "Un funcionario puede pedir una licencia sin sueldo por una circunstancia personal debidamente fundada (Art. 57)."}, {"ref": "Arts. 59-61", "titulo": "Procedimiento disciplinario: principios", "cita": "Es el conjunto de trámites del poder disciplinario (59). Rige el non bis in ídem: no se responde dos veces por el mismo hecho (60). Los procedimientos son secretos; violar el secreto es falta grave (61).", "explicacion": "Tres principios clave: definición del procedimiento, non bis in ídem (sin perjuicio de responsabilidad penal/civil coexistente) y carácter secreto de todo el procedimiento. La violación del secreto es falta grave.", "ejemplo": "No se puede sancionar disciplinariamente dos veces por el mismo hecho (Art. 60)."}, {"ref": "Arts. 62-64", "titulo": "Falta administrativa y su gravedad", "cita": "Falta administrativa es todo acto u omisión, intencional o culposo, que incumpla deberes o viole prohibiciones (62). Se clasifican en leves, semigraves o graves (63). Las faltas no de constatación directa requieren investigación o sumario (64).", "explicacion": "Define qué es una falta (incumplir deberes o violar prohibiciones, por dolo o culpa), su graduación (leve/semigrave/grave) y la regla de que las faltas no evidentes exigen un procedimiento previo (investigación o sumario) para poder sancionarse.", "ejemplo": "Llegar tarde reiteradamente podría ser falta leve; aceptar una dádiva, falta grave (Arts. 62-63)."}, {"ref": "Arts. 65-67", "titulo": "Investigación administrativa y sumario", "cita": "La investigación administrativa busca comprobar hechos irregulares e identificar responsables (65). El sumario busca determinar la responsabilidad de funcionarios imputados (66). Si en la investigación se individualiza a un responsable, se decreta sumario (67).", "explicacion": "Distingue dos procedimientos: la investigación (averigua si hay irregularidad y quién es responsable) y el sumario (determina la responsabilidad del funcionario imputado). Si la investigación detecta un responsable, se pasa a sumario, con garantías de defensa.", "ejemplo": "Tras una investigación que identifica a un funcionario presuntamente responsable, se decreta un sumario (Art. 67)."}, {"ref": "Art. 68", "titulo": "Inicio del sumario o investigación", "cita": "Todo sumario o investigación se inicia con resolución fundada del Directorio o de quien tenga delegada la facultad, conforme al procedimiento reglamentario.", "explicacion": "El procedimiento disciplinario formal solo arranca con una resolución fundada del Directorio (o su delegado). No puede iniciarse de cualquier modo.", "ejemplo": "Para abrir un sumario se requiere una resolución fundada del Directorio (Art. 68)."}, {"ref": "Arts. 69-71", "titulo": "Suspensión preventiva: máximo 6 meses", "cita": "Al decretar el sumario, el Directorio puede disponer la suspensión preventiva; es preceptiva en faltas graves, con retención de medios sueldos (69). No puede exceder 6 meses (70). Cumplidos los 6 meses, se dispone su cese sin prejuzgar el fondo (71).", "explicacion": "Datos duros muy evaluables: la suspensión preventiva es OBLIGATORIA (preceptiva) si la falta imputada es grave, con retención de medio sueldo; tiene un tope de 6 meses; al vencer, cesa automáticamente la suspensión y la retención, sin que ello signifique decidir el fondo.", "ejemplo": "Imputada una falta grave, el Directorio debe suspender preventivamente al funcionario, por un máximo de 6 meses (Arts. 69-70)."}, {"ref": "Art. 72", "titulo": "Normativa aplicable al procedimiento", "cita": "El procedimiento de sumarios e investigaciones se regula por el Estatuto, el Reglamento de Procedimiento Administrativo y el Reglamento de Responsabilidad Administrativa vigentes.", "explicacion": "Remite el detalle procesal a normas reglamentarias complementarias del Estatuto, asegurando un marco normativo completo para los procedimientos disciplinarios.", "ejemplo": "Para tramitar un sumario se aplican el Estatuto y los reglamentos de Procedimiento y Responsabilidad Administrativa (Art. 72)."}, {"ref": "Art. 73", "titulo": "Extinción de la relación funcional (incs. a-j)", "cita": "Se extingue por: a) renuncia aceptada; b) fallecimiento; c) revocación por legalidad; d) cesantía por abandono; e) cesantía por falta superviniente de calidades/incompatibilidad; f) cese por edad máxima; g) destitución disciplinaria (solo ineptitud, omisión o delito); h) cesantía del Art. 3; i) destitución por incapacidad; j) redistribución como excedentario.", "explicacion": "Artículo clave con 10 causales de extinción (incs. a-j). Dato fino muy evaluable: la DESTITUCIÓN como medida disciplinaria solo procede por ineptitud, omisión o delito (inc. g). También distinguir cesantía (varias causas) de destitución (disciplinaria o por incapacidad).", "ejemplo": "Un funcionario que abandona el cargo de forma comprobada puede ser cesado (inc. d); la destitución disciplinaria solo procede por ineptitud, omisión o delito (inc. g)."}, {"ref": "Art. 74", "titulo": "Comisión bipartita BPS-ATSS", "cita": "Se crea una comisión bipartita permanente, asesora y de consulta, integrada por representantes del BPS y ATSS, para procesar discrepancias sobre el Estatuto y reglamentar procedimientos de la relación laboral.", "explicacion": "Crea un ámbito permanente de diálogo entre la Administración (BPS) y el sindicato (ATSS) para resolver discrepancias de interpretación y reglamentar temas de la relación laboral.", "ejemplo": "Si surge una discrepancia sobre cómo aplicar un artículo del Estatuto, la trata la comisión bipartita BPS-ATSS (Art. 74)."}, {"ref": "Arts. 75-76", "titulo": "Disposiciones especiales y reglamentos", "cita": "Se reglamentará la situación de los funcionarios vinculados a la salud según OMS, OPS y normas nacionales (75). Todos los Reglamentos del Estatuto son aprobados exclusivamente por el Directorio del BPS (76).", "explicacion": "Cierra el Estatuto: prevé un régimen especial para el personal de salud (con estándares OMS/OPS) y establece que la potestad de aprobar los reglamentos del Estatuto es exclusiva del Directorio.", "ejemplo": "Un nuevo Reglamento de Calificaciones solo es válido si lo aprueba el Directorio del BPS (Art. 76)."}], "flashcards": [{"front": "¿A quién se aplica el Estatuto del Funcionario del BPS?", "back": "A todos los funcionarios del BPS: toda persona designada por el Directorio, con carácter permanente o temporal, en subordinación jerárquica, cualquiera sea la forma de remuneración (Art. 1).", "id": "1-0"}, {"front": "¿Qué requisito de ciudadanía se exige para ingresar al BPS?", "back": "Ser ciudadano natural, o tener no menos de 3 años de ciudadanía legal (Art. 2 inc. a).", "id": "1-1"}, {"front": "¿Cómo se certifica la aptitud física para ingresar?", "back": "Mediante el Carné de Salud, de acuerdo a la normativa vigente (Art. 2 inc. c).", "id": "1-2"}, {"front": "¿Cuánto dura el carácter precario y revocable de la designación de ingreso?", "back": "Seis meses contados desde la toma de posesión del cargo; la revocación es por resolución fundada (Art. 3).", "id": "1-3"}, {"front": "¿Con qué anticipación debe el superior elevar el informe sobre el ingresante en prueba?", "back": "No inferior a 30 días del vencimiento del término de 6 meses; el plazo no es prorrogable y omitirlo es falta administrativa (Art. 3).", "id": "1-4"}, {"front": "¿Cuáles son las formas válidas de selección de personal?", "back": "Concurso de oposición y méritos, concurso de méritos y prueba de aptitud o suficiencia, o sorteo, salvo otra forma prevista por la normativa (Art. 4).", "id": "1-5"}, {"front": "¿Por qué grado ingresa el personal al escalafón?", "back": "Por el último grado del presupuesto o del escalafón, y de la serie o especialidad correspondiente según el llamado (Art. 5).", "id": "1-6"}, {"front": "¿A quién debe requerir el Directorio la nómina de funcionarios excedentarios?", "back": "A la ONSC (Oficina Nacional del Servicio Civil), antes de incorporar personal (Art. 7).", "id": "1-7"}, {"front": "¿Cuáles son los 7 escalafones del BPS?", "back": "R Gerencial, A Profesional Universitario, B Técnico Universitario, C Administrativo, D Especializado, E de Oficios, F Servicios Auxiliares (Art. 13).", "id": "1-8"}, {"front": "¿En qué escalafón se ubica el aspirante administrativo?", "back": "En el escalafón C Administrativo: registro, clasificación, manejo y archivo de datos y documentos, más planificación, coordinación, organización, dirección y control (Art. 13).", "id": "1-9"}, {"front": "¿Qué duración de carrera exige el escalafón A Profesional Universitario?", "back": "Título de planes de estudio de duración no inferior a 4 años (Art. 13).", "id": "1-10"}, {"front": "¿Qué exige el escalafón B Técnico Universitario?", "back": "Estudios equivalentes a 2 años mínimo de carrera universitaria, o haber aprobado no menos del equivalente a 3 años de carrera del escalafón A (Art. 13).", "id": "1-11"}, {"front": "Diferencia entre entrenamiento, capacitación y desarrollo", "back": "Entrenamiento: habilidad para el cargo actual (Art. 9). Capacitación: acceder a cargos superiores o funciones distintas (Art. 10). Desarrollo: conocimientos que trascienden el cargo, para el crecimiento profesional (Art. 11).", "id": "1-12"}, {"front": "¿Con qué frecuencia se califica a los funcionarios?", "back": "Anualmente, conforme al Reglamento de Calificaciones (Art. 17).", "id": "1-13"}, {"front": "¿Qué cargos se exceptúan de la evaluación?", "back": "Gerente General, Secretario General, y Directores Técnicos de Atyr y de Prestaciones (Art. 19).", "id": "1-14"}, {"front": "¿Cuál es el plazo máximo entre el llamado a concurso y la provisión de vacantes?", "back": "18 meses (Art. 22).", "id": "1-15"}, {"front": "¿En cuánto tiempo se deben comunicar los cambios de domicilio?", "back": "Dentro de las 48 horas hábiles siguientes a producirse el cambio (Art. 23 inc. h).", "id": "1-16"}, {"front": "¿Hasta qué grado se deben declarar los vínculos de parentesco?", "back": "Hasta el segundo grado de consanguinidad o afinidad (Art. 23 inc. k; Art. 24).", "id": "1-17"}, {"front": "¿Pueden parientes cercanos trabajar en dependencia jerárquica directa?", "back": "No: cónyuges o parientes dentro del 2.º grado de consanguinidad o afinidad no pueden hacerlo en la misma sección, departamento o unidad (Art. 24).", "id": "1-18"}, {"front": "¿Pueden los funcionarios presentarse a licitaciones del BPS?", "back": "No, en nombre propio ni de empresa vinculada. Exceptuados quienes no intervienen en el proceso ni pertenecen a las oficinas que lo tramitan (Art. 26).", "id": "1-19"}, {"front": "¿Qué prohíbe el Art. 28 sobre dádivas?", "back": "Solicitar o aceptar dinero, regalos, favores o ventajas, para sí o terceros, para ejecutar, acelerar, retardar u omitir un acto del empleo (Art. 28).", "id": "1-20"}, {"front": "¿Desde cuándo cobra el subrogante la diferencia de sueldo?", "back": "A partir de los 45 días de la ausencia del titular, salvo que el Directorio fije otra fecha (Art. 32).", "id": "1-21"}, {"front": "¿En qué plazo debe proveerse por ascenso un cargo subrogado?", "back": "Dentro de los 18 meses contados desde la resolución de subrogación (Art. 32).", "id": "1-22"}, {"front": "¿De cuántos días es la licencia anual remunerada?", "back": "Veinte (20) días hábiles como mínimo, en un solo período, con posibilidad de fraccionamiento (Art. 54).", "id": "1-23"}, {"front": "¿Qué día es el día del funcionario del BPS?", "back": "El 28 de mayo de cada año, con asueto, salvo servicios no susceptibles de interrupción (Art. 56).", "id": "1-24"}, {"front": "¿Qué principio impide sancionar dos veces por el mismo hecho?", "back": "El non bis in ídem (Art. 60), sin perjuicio de la responsabilidad penal o civil coexistente.", "id": "1-25"}, {"front": "¿Qué carácter tienen los procedimientos disciplinarios?", "back": "Son secretos; violar el secreto es falta grave (Art. 61).", "id": "1-26"}, {"front": "¿Qué es una falta administrativa?", "back": "Todo acto u omisión, intencional o culposo, que incumpla deberes o viole prohibiciones o incompatibilidades (Art. 62). Se clasifican en leves, semigraves o graves (Art. 63).", "id": "1-27"}, {"front": "¿Cuándo es preceptiva la suspensión preventiva y cuánto puede durar?", "back": "Es preceptiva cuando los hechos imputados constituyan falta grave (con retención de medios sueldos), y no puede exceder los 6 meses (Arts. 69-70).", "id": "1-28"}, {"front": "¿Por qué causales procede la destitución como medida disciplinaria?", "back": "Solo por las causales de ineptitud, omisión o delito (Art. 73 inc. g).", "id": "1-29"}, {"front": "¿Cuántas causales de extinción de la relación funcional hay?", "back": "Diez causales, incisos a) a j) (Art. 73), entre ellas renuncia, fallecimiento, cesantía por abandono, cese por edad máxima, destitución y redistribución.", "id": "1-30"}, {"front": "¿Quiénes integran la comisión bipartita y para qué?", "back": "Representantes del BPS y ATSS; es asesora y de consulta, para procesar discrepancias sobre el Estatuto y reglamentar la relación laboral (Art. 74).", "id": "1-31"}, {"front": "¿Quién aprueba los Reglamentos del Estatuto?", "back": "Exclusivamente el Directorio del Banco de Previsión Social (Art. 76).", "id": "1-32"}, {"front": "¿Puede usarse el traslado como sanción disciplinaria?", "back": "No: es improcedente el traslado como medida de sanción disciplinaria; debe ser por resolución fundada y escrita (Art. 39).", "id": "1-33"}, {"front": "¿La subrogación da mérito adicional para ascender?", "back": "No: el ejercicio de las subrogaciones del Art. 32 no supone mérito adicional (Art. 21).", "id": "1-34"}], "practica": [{"subtema": "Ámbito de aplicación", "q": "Según el Art. 1, ¿qué elemento es esencial para ser considerado funcionario del BPS?", "opciones": ["Ser designado por el Directorio en subordinación jerárquica", "Tener contrato a término fijo", "Cobrar por hora", "Estar afiliado al sindicato"], "correcta": 0, "expl": "Es funcionario quien es designado por el Directorio, permanente o temporal, en subordinación jerárquica, cualquiera sea la forma de remuneración (Art. 1).", "id": "1-0", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Ámbito de aplicación", "q": "¿El Estatuto se aplica a quienes tienen otras modalidades de contratación de servicios personales?", "opciones": ["Nunca", "Solo si son médicos", "En todo lo que fuera compatible y no esté regulado por sus contratos/convenios", "Solo durante el primer año"], "correcta": 2, "expl": "Esas modalidades se rigen por sus contratos/convenios, sin perjuicio de aplicar el Estatuto en lo compatible y no regulado (Art. 1).", "id": "1-1", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Ingreso y requisitos", "q": "¿Qué exige el Art. 2 en materia de ciudadanía?", "opciones": ["Ser ciudadano natural o tener no menos de 3 años de ciudadanía legal", "Ser ciudadano natural únicamente", "Tener 5 años de residencia", "Tener 10 años de ciudadanía legal"], "correcta": 0, "expl": "El Art. 2 inc. a exige ser ciudadano natural o tener no menos de 3 años de ciudadanía legal.", "id": "1-2", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Ingreso y requisitos", "q": "¿Cómo se acredita la aptitud física para ingresar?", "opciones": ["Con un examen psicológico", "Mediante el Carné de Salud", "Con declaración jurada", "Con certificado del médico de familia"], "correcta": 1, "expl": "Se certifica mediante el Carné de Salud según la normativa vigente (Art. 2 inc. c).", "id": "1-3", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Ingreso y requisitos", "q": "Respecto del voto obligatorio (Art. 2 inc. d), la omisión de sufragar:", "opciones": ["Siempre se subsana pagando multa", "No puede subsanarse con multa, salvo que la ley disponga lo contrario", "No es requisito de ingreso", "Se subsana con declaración jurada"], "correcta": 1, "expl": "La omisión no podrá subsanarse mediante el pago de multa, salvo que la ley en la materia disponga lo contrario (Art. 2 inc. d).", "id": "1-4", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Ingreso y requisitos", "q": "La declaración jurada del Art. 2 inc. e busca asegurar:", "opciones": ["Que el postulante tenga título universitario", "La ausencia de incompatibilidades (otro cargo público, pasividad incompatible, etc.)", "El domicilio del postulante", "La afiliación a una mutualista"], "correcta": 1, "expl": "Es una declaración jurada de ausencia de incompatibilidad, con excepción de docencia y demás casos legales (Art. 2 inc. e).", "id": "1-5", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Designación precaria", "q": "La designación que supone un ingreso al Ente es:", "opciones": ["Definitiva desde el primer día", "Precaria y revocable dentro de 6 meses por resolución fundada", "Revocable en cualquier momento sin fundamento", "Precaria por 12 meses"], "correcta": 1, "expl": "Es precaria y revocable por resolución fundada dentro de los 6 meses desde la toma de posesión (Art. 3).", "id": "1-6", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Designación precaria", "q": "¿Qué pasa si el superior omite elevar el informe del Art. 3?", "opciones": ["Se prorroga el plazo automáticamente", "Incurre en falta administrativa", "El funcionario es destituido", "No tiene consecuencias"], "correcta": 1, "expl": "Los responsables omisos en la emisión de los informes incurren en falta administrativa; el plazo no es prorrogable (Art. 3).", "id": "1-7", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Selección de personal", "q": "¿Cuál NO es una forma de selección prevista en el Art. 4?", "opciones": ["Concurso de oposición y méritos", "Concurso de méritos y prueba de aptitud o suficiencia", "Sorteo", "Designación directa discrecional"], "correcta": 3, "expl": "El Art. 4 prevé concurso de oposición y méritos, concurso de méritos y prueba de aptitud/suficiencia, o sorteo; no la designación directa discrecional.", "id": "1-8", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Selección de personal", "q": "¿Qué debe hacer el Directorio antes de incorporar personal, según el Art. 7?", "opciones": ["Consultar a la mutualista", "Requerir a la ONSC la nómina de funcionarios excedentarios de otros organismos", "Publicar en el Diario Oficial", "Pedir autorización al Parlamento"], "correcta": 1, "expl": "Debe requerir a la ONSC la nómina de excedentarios de otros Organismos Públicos (Art. 7).", "id": "1-9", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Selección de personal", "q": "La presupuestación de contratados y la incorporación de redistribuidos (Art. 6) está condicionada a:", "opciones": ["La firma del sindicato", "La previa realización de promociones y cobertura de vacantes del personal presupuestado", "Un sorteo público", "La aprobación del Tribunal de Cuentas"], "correcta": 1, "expl": "Está condicionada a la previa realización de promociones y cobertura de vacantes por el personal presupuestado (Art. 6).", "id": "1-10", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Capacitación y desarrollo", "q": "El entrenamiento (Art. 9) consiste en:", "opciones": ["Conocimientos que trascienden el cargo", "Aumentar el conocimiento y la habilidad para el cargo y función actuales", "Acceder a cargos superiores", "Una licencia por estudio"], "correcta": 1, "expl": "El entrenamiento aumenta el conocimiento y la habilidad para el desempeño del cargo y función actuales (Art. 9).", "id": "1-11", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Capacitación y desarrollo", "q": "La capacitación (Art. 10) apunta a:", "opciones": ["El cargo actual exclusivamente", "Acceder a cargos de mayor jerarquía o funciones diferentes", "Reemplazar el Carné de Salud", "El proselitismo gremial"], "correcta": 1, "expl": "La capacitación prepara para acceder a cargos de mayor jerarquía que el ostentado o funciones diferentes (Art. 10).", "id": "1-12", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Capacitación y desarrollo", "q": "El desarrollo (Art. 11) se caracteriza por:", "opciones": ["Conocimientos que trascienden lo exigido por el cargo, para el crecimiento profesional", "Solo entrenamiento básico", "Ser obligatorio para ingresar", "Limitarse a tareas de archivo"], "correcta": 0, "expl": "El desarrollo proporciona conocimientos que trascienden lo exigido por el cargo, preparando para funciones más complejas (Art. 11).", "id": "1-13", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Escalafones", "q": "¿Cuál es el orden correcto de los escalafones del BPS (Art. 13)?", "opciones": ["A, B, C, D, E, F, R", "R, A, B, C, D, E, F", "C, B, A, R, D, E, F", "R, F, E, D, C, B, A"], "correcta": 1, "expl": "Los escalafones son R, A, B, C, D, E, F (Art. 13).", "id": "1-14", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Escalafones", "q": "El aspirante administrativo pertenece al escalafón:", "opciones": ["A Profesional Universitario", "C Administrativo", "F Servicios Auxiliares", "R Gerencial"], "correcta": 1, "expl": "El escalafón C Administrativo abarca registro, clasificación, manejo y archivo de datos y documentos, más planificación, coordinación, organización, dirección y control (Art. 13).", "id": "1-15", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Escalafones", "q": "El escalafón A Profesional Universitario exige planes de estudio de duración:", "opciones": ["No inferior a 4 años", "De 2 años", "De 1 año", "Sin requisito de duración"], "correcta": 0, "expl": "El escalafón A exige título de carrera de duración no inferior a 4 años (Art. 13).", "id": "1-16", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Escalafones", "q": "El escalafón F Servicios Auxiliares incluye tareas de:", "opciones": ["Asesoramiento jurídico", "Limpieza, portería, conducción, transporte y vigilancia", "Profesional universitario", "Gerencia"], "correcta": 1, "expl": "El escalafón F comprende limpieza, portería, conducción, transporte de materiales, vigilancia, conservación y tareas similares (Art. 13).", "id": "1-17", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Escalafones", "q": "El Manual Descriptivo de cargos (Art. 15) contiene:", "opciones": ["Solo los sueldos", "Listas de tareas/competencias, descripciones generales y requisitos de cada cargo", "El reglamento de licencias", "El organigrama únicamente"], "correcta": 1, "expl": "El Manual Descriptivo contiene listas de tareas o competencias, descripciones generales y los requisitos de cada cargo (Art. 15).", "id": "1-18", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Calificaciones y ascensos", "q": "¿Con qué frecuencia deben calificarse los funcionarios?", "opciones": ["Cada 5 años", "Anualmente", "Cada 6 meses", "Solo al ingresar"], "correcta": 1, "expl": "Los funcionarios deben ser calificados anualmente (Art. 17).", "id": "1-19", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Calificaciones y ascensos", "q": "¿Qué cargos se exceptúan de la evaluación del Art. 19?", "opciones": ["Todos los administrativos", "Gerente General, Secretario General y Directores Técnicos de Atyr y de Prestaciones", "Los funcionarios contratados", "Los funcionarios con discapacidad"], "correcta": 1, "expl": "Se exceptúan Gerente General, Secretario General y Directores Técnicos de Atyr y de Prestaciones (Art. 19).", "id": "1-20", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Calificaciones y ascensos", "q": "El plazo máximo entre el llamado a concurso y la provisión de vacantes es:", "opciones": ["6 meses", "12 meses", "18 meses", "24 meses"], "correcta": 2, "expl": "No se puede exceder el plazo de 18 meses entre el llamado y la provisión (Art. 22).", "id": "1-21", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Calificaciones y ascensos", "q": "El ejercicio de subrogaciones (Art. 32), respecto del ascenso:", "opciones": ["Otorga mérito adicional", "No supone mérito adicional", "Es obligatorio para ascender", "Reemplaza al concurso"], "correcta": 1, "expl": "El ejercicio de las subrogaciones no supone mérito adicional para el ascenso (Art. 21).", "id": "1-22", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Obligaciones", "q": "¿En qué plazo debe comunicarse un cambio de domicilio?", "opciones": ["48 horas hábiles", "24 horas", "5 días", "Un mes"], "correcta": 0, "expl": "Los cambios de domicilio se comunican dentro de las 48 horas hábiles siguientes (Art. 23 inc. h).", "id": "1-23", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Obligaciones", "q": "Entre las obligaciones del Art. 23 está:", "opciones": ["Hacer proselitismo político", "Mantener actualizado el Carné de Salud", "Aceptar regalos de proveedores", "Trabajar con su cónyuge como jefe directo"], "correcta": 1, "expl": "Mantener actualizado el Carné de Salud es una obligación expresa (Art. 23 inc. m).", "id": "1-24", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Obligaciones", "q": "El deber de reserva (Art. 23 inc. d) implica:", "opciones": ["Revelar información a la prensa", "Mantener reserva sobre hechos/documentación secreta, reservada o privada", "No declarar el domicilio", "No comunicar irregularidades"], "correcta": 1, "expl": "El funcionario debe mantener la debida reserva sobre hechos o documentación de carácter secreto, reservado o privado (Art. 23 inc. d).", "id": "1-25", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Prohibiciones e incompatibilidades", "q": "¿Pueden cónyuges o parientes hasta 2.º grado trabajar en dependencia jerárquica directa?", "opciones": ["Sí, sin restricción", "No, en la misma sección/departamento/unidad", "Solo si lo autoriza el sindicato", "Solo en escalafón C"], "correcta": 1, "expl": "No pueden desempeñar funciones en dependencia jerárquica directa entre sí en la misma sección, departamento o unidad (Art. 24).", "id": "1-26", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Prohibiciones e incompatibilidades", "q": "Realizar gestiones para diligenciar trámites a terceros (Art. 25) configura:", "opciones": ["Una conducta permitida", "Falta administrativa grave, salvo excepciones reglamentarias", "Falta leve", "Un derecho del funcionario"], "correcta": 1, "expl": "Configura falta administrativa grave, salvo las excepciones previstas en la reglamentación (Art. 25).", "id": "1-27", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Prohibiciones e incompatibilidades", "q": "Respecto de las licitaciones del Organismo (Art. 26), los funcionarios:", "opciones": ["Pueden presentarse libremente", "Tienen prohibido presentarse, salvo quienes no intervienen ni pertenecen a las oficinas que tramitan", "Solo pueden presentarse en escalafón R", "Pueden presentarse con autorización del jefe"], "correcta": 1, "expl": "Está prohibido presentarse a licitaciones del BPS, salvo quienes no intervienen en el proceso ni pertenecen a las oficinas que lo tramitan (Art. 26).", "id": "1-28", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Prohibiciones e incompatibilidades", "q": "El Art. 28 prohíbe aceptar dádivas cuando el fin es:", "opciones": ["Ejecutar, acelerar, retardar u omitir un acto del empleo", "Recibir un saludo protocolar", "Participar en un congreso académico", "Cobrar el sueldo"], "correcta": 0, "expl": "Prohíbe aceptar ventajas para ejecutar, acelerar, retardar u omitir un acto del empleo o por un acto ya cumplido (Art. 28).", "id": "1-29", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Prohibiciones e incompatibilidades", "q": "¿Cuál NO es una excepción a la prohibición de dádivas (Art. 30)?", "opciones": ["Reconocimientos protocolares de organismos internacionales", "Gastos de viaje para dictar una conferencia académica", "Un soborno de un proveedor para agilizar un pago", "Colectas autorizadas por la Superioridad"], "correcta": 2, "expl": "El soborno de un proveedor no es excepción; las excepciones son reconocimientos protocolares, gastos académicos, atenciones de cortesía y colectas autorizadas (Art. 30).", "id": "1-30", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Prohibiciones e incompatibilidades", "q": "Según el Art. 31, los funcionarios están al servicio de:", "opciones": ["Una fracción política", "La Nación y no de una fracción política", "El sindicato", "El Directorio personalmente"], "correcta": 1, "expl": "Los funcionarios están al servicio de la Nación y no de una fracción política; el proselitismo en el trabajo es ilícito (Art. 31).", "id": "1-31", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Subrogación", "q": "¿Qué es la acefalía según el Art. 32?", "opciones": ["Un tipo de licencia", "La ausencia temporal o definitiva de un cargo", "Una falta grave", "Un beneficio salarial"], "correcta": 1, "expl": "Constituye acefalía la ausencia temporal o definitiva de un cargo (Art. 32).", "id": "1-32", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Subrogación", "q": "El subrogante percibe la diferencia salarial a partir de:", "opciones": ["El primer día de ausencia", "Los 45 días de la ausencia del titular", "Los 6 meses", "Los 18 meses"], "correcta": 1, "expl": "El sustituto cobra la diferencia a partir de los 45 días de la ausencia del titular, salvo resolución del Directorio (Art. 32).", "id": "1-33", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Subrogación", "q": "¿En qué plazo debe proveerse por ascenso el cargo subrogado?", "opciones": ["6 meses", "12 meses", "18 meses", "24 meses"], "correcta": 2, "expl": "Dentro de los 18 meses desde la resolución de subrogación, el cargo debe proveerse por las reglas del ascenso (Art. 32).", "id": "1-34", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Derechos y garantías", "q": "El traslado de un funcionario (Art. 39):", "opciones": ["Puede usarse como sanción disciplinaria", "Es improcedente como sanción disciplinaria", "Siempre es a otra localidad", "No requiere fundamentación"], "correcta": 1, "expl": "Es improcedente el traslado como medida de sanción disciplinaria; debe ser por resolución fundada y escrita (Art. 39).", "id": "1-35", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Derechos y garantías", "q": "Ante una orden que pueda generar responsabilidad, el funcionario tiene derecho a (Art. 42):", "opciones": ["Negarse sin más", "Pedir que se le efectúe por escrito, fechada y firmada", "Denunciarla a la prensa", "Renunciar al cargo"], "correcta": 1, "expl": "Tiene derecho a solicitar que la orden se le efectúe por escrito, fechada y firmada (Art. 42).", "id": "1-36", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Derechos y garantías", "q": "El derecho de huelga de los funcionarios del BPS (Art. 45):", "opciones": ["No existe", "Se declara como derecho gremial conforme a la Constitución y Convenios Internacionales", "Solo aplica al escalafón R", "Requiere autorización del Directorio"], "correcta": 1, "expl": "Se declara la huelga como derecho gremial de todos los funcionarios, en el marco de la Constitución y los Convenios Internacionales del Trabajo (Art. 45).", "id": "1-37", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Derechos y garantías", "q": "Para una anotación desfavorable en el legajo (Art. 47) se debe:", "opciones": ["Notificar al sindicato", "Cumplir previamente el Art. 66 de la Constitución (derecho de defensa)", "Esperar 6 meses", "Pedir permiso a la ONSC"], "correcta": 1, "expl": "Toda anotación desfavorable exige cumplir previamente el Art. 66 de la Constitución de la República (Art. 47).", "id": "1-38", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Derechos y garantías", "q": "¿Cuál de estos es un beneficio listado en el Art. 51?", "opciones": ["Prima por Antigüedad", "Bono por proselitismo", "Comisión por licitación", "Premio por dádivas"], "correcta": 0, "expl": "El Art. 51 lista, entre otros, la Prima por Antigüedad, por Matrimonio, por Nacimiento, Hogar Constituido y Cuota Mutual.", "id": "1-39", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Licencias", "q": "La licencia anual remunerada mínima es de:", "opciones": ["10 días hábiles", "15 días corridos", "20 días hábiles", "30 días corridos"], "correcta": 2, "expl": "Es de 20 días hábiles como mínimo, en un solo período, con fraccionamiento posible (Art. 54).", "id": "1-40", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Licencias", "q": "¿Cuál NO figura entre las licencias especiales del Art. 55?", "opciones": ["Por matrimonio", "Por duelo", "Por estudio", "Por presentarse a una licitación"], "correcta": 3, "expl": "El Art. 55 incluye matrimonio, maternidad/paternidad, enfermedad, duelo, donación, estudio, etc., pero no por presentarse a una licitación.", "id": "1-41", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Licencias", "q": "El asueto del día del funcionario del BPS es el:", "opciones": ["1.º de mayo", "28 de mayo", "18 de julio", "25 de agosto"], "correcta": 1, "expl": "El 28 de mayo es el día del funcionario del BPS, con asueto, salvo servicios esenciales (Art. 56).", "id": "1-42", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Procedimiento disciplinario", "q": "El principio que impide sancionar dos veces por el mismo hecho es:", "opciones": ["In dubio pro operario", "Non bis in ídem", "Iura novit curia", "Pacta sunt servanda"], "correcta": 1, "expl": "Rige el non bis in ídem, sin perjuicio de la responsabilidad penal o civil coexistente (Art. 60).", "id": "1-43", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Procedimiento disciplinario", "q": "Los procedimientos disciplinarios son:", "opciones": ["Públicos", "Secretos; violar el secreto es falta grave", "Optativos", "Solo orales"], "correcta": 1, "expl": "Son de carácter secreto; su violación es considerada falta grave (Art. 61).", "id": "1-44", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Procedimiento disciplinario", "q": "Las faltas administrativas se clasifican en (Art. 63):", "opciones": ["Leves, semigraves o graves", "Civiles y penales", "Internas y externas", "Mayores y menores"], "correcta": 0, "expl": "La reglamentación clasifica las faltas en leves, semigraves o graves (Art. 63).", "id": "1-45", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Procedimiento disciplinario", "q": "Diferencia entre investigación administrativa y sumario:", "opciones": ["Son sinónimos", "La investigación comprueba hechos irregulares y responsables; el sumario determina la responsabilidad del imputado", "El sumario es informal", "La investigación solo la hace el sindicato"], "correcta": 1, "expl": "La investigación comprueba hechos irregulares e identifica responsables (Art. 65); el sumario determina la responsabilidad de los imputados (Art. 66).", "id": "1-46", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Procedimiento disciplinario", "q": "La suspensión preventiva es preceptiva cuando:", "opciones": ["La falta es leve", "Los hechos imputados constituyan falta grave", "Lo pide el funcionario", "Nunca es preceptiva"], "correcta": 1, "expl": "Es preceptiva cuando los hechos imputados constituyan falta grave, con retención de medios sueldos (Art. 69).", "id": "1-47", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Procedimiento disciplinario", "q": "La suspensión preventiva no puede exceder de:", "opciones": ["3 meses", "6 meses", "12 meses", "18 meses"], "correcta": 1, "expl": "La suspensión preventiva y la retención de medios sueldos no pueden exceder los 6 meses (Art. 70).", "id": "1-48", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Procedimiento disciplinario", "q": "El sumario o investigación se inicia con (Art. 68):", "opciones": ["Una orden verbal del jefe", "Resolución fundada del Directorio o de quien tenga delegada la facultad", "Denuncia anónima", "Un acta del sindicato"], "correcta": 1, "expl": "Se inicia con resolución fundada del Directorio o de quien tenga delegada la facultad (Art. 68).", "id": "1-49", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Extinción de la relación funcional", "q": "La destitución como medida disciplinaria solo procede por:", "opciones": ["Cualquier falta", "Ineptitud, omisión o delito", "Llegar tarde", "Pedir licencia"], "correcta": 1, "expl": "La destitución disciplinaria solo procede por las causales de ineptitud, omisión o delito (Art. 73 inc. g).", "id": "1-50", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Extinción de la relación funcional", "q": "¿Cuál de estas es una causal de extinción del vínculo (Art. 73)?", "opciones": ["Tomar licencia anual", "Renuncia del funcionario expresamente aceptada", "Pedir una orden por escrito", "Calificación regular"], "correcta": 1, "expl": "La renuncia expresamente aceptada es una de las 10 causales de extinción (Art. 73 inc. a).", "id": "1-51", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Extinción de la relación funcional", "q": "La cesantía por abandono del cargo (Art. 73 inc. d) requiere que el abandono esté:", "opciones": ["Presumido", "Debidamente comprobado", "Denunciado por un compañero", "Anotado en el legajo"], "correcta": 1, "expl": "Procede la cesantía por abandono del cargo debidamente comprobado (Art. 73 inc. d).", "id": "1-52", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Comisión bipartita y disposiciones finales", "q": "La comisión bipartita del Art. 74 está integrada por:", "opciones": ["BPS y ONSC", "BPS y ATSS", "BPS y el Parlamento", "ATSS y la mutualista"], "correcta": 1, "expl": "Es una comisión bipartita permanente integrada por representantes del BPS y ATSS, asesora y de consulta (Art. 74).", "id": "1-53", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Comisión bipartita y disposiciones finales", "q": "¿Quién aprueba los Reglamentos del Estatuto (Art. 76)?", "opciones": ["La ONSC", "El Parlamento", "Exclusivamente el Directorio del BPS", "El sindicato ATSS"], "correcta": 2, "expl": "Todos los Reglamentos del Estatuto son aprobados exclusivamente por el Directorio del BPS (Art. 76).", "id": "1-54", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}, {"subtema": "Comisión bipartita y disposiciones finales", "q": "El Art. 75 prevé reglamentación especial para funcionarios vinculados a:", "opciones": ["La informática", "La salud, considerando OMS y OPS", "El transporte", "La docencia"], "correcta": 1, "expl": "Se reglamentará la situación de funcionarios vinculados a la salud según OMS, OPS y normas nacionales (Art. 75).", "id": "1-55", "tema_id": 1, "tema_nombre": "Estatuto del Funcionario del BPS"}], "autoeval": [{"q": "¿Quién es considerado funcionario del BPS y qué norma lo define?", "a": "Toda persona incorporada regularmente al Organismo mediante designación del Directorio, con carácter permanente o temporal, en subordinación jerárquica, cualquiera sea la forma de remuneración (Art. 1)."}, {"q": "Enumerá los requisitos de ingreso del Art. 2.", "a": "a) ciudadanía (natural o 3 años de legal); b) edad legal; c) aptitud física por Carné de Salud; d) voto obligatorio cumplido; e) declaración jurada de ausencia de incompatibilidad; f) todo otro requisito legal (Art. 2 incs. a-f)."}, {"q": "Explicá el régimen de la designación precaria.", "a": "Toda designación de ingreso es precaria y revocable por resolución fundada dentro de 6 meses desde la toma de posesión; el superior eleva informe con no menos de 30 días de anticipación (plazo no prorrogable), y omitirlo es falta administrativa (Art. 3)."}, {"q": "¿Cuáles son las formas de selección de personal?", "a": "Concurso de oposición y méritos, concurso de méritos y prueba de aptitud o suficiencia, o sorteo, salvo otra forma prevista por la normativa (Art. 4)."}, {"q": "Nombrá los 7 escalafones y ubicá al aspirante administrativo.", "a": "R Gerencial, A Profesional Universitario, B Técnico Universitario, C Administrativo, D Especializado, E de Oficios, F Servicios Auxiliares. El aspirante administrativo es escalafón C (Art. 13)."}, {"q": "Diferenciá entrenamiento, capacitación y desarrollo.", "a": "Entrenamiento: habilidad para el cargo actual (Art. 9). Capacitación: acceder a cargos superiores o funciones distintas (Art. 10). Desarrollo: conocimientos que trascienden el cargo, para el crecimiento profesional (Art. 11)."}, {"q": "¿Con qué frecuencia se califica y qué cargos se exceptúan de la evaluación?", "a": "La calificación es anual (Art. 17). De la evaluación se exceptúan Gerente General, Secretario General y Directores Técnicos de Atyr y de Prestaciones (Art. 19)."}, {"q": "¿Cuál es el plazo máximo entre el llamado a concurso y la provisión de vacantes?", "a": "18 meses (Art. 22)."}, {"q": "Mencioná tres obligaciones del funcionario con sus datos duros.", "a": "Comunicar cambios de domicilio en 48 horas hábiles (inc. h); declarar parentesco hasta 2.º grado (inc. k); mantener actualizado el Carné de Salud (inc. m), entre otras (Art. 23)."}, {"q": "¿Qué prohíbe el Art. 28 y cuáles son sus excepciones?", "a": "Prohíbe solicitar o aceptar dádivas para torcer un acto del empleo (Art. 28). Excepciones (Art. 30): reconocimientos protocolares, gastos de viaje para actividades académicas, atenciones de cortesía en fiestas y colectas autorizadas."}, {"q": "Explicá la subrogación: plazos clave.", "a": "Acefalía es la ausencia de un cargo; la subrogación de jefatura/gerencia la dispone el Directorio. El subrogante cobra la diferencia desde los 45 días de ausencia del titular; el cargo se provee por ascenso dentro de 18 meses (Art. 32)."}, {"q": "¿Cuál es la licencia anual mínima y qué día es el del funcionario del BPS?", "a": "Licencia anual: 20 días hábiles mínimo, en un solo período con fraccionamiento posible (Art. 54). El día del funcionario es el 28 de mayo, con asueto (Art. 56)."}, {"q": "Resumí los principios del procedimiento disciplinario.", "a": "Non bis in ídem (Art. 60), carácter secreto cuya violación es falta grave (Art. 61), y necesidad de investigación o sumario para faltas no de constatación directa (Art. 64)."}, {"q": "¿Cuándo es preceptiva la suspensión preventiva y cuál es su tope?", "a": "Es preceptiva cuando los hechos imputados constituyan falta grave, con retención de medios sueldos (Art. 69), y no puede exceder los 6 meses (Art. 70)."}, {"q": "¿Por qué causales procede la destitución disciplinaria y cuántas causales de extinción hay?", "a": "La destitución disciplinaria solo procede por ineptitud, omisión o delito (Art. 73 inc. g). Hay 10 causales de extinción del vínculo (Art. 73 incs. a-j)."}, {"q": "¿Qué es la comisión bipartita y quién aprueba los reglamentos del Estatuto?", "a": "La comisión bipartita es un órgano permanente, asesor y de consulta, integrado por BPS y ATSS (Art. 74). Los reglamentos los aprueba exclusivamente el Directorio del BPS (Art. 76)."}], "huecos": []}, {"id": 2, "tema": "Plan Estratégico 2025-2030 del BPS", "fuente_pagina": "https://www.bps.gub.uy/24263/", "fuente_pdf": "https://www.bps.gub.uy/bps/file/24263/1/plan-estrategico-2025-2030.pdf", "fuente_nombre": "Plan Estratégico 2025-2030 - Banco de Previsión Social (Gerencia Planificación y Control Institucional)", "ficha": "El Plan Estratégico 2025-2030 es el documento de planificación institucional del BPS elaborado por la Gerencia Planificación y Control Institucional. Define la misión, visión, valores, un diagnóstico estratégico (incluido un FODA), 8 lineamientos/ejes estratégicos con sus objetivos y líneas de acción, e indicadores con metas anuales 2026-2030. Sirve para orientar la gestión del Instituto de Seguridad Social hacia una atención cercana, eficiente, transparente e innovadora durante el quinquenio.", "eli5": "Imaginá que el BPS es un barco enorme que lleva a casi todos los uruguayos en distintos momentos de su vida (cuando nacen, trabajan, se enferman o se jubilan). El Plan Estratégico es el mapa de ruta del barco para los próximos 5 años: dice a dónde quiere llegar (visión), por qué existe (misión), qué reglas de conducta sigue la tripulación (valores), qué problemas hay en el mar (diagnóstico/FODA) y los 8 caminos principales que va a tomar (ejes). Además pone metas con números para saber si va avanzando.", "esquema": ["Plan Estratégico 2025-2030 (BPS - Gerencia Planificación y Control Institucional)", "  - Introducción (cometido del BPS, datos de prestaciones y cotizantes ene/2025)", "  - Misión", "  - Visión", "  - Valores (9)", "  - Diagnóstico Estratégico", "    - Desafíos: envejecimiento, tecnología, pobreza infantil, Diálogo Social", "    - Impactos de corto plazo (Ley 20.130, nuevo sistema de Prestaciones Económicas, etc.)", "    - FODA (Fortalezas, Oportunidades, Debilidades, Amenazas)", "  - Lineamientos Estratégicos (8 líneas estratégicas)", "  - Objetivos Estratégicos (8 ejes con sub-objetivos y líneas de acción 1.1 a 8.5)", "  - Indicadores Estratégicos (con valor base y metas 2026-2030)"], "datos_duros": ["Período del plan: 2025-2030 (Introducción).", "BPS: ente autónomo creado en el art. 195 de la Constitución de 1967 (Introducción).", "Prestaciones otorgadas en enero 2025: 1.376.110 (Introducción).", "Desglose ene/2025: Jubilaciones 496.802; Pensiones sobrevivencia 226.366; AFAM 466.302; Pensiones asistenciales 91.859; Subsidio Desempleo 46.394; Subsidio enfermedad 44.690; Maternidad, paternidad y cuidados 3.697 (Introducción).", "Puestos cotizantes recaudados en enero 2025: 1.579.795 (Introducción).", "Valores: son 9 (Responsabilidad social; Articulación interinstitucional; Transpa
