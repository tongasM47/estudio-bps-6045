si falta, hay 10 días hábiles para salvarla", "Deben presentarse en papel sellado", "Requieren firma de dos testigos"], "correcta": 1, "expl": "El Art. 125 exige firma de letrado; su omisión se salva en 10 días hábiles bajo apercibimiento de tener el recurso por no presentado.", "id": "6-45", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Recursos: trámite", "q": "La fundamentación del recurso (Art. 124):", "opciones": ["Es obligatoria al momento de interponerlo", "Puede cumplirse después, mientras el asunto esté pendiente de resolución", "No se admite", "Solo la presenta el abogado del BPS"], "correcta": 1, "expl": "El Art. 124 reconoce que la fundamentación puede cumplirse posteriormente.", "id": "6-46", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Recursos: trámite", "q": "Si el recurso se interpone por fax o telegrama, el recurrente tiene para ratificar (Art. 126):", "opciones": ["3 días hábiles", "5 días corridos", "10 días hábiles", "20 días corridos"], "correcta": 2, "expl": "El Art. 126 otorga 10 días hábiles para comparecer y ratificar, bajo apercibimiento de tener el recurso por no presentado.", "id": "6-47", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Recursos: resolución y efectos", "q": "Al resolver el recurso jerárquico, el jerarca puede (Art. 133):", "opciones": ["Solo confirmar el acto", "Confirmar, modificar o revocar total o parcialmente, y convalidar si hay vicio de forma", "Únicamente anularlo", "Derivarlo al TCA"], "correcta": 1, "expl": "El Art. 133 habilita confirmar, modificar, revocar y convalidar subsanando vicios de forma.", "id": "6-48", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Procedimiento disciplinario (Libro II)", "q": "La falta disciplinaria es (Art. 136):", "opciones": ["Solo el delito penal del funcionario", "Todo acto u omisión, intencional o culposo, que viole los deberes funcionales", "Cualquier error administrativo del organismo", "La inasistencia justificada"], "correcta": 1, "expl": "El Art. 136 define la falta como acto u omisión que viola los deberes funcionales.", "id": "6-49", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Procedimiento disciplinario (Libro II)", "q": "La instrucción de un sumario debe terminarse en (Art. 178):", "opciones": ["30 días hábiles", "60 días corridos, prorrogables hasta 30 días", "90 días corridos", "120 días"], "correcta": 1, "expl": "El Art. 178 fija 60 días corridos desde la notificación al instructor, prorrogables hasta 30 días.", "id": "6-50", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}, {"subtema": "Procedimiento disciplinario (Libro II)", "q": "El carácter de los procedimientos del Libro II (sumarios) es (Art. 140):", "opciones": ["Público", "Secreto; su violación es falta grave", "Reservado solo para el imputado", "Confidencial sin sanción"], "correcta": 1, "expl": "El Art. 140 establece el carácter secreto y que su violación es falta grave.", "id": "6-51", "tema_id": 6, "tema_nombre": "Reglamento de Procedimiento Administrativo del BPS"}], "autoeval": [{"q": "Explicá la diferencia entre cómo se computan los plazos reglamentarios por días (Art. 97) y los plazos para que la Administración decida peticiones y recursos (Arts. 93, 115).", "a": "Los plazos reglamentarios señalados por días se entienden HÁBILES (Art. 97). En cambio, los plazos para que la Administración decida peticiones (Art. 93) y recursos (Art. 115) se computan por días CORRIDOS, sin interrupción, suspendiéndose solo durante la Semana de Turismo y extendiéndose al día hábil siguiente si vencen en feriado."}, {"q": "Detallá el plazo, el órgano y la forma de interposición de los recursos de revocación y jerárquico.", "a": "La revocación se interpone en 10 días corridos siguientes a la notificación personal o publicación, ante el mismo órgano que dictó el acto. Si el órgano está sometido a jerarquía, debe interponerse además, en forma conjunta y subsidiaria, el jerárquico ante el jerarca máximo (Art. 112). El plazo se suspende en Ferias Judiciales y Semana de Turismo (Art. 114)."}, {"q": "¿Cuándo se agota la vía administrativa y qué efecto tiene el vencimiento de los plazos?", "a": "Se agota a los 150 días si solo se interpuso revocación, o a los 200 días si se interpusieron conjuntamente revocación y jerárquico, sin resolución (Art. 117; Art. 41 Ley 17.292). Vencidos los 200 días sin resolver, el acto se reputa fictamente confirmado (Art. 118), habilitando la acción de nulidad ante el TCA, sin que cese el deber de la Administración de pronunciarse."}, {"q": "¿Qué es la vista previa y cuándo procede?", "a": "Es la garantía del Art. 69: cuando pueda recaer una decisión contraria, sancionatoria o perjudicial al administrado, o se hubiere deducido oposición, no se dicta resolución sin previa vista al interesado por 10 días para presentar descargos, probanzas y articular su defensa. Con varias partes, el término es común y corre desde la última notificación."}, {"q": "Describí las reglas de notificación: qué se notifica, plazo de la oficina y qué pasa si se desconoce el domicilio.", "a": "Se notifican las resoluciones que dan vista, las que culminan el procedimiento y las que causan gravamen irreparable (Art. 80). La oficina notifica en máximo 5 días hábiles desde el día siguiente a la recepción del expediente. Si se desconoce el domicilio, se publica en el Diario Oficial durante 3 días seguidos (Art. 83). El conocimiento informal no hace correr el plazo para recurrir (Art. 113)."}, {"q": "¿Qué exige el reglamento sobre la motivación y la estructura del acto administrativo?", "a": "Todo acto debe ser motivado con relación directa y concreta de los hechos, sin fórmulas generales (Art. 106). La resolución consta de parte expositiva (Visto, Resultandos, Considerandos y Atento) y parte dispositiva (Art. 107). El acto administrativo es toda manifestación de voluntad de la Administración que produce efectos jurídicos (Art. 104)."}, {"q": "¿Qué rol cumple la impulsión de oficio y existe la perención en este procedimiento?", "a": "La impulsión del procedimiento se realiza de oficio: la autoridad practica las diligencias y requiere informes, sin perjuicio de la impulsión de los interesados. La falta de impulsión por los interesados NO produce perención de las actuaciones; el trámite debe continuar hasta la decisión final (Art. 54)."}, {"q": "Mencioná los principales requisitos formales para interponer un recurso y las consecuencias de no cumplirlos.", "a": "Debe constar nombre y domicilio del recurrente, voluntad de recurrir, qué recursos se interponen y qué acto se impugna (Art. 123). Llevan firma de letrado (Art. 125); si falta, 10 días hábiles para salvarla, bajo apercibimiento de tenerlo por no presentado. La fundamentación puede cumplirse después (Art. 124). Si se interpuso por fax/telegrama, hay 10 días hábiles para ratificar (Art. 126)."}, {"q": "¿Qué normas nacionales recoge y cita el reglamento del BPS?", "a": "Cita y aplica: la Constitución (arts. 30 derecho de petición, 66 debido proceso disciplinario, 318 obligación de decidir), la Ley 15.869 (cómputo de plazos y recursos), la Ley 17.292 art. 41 (agotamiento a 200 días y presunción simple), el Decreto-ley 15.524 art. 37 (firma letrada) y el Decreto 264/996 (recursos en pasividades civiles). El reglamento adapta para el BPS las reglas del procedimiento administrativo nacional (en línea con el Decreto 500/991)."}, {"q": "Explicá brevemente el procedimiento disciplinario del Libro II (carácter, plazo del sumario y suspensión preventiva).", "a": "Es el conjunto de trámites del poder disciplinario del BPS (Art. 135). La falta es todo acto u omisión que viole los deberes funcionales (Art. 136). Los procedimientos son secretos y su violación es falta grave (Art. 140). La instrucción del sumario dura 60 días corridos, prorrogables 30 (Art. 178). La suspensión preventiva con retención de medio sueldo es preceptiva ante falta grave y no excede 6 meses (Art. 153)."}], "huecos": ["El Libro I (Arts. 1-134: procedimiento administrativo general — el núcleo evaluable de este tema) está COMPLETO y verificado. El Libro II del reglamento (procedimiento disciplinario: sumarios, investigaciones administrativas y sanciones) se truncó al descargar el PDF (cap de tamaño, corte en Art. 182). RESOLUCIÓN: esa materia disciplinaria está cubierta a fondo en el Tema 1 (Estatuto, Cap. X — Procedimiento disciplinario, Arts. 59-72) y, sobre todo, en el Tema 7 (Reglamento de Responsabilidad Administrativa, completo). Es decir, no hay un vacío de contenido para el estudio; lo que no se pudo extraer es la numeración específica de los artículos del Libro II de ESTE reglamento más allá del 182.", "El reglamento remite a normas nacionales (Ley 15.869, Ley 17.292, Decreto-ley 15.524, Decreto 264/996 y el régimen del Decreto 500/991). Los plazos citados son los que constan expresamente en el articulado del reglamento del BPS."]}, {"id": 7, "tema": "Reglamento de Responsabilidad Administrativa (BPS)", "fuente_pagina": "https://www.bps.gub.uy/24268/", "fuente_pdf": "https://www.bps.gub.uy/bps/file/24268/1/reglamento-de-responsabilidad-administrativa.pdf", "fuente_nombre": "Reglamento de Responsabilidad Administrativa - Banco de Previsión Social, Gerencia de Gestión Humana", "ficha": "Reglamento interno del BPS que regula los deberes de horario y asistencia, define las faltas administrativas (leves, semi-graves y graves), las sanciones disciplinarias (observación escrita, suspensión con pérdida de haberes y destitución), las jerarquías que pueden aplicarlas, los procedimientos (apreciación directa, investigación administrativa y sumario), la prescripción y las reglas de graduación de la sanción. Se aplica a todos los funcionarios del Organismo por hechos ocurridos con posterioridad a su vigencia (Art. 27).", "eli5": "Imaginá las reglas de convivencia de una casa muy grande: a qué hora hay que llegar, qué pasa si faltás o llegás tarde, y qué cosas no se pueden hacer. Si rompés una regla chica te llaman la atención por escrito; si es más seria te suspenden unos días sin pagarte; y si es muy grave te pueden echar (destitución). Antes de castigarte te avisan, te dejan explicarte y te dan papeles para defenderte. Y hay un reloj: si pasa demasiado tiempo, la falta ya no se puede castigar (prescribe).", "esquema": ["Cap. I - Horario y asistencia (Arts. 1-11)", "  - Horario, asistencia y registro (Arts. 1-3)", "  - Inasistencias: con/sin aviso, sanciones automáticas y definitivas (Art. 4)", "  - Incumplimiento de horario y omisiones de registro (Arts. 5-7)", "  - Solicitudes fuera de plazo (Art. 8); renuncia tácita / abandono del cargo (Art. 9)", "  - Horas por asuntos particulares (Art. 10) y comisiones (Art. 11)", "Cap. II - Faltas administrativas (Arts. 12-16)", "  - Definición (Art. 12) y clasificación: leves, semi-graves, graves (Art. 13)", "  - Faltas leves (Art. 14), semi-graves (Art. 15) y graves (Art. 16)", "Cap. III - Sanciones disciplinarias y su aplicación (Arts. 17-18)", "  - Tipos de sanción (Art. 17); escala por jerarquía (Art. 18)", "Cap. IV - Faltas de apreciación directa (Arts. 19-20)", "  - Apreciación directa sin sumario (Art. 19); cuándo se exige sumario (Art. 20)", "Cap. V - Disposiciones finales (Arts. 21-27)", "  - Prescripción (Art. 21); cuantificación / atenuantes y agravantes (Art. 22)", "  - Suspensión preventiva e imputación (Art. 23); beneficios sociales (Art. 24); vigencia (Art. 27)", "Anexo I - Instructivo del procedimiento de apreciación directa (7 pasos)"], "datos_duros": ["Clasificación de faltas (Art. 13): leves, semi-graves y graves.", "Faltas LEVES (Art. 14): sancionables desde observación escrita y hasta 10 días de suspensión con pérdida de haberes.", "Faltas SEMI-GRAVES (Art. 15): sancionables desde 11 y hasta 30 días de suspensión con pérdida de haberes.", "Faltas GRAVES (Art. 16): sancionables desde 31 y hasta 180 días de suspensión, pudiendo llegar hasta la destitución.", "Sanciones disciplinarias (Art. 17): a) observación escrita; b) suspensión con pérdida de haberes; c) destitución.", "Destitución (Art. 17 lit. c): la dispone el Directorio por CUATRO votos conformes, por falta grave, en casos de ineptitud, omisión o delito.", "Escala de aplicación por jerarquía (Art. 18): Directorio -\u003e observación / suspensión hasta 180 días / destitución.", "Art. 18: Gerencia General, Dir. Técnica de ATYR, Dir. Técnica de Prestaciones, Secretaría General y jerarcas Nivel I -\u003e observación / suspensión hasta 30 días.", "Art. 18: Gerentes de Unidades -\u003e observación / suspensión hasta 10 días; Jefes -\u003e observación / suspensión hasta 3 días.", "Apreciación directa (Art. 19): faltas leves y semi-graves que no requieren investigación se evalúan SIN previo sumario.", "Sumario obligatorio (Art. 20): las leves/semi-graves que NO sean de apreciación directa y TODAS las graves requieren investigación administrativa o sumario.", "Prescripción (Art. 21): a los 8 años si la falta no constituye delito; si constituye delito, en el plazo de prescripción de ese delito.", "Prescripción (Art. 21): el plazo corre como el de los delitos (art. 119 Código Penal) y se suspende por la resolución que dispone investigación administrativa o instrucción de sumario.", "Inasistencias con aviso (Art. 4.I.a): desde la 2a en el mes, 1 día de suspensión por cada día no trabajado.", "Inasistencias sin aviso (Art. 4.I.b): 1er día -\u003e 1 día de suspensión; 2a y sucesivas en el mismo mes -\u003e 2 días por cada día.", "Inasistencias definitivas (Art. 4.II): hasta 9 inclusive la sanción provisional queda definitiva; desde 10 se dispone sumario administrativo.", "Renuncia tácita / abandono del cargo (Art. 9): se configura con 5 días de inasistencias continuas sin aviso; comunicar a RRHH en 24 horas; emplazamiento por 3 días.", "Omisiones de registro (Art. 6): desde la 5a omisión anual; 5-7 observación escrita; 8-10 1 día; 11-13 2 días; +1 día cada 3 que excedan de 13.", "Solicitudes fuera de plazo (Art. 8): desde la 5a anual; 5-15 observación; 16-25 1 día; 26-35 2 días; +1 día cada 10 que excedan de 35.", "Suspensión preventiva (Art. 23): se imputa a la sanción definitiva el tiempo y los haberes retenidos; si hay destitución, NO se devuelven los haberes.", "Atenuantes (Art. 22.I): sin intención/premeditación; buena conducta anterior; confesión y/o reparación del daño; análogas.", "Agravantes (Art. 22.II): reiteración; reincidencia (nuevas faltas antes de 5 años de la sanción anterior o de su prescripción); premeditación/engaño/abuso de autoridad o daño patrimonial; ser funcionario de jerarquía; análogas.", "Graduación (Art. 22): atenuantes de excepcional relevancia bajan la falta al grado inmediato anterior; agravantes de excepcional relevancia la suben al grado inmediato superior.", "Recursos en apreciación directa (Anexo I, paso 6): revocación y jerárquico en subsidio, dentro de 10 días corridos de la notificación personal, sin efecto suspensivo.", "Vigencia (Art. 27): el reglamento se aplica a las situaciones ocurridas con posterioridad a su vigencia."], "teoria_resumida": "\u003cp\u003eEl \u003cstrong\u003eReglamento de Responsabilidad Administrativa\u003c/strong\u003e del BPS organiza tres bloques clave para el concurso: \u003cstrong\u003equé es una falta\u003c/strong\u003e, \u003cstrong\u003ecómo se clasifica y sanciona\u003c/strong\u003e, y \u003cstrong\u003econ qué procedimiento y garantías\u003c/strong\u003e se actúa.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFalta administrativa\u003c/strong\u003e (Art. 12) es todo acto u omisión del funcionario, \u003cstrong\u003eintencional o culposo\u003c/strong\u003e, que viole los deberes funcionales. Las faltas se clasifican en \u003cstrong\u003eleves, semi-graves y graves\u003c/strong\u003e (Art. 13).\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eLeves\u003c/strong\u003e (Art. 14): desde observación escrita y hasta \u003cstrong\u003e10 días\u003c/strong\u003e de suspensión. Ej.: conducta irrespetuosa, uso indebido de equipos, incumplir la jornada.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eSemi-graves\u003c/strong\u003e (Art. 15): desde \u003cstrong\u003e11 hasta 30 días\u003c/strong\u003e. Ej.: incumplir órdenes legítimas, concurrir en estado de ebriedad, reiteración de faltas leves.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eGraves\u003c/strong\u003e (Art. 16): desde \u003cstrong\u003e31 hasta 180 días\u003c/strong\u003e, pudiendo llegar a la \u003cstrong\u003edestitución\u003c/strong\u003e. Ej.: violar el secreto administrativo, beneficio ilegítimo, delito contra la Administración, acumular 10 o más faltas injustificadas al año.\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eLas \u003cstrong\u003esanciones\u003c/strong\u003e (Art. 17) son tres: \u003cstrong\u003eobservación escrita\u003c/strong\u003e (advertencia con anotación en legajo), \u003cstrong\u003esuspensión con pérdida de haberes\u003c/strong\u003e y \u003cstrong\u003edestitución\u003c/strong\u003e (la dispone el \u003cstrong\u003eDirectorio por 4 votos conformes\u003c/strong\u003e, por ineptitud, omisión o delito). La potestad sancionatoria se reparte por jerarquía (Art. 18): el Directorio llega hasta 180 días y destitución; un Jefe solo hasta 3 días.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProcedimiento\u003c/strong\u003e: las faltas leves y semi-graves de \u003cstrong\u003eapreciación directa\u003c/strong\u003e se resuelven sin sumario, por el jerarca, labrando acta y dando vista (Art. 19 y Anexo I). En cambio, las graves y las que no sean de apreciación directa exigen siempre \u003cstrong\u003einvestigación administrativa o sumario\u003c/strong\u003e (Art. 20). El reglamento asegura el \u003cstrong\u003edebido proceso\u003c/strong\u003e: vista, descargos, prueba, resolución fundada y recursos (revocación y jerárquico en subsidio, 10 días corridos, sin efecto suspensivo).\u003c/p\u003e\u003cp\u003eLa \u003cstrong\u003eprescripción\u003c/strong\u003e (Art. 21) es a los \u003cstrong\u003e8 años\u003c/strong\u003e si la falta no es delito, o el plazo del delito si lo es, y se suspende al disponerse la investigación o el sumario. La \u003cstrong\u003egraduación\u003c/strong\u003e (Art. 22) atiende a atenuantes (sin intención, buena conducta, confesión/reparación) y agravantes (reiteración, reincidencia, abuso de autoridad, ser jerarca). La \u003cstrong\u003esuspensión preventiva\u003c/strong\u003e se imputa a la sanción final (Art. 23).\u003c/p\u003e", "teoria_exhaustiva": [{"ref": "Art. 1", "titulo": "Días y horarios de trabajo", "cita": "El Directorio o la Gerencia General fijará el horario de trabajo de los funcionarios del Organismo.", "explicacion": "La fijación del horario es competencia del Directorio o la Gerencia General; se identifican días no laborables (sábados, domingos y feriados nacionales) y se admiten variaciones autorizadas.", "ejemplo": "Una Gerencia con atención al público puede pedir a Gerencia General adecuar horarios por la naturaleza del servicio."}, {"ref": "Art. 2", "titulo": "Asistencia", "cita": "Los funcionarios están obligados a cumplir íntegramente el horario establecido... salvo por razones debidamente autorizadas.", "explicacion": "Deber básico de presencia y puntualidad; sustenta las faltas de horario y asistencia.", "ejemplo": "Retirarse antes sin autorización configura incumplimiento del horario."}, {"ref": "Art. 3", "titulo": "Registro de asistencia", "cita": "Los funcionarios deberán registrar toda entrada y salida de la oficina.", "explicacion": "Obligación de marcar entradas/salidas (salvo exceptuados); 30 minutos de descanso intermedio en régimen de 8 horas, entre la 2a y la 5a hora.", "ejemplo": "No registrar la salida repetidamente puede derivar en la falta del Art. 6."}, {"ref": "Art. 4", "titulo": "Sanciones por inasistencia", "cita": "Por la inasistencia se le descontará... el importe de un día por cada día de falta y corresponderán las siguientes sanciones.", "explicacion": "Distingue faltas con aviso (desde la 2a del mes, 1 día de suspensión por día) y sin aviso (1er día 1 día; siguientes del mes 2 días por día). Definitivas: hasta 9 inasistencias anuales la provisional queda firme; desde 10 se dispone sumario.", "ejemplo": "Faltar 3 días sin aviso en un mes: día 1 = 1 día de suspensión, días 2 y 3 = 2 días cada uno."}, {"ref": "Art. 5", "titulo": "Incumplimiento del horario reglamentario", "cita": "Se establece una tolerancia mensual de hasta 30 minutos para llegadas tarde, salidas entre horario o al final de la jornada.", "explicacion": "Superada la tolerancia se descuenta a tiempo real; si se exceden los topes de cada régimen horario, se inicia procedimiento disciplinario por el Art. 14 lit. e. Los deméritos no se computan tras 12 meses.", "ejemplo": "Funcionario de 8 horas que excede 241 minutos en el trimestre: se inicia procedimiento disciplinario."}, {"ref": "Art. 6", "titulo": "Omisiones de registro de asistencia", "cita": "A partir de la quinta omisión en un período de un año calendario podrá incurrir en falta administrativa.", "explicacion": "Escala gradual: 5-7 observación escrita; 8-10 un día de suspensión; 11-13 dos días; +1 día cada 3 que excedan de 13. (Fuente R.D. N° 6-3/2026).", "ejemplo": "9 omisiones de registro en el año: 1 día de suspensión."}, {"ref": "Art. 7", "titulo": "Excepciones", "cita": "El jerarca podrá solicitar a RRHH que se subsane la omisión de registro... bajo su más estricta responsabilidad.", "explicacion": "Permite corregir excepcionalmente una omisión de registro con circunstancias probadas, responsabilizando al jerarca.", "ejemplo": "Falla del sistema de marcación documentada que impidió registrar la salida."}, {"ref": "Art. 8", "titulo": "Solicitudes y autorizaciones fuera de plazo", "cita": "A partir de la quinta solicitud o autorización... fuera de plazo en un año calendario... podrá incurrir en falta.", "explicacion": "Dos escalas separadas: solicitudes (5-15 observación; 16-25 1 día; 26-35 2 días; +1 cada 10 sobre 35) y autorizaciones de coberturas (5-30 observación; 31-55 1 día; 56-80 2 días; +1 cada 10 sobre 80).", "ejemplo": "Un jerarca que autoriza 35 coberturas fuera de plazo en el año: 1 día de suspensión."}, {"ref": "Art. 9", "titulo": "Renuncia tácita / abandono del cargo", "cita": "Cinco días de inasistencias continuas sin aviso... promover el trámite de abandono del cargo.", "explicacion": "El superior comunica a RRHH en 24 horas; el funcionario es emplazado 3 días (domicilio y/o Diario Oficial). Si no se reintegra, el Directorio declara el abandono; si dice querer seguir pero no se reintegra, se inicia sumario.", "ejemplo": "Quien falta 5 días seguidos sin avisar y no responde al emplazamiento puede ser declarado renunciante."}, {"ref": "Art. 10", "titulo": "Horas por asuntos particulares", "cita": "Horas no acumulativas por asuntos particulares según el régimen horario.", "explicacion": "Beneficio mensual escalonado (8h: 4h; ...; 3h30: 1h45). No lo tienen quienes cumplen menos de 17h30 semanales. El exceso pasa a 'incumplimiento de horario' (Art. 5).", "ejemplo": "Funcionario de 6 horas dispone de 3 horas mensuales por asuntos particulares."}, {"ref": "Art. 11", "titulo": "Comisiones", "cita": "Comisión simple, de servicio, médicas y por lactancia.", "explicacion": "La comisión de servicio dentro del país la autoriza el jerarca máximo hasta 10 días; más de 10 días Gerencia General; el exterior el Directorio. Lactancia: 30 minutos o, en jornada completa, dos de media hora o uno de una hora.", "ejemplo": "Un curso de 12 días en el país requiere autorización de Gerencia General."}, {"ref": "Art. 12", "titulo": "Definición de falta administrativa", "cita": "Es falta administrativa todo acto u omisión del funcionario, intencional o culposo, que viole los deberes funcionales.", "explicacion": "Concepto amplio: abarca acción y omisión, dolo (intencional) y culpa (negligencia). Base de toda la responsabilidad disciplinaria.", "ejemplo": "Perder por descuido un expediente (culpa) también es falta, no solo el acto deliberado."}, {"ref": "Art. 13", "titulo": "Clasificación de las faltas", "cita": "Las faltas administrativas según su entidad pueden ser calificadas en: leves, semi-graves y graves.", "explicacion": "Tres categorías según la gravedad, cada una con su rango de sanción (Arts. 14-16). Es uno de los puntos más evaluables.", "ejemplo": "La misma conducta reiterada puede 'subir' de categoría (reiteración de leves -\u003e semi-grave)."}, {"ref": "Art. 14", "titulo": "Faltas leves", "cita": "Desde una observación escrita y hasta por 10 días de suspensión con pérdida de haberes.", "explicacion": "Incluye conducta irrespetuosa, ejecución tardía injustificada, tomar atribuciones ajenas, uso indebido de equipos, incumplir la jornada (lit. e), descuidar claves/sellos, no procurar la mejora de su salud en licencia.", "ejemplo": "Usar la fotocopiadora para asuntos personales (lit. d) es falta leve."}, {"ref": "Art. 15", "titulo": "Faltas semi-graves", "cita": "Desde 11 y hasta 30 días de suspensión con pérdida de haberes.", "explicacion": "Incluye incumplir órdenes legítimas, no cumplir capacitación, concurrir ebrio o bajo drogas, omitir sancionar, omitir ejecutar tareas, y la reiteración de faltas leves.", "ejemplo": "Concurrir al trabajo en estado de ebriedad (lit. c) es falta semi-grave."}, {"ref": "Art. 16", "titulo": "Faltas graves", "cita": "Desde 31 días y hasta 180 días de suspensión... pudiendo llegar hasta la destitución.", "explicacion": "Incluye actos con perjuicio cierto, entorpecer investigaciones, beneficio ilegítimo, violar el secreto administrativo, dañar sistemas, delito contra la Administración, acumular 10 o más faltas injustificadas al año, marcar por otro funcionario y reiteración de semi-graves.", "ejemplo": "Divulgar datos reservados de un afiliado (lit. l) es falta grave."}, {"ref": "Art. 17", "titulo": "Tipos de sanciones disciplinarias", "cita": "Observación escrita; suspensión con pérdida de haberes; destitución... por el Directorio por cuatro votos conformes.", "explicacion": "Tres sanciones. La observación se anota en el legajo; la suspensión priva del ejercicio de funciones; la destitución extingue el vínculo por falta grave (ineptitud, omisión o delito) y exige 4 votos del Directorio.", "ejemplo": "Sin los 4 votos conformes del Directorio no puede destituirse al funcionario."}, {"ref": "Art. 18", "titulo": "Aplicación de sanciones por jerarquía", "cita": "Directorio: observación / suspensión hasta 180 días / destitución... Jefes: observación / suspensión hasta tres días.", "explicacion": "Competencia escalonada: Directorio (todo); Nivel I (hasta 30 días); Gerentes de Unidades (hasta 10 días); Jefes (hasta 3 días). Solo el Directorio destituye.", "ejemplo": "Un Gerente de Unidad no puede imponer 20 días de suspensión: su tope es 10."}, {"ref": "Art. 19", "titulo": "Faltas de apreciación directa", "cita": "Serán evaluadas por los Jerarcas del funcionario, sin necesidad de previo sumario.", "explicacion": "Las leves y semi-graves que no requieren investigación se resuelven por el jerarca, que labra acta (hechos, prueba, falta y sanción) y da vista al funcionario (procedimiento del Anexo I).", "ejemplo": "Una llegada tarde verificable en el reloj puede sancionarse sin sumario."}, {"ref": "Art. 20", "titulo": "Faltas que exigen sumario", "cita": "Las faltas... que no sean de apreciación directa y las faltas graves, requerirán siempre... investigación administrativa o de sumario.", "explicacion": "Garantía procesal: toda falta grave, y las leves/semi-graves no evidentes, exigen instrucción previa.", "ejemplo": "Una acusación de violación del secreto administrativo siempre requiere sumario."}, {"ref": "Art. 21", "titulo": "Prescripción", "cita": "Cuando no constituyen delito, a los ocho años... se suspende por la resolución que disponga una investigación administrativa o la instrucción de un sumario.", "explicacion": "Plazo general de 8 años (o el del delito si la falta lo configura). El cómputo sigue el art. 119 del Código Penal y se suspende al disponerse la investigación o el sumario.", "ejemplo": "Una falta no delictiva descubierta a los 9 años ya está prescripta."}, {"ref": "Art. 22", "titulo": "Cuantificación / atenuantes y agravantes", "cita": "La sanción se fijará en función de la gravedad de la falta y de las circunstancias atenuantes y agravantes existentes.", "explicacion": "Atenuantes: sin intención, buena conducta, confesión/reparación. Agravantes: reiteración, reincidencia (antes de 5 años de la sanción anterior o su prescripción), premeditación/abuso de autoridad, ser jerarca. Las de excepcional relevancia mueven la falta un grado.", "ejemplo": "Confesar y reparar el daño puede bajar una falta semi-grave al grado de leve."}, {"ref": "Art. 23", "titulo": "Imputación de la suspensión preventiva", "cita": "Deberá imputarse a la sanción que en definitiva recaiga... el tiempo de suspensión... y los haberes... retenidos.", "explicacion": "Si hubo suspensión preventiva, su tiempo y los haberes retenidos se descuentan de la sanción final; pero si el sumario termina en destitución, no se devuelven los haberes.", "ejemplo": "Quien estuvo 20 días suspendido preventivamente y recibe 30 días, cumple solo 10 más."}, {"ref": "Art. 24", "titulo": "Beneficios sociales", "cita": "La Prima por Hogar Constituido y la Asignación Familiar... no serán descontadas ni retenidas.", "explicacion": "Protege beneficios de carácter social aun cuando se descuenten haberes por faltas o suspensiones.", "ejemplo": "Una suspensión con pérdida de haberes no afecta la Asignación Familiar del funcionario."}, {"ref": "Art. 25", "titulo": "Descuento por asistencia y horario", "cita": "Toda sanción disciplinaria... se aplicará sin perjuicio de los descuentos que establecen los regímenes de 'asistencia y horario'.", "explicacion": "La sanción disciplinaria y el descuento por el tiempo no trabajado son acumulables, no se excluyen.", "ejemplo": "Una inasistencia genera el descuento del día y, además, la suspensión correspondiente."}, {"ref": "Art. 26", "titulo": "Personal médico y técnico de salud", "cita": "Se aplicará el régimen de equivalencias en relación a la suma total de horas presenciales semanales y la carga horaria diaria.", "explicacion": "Adapta el cómputo de faltas, comisiones y sanciones a quienes trabajan por guardias o policlínica.", "ejemplo": "Para un médico de guardia, las faltas se computan según equivalencias horarias."}, {"ref": "Art. 27", "titulo": "Vigencia", "cita": "El presente Reglamento se aplicará a todas las situaciones ocurridas con posterioridad a su vigencia.", "explicacion": "Aplicación hacia el futuro: rige los hechos posteriores a su entrada en vigor.", "ejemplo": "Un hecho anterior a la vigencia se rige por la norma que estaba vigente entonces."}, {"ref": "Anexo I", "titulo": "Instructivo del procedimiento de apreciación directa", "cita": "Recursos de revocación y jerárquico en subsidio... dentro de los diez días corridos... no teniendo efecto suspensivo.", "explicacion": "Siete pasos: acta del jerarca, vista, descargos/prueba, resolución, elevación a RRHH, recursos (10 días corridos, sin efecto suspensivo) y, si se mantiene, elevación a la Gerencia de Sumarios y al Directorio. Los recursos llevan firma letrada.", "ejemplo": "Si no se incluye firma letrada en el recurso, se da 10 días hábiles para salvarla o se tiene por no presentado."}], "flashcards": [{"front": "¿Qué es una falta administrativa?", "back": "Todo acto u omisión del funcionario, intencional o culposo, que viole los deberes funcionales (Art. 12).", "id": "7-0"}, {"front": "¿Cómo se clasifican las faltas según su entidad?", "back": "En leves, semi-graves y graves (Art. 13).", "id": "7-1"}, {"front": "Rango de sanción de las faltas LEVES", "back": "Desde observación escrita y hasta 10 días de suspensión con pérdida de haberes (Art. 14).", "id": "7-2"}, {"front": "Rango de sanción de las faltas SEMI-GRAVES", "back": "Desde 11 y hasta 30 días de suspensión con pérdida de haberes (Art. 15).", "id": "7-3"}, {"front": "Rango de sanción de las faltas GRAVES", "back": "Desde 31 y hasta 180 días de suspensión, pudiendo llegar hasta la destitución (Art. 16).", "id": "7-4"}, {"front": "¿Cuáles son las tres sanciones disciplinarias?", "back": "Observación escrita, suspensión con pérdida de haberes y destitución (Art. 17).", "id": "7-5"}, {"front": "¿Quién dispone la destitución y con qué mayoría?", "back": "El Directorio, por cuatro votos conformes, por falta grave en casos de ineptitud, omisión o delito (Art. 17 lit. c).", "id": "7-6"}, {"front": "¿Hasta cuántos días de suspensión puede aplicar un Jefe?", "back": "Hasta tres días (Art. 18).", "id": "7-7"}, {"front": "¿Hasta cuántos días puede suspender un Gerente de Unidad?", "back": "Hasta 10 días (Art. 18).", "id": "7-8"}, {"front": "¿Qué jerarcas pueden suspender hasta 30 días?", "back": "Gerencia General, Dir. Técnica de ATYR y de Prestaciones, Secretaría General y demás jerarcas Nivel I (Art. 18).", "id": "7-9"}, {"front": "¿Qué faltas se pueden sancionar sin sumario?", "back": "Las leves y semi-graves de apreciación directa, que no requieren investigación (Art. 19).", "id": "7-10"}, {"front": "¿Qué faltas requieren siempre investigación administrativa o sumario?", "back": "Las graves y las leves/semi-graves que NO sean de apreciación directa (Art. 20).", "id": "7-11"}, {"front": "¿A qué plazo prescriben las faltas que no constituyen delito?", "back": "A los ocho años (Art. 21 lit. b).", "id": "7-12"}, {"front": "¿Qué pasa con la prescripción si la falta también es delito?", "back": "Prescribe en el término de prescripción de ese delito (Art. 21 lit. a).", "id": "7-13"}, {"front": "¿Qué suspende el curso de la prescripción de una falta?", "back": "La resolución que disponga una investigación administrativa o la instrucción de un sumario (Art. 21).", "id": "7-14"}, {"front": "¿Qué son las sanciones automáticas por inasistencia CON aviso?", "back": "Desde la 2a inasistencia del mes, 1 día de suspensión por cada día no trabajado (Art. 4.I.a).", "id": "7-15"}, {"front": "¿Cómo se sancionan las inasistencias SIN aviso?", "back": "1er día: 1 día de suspensión; 2a y sucesivas del mismo mes: 2 días por cada día (Art. 4.I.b).", "id": "7-16"}, {"front": "¿A partir de cuántas inasistencias anuales se dispone sumario?", "back": "A partir de 10 inasistencias; hasta 9 inclusive la sanción provisional queda definitiva (Art. 4.II).", "id": "7-17"}, {"front": "¿Cuándo se configura el abandono del cargo / renuncia tácita?", "back": "Con 5 días de inasistencias continuas sin aviso; se comunica a RRHH en 24 horas y se emplaza por 3 días (Art. 9).", "id": "7-18"}, {"front": "Circunstancias atenuantes de la sanción", "back": "Sin intención/premeditación, buena conducta anterior, confesión y/o reparación del daño, y análogas (Art. 22.I).", "id": "7-19"}, {"front": "Circunstancias agravantes de la sanción", "back": "Reiteración, reincidencia, premeditación/engaño/abuso de autoridad o daño patrimonial, ser funcionario de jerarquía, y análogas (Art. 22.II).", "id": "7-20"}, {"front": "¿Qué es la reincidencia?", "back": "Cometer nuevas faltas antes de cumplidos 5 años de las sanciones por faltas anteriores o prescriptas las mismas (Art. 22.II.b).", "id": "7-21"}, {"front": "Efecto de la suspensión preventiva sobre la sanción final", "back": "Se imputa a la sanción definitiva el tiempo de suspensión y los haberes retenidos; si hay destitución no se devuelven (Art. 23).", "id": "7-22"}, {"front": "¿Qué beneficios no se descuentan aunque se retengan haberes?", "back": "La Prima por Hogar Constituido y la Asignación Familiar cuando corresponda (Art. 24).", "id": "7-23"}, {"front": "¿Qué recursos proceden contra el acto de apreciación directa y en qué plazo?", "back": "Revocación y jerárquico en subsidio, dentro de 10 días corridos de la notificación, sin efecto suspensivo (Anexo I, paso 6).", "id": "7-24"}, {"front": "¿Las faltas pueden cambiar de grado por las circunstancias?", "back": "Sí: atenuantes de excepcional relevancia bajan la falta un grado y agravantes de excepcional relevancia la suben (Art. 22).", "id": "7-25"}, {"front": "Da un ejemplo de falta grave", "back": "Violar el secreto administrativo, servirse del cargo para un beneficio ilegítimo o cometer delito contra la Administración (Art. 16).", "id": "7-26"}, {"front": "Da un ejemplo de falta semi-grave", "back": "Concurrir en estado de ebriedad o bajo drogas, o la reiteración de faltas leves (Art. 15).", "id": "7-27"}], "practica": [{"subtema": "Faltas: definición y clasificación", "q": "Según el Art. 12, una falta administrativa es:", "opciones": ["Solo un acto intencional que cause daño económico", "Todo acto u omisión, intencional o culposo, que viole los deberes funcionales", "Únicamente la inasistencia injustificada", "Cualquier conducta privada del funcionario"], "correcta": 1, "expl": "El Art. 12 define la falta como acto u omisión, intencional o culposo, que viola los deberes funcionales.", "id": "7-0", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Faltas: definición y clasificación", "q": "Las faltas administrativas se clasifican en (Art. 13):", "opciones": ["Leves y graves", "Leves, medias y graves", "Leves, semi-graves y graves", "Menores, mayores y gravísimas"], "correcta": 2, "expl": "El Art. 13 las califica en leves, semi-graves y graves.", "id": "7-1", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Faltas: definición y clasificación", "q": "La falta culposa (negligente):", "opciones": ["No es sancionable, solo la intencional", "También es falta administrativa", "Solo se sanciona si es jerarca", "Requiere siempre destitución"], "correcta": 1, "expl": "El Art. 12 incluye expresamente la conducta culposa, no solo la intencional.", "id": "7-2", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Faltas: definición y clasificación", "q": "¿Cuál de estas es una falta LEVE?", "opciones": ["Violar el secreto administrativo", "Conducta irrespetuosa con otro funcionario o el público", "Cometer delito contra la Administración", "Servirse del cargo para beneficio ilegítimo"], "correcta": 1, "expl": "La conducta irrespetuosa es falta leve (Art. 14 lit. a); las demás son graves (Art. 16).", "id": "7-3", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Faltas: definición y clasificación", "q": "La reiteración de faltas leves constituye:", "opciones": ["Otra falta leve", "Una falta semi-grave", "Una falta grave", "Una atenuante"], "correcta": 1, "expl": "El Art. 15 lit. f tipifica la reiteración de faltas leves como semi-grave.", "id": "7-4", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Faltas: definición y clasificación", "q": "Acumular 10 o más faltas injustificadas al año es una falta:", "opciones": ["Leve", "Semi-grave", "Grave", "No es falta, solo descuento"], "correcta": 2, "expl": "El Art. 16 lit. q la tipifica como falta grave.", "id": "7-5", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Faltas: definición y clasificación", "q": "Concurrir al trabajo en estado de ebriedad es una falta:", "opciones": ["Leve", "Semi-grave", "Grave que amerita destitución directa", "No prevista"], "correcta": 1, "expl": "El Art. 15 lit. c la clasifica como semi-grave.", "id": "7-6", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Faltas: definición y clasificación", "q": "Efectuar registros de asistencia de otro funcionario (marcar por otro) es:", "opciones": ["Falta leve", "Falta semi-grave", "Falta grave", "Conducta permitida con autorización"], "correcta": 2, "expl": "El Art. 16 lit. r la tipifica como falta grave.", "id": "7-7", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Sanciones y graduación", "q": "¿Cuáles son las sanciones disciplinarias del Art. 17?", "opciones": ["Multa, suspensión y destitución", "Observación escrita, suspensión con pérdida de haberes y destitución", "Apercibimiento verbal, traslado y destitución", "Amonestación, descuento y cesantía"], "correcta": 1, "expl": "El Art. 17 enumera observación escrita, suspensión con pérdida de haberes y destitución.", "id": "7-8", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Sanciones y graduación", "q": "La observación escrita consiste en:", "opciones": ["Un descuento de haberes", "Una advertencia con notificación y anotación en el legajo personal", "La privación temporal de funciones", "El cese del vínculo funcional"], "correcta": 1, "expl": "El Art. 17 lit. a la define como advertencia con notificación y anotación en el legajo.", "id": "7-9", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Sanciones y graduación", "q": "La destitución la dispone el Directorio con:", "opciones": ["Mayoría simple", "Tres votos conformes", "Cuatro votos conformes", "Unanimidad obligatoria"], "correcta": 2, "expl": "El Art. 17 lit. c exige cuatro votos conformes del Directorio.", "id": "7-10", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Sanciones y graduación", "q": "La destitución procede por falta grave en casos de:", "opciones": ["Ineptitud, omisión o delito", "Cualquier inasistencia", "Llegadas tarde reiteradas", "Discusiones con el público"], "correcta": 0, "expl": "El Art. 17 lit. c menciona ineptitud, omisión o delito.", "id": "7-11", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Sanciones y graduación", "q": "Las faltas semi-graves pueden sancionarse con suspensión de:", "opciones": ["Hasta 10 días", "11 a 30 días", "31 a 180 días", "Más de 180 días"], "correcta": 1, "expl": "El Art. 15 establece de 11 a 30 días de suspensión con pérdida de haberes.", "id": "7-12", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Sanciones y graduación", "q": "Las faltas graves se sancionan con suspensión de:", "opciones": ["1 a 10 días", "11 a 30 días", "31 a 180 días, pudiendo llegar a la destitución", "Solo destitución"], "correcta": 2, "expl": "El Art. 16 fija de 31 a 180 días, pudiendo llegar a la destitución.", "id": "7-13", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Sanciones y graduación", "q": "La sanción se gradúa en función de (Art. 22):", "opciones": ["La antigüedad únicamente", "La gravedad de la falta y las circunstancias atenuantes y agravantes", "El salario del funcionario", "La opinión del público"], "correcta": 1, "expl": "El Art. 22 manda fijar la sanción según gravedad y circunstancias atenuantes/agravantes.", "id": "7-14", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Sanciones y graduación", "q": "¿Cuál NO es una circunstancia atenuante?", "opciones": ["Haber cometido la falta sin intención", "La buena conducta anterior", "La confesión y/o reparación del daño", "La reincidencia"], "correcta": 3, "expl": "La reincidencia es agravante (Art. 22.II.b); las demás son atenuantes (Art. 22.I).", "id": "7-15", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Sanciones y graduación", "q": "La reincidencia se configura cuando se cometen nuevas faltas:", "opciones": ["En el mismo mes", "Antes de cumplidos 5 años de las sanciones anteriores o prescriptas las mismas", "Después de 10 años", "Solo si son de la misma naturaleza"], "correcta": 1, "expl": "El Art. 22.II.b define la reincidencia con el plazo de 5 años.", "id": "7-16", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Sanciones y graduación", "q": "Que la falta sea cometida por un funcionario de jerarquía es:", "opciones": ["Una atenuante", "Indiferente", "Una agravante", "Causa de prescripción"], "correcta": 2, "expl": "El Art. 22.II.d la considera circunstancia agravante.", "id": "7-17", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Sanciones y graduación", "q": "Atenuantes de excepcional relevancia pueden calificar la falta:", "opciones": ["En el grado inmediato superior", "En el grado inmediato anterior", "Como prescripta", "Sin cambios de grado"], "correcta": 1, "expl": "El Art. 22 permite bajar la falta al grado inmediato anterior por atenuantes excepcionales.", "id": "7-18", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Aplicación por jerarquía", "q": "El máximo de suspensión que puede aplicar un Jefe es:", "opciones": ["3 días", "10 días", "30 días", "180 días"], "correcta": 0, "expl": "El Art. 18 fija el tope de los Jefes en tres días.", "id": "7-19", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Aplicación por jerarquía", "q": "Un Gerente de Unidad puede aplicar suspensión de hasta:", "opciones": ["3 días", "10 días", "30 días", "180 días"], "correcta": 1, "expl": "El Art. 18 establece hasta 10 días para los Gerentes de Unidades.", "id": "7-20", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Aplicación por jerarquía", "q": "¿Quién puede aplicar la destitución?", "opciones": ["Cualquier Jefe", "Los Gerentes de Unidades", "Solo el Directorio", "La Gerencia General"], "correcta": 2, "expl": "Según el Art. 18, solo el Directorio puede destituir (y hasta 180 días de suspensión).", "id": "7-21", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Aplicación por jerarquía", "q": "Los jerarcas de Nivel I pueden suspender hasta:", "opciones": ["3 días", "10 días", "30 días", "180 días"], "correcta": 2, "expl": "El Art. 18 fija hasta 30 días para Gerencia General, ATYR, Prestaciones, Secretaría General y Nivel I.", "id": "7-22", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Procedimiento y debido proceso", "q": "Las faltas leves y semi-graves de apreciación directa:", "opciones": ["Requieren sumario obligatorio", "Se evalúan por los jerarcas sin previo sumario", "Las resuelve siempre el Directorio", "Prescriben de inmediato"], "correcta": 1, "expl": "El Art. 19 permite resolverlas sin sumario, mediante acta y vista del jerarca.", "id": "7-23", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Procedimiento y debido proceso", "q": "¿Qué faltas requieren SIEMPRE investigación administrativa o sumario?", "opciones": ["Todas las leves", "Las graves y las que no sean de apreciación directa", "Solo las que impliquen destitución", "Ninguna"], "correcta": 1, "expl": "El Art. 20 exige sumario para las graves y las no de apreciación directa.", "id": "7-24", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Procedimiento y debido proceso", "q": "En la apreciación directa, antes de resolver el jerarca debe:", "opciones": ["Destituir directamente", "Labrar acta y conferir vista al funcionario", "Publicar en el Diario Oficial", "Esperar 8 años"], "correcta": 1, "expl": "El Art. 19 y el Anexo I exigen acta con los hechos y vista al funcionario.", "id": "7-25", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Procedimiento y debido proceso", "q": "Contra el acto de apreciación directa proceden:", "opciones": ["Solo el recurso de revocación", "Revocación y jerárquico en subsidio", "Apelación judicial directa", "Ningún recurso"], "correcta": 1, "expl": "El Anexo I (paso 6) prevé revocación y jerárquico en subsidio.", "id": "7-26", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Procedimiento y debido proceso", "q": "El plazo para interponer los recursos en apreciación directa es de:", "opciones": ["3 días corridos", "10 días corridos siguientes a la notificación personal", "20 días hábiles", "30 días corridos"], "correcta": 1, "expl": "El Anexo I (paso 6) fija 10 días corridos siguientes a la notificación, sin efecto suspensivo.", "id": "7-27", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Procedimiento y debido proceso", "q": "La interposición del recurso en apreciación directa:", "opciones": ["Suspende la aplicación de la sanción", "No tiene efecto suspensivo para la sanción", "Anula automáticamente la sanción", "Obliga a destituir"], "correcta": 1, "expl": "El Anexo I aclara que el recurso no tiene efecto suspensivo.", "id": "7-28", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Procedimiento y debido proceso", "q": "Si el recurso jerárquico se mantiene, las actuaciones pasan a:", "opciones": ["La Justicia ordinaria", "La Gerencia de Sumarios, que lo eleva al Directorio", "RRHH para archivar", "El mismo jerarca de nuevo"], "correcta": 1, "expl": "El Anexo I (paso 7): la Gerencia de Sumarios sustancia el jerárquico y lo eleva al Directorio.", "id": "7-29", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Prescripción y disposiciones finales", "q": "Las faltas que no constituyen delito prescriben a los:", "opciones": ["2 años", "5 años", "8 años", "10 años"], "correcta": 2, "expl": "El Art. 21 lit. b establece ocho años.", "id": "7-30", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Prescripción y disposiciones finales", "q": "La prescripción de la falta se suspende por:", "opciones": ["La renuncia del funcionario", "La resolución que disponga investigación administrativa o sumario", "El paso de 5 años", "La notificación de la observación"], "correcta": 1, "expl": "El Art. 21 dispone la suspensión por esa resolución.", "id": "7-31", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Prescripción y disposiciones finales", "q": "La suspensión preventiva aplicada en un sumario:", "opciones": ["No tiene ningún efecto", "Se imputa a la sanción definitiva (tiempo y haberes retenidos)", "Se suma a la sanción final", "Siempre se devuelve íntegra"], "correcta": 1, "expl": "El Art. 23 manda imputarla a la sanción; salvo destitución, se devuelven los haberes.", "id": "7-32", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Prescripción y disposiciones finales", "q": "Si el sumario termina en destitución, los haberes retenidos:", "opciones": ["Se devuelven íntegros", "Se devuelven a la mitad", "No corresponde devolverlos en ningún caso", "Se transforman en indemnización"], "correcta": 2, "expl": "El Art. 23 establece que en caso de destitución no se devuelven los haberes retenidos.", "id": "7-33", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Prescripción y disposiciones finales", "q": "Aunque se retengan haberes por una sanción, NO se descuentan:", "opciones": ["El sueldo base", "La Prima por Hogar Constituido y la Asignación Familiar", "Los viáticos", "Las horas extra"], "correcta": 1, "expl": "El Art. 24 preserva la Prima por Hogar Constituido y la Asignación Familiar.", "id": "7-34", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Inasistencias y horario", "q": "Las inasistencias SIN aviso: el primer día se sanciona con:", "opciones": ["Observación escrita", "1 día de suspensión", "2 días de suspensión", "Destitución"], "correcta": 1, "expl": "El Art. 4.I.b fija 1 día de suspensión por el primer día sin aviso.", "id": "7-35", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Inasistencias y horario", "q": "A partir de cuántas inasistencias anuales se dispone la instrucción de sumario:", "opciones": ["5", "9", "10", "15"], "correcta": 2, "expl": "El Art. 4.II.b: a partir de 10 inasistencias se dispone sumario; hasta 9 la sanción provisional queda firme.", "id": "7-36", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Inasistencias y horario", "q": "El abandono del cargo (renuncia tácita) se promueve con:", "opciones": ["3 días de inasistencia con aviso", "5 días de inasistencias continuas sin aviso", "10 inasistencias en el mes", "Una sola falta grave"], "correcta": 1, "expl": "El Art. 9 exige 5 días de inasistencias continuas sin aviso, comunicando a RRHH en 24 horas.", "id": "7-37", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Inasistencias y horario", "q": "En el trámite de abandono, el funcionario es emplazado por:", "opciones": ["24 horas", "tres días", "cinco días", "diez días"], "correcta": 1, "expl": "El Art. 9 prevé emplazamiento por tres días (domicilio y/o Diario Oficial).", "id": "7-38", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}, {"subtema": "Inasistencias y horario", "q": "Las omisiones de registro de asistencia generan falta a partir de la:", "opciones": ["primera omisión", "tercera omisión", "quinta omisión en el año calendario", "décima omisión"], "correcta": 2, "expl": "El Art. 6: a partir de la quinta omisión en un año calendario puede incurrir en falta.", "id": "7-39", "tema_id": 7, "tema_nombre": "Reglamento de Responsabilidad Administrativa (BPS)"}], "autoeval": [{"q": "Definí qué es una falta administrativa y por qué incluye la conducta culposa.", "a": "Es todo acto u omisión del funcionario, intencional o culposo, que viola los deberes funcionales (Art. 12). Incluye la culpa (negligencia) porque el reglamento protege el correcto cumplimiento de los deberes, no solo castiga la mala intención: una omisión negligente que daña el servicio también compromete la responsabilidad."}, {"q": "Explicá la clasificación de las faltas y el rango de sanción de cada categoría.", "a": "Leves: desde observación escrita hasta 10 días de suspensión (Art. 14). Semi-graves: de 11 a 30 días (Art. 15). Graves: de 31 a 180 días, pudiendo llegar a la destitución (Art. 16). La clasificación (Art. 13) ordena la respuesta disciplinaria según la entidad de la conducta."}, {"q": "¿Cuáles son las tres sanciones disciplinarias y qué requisito especial tiene la destitución?", "a": "Observación escrita (advertencia con anotación en legajo), suspensión con pérdida de haberes y destitución (Art. 17). La destitución la dispone el Directorio por cuatro votos conformes, por falta grave, en casos de ineptitud, omisión o delito."}, {"q": "Describí la escala de competencia sancionatoria por jerarquía (Art. 18).", "a": "Directorio: observación, suspensión hasta 180 días y destitución. Gerencia General, ATYR, Prestaciones, Secretaría General y Nivel I: hasta 30 días. Gerentes de Unidades: hasta 10 días. Jefes: hasta 3 días. Solo el Directorio destituye."}, {"q": "Diferenciá el procedimiento de apreciación directa del sumario (Arts. 19-20).", "a": "Las faltas leves y semi-graves de apreciación directa, que no requieren investigación, las resuelve el jerarca sin sumario, labrando acta y dando vista (Art. 19, Anexo I). En cambio, las faltas graves y las leves/semi-graves que no sean de apreciación directa exigen siempre investigación administrativa o sumario (Art. 20)."}, {"q": "¿Cómo funciona la prescripción de las faltas administrativas?", "a": "Prescriben a los 8 años si no constituyen delito, o en el plazo del delito si lo configuran (Art. 21). El cómputo sigue el art. 119 del Código Penal y se suspende por la resolución que dispone la investigación administrativa o el sumario."}, {"q": "Enumerá atenuantes y agravantes y explicá su efecto sobre el grado de la falta.", "a": "Atenuantes (Art. 22.I): sin intención, buena conducta anterior, confesión/reparación del daño y análogas. Agravantes (Art. 22.II): reiteración, reincidencia (antes de 5 años), premeditación/abuso de autoridad o daño patrimonial, ser jerarca y análogas. Las de excepcional relevancia bajan o suben la falta al grado inmediato anterior o superior."}, {"q": "¿Qué efectos tiene la suspensión preventiva sobre la sanción definitiva?", "a": "Se imputa a la sanción que recaiga el tiempo de suspensión y los haberes retenidos (Art. 23). Si el sumario termina en destitución, no corresponde devolver los haberes retenidos."}, {"q": "¿Qué garantías del debido proceso prevé el Anexo I para la apreciación directa?", "a": "Acta del jerarca, vista al funcionario, posibilidad de descargos, probanzas y defensa, resolución fundada, y recursos de revocación y jerárquico en subsidio dentro de 10 días corridos de la notificación, sin efecto suspensivo. Si se mantiene, pasa a la Gerencia de Sumarios y al Directorio."}, {"q": "¿Cómo se sancionan las inasistencias con y sin aviso y cuándo se llega al sumario?", "a": "Con aviso: desde la 2a del mes, 1 día de suspensión por día (Art. 4.I.a). Sin aviso: 1er día 1 día, siguientes del mes 2 días por día (Art. 4.I.b). Hasta 9 inasistencias anuales la sanción provisional queda definitiva; desde 10 se dispone sumario (Art. 4.II)."}], "huecos": ["Las escalas numéricas detalladas del Art. 5 (descuento de minutos particulares por régimen horario, literales I a VI con sus rangos exactos) se resumieron pero no se transcribieron cifra por cifra en el JSON; el detalle completo figura en el PDF/07-raw.txt.", "El reglamento no fija una fecha única de vigencia general; cita modificaciones por R.D. N° 40-10/2025 (17/12/2025) en Arts. 5 y 10 y R.D. N° 6-3/2026 (4/3/2026) en Arts. 6 y 8. No se identificó en el texto la resolución de aprobación original del reglamento."]}, {"id": 8, "tema": "Salud en el trabajo: factores y riesgos psicosociales", "fuente_pagina": "https://www.bps.gub.uy/24271/", "fuente_pdf": "https://www.bps.gub.uy/bps/file/24271/1/salud-en-el-trabajo-factores-y-riesgos-psicosociales.pdf", "fuente_nombre": "Salud en el trabajo: factores y riesgos psicosociales - Centro de Estudios de BPS (edicion 2026)", "ficha": "Material conceptual y tecnico del Centro de Estudios de BPS que aborda la salud en el trabajo desde el enfoque de la salud ocupacional. Distingue entre riesgos psicosociales (hechos con alta probabilidad de danar la salud) y factores psicosociales (condiciones organizacionales que pueden ser de riesgo o protectoras), describe los principales riesgos (estres, violencia, acoso laboral y sexual, inseguridad, burnout), el marco normativo nacional e internacional, y las areas, programas y protocolos que BPS implementa para la prevencion y gestion.", "eli5": "Imaginate que tu trabajo es como una planta: necesita buena tierra, luz y agua para crecer sana. Esos cuidados son las condiciones del trabajo. Algunos elementos del ambiente laboral (cuanta tarea tenes, como te tratan, si tenes apoyo) pueden ayudarte a florecer o enfermarte. Cuando algo del ambiente realmente dana tu cabeza o tu cuerpo (como el acoso o el estres fuerte), eso es un riesgo psicosocial. La idea central es que la responsabilidad de cuidar esa planta no es solo tuya: la organizacion es la principal responsable, aunque vos tambien ayudas.", "esquema": ["1. Marco general", "  - Convenio 187 de OIT (2006): cultura de prevencion, maxima prioridad a la prevencion", "  - Cultura de seguridad y salud: corresponsabilidad (organizaciones = responsabilidad principal; trabajadores = papel crucial)", "  - Trabajo vs. empleo (empleo = contrato y compensacion; trabajo = toda actividad que genera valor)", "2. Salud y salud ocupacional", "  - Salud (OMS 1946): completo bienestar fisico, mental y social, no solo ausencia de enfermedad", "  - Salud ocupacional (OMS 1995): actividad multidisciplinaria de promocion y proteccion", "  - CYMAT: factores fisicos, quimicos, biologicos, ergonomicos y psicosociales", "3. Riesgos y factores psicosociales", "  - Riesgos psicosociales (Moreno y Baez 2010): hechos con alta probabilidad de danar la salud", "  - Factores psicosociales: condiciones presentes en la organizacion, no necesariamente negativas", "  - Consecuencias de los riesgos concretados", "4. Principales riesgos psicosociales", "  - Estres (el principal; respuesta general ante los demas)", "  - Violencia (3 tipos)", "  - Acoso laboral (mobbing) y abuso emocional", "  - Acoso sexual (Ley 18.561; unico riesgo con cobertura legal; 2 tipos)", "  - Inseguridad laboral, burnout, incivismo, conflicto familia-trabajo, trabajo emocional", "5. Factores psicosociales (lista)", "6. Marco normativo (Constitucion, Ley 15.965, Decreto 291/007, normas internacionales)", "7. BPS: normativa interna, areas, programas y protocolos"], "datos_duros": ["Convenio 187 de OIT (ano 2006): promueve una cultura de prevencion con participacion de gobierno, empleadores y trabajadores; maxima prioridad al principio de prevencion (Introduccion).", "Salud (OMS, 1946): 'el estado de completo bienestar fisico, mental y social, y no solo la ausencia de afecciones o enfermedades' (Salud y salud ocupacional).", "Salud ocupacional definida por la OMS, 1995 (Salud y salud ocupacional).", "CYMAT: factores fisicos, quimicos, biologicos, ergonomicos y psicosociales (CYMAT).", "Riesgos psicosociales (Moreno y Baez, 2010, p.17): 'hechos, situaciones o estados de la organizacion con una alta probabilidad de danar la salud de los trabajadores de forma importante'.", "Moreno y Baez (2010) profundizan en 6 riesgos: violencia, acoso laboral, acoso sexual, inseguridad laboral, burnout y estres; agregan 2 mas: conflicto trabajo-familia y trabajo emocional.", "Lista de riesgos psicosociales del recuadro: estres, violencia, incivismo, acoso laboral, acoso sexual, inseguridad laboral, burnout, conflicto familia-trabajo (Riesgos).", "Estres laboral (Comision Europea, 2002, citado en Moreno y Baez 2010): 'patron de reacciones emocionales, cognitivas, fisiologicas y de comportamiento a ciertos aspectos adversos o nocivos del contenido del trabajo...' (El estres).", "El estres es el PRINCIPAL riesgo psicosocial, actua como respuesta general ante los demas (Moreno y Baez) (El estres).", "Violencia laboral (OIT, 2003): 'toda accion, incidente o comportamiento que se aparta de lo razonable en la cual una persona es agredida, amenazada, humillada o lesionada como consecuencia directa de su trabajo' (Violencia).", "3 tipos de violencia en el trabajo: externa (ajenos a la organizacion), de clientes/usuarios, e interna (companeros, supervisores) (Violencia).", "Bullying = acoso educativo; Mobbing = acoso laboral (Acoso laboral).", "Acoso sexual: UNICO riesgo psicosocial con cobertura legal en Uruguay; Art. 2 de la Ley 18.561 (Acoso sexual).", "2 tipos de acoso sexual: chantaje sexual (quid pro quo) y ambiente hostil (Acoso sexual).", "Constitucion de la Republica: arts. 7, 44, 53 y 54 protegen integridad fisica/moral y salud en el trabajo (Marco normativo).", "Ley 15.965 (junio de 1988): ratifico los Convenios de OIT 148, 155 y 161 (Marco normativo).", "Decreto 291/007: reglamenta el Convenio 155 de OIT; disposiciones minimas obligatorias de prevencion y cooperacion empleadores-trabajadores (Marco normativo).", "Organismo de contralor: Ministerio de Trabajo y Seguridad Social; fiscalizacion por la Inspeccion General del Trabajo (Marco normativo).", "Estatuto del Funcionario de BPS: Art. 34 (higiene, salubridad y seguridad) y Art. 50 (proteccion del funcionario ante ataques/difamacion) (Normativa BPS).", "Dos areas en BPS: Asuntos Laborales (Gestion Humana) y Salud Ocupacional (Gerencia de Prestaciones de Salud) (Areas).", "Plan de Salud y Seguridad Laboral: desde 2007 (Programas).", "Programa de Promocion en salud mental y mejora de condiciones psicosociales: creado en 2014 (Programas).", "Protocolo de actuacion ante denuncias de acoso o discriminacion laboral: desde 2018 (Programas).", "Protocolo de actuacion frente a situaciones de violencia sobre trabajadores: desde 2019 (Programas).", "ATSS = Asociacion de Trabajadores de la Seguridad Social; participa en la Comision Bipartita de Salud Laboral (Programas)."], "teoria_resumida": "\u003cp\u003eEl material aborda la \u003cstrong\u003esalud en el trabajo\u003c/strong\u003e desde el enfoque de la \u003cstrong\u003esalud ocupacional\u003c/strong\u003e, enmarcado en el \u003cstrong\u003eConvenio 187 de la OIT (2006)\u003c/strong\u003e, que promueve una cultura de prevencion con participacion de gobierno, empleadores y trabajadores y maxima prioridad al principio de prevencion.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCorresponsabilidad:\u003c/strong\u003e la cultura de seguridad y salud implica que \u003cstrong\u003elas organizaciones tienen la responsabilidad principal\u003c/strong\u003e, pero los trabajadores tambien cumplen un papel crucial (seguir politicas, formarse, comunicar inquietudes).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eConceptos base:\u003c/strong\u003e el \u003cem\u003eempleo\u003c/em\u003e es la relacion laboral formalizada por un contrato a cambio de compensacion; el \u003cem\u003etrabajo\u003c/em\u003e es toda actividad que genera valor, dentro o fuera de lo remunerado. La \u003cstrong\u003esalud\u003c/strong\u003e (OMS, 1946) es el completo bienestar fisico, mental y social. La \u003cstrong\u003esalud ocupacional\u003c/strong\u003e (OMS, 1995) es una actividad multidisciplinaria de promocion y proteccion. Las \u003cstrong\u003eCYMAT\u003c/strong\u003e agrupan factores fisicos, quimicos, biologicos, ergonomicos y \u003cstrong\u003epsicosociales\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDistincion clave:\u003c/strong\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eRiesgos psicosociales\u003c/strong\u003e (Moreno y Baez, 2010): \u003cem\u003ehechos\u003c/em\u003e, situaciones o estados de la organizacion con alta probabilidad de danar la salud de forma importante. Tienen mayor impacto, sobre todo en la salud mental.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eFactores psicosociales\u003c/strong\u003e: \u003cem\u003econdiciones\u003c/em\u003e presentes en la organizacion; pueden ser de riesgo pero \u003cstrong\u003eno necesariamente negativas\u003c/strong\u003e (pueden ser protectoras, como las buenas relaciones interpersonales).\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eEl analisis de los riesgos recae sobre la \u003cstrong\u003eorganizacion\u003c/strong\u003e, no sobre la persona. Cuando se concretan, sus consecuencias son: baja del rendimiento, aumento del ausentismo, mas accidentes, aislamiento y mayor estres.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePrincipales riesgos:\u003c/strong\u003e el \u003cstrong\u003eestres\u003c/strong\u003e es el principal (respuesta general ante los demas); la \u003cstrong\u003eviolencia\u003c/strong\u003e laboral (OIT, 2003), con 3 tipos segun el origen; el \u003cstrong\u003eacoso laboral\u003c/strong\u003e o \u003cem\u003emobbing\u003c/em\u003e (trato hostil sostenido y sistematico), del que el \u003cem\u003eabuso emocional\u003c/em\u003e es un componente; y el \u003cstrong\u003eacoso sexual\u003c/strong\u003e, unico riesgo con cobertura legal en Uruguay (Art. 2 de la Ley 18.561), con dos modalidades: chantaje sexual y ambiente hostil.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMarco normativo:\u003c/strong\u003e Constitucion (arts. 7, 44, 53 y 54), Ley 15.965/1988 (ratifica Convenios OIT 148, 155 y 161), Decreto 291/007 (reglamenta el Convenio 155) y diversas normas internacionales. Contralor: MTSS, via Inspeccion General del Trabajo.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEn BPS:\u003c/strong\u003e el Estatuto del Funcionario (arts. 34 y 50), dos areas responsables (Asuntos Laborales y Salud Ocupacional) y programas/protocolos: Plan de Salud y Seguridad Laboral (2007), Programa de salud mental y condiciones psicosociales (2014), Protocolo de acoso/discriminacion (2018) y Protocolo de violencia desde usuarios (2019).\u003c/p\u003e", "teoria_exhaustiva": [{"ref": "Introduccion", "titulo": "Marco OIT y prioridad de la prevencion", "cita": "Convenio 187 de OIT (2006): promueve una cultura en la que gobierno, empleadores y trabajadores participan activamente y se concede la maxima prioridad al principio de prevencion.", "explicacion": "El material se sustenta en los lineamientos internacionales de la OIT. El eje es prevenir antes que reparar, con responsabilidad compartida pero diferenciada.", "ejemplo": "Capacitar al personal en manejo del estres antes de que aparezcan licencias por sobrecarga."}, {"ref": "Corresponsabilidad", "titulo": "Cultura de seguridad y salud en el trabajo", "cita": "La corresponsabilidad implica que las organizaciones tienen la responsabilidad principal y los trabajadores tambien desempenan un papel crucial.", "explicacion": "Los trabajadores deben seguir las politicas, participar en la formacion y comunicar inquietudes; las personas pueden reducir factores de estres organizando su tiempo y comunicandose de forma abierta.", "ejemplo": "Un funcionario que reporta una situacion de conflicto en su equipo a Asuntos Laborales ejerce su corresponsabilidad."}, {"ref": "Trabajo y empleo", "titulo": "Diferencia entre trabajo y empleo", "cita": "El empleo refiere a las relaciones laborales a traves de un contrato que formaliza la prestacion de servicios a cambio de una compensacion economica; el trabajo trasciende el empleo y alude a toda actividad que genere valor.", "explicacion": "El empleo esta institucionalizado (contrato, derechos y obligaciones reciprocas); el trabajo es mas amplio y no se limita a lo remunerado y contractual.", "ejemplo": "Cuidar a un familiar es trabajo (genera valor) pero no es empleo (no hay contrato ni salario)."}, {"ref": "Salud (OMS 1946)", "titulo": "Definicion de salud", "cita": "La salud es 'el estado de completo bienestar fisico, mental y social, y no solo la ausencia de afecciones o enfermedades' (OMS, 1946).", "explicacion": "La salud no es solo no estar enfermo; incluye el bienestar mental y social. La estrategia 'Salud para Todos en el Ano 2000' agrego el nivel de salud suficiente para trabajar y participar socialmente.", "ejemplo": "Una persona sin enfermedad fisica pero con estres cronico no goza de salud plena segun la OMS."}, {"ref": "Salud ocupacional (OMS 1995)", "titulo": "Definicion de salud ocupacional", "cita": "Actividad multidisciplinaria dirigida a promover y proteger la salud de los trabajadores mediante la prevencion y el control de enfermedades y accidentes y la eliminacion de los factores y condiciones que ponen en peligro la salud y seguridad en el trabajo (OMS, 1995).", "explicacion": "Es multidisciplinaria, preventiva e integral (fisico, mental y social); busca trabajo seguro y sano y mantener la capacidad de trabajo, habilitando vidas productivas.", "ejemplo": "Un equipo de medicos, psicologos y tecnicos en seguridad evaluando un puesto de trabajo."}, {"ref": "CYMAT", "titulo": "Condiciones y medioambiente de trabajo", "cita": "Las CYMAT se componen de factores fisicos, quimicos, biologicos, ergonomicos y psicosociales, con incidencia directa y continua sobre las personas.", "explicacion": "Concepto que surge a mediados del siglo XX y desplaza la idea de que el deterioro de la salud era una problematica exclusivamente individual. Engloba el contexto fisico, tecnologico y de relaciones.", "ejemplo": "El ruido (fisico), un solvente (quimico) y la falta de apoyo del equipo (psicosocial) son todos factores CYMAT."}, {"ref": "Riesgos psicosociales", "titulo": "Definicion de riesgos psicosociales", "cita": "Moreno y Baez (2010): 'hechos, situaciones o estados de la organizacion con una alta probabilidad de danar la salud de los trabajadores de forma importante' (p.17).", "explicacion": "Estan determinados por variables del entorno y de la singularidad de las personas, pero el peso del analisis recae sobre la organizacion, no sobre la persona.", "ejemplo": "Una situacion sostenida de acoso es un riesgo psicosocial que se analiza desde fallas organizacionales."}, {"ref": "Termino psicosocial", "titulo": "Que significa 'psicosocial'", "cita": "Interaccion entre aspectos psicologicos (emociones, pensamientos, comportamientos) y sociales (relaciones interpersonales, contexto cultural, entorno social).", "explicacion": "El termino describe como lo individual-psicologico y lo social se cruzan en la vida laboral.", "ejemplo": "El malestar por un clima de equipo tenso combina lo emocional (psicologico) y lo relacional (social)."}, {"ref": "Factores psicosociales", "titulo": "Diferencia entre factores y riesgos", "cita": "Los factores psicosociales no son hechos puntuales, sino condiciones presentes en la organizacion; pueden representar un riesgo, pero no tienen carga necesariamente negativa.", "explicacion": "Son caracteristicas de la actividad laboral. Pueden ser incluso protectores: las relaciones interpersonales favorables protegen la salud y el bienestar.", "ejemplo": "El estilo de mando es un factor: un buen liderazgo protege; uno autoritario puede transformarse en riesgo."}, {"ref": "Consecuencias", "titulo": "Consecuencias de los riesgos concretados", "cita": "Disminucion del rendimiento, aumento del ausentismo, mas posibilidades de accidentes, mayor aislamiento o reduccion de relaciones interpersonales e incremento del estres.", "explicacion": "Los riesgos psicosociales tienen mayor impacto en la salud mental y terminan afectando la identidad de la persona.", "ejemplo": "Un trabajador con burnout falta mas seguido y baja su rendimiento."}, {"ref": "El estres", "titulo": "El estres como proceso y como riesgo", "cita": "Comision Europea (2002): 'patron de reacciones emocionales, cognitivas, fisiologicas y de comportamiento a ciertos aspectos adversos o nocivos del contenido del trabajo, organizacion del trabajo y el medio ambiente de trabajo'.", "explicacion": "El estres es una respuesta natural y adaptativa; solo bajo ciertas condiciones se vuelve negativo. Es el principal riesgo psicosocial porque funciona como respuesta general ante los demas. Influye la experiencia subjetiva y la capacidad de afrontamiento.", "ejemplo": "El estres ante una entrega puntual es adaptativo; sostenido sin control puede derivar en deterioro de la salud."}, {"ref": "Violencia", "titulo": "Violencia laboral y sus tipos", "cita": "OIT (2003): 'toda accion, incidente o comportamiento que se aparta de lo razonable en la cual una persona es agredida, amenazada, humillada o lesionada como consecuencia directa de su trabajo'.", "explicacion": "Puede ser fisica o psicologica. Tres tipos segun el origen: personas ajenas a la organizacion (ej. robo), clientes/usuarios (reclamos) y miembros de la organizacion (companeros, supervisores).", "ejemplo": "Un usuario que amenaza a un funcionario por un tramite es violencia del tipo cliente/usuario."}, {"ref": "Acoso laboral", "titulo": "Mobbing y abuso emocional", "cita": "Mobbing: trato hostil sostenido hacia otra persona en el trabajo; sistematico y con intencionalidad de afectar negativamente.", "explicacion": "Bullying se reserva para ambitos educativos; mobbing para los laborales. El abuso emocional es un componente del mobbing, menos sistematico, sin contacto fisico, y por si solo no constituye acoso.", "ejemplo": "Descalificar e intimidar a un companero de forma repetida y deliberada es mobbing."}, {"ref": "Acoso sexual (Ley 18.561, art. 2)", "titulo": "Acoso sexual: unico riesgo con cobertura legal", "cita": "Art. 2 de la Ley 18.561: 'todo comportamiento de naturaleza sexual... no deseado por la persona a la que va dirigido, y cuyo rechazo le produzca o amenace con producirle un perjuicio... o que cree un ambiente de trabajo intimidatorio, hostil o humillante'.", "explicacion": "Es una forma de violencia y un tipo de acoso laboral, pero se trata de forma independiente. En Uruguay es el unico riesgo psicosocial con cobertura legal. Dos tipos: chantaje sexual (quid pro quo, desde una posicion de poder) y ambiente hostil (discriminacion y valoracion de atributos sexuales).", "ejemplo": "Condicionar un ascenso a favores sexuales es chantaje sexual."}, {"ref": "Marco normativo", "titulo": "Normativa nacional e internacional", "cita": "Constitucion (arts. 7, 44, 53 y 54); Ley 15.965 (1988) que ratifica los Convenios OIT 148, 155 y 161; Decreto 291/007 que reglamenta el Convenio 155.", "explicacion": "Marco protector de la integridad fisica y moral. El Decreto 291/007 fija disposiciones minimas obligatorias y promueve la cooperacion bipartita. Contralor: MTSS via Inspeccion General del Trabajo.", "ejemplo": "El Convenio 161 (servicios de salud en el trabajo) sustenta la existencia de areas de Salud Ocupacional."}, {"ref": "Estatuto del Funcionario de BPS", "titulo": "Normativa interna de BPS", "cita": "Art. 34: 'Las condiciones del trabajo guardaran adecuada higiene, salubridad y seguridad...'; Art. 50: 'La Administracion protegera a los funcionarios de cualquier ataque, menoscabo, injuria o difamacion...'.", "explicacion": "Ambos articulos comprenden factores fisicos y psicosociales y expresan el compromiso del organismo con la integridad fisica y psicologica del personal.", "ejemplo": "Defender a un funcionario difamado por el ejercicio regular de su cargo (Art. 50)."}, {"ref": "Areas de BPS", "titulo": "Asuntos Laborales y Salud Ocupacional", "cita": "Asuntos Laborales (Gestion Humana) atiende clima laboral y vinculos; Salud Ocupacional (Gerencia de Prestaciones de Salud) brinda promocion, prevencion y proteccion con enfoque integral.", "explicacion": "Trabajan coordinadamente en identificacion y evaluacion de riesgos, reubicacion/reconversion laboral, vigilancia de la salud y participacion bipartita.", "ejemplo": "Salud Ocupacional recomienda readaptar un puesto segun las limitaciones fisicas o psiquicas de la persona."}, {"ref": "Programas y protocolos", "titulo": "Acciones de BPS", "cita": "Plan de Salud y Seguridad Laboral (2007), Programa de salud mental y condiciones psicosociales (2014), Protocolo de acoso o discriminacion (2018), Protocolo de violencia desde usuarios (2019).", "explicacion": "El conjunto cubre prevencion, formacion, evaluacion de riesgos psicosociales, actuacion ante acoso/discriminacion y ante violencia de usuarios, en coordinacion bipartita con ATSS.", "ejemplo": "Una denuncia de acoso se tramita por el Protocolo de 2018 garantizando confidencialidad y debido proceso."}], "flashcards": [{"front": "En que convenio de la OIT se enmarca el material?", "back": "En el Convenio 187 de la OIT (2006), que promueve una cultura de prevencion con maxima prioridad al principio de prevencion (Introduccion).", "id": "8-0"}, {"front": "Que implica la corresponsabilidad en salud y seguridad?", "back": "Que las organizaciones tienen la responsabilidad principal y los trabajadores cumplen un papel crucial (seguir politicas, formarse, comunicar inquietudes) (Corresponsabilidad).", "id": "8-1"}, {"front": "Diferencia entre trabajo y empleo", "back": "El empleo es la relacion laboral formalizada por contrato a cambio de compensacion; el trabajo es toda actividad que genera valor, no limitada a lo remunerado (Trabajo y empleo).", "id": "8-2"}, {"front": "Como definio la OMS la salud en 1946?", "back": "'El estado de completo bienestar fisico, mental y social, y no solo la ausencia de afecciones o enfermedades' (Salud y salud ocupacional).", "id": "8-3"}, {"front": "Que es la salud ocupacional segun la OMS (1995)?", "back": "Actividad multidisciplinaria
